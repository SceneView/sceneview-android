<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 480" fill="none">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F9FA"/>
      <stop offset="100%" stop-color="#E8EAED"/>
    </linearGradient>

    <!-- HDRI warm hint -->
    <linearGradient id="hdri-hint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3E0" stop-opacity="0.1"/>
      <stop offset="30%" stop-color="#FFF3E0" stop-opacity="0"/>
    </linearGradient>

    <!-- Floor gradient -->
    <linearGradient id="floor-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0EEE9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E8E4DD"/>
    </linearGradient>

    <!-- Chrome sphere -->
    <radialGradient id="chrome-grad" cx="0.35" cy="0.3" r="0.65" fx="0.3" fy="0.25">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="18%" stop-color="#F9FAFB"/>
      <stop offset="35%" stop-color="#D1D5DB"/>
      <stop offset="50%" stop-color="#9CA3AF"/>
      <stop offset="70%" stop-color="#6B7280"/>
      <stop offset="85%" stop-color="#4B5563"/>
      <stop offset="100%" stop-color="#374151"/>
    </radialGradient>

    <!-- Chrome environment stripe -->
    <linearGradient id="chrome-stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#F3F4F6" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Matte ceramic sphere -->
    <radialGradient id="matte-grad" cx="0.45" cy="0.38" r="0.6" fx="0.42" fy="0.35">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#F9FAFB"/>
      <stop offset="55%" stop-color="#F3F4F6"/>
      <stop offset="75%" stop-color="#E5E7EB"/>
      <stop offset="90%" stop-color="#D1D5DB"/>
      <stop offset="100%" stop-color="#9CA3AF"/>
    </radialGradient>

    <!-- Glass sphere -->
    <radialGradient id="glass-grad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#E0F2FE" stop-opacity="0.08"/>
      <stop offset="75%" stop-color="#BAE6FD" stop-opacity="0.15"/>
      <stop offset="90%" stop-color="#7DD3FC" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.25"/>
    </radialGradient>

    <radialGradient id="glass-edge" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="80%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="92%" stop-color="#E0F2FE" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#BAE6FD" stop-opacity="0.5"/>
    </radialGradient>

    <!-- Gold sphere -->
    <radialGradient id="gold-grad" cx="0.35" cy="0.3" r="0.65" fx="0.3" fy="0.25">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="20%" stop-color="#FDE68A"/>
      <stop offset="40%" stop-color="#FBBF24"/>
      <stop offset="55%" stop-color="#F59E0B"/>
      <stop offset="70%" stop-color="#D97706"/>
      <stop offset="85%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#92400E"/>
    </radialGradient>

    <!-- Gold specular -->
    <radialGradient id="gold-spec" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#FEF3C7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FEF3C7" stop-opacity="0"/>
    </radialGradient>

    <!-- Reflection blur filter -->
    <filter id="reflect-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>

    <!-- Soft shadow filter -->
    <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>

    <!-- Glass caustic filter -->
    <filter id="caustic-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>

    <!-- Perspective grid pattern -->
    <pattern id="grid-pattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#D1D5DB" stroke-width="0.3"/>
    </pattern>

    <!-- Floor clip -->
    <clipPath id="floor-clip">
      <rect x="0" y="235" width="280" height="245"/>
    </clipPath>

    <!-- Glass inner clip for refraction -->
    <clipPath id="glass-clip">
      <circle cx="178" cy="282" r="30"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="280" height="480" fill="url(#bg-grad)"/>

  <!-- HDRI warm hint at top -->
  <rect width="280" height="120" fill="url(#hdri-hint)"/>

  <!-- Very subtle warm ambient glow top-center -->
  <ellipse cx="140" cy="0" rx="160" ry="60" fill="#FFF3E0" opacity="0.06"/>

  <!-- Floor surface -->
  <g clip-path="url(#floor-clip)">
    <!-- Floor base color -->
    <rect x="0" y="235" width="280" height="245" fill="#F0EEE9"/>

    <!-- Perspective grid — converging lines toward vanishing point at (140, 180) -->
    <!-- Horizontal lines with perspective spacing -->
    <line x1="0" y1="260" x2="280" y2="260" stroke="#D1D5DB" stroke-width="0.3" opacity="0.5"/>
    <line x1="0" y1="285" x2="280" y2="285" stroke="#D1D5DB" stroke-width="0.3" opacity="0.45"/>
    <line x1="0" y1="315" x2="280" y2="315" stroke="#D1D5DB" stroke-width="0.3" opacity="0.4"/>
    <line x1="0" y1="350" x2="280" y2="350" stroke="#D1D5DB" stroke-width="0.3" opacity="0.35"/>
    <line x1="0" y1="390" x2="280" y2="390" stroke="#D1D5DB" stroke-width="0.3" opacity="0.3"/>
    <line x1="0" y1="435" x2="280" y2="435" stroke="#D1D5DB" stroke-width="0.3" opacity="0.25"/>

    <!-- Vertical converging lines -->
    <line x1="140" y1="235" x2="-40" y2="480" stroke="#D1D5DB" stroke-width="0.3" opacity="0.3"/>
    <line x1="140" y1="235" x2="40" y2="480" stroke="#D1D5DB" stroke-width="0.3" opacity="0.3"/>
    <line x1="140" y1="235" x2="100" y2="480" stroke="#D1D5DB" stroke-width="0.3" opacity="0.35"/>
    <line x1="140" y1="235" x2="140" y2="480" stroke="#D1D5DB" stroke-width="0.3" opacity="0.4"/>
    <line x1="140" y1="235" x2="180" y2="480" stroke="#D1D5DB" stroke-width="0.3" opacity="0.35"/>
    <line x1="140" y1="235" x2="240" y2="480" stroke="#D1D5DB" stroke-width="0.3" opacity="0.3"/>
    <line x1="140" y1="235" x2="320" y2="480" stroke="#D1D5DB" stroke-width="0.3" opacity="0.3"/>

    <!-- Floor fade to background at bottom -->
    <rect x="0" y="420" width="280" height="60" fill="url(#bg-grad)" opacity="0.4"/>
  </g>

  <!-- Horizon line softener -->
  <rect x="0" y="225" width="280" height="20" fill="url(#bg-grad)" opacity="0.5"/>

  <!-- ==================== SHADOWS ON FLOOR ==================== -->
  <!-- Chrome shadow -->
  <ellipse cx="68" cy="310" rx="24" ry="6" fill="#6B7280" opacity="0.12" filter="url(#soft-shadow)"/>
  <!-- Matte shadow -->
  <ellipse cx="118" cy="305" rx="22" ry="5.5" fill="#6B7280" opacity="0.1" filter="url(#soft-shadow)"/>
  <!-- Glass shadow + caustic -->
  <ellipse cx="178" cy="315" rx="22" ry="5.5" fill="#6B7280" opacity="0.06" filter="url(#soft-shadow)"/>
  <ellipse cx="178" cy="318" rx="14" ry="6" fill="#FFFFFF" opacity="0.25" filter="url(#caustic-blur)"/>
  <!-- Gold shadow -->
  <ellipse cx="222" cy="320" rx="28" ry="7" fill="#92400E" opacity="0.1" filter="url(#soft-shadow)"/>

  <!-- ==================== REFLECTIONS ON FLOOR ==================== -->
  <g clip-path="url(#floor-clip)" filter="url(#reflect-blur)">
    <!-- Chrome reflection -->
    <g transform="translate(68, 310) scale(1, -1) translate(-68, -275)" opacity="0.2">
      <circle cx="68" cy="275" r="28" fill="url(#chrome-grad)"/>
    </g>

    <!-- Matte reflection -->
    <g transform="translate(118, 305) scale(1, -1) translate(-118, -272)" opacity="0.15">
      <circle cx="118" cy="272" r="26" fill="url(#matte-grad)"/>
    </g>

    <!-- Glass reflection -->
    <g transform="translate(178, 315) scale(1, -1) translate(-178, -282)" opacity="0.1">
      <circle cx="178" cy="282" r="30" fill="url(#glass-edge)"/>
      <circle cx="178" cy="282" r="30" fill="#BAE6FD" opacity="0.1"/>
    </g>

    <!-- Gold reflection -->
    <g transform="translate(222, 320) scale(1, -1) translate(-222, -285)" opacity="0.22">
      <circle cx="222" cy="285" r="34" fill="url(#gold-grad)"/>
    </g>

    <!-- Gold warm reflection glow on floor -->
    <ellipse cx="222" cy="330" rx="30" ry="12" fill="#F59E0B" opacity="0.06"/>
  </g>

  <!-- ==================== SPHERES ==================== -->

  <!-- 1. Chrome sphere (left-back, smaller — perspective) -->
  <g>
    <circle cx="68" cy="275" r="28" fill="url(#chrome-grad)"/>
    <!-- Environment reflection stripe -->
    <ellipse cx="68" cy="273" rx="26" ry="4" fill="url(#chrome-stripe)" opacity="0.7"/>
    <!-- Primary specular highlight -->
    <circle cx="58" cy="264" r="8" fill="white" opacity="0.85"/>
    <circle cx="56" cy="262" r="4" fill="white" opacity="0.95"/>
    <!-- Secondary highlight (bottom edge bounce) -->
    <circle cx="80" cy="292" r="3" fill="white" opacity="0.15"/>
    <!-- Rim light -->
    <path d="M 44 288 A 28 28 0 0 0 92 288" fill="none" stroke="white" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- 2. Matte ceramic sphere (center-left) -->
  <g>
    <circle cx="118" cy="272" r="26" fill="url(#matte-grad)"/>
    <!-- Very subtle, diffuse highlight only -->
    <circle cx="112" cy="263" r="10" fill="white" opacity="0.15"/>
    <!-- Subtle rim -->
    <path d="M 96 286 A 26 26 0 0 0 140 286" fill="none" stroke="white" stroke-width="0.4" opacity="0.1"/>
  </g>

  <!-- 3. Glass sphere (center-right, larger) -->
  <g>
    <!-- Grid visible through glass (refraction offset) -->
    <g clip-path="url(#glass-clip)" opacity="0.3">
      <g transform="translate(3, 2)">
        <line x1="140" y1="235" x2="100" y2="480" stroke="#D1D5DB" stroke-width="0.4" opacity="0.5"/>
        <line x1="140" y1="235" x2="180" y2="480" stroke="#D1D5DB" stroke-width="0.4" opacity="0.5"/>
        <line x1="140" y1="235" x2="240" y2="480" stroke="#D1D5DB" stroke-width="0.4" opacity="0.5"/>
        <line x1="0" y1="285" x2="280" y2="285" stroke="#D1D5DB" stroke-width="0.4" opacity="0.4"/>
        <line x1="0" y1="315" x2="280" y2="315" stroke="#D1D5DB" stroke-width="0.4" opacity="0.35"/>
      </g>
    </g>

    <!-- Glass body -->
    <circle cx="178" cy="282" r="30" fill="url(#glass-grad)"/>
    <circle cx="178" cy="282" r="30" fill="url(#glass-edge)"/>

    <!-- Glass rim/outline -->
    <circle cx="178" cy="282" r="29.5" fill="none" stroke="#93C5FD" stroke-width="0.5" opacity="0.4"/>

    <!-- Sharp specular dot -->
    <circle cx="167" cy="268" r="3.5" fill="white" opacity="0.95"/>
    <circle cx="167" cy="268" r="2" fill="white"/>
    <!-- Secondary internal reflection -->
    <circle cx="190" cy="296" r="2.5" fill="white" opacity="0.2"/>

    <!-- Fresnel edge brightening -->
    <circle cx="178" cy="282" r="29" fill="none" stroke="white" stroke-width="1.2" opacity="0.15"/>
  </g>

  <!-- 4. Gold sphere (right-front, largest — perspective) -->
  <g>
    <circle cx="222" cy="285" r="34" fill="url(#gold-grad)"/>
    <!-- Warm specular highlight -->
    <circle cx="210" cy="270" r="10" fill="url(#gold-spec)"/>
    <circle cx="208" cy="268" r="5" fill="white" opacity="0.8"/>
    <circle cx="207" cy="267" r="2.5" fill="white" opacity="0.95"/>
    <!-- Environment reflection hint -->
    <ellipse cx="222" cy="282" rx="30" ry="5" fill="#FEF3C7" opacity="0.2"/>
    <!-- Rim light -->
    <path d="M 194 308 A 34 34 0 0 0 250 308" fill="none" stroke="#FEF3C7" stroke-width="0.8" opacity="0.3"/>
    <!-- Bottom bounce light -->
    <circle cx="236" cy="306" r="4" fill="#FDE68A" opacity="0.15"/>
  </g>

  <!-- ==================== LABELS ==================== -->
  <text x="68" y="316" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle" font-weight="500">Chrome</text>
  <text x="118" y="312" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle" font-weight="500">Matte</text>
  <text x="178" y="326" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle" font-weight="500">Glass</text>
  <text x="222" y="334" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle" font-weight="500">Gold</text>

  <!-- ==================== UI OVERLAY ==================== -->
  <!-- Title top-left -->
  <text x="16" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#374151" font-weight="600">Materials</text>

  <!-- Subtitle -->
  <text x="16" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#9CA3AF" font-weight="400">PBR Material Showcase</text>

  <!-- ==================== MATERIAL PROPERTY CHIPS ==================== -->
  <g transform="translate(0, 440)">
    <!-- Chrome chip -->
    <rect x="8" y="0" width="76" height="18" rx="9" fill="#F3F4F6"/>
    <circle cx="19" cy="9" r="4" fill="url(#chrome-grad)"/>
    <text x="26" y="12.5" font-family="system-ui, -apple-system, sans-serif" font-size="6.5" fill="#6B7280">Metal: 1.0  Rgh: 0.0</text>

    <!-- Matte chip -->
    <rect x="90" y="0" width="76" height="18" rx="9" fill="#F3F4F6"/>
    <circle cx="101" cy="9" r="4" fill="#E5E7EB"/>
    <text x="108" y="12.5" font-family="system-ui, -apple-system, sans-serif" font-size="6.5" fill="#6B7280">Metal: 0.0  Rgh: 0.9</text>

    <!-- Glass chip -->
    <rect x="8" y="22" width="76" height="18" rx="9" fill="#F3F4F6"/>
    <circle cx="19" cy="33" r="4" fill="#E0F2FE" stroke="#93C5FD" stroke-width="0.5"/>
    <text x="26" y="36.5" font-family="system-ui, -apple-system, sans-serif" font-size="6.5" fill="#6B7280">Metal: 0.0  Rgh: 0.0</text>

    <!-- Gold chip -->
    <rect x="90" y="22" width="76" height="18" rx="9" fill="#F3F4F6"/>
    <circle cx="101" cy="33" r="4" fill="#F59E0B"/>
    <text x="108" y="36.5" font-family="system-ui, -apple-system, sans-serif" font-size="6.5" fill="#6B7280">Metal: 1.0  Rgh: 0.3</text>
  </g>
</svg>