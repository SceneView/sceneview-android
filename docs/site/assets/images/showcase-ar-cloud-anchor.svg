<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 720" width="400" height="720">
  <defs>
    <linearGradient id="bg-ar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="furniture-wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DEB887"/>
      <stop offset="100%" stop-color="#A0845C"/>
    </linearGradient>
    <linearGradient id="neon-purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6c35aa"/>
      <stop offset="100%" stop-color="#e040fb"/>
    </linearGradient>
    <filter id="neon-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow-ar3">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <clipPath id="screen-ar3">
      <rect x="16" y="16" width="368" height="688" rx="20"/>
    </clipPath>
  </defs>

  <!-- Device frame -->
  <rect width="400" height="720" rx="32" fill="#1a1a1a"/>
  <rect x="4" y="4" width="392" height="712" rx="28" fill="#2a2a2a"/>

  <g clip-path="url(#screen-ar3)">
    <!-- Dark room background -->
    <rect x="16" y="16" width="368" height="688" fill="url(#bg-ar3)"/>

    <!-- Floor -->
    <polygon points="16,450 384,450 384,704 16,704" fill="#1a1520" opacity="0.8"/>

    <!-- AR grid on floor -->
    <g opacity="0.2" stroke="#6c35aa" stroke-width="0.5">
      <line x1="16" y1="500" x2="384" y2="500"/>
      <line x1="16" y1="550" x2="384" y2="550"/>
      <line x1="16" y1="600" x2="384" y2="600"/>
      <line x1="16" y1="650" x2="384" y2="650"/>
      <line x1="100" y1="450" x2="50" y2="704"/>
      <line x1="200" y1="450" x2="200" y2="704"/>
      <line x1="300" y1="450" x2="350" y2="704"/>
    </g>

    <!-- 3D Furniture piece - Modern chair -->
    <g transform="translate(200,380)" filter="url(#shadow-ar3)">
      <!-- Chair legs -->
      <line x1="-35" y1="60" x2="-40" y2="100" stroke="#333" stroke-width="4" stroke-linecap="round"/>
      <line x1="35" y1="60" x2="40" y2="100" stroke="#333" stroke-width="4" stroke-linecap="round"/>
      <line x1="-30" y1="20" x2="-35" y2="100" stroke="#333" stroke-width="4" stroke-linecap="round"/>
      <line x1="30" y1="20" x2="35" y2="100" stroke="#333" stroke-width="4" stroke-linecap="round"/>

      <!-- Chair seat -->
      <path d="M-45,55 Q-50,40 -40,30 L40,30 Q50,40 45,55 Z" fill="#e040fb"/>
      <path d="M-45,55 L45,55 L40,62 L-40,62 Z" fill="#c030d0"/>

      <!-- Chair back -->
      <path d="M-35,-40 Q-38,-50 -30,-55 L30,-55 Q38,-50 35,-40 L35,25 Q0,35 -35,25 Z" fill="#e040fb"/>
      <path d="M-28,-48 Q0,-52 28,-48 L25,18 Q0,25 -25,18 Z" fill="#d030e0" opacity="0.6"/>

      <!-- Cushion detail -->
      <ellipse cx="0" cy="42" rx="35" ry="8" fill="rgba(255,255,255,0.1)"/>
    </g>

    <!-- Cloud anchor indicator -->
    <g transform="translate(200,500)" filter="url(#neon-glow)">
      <!-- Anchor ring -->
      <circle r="25" fill="none" stroke="url(#neon-purple)" stroke-width="2">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
      </circle>
      <circle r="15" fill="none" stroke="#e040fb" stroke-width="1" stroke-dasharray="3,5">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle r="4" fill="#e040fb"/>
    </g>

    <!-- Cloud sync indicator top-right -->
    <g transform="translate(330,80)">
      <rect x="-50" y="-20" width="100" height="40" rx="8" fill="rgba(0,0,0,0.6)"/>
      <!-- Cloud icon -->
      <path d="M-30,5 Q-35,5 -35,0 Q-35,-8 -27,-8 Q-25,-15 -15,-15 Q-5,-15 -3,-8 Q5,-8 5,0 Q5,5 0,5 Z" fill="white" opacity="0.9"/>
      <!-- Sync arrows -->
      <path d="M12,-8 L18,-8 L18,-14" fill="none" stroke="#4CAF50" stroke-width="2"/>
      <path d="M25,5 L19,5 L19,11" fill="none" stroke="#4CAF50" stroke-width="2"/>
      <text x="20" y="16" text-anchor="middle" fill="#4CAF50" font-family="system-ui" font-size="8" font-weight="600">SYNCED</text>
    </g>

    <!-- Measurement overlay -->
    <g opacity="0.7">
      <line x1="130" y1="480" x2="270" y2="480" stroke="#00E5FF" stroke-width="1" stroke-dasharray="4,2"/>
      <line x1="130" y1="475" x2="130" y2="485" stroke="#00E5FF" stroke-width="1"/>
      <line x1="270" y1="475" x2="270" y2="485" stroke="#00E5FF" stroke-width="1"/>
      <text x="200" y="475" text-anchor="middle" fill="#00E5FF" font-family="system-ui" font-size="10">0.6m</text>
    </g>

    <!-- Title bar -->
    <rect x="60" y="50" width="220" height="44" rx="22" fill="rgba(108,53,170,0.85)"/>
    <text x="170" y="77" text-anchor="middle" fill="white" font-family="system-ui" font-size="14" font-weight="500">Cloud Anchor — Shared</text>

    <!-- Bottom action bar -->
    <rect x="16" y="640" width="368" height="64" fill="rgba(0,0,0,0.7)"/>
    <circle cx="200" cy="672" r="24" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="200" cy="672" r="18" fill="#6c35aa"/>
    <text x="200" y="677" text-anchor="middle" fill="white" font-family="system-ui" font-size="10" font-weight="600">PLACE</text>
    <text x="100" y="677" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="system-ui" font-size="11">2 users</text>
    <text x="310" y="677" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="system-ui" font-size="11">Share</text>
  </g>

  <rect x="140" y="16" width="120" height="28" rx="14" fill="#1a1a1a"/>
</svg>
