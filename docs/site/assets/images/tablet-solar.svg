<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320" font-family="system-ui, sans-serif">
  <defs>
    <linearGradient id="tBezel3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E5E7EB"/>
      <stop offset="100%" stop-color="#9CA3AF"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="40%" stop-color="#FACC15"/>
      <stop offset="70%" stop-color="#F59E0B" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="50%" stop-color="#FDE047"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </radialGradient>
    <radialGradient id="spaceBg" cx="0.4" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>
    <radialGradient id="earthGrad" cx="0.4" cy="0.35" r="0.5">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="40%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </radialGradient>
    <radialGradient id="marsGrad" cx="0.4" cy="0.35" r="0.5">
      <stop offset="0%" stop-color="#F87171"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </radialGradient>
    <radialGradient id="venusGrad" cx="0.4" cy="0.35" r="0.5">
      <stop offset="0%" stop-color="#FDBA74"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="planetGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="selectGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#3B82F6" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Tablet frame -->
  <rect x="5" y="10" width="410" height="300" rx="20" ry="20" fill="url(#tBezel3)" stroke="#6B7280" stroke-width="1"/>
  <rect x="7" y="12" width="406" height="296" rx="18" ry="18" fill="none" stroke="#D1D5DB" stroke-width="0.5"/>
  <circle cx="210" cy="18" r="2.5" fill="#4B5563"/>
  <circle cx="210" cy="18" r="1.2" fill="#1F2937"/>

  <!-- Screen - space background -->
  <rect x="18" y="26" width="384" height="268" rx="4" fill="url(#spaceBg)"/>

  <!-- Stars -->
  <circle cx="50" cy="45" r="0.6" fill="white" fill-opacity="0.8"/>
  <circle cx="90" cy="70" r="0.4" fill="white" fill-opacity="0.5"/>
  <circle cx="150" cy="38" r="0.5" fill="white" fill-opacity="0.7"/>
  <circle cx="200" cy="55" r="0.3" fill="white" fill-opacity="0.4"/>
  <circle cx="280" cy="42" r="0.6" fill="white" fill-opacity="0.6"/>
  <circle cx="320" cy="65" r="0.4" fill="white" fill-opacity="0.5"/>
  <circle cx="370" cy="38" r="0.5" fill="white" fill-opacity="0.8"/>
  <circle cx="55" cy="120" r="0.3" fill="white" fill-opacity="0.4"/>
  <circle cx="380" cy="130" r="0.5" fill="white" fill-opacity="0.6"/>
  <circle cx="340" cy="180" r="0.4" fill="white" fill-opacity="0.5"/>
  <circle cx="390" cy="210" r="0.3" fill="white" fill-opacity="0.4"/>
  <circle cx="30" cy="200" r="0.5" fill="white" fill-opacity="0.6"/>
  <circle cx="60" cy="250" r="0.4" fill="white" fill-opacity="0.5"/>
  <circle cx="130" cy="260" r="0.6" fill="white" fill-opacity="0.7"/>
  <circle cx="350" cy="250" r="0.5" fill="white" fill-opacity="0.5"/>
  <circle cx="395" cy="85" r="0.3" fill="white" fill-opacity="0.6"/>
  <circle cx="45" cy="160" r="0.5" fill="white" fill-opacity="0.4"/>
  <circle cx="250" cy="240" r="0.4" fill="white" fill-opacity="0.6"/>
  <circle cx="310" cy="100" r="0.3" fill="white" fill-opacity="0.5"/>
  <circle cx="170" cy="230" r="0.5" fill="white" fill-opacity="0.3"/>

  <!-- Orbit rings -->
  <ellipse cx="140" cy="155" rx="45" ry="20" fill="none" stroke="#475569" stroke-width="0.5" stroke-dasharray="3,2" transform="rotate(-5, 140, 155)"/>
  <ellipse cx="140" cy="155" rx="72" ry="32" fill="none" stroke="#475569" stroke-width="0.5" stroke-dasharray="3,2" transform="rotate(-5, 140, 155)"/>
  <ellipse cx="140" cy="155" rx="108" ry="48" fill="none" stroke="#475569" stroke-width="0.5" stroke-dasharray="3,2" transform="rotate(-5, 140, 155)"/>
  <ellipse cx="140" cy="155" rx="148" ry="65" fill="none" stroke="#475569" stroke-width="0.5" stroke-dasharray="3,2" transform="rotate(-5, 140, 155)"/>

  <!-- Sun -->
  <circle cx="140" cy="155" r="30" fill="url(#sunGlow)" filter="url(#glow)"/>
  <circle cx="140" cy="155" r="18" fill="url(#sunCore)"/>
  <!-- Sun surface detail -->
  <circle cx="132" cy="148" r="3" fill="#FDE68A" fill-opacity="0.5"/>
  <circle cx="148" cy="160" r="2.5" fill="#FDE68A" fill-opacity="0.4"/>
  <circle cx="140" cy="165" r="2" fill="#FEF08A" fill-opacity="0.3"/>

  <!-- Mercury -->
  <circle cx="178" cy="140" r="3.5" fill="#9CA3AF" stroke="#6B7280" stroke-width="0.3"/>
  <circle cx="177" cy="139" r="1" fill="#D1D5DB" fill-opacity="0.4"/>

  <!-- Venus -->
  <circle cx="200" cy="172" r="5.5" fill="url(#venusGrad)" stroke="#C2410C" stroke-width="0.3"/>
  <!-- Venus atmosphere -->
  <circle cx="200" cy="172" r="5.5" fill="none" stroke="#FDBA74" stroke-width="0.5" stroke-opacity="0.3"/>
  <path d="M196 170 Q200 168 204 170" fill="none" stroke="#FED7AA" stroke-width="0.4" stroke-opacity="0.5"/>

  <!-- Earth (selected) -->
  <g filter="url(#selectGlow)">
    <circle cx="245" cy="142" r="7" fill="url(#earthGrad)"/>
  </g>
  <!-- Earth continents hint -->
  <path d="M240 139 Q242 137 245 138 Q247 139 246 141" fill="#34D399" fill-opacity="0.4"/>
  <path d="M247 144 Q249 143 250 145" fill="#34D399" fill-opacity="0.3"/>
  <!-- Earth clouds -->
  <path d="M239 140 Q242 138 244 140" fill="none" stroke="white" stroke-width="0.4" stroke-opacity="0.5"/>
  <path d="M246 142 Q248 141 250 142" fill="none" stroke="white" stroke-width="0.4" stroke-opacity="0.5"/>
  <!-- Earth moon -->
  <circle cx="256" cy="136" r="1.8" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="0.3"/>
  <!-- Selection ring -->
  <circle cx="245" cy="142" r="11" fill="none" stroke="#3B82F6" stroke-width="0.8" stroke-dasharray="2,1.5"/>

  <!-- Mars -->
  <circle cx="288" cy="165" r="5" fill="url(#marsGrad)" stroke="#991B1B" stroke-width="0.3"/>
  <!-- Mars surface -->
  <circle cx="286" cy="163" r="1" fill="#FCA5A5" fill-opacity="0.3"/>
  <path d="M285 167 Q288 166 291 167" fill="none" stroke="#7F1D1D" stroke-width="0.3" stroke-opacity="0.4"/>

  <!-- Earth info card -->
  <g transform="translate(245, 96)">
    <!-- Card background -->
    <rect x="-45" y="-15" width="90" height="42" rx="6" fill="#1E293B" fill-opacity="0.92" stroke="#3B82F6" stroke-width="0.8"/>
    <!-- Connector line -->
    <line x1="0" y1="27" x2="0" y2="35" stroke="#3B82F6" stroke-width="0.6"/>
    <circle cx="0" cy="35" r="1.5" fill="#3B82F6"/>

    <!-- Earth icon -->
    <circle cx="-32" cy="0" r="6" fill="#3B82F6" fill-opacity="0.2"/>
    <circle cx="-32" cy="0" r="4" fill="url(#earthGrad)"/>

    <!-- Planet name -->
    <text x="-22" y="-5" font-size="8" font-weight="700" fill="white">Earth</text>
    <text x="-22" y="4" font-size="4.5" fill="#94A3B8">Terrestrial Planet</text>

    <!-- Stats row -->
    <line x1="-40" y1="9" x2="40" y2="9" stroke="#334155" stroke-width="0.5"/>
    <text x="-38" y="18" font-size="4" fill="#64748B">Radius</text>
    <text x="-38" y="23" font-size="4.5" font-weight="600" fill="#3B82F6">6,371 km</text>
    <text x="-5" y="18" font-size="4" fill="#64748B">Distance</text>
    <text x="-5" y="23" font-size="4.5" font-weight="600" fill="#3B82F6">1.0 AU</text>
    <text x="25" y="18" font-size="4" fill="#64748B">Moons</text>
    <text x="25" y="23" font-size="4.5" font-weight="600" fill="#3B82F6">1</text>
  </g>

  <!-- Planet labels (small) -->
  <text x="178" y="131" text-anchor="middle" font-size="4" fill="#9CA3AF">Mercury</text>
  <text x="200" y="182" text-anchor="middle" font-size="4" fill="#9CA3AF">Venus</text>
  <text x="288" y="175" text-anchor="middle" font-size="4" fill="#9CA3AF">Mars</text>

  <!-- Top bar overlay -->
  <rect x="18" y="26" width="384" height="24" fill="#0F172A" fill-opacity="0.6"/>
  <text x="32" y="42" font-size="8" font-weight="700" fill="white">Solar System Explorer</text>

  <!-- Navigation dots -->
  <g transform="translate(340, 34)">
    <circle cx="0" cy="0" r="3" fill="#3B82F6" fill-opacity="0.3" stroke="#3B82F6" stroke-width="0.5"/>
    <text x="0" y="2" text-anchor="middle" font-size="4" fill="#93C5FD">☰</text>
    <circle cx="16" cy="0" r="3" fill="#3B82F6" fill-opacity="0.3" stroke="#3B82F6" stroke-width="0.5"/>
    <text x="16" y="2.5" text-anchor="middle" font-size="5" fill="#93C5FD">S</text>
    <circle cx="32" cy="0" r="3" fill="#3B82F6" fill-opacity="0.3" stroke="#3B82F6" stroke-width="0.5"/>
    <text x="32" y="2" text-anchor="middle" font-size="4" fill="#93C5FD">ℹ</text>
  </g>

  <!-- Bottom controls panel -->
  <rect x="18" y="264" width="384" height="30" rx="0 0 4 4" fill="#0F172A" fill-opacity="0.7"/>

  <!-- Zoom slider -->
  <text x="30" y="280" font-size="4.5" fill="#64748B">Zoom</text>
  <rect x="52" y="276" width="80" height="4" rx="2" fill="#1E293B"/>
  <rect x="52" y="276" width="50" height="4" rx="2" fill="#3B82F6"/>
  <circle cx="102" cy="278" r="4" fill="white" stroke="#3B82F6" stroke-width="1.2"/>

  <!-- Speed control -->
  <text x="155" y="280" font-size="4.5" fill="#64748B">Speed</text>
  <g transform="translate(180, 272)">
    <rect x="0" y="0" width="18" height="14" rx="4" fill="#1E293B" stroke="#3B82F6" stroke-width="0.6"/>
    <text x="9" y="10" text-anchor="middle" font-size="5" fill="#3B82F6">1x</text>
    <rect x="22" y="0" width="18" height="14" rx="4" fill="#3B82F6"/>
    <text x="31" y="10" text-anchor="middle" font-size="5" font-weight="600" fill="white">5x</text>
    <rect x="44" y="0" width="20" height="14" rx="4" fill="#1E293B" stroke="#3B82F6" stroke-width="0.6"/>
    <text x="54" y="10" text-anchor="middle" font-size="5" fill="#3B82F6">10x</text>
  </g>

  <!-- Play/pause -->
  <g transform="translate(280, 272)">
    <circle cx="7" cy="7" r="7" fill="#3B82F6"/>
    <polygon points="5,4 5,10 10,7" fill="white"/>
  </g>

  <!-- Planet selector pills (bottom right) -->
  <g transform="translate(310, 273)">
    <rect x="0" y="0" width="10" height="12" rx="3" fill="#6B7280" fill-opacity="0.4"/>
    <circle cx="5" cy="6" r="2.5" fill="#9CA3AF"/>
    <rect x="14" y="0" width="10" height="12" rx="3" fill="#C2410C" fill-opacity="0.3"/>
    <circle cx="19" cy="6" r="2.5" fill="#FDBA74"/>
    <rect x="28" y="0" width="10" height="12" rx="3" fill="#3B82F6" fill-opacity="0.4" stroke="#3B82F6" stroke-width="0.8"/>
    <circle cx="33" cy="6" r="2.5" fill="#60A5FA"/>
    <rect x="42" y="0" width="10" height="12" rx="3" fill="#B91C1C" fill-opacity="0.3"/>
    <circle cx="47" cy="6" r="2.5" fill="#F87171"/>
  </g>

  <!-- Powered by label -->
  <text x="390" y="288" text-anchor="end" font-size="4" fill="#3B82F6" fill-opacity="0.6">SceneView 3D</text>
</svg>