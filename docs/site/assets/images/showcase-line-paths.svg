      L154.9,222.7 L140.0,232.5 L125.1,241.7 L110.6,250.3 L96.9,258.0 L84.2,264.9
      L72.8,270.9 L63.1,275.9 L55.4,279.9 L49.6,282.7 L46.2,284.4 L45.0,285.0
