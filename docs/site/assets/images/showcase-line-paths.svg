<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 480" fill="none">
  <defs>
    <!-- Lissajous gradient along path -->
    <linearGradient id="lp-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="lp-grad-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#06B6D4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0.4"/>
    </linearGradient>
    <!-- Radial ambient glow -->
    <radialGradient id="lp-ambient" cx="50%" cy="38%" r="35%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <!-- Heavy outer glow -->
    <filter id="lp-glow-outer" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <!-- Medium glow for main path -->
    <filter id="lp-glow4" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Sine glow -->
    <filter id="lp-glow-sine" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <!-- Particle bright glow -->
    <filter id="lp-bright" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <!-- Small dot glow -->
    <filter id="lp-dot-glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="280" height="480" fill="#0A0A1A"/>

  <!-- Radial ambient glow behind curves -->
  <ellipse cx="140" cy="180" rx="130" ry="120" fill="url(#lp-ambient)"/>

  <!-- Subtle grid reference lines -->
  <line x1="140" y1="0" x2="140" y2="480" stroke="#1E293B" stroke-width="0.3"/>
  <line x1="0" y1="180" x2="280" y2="180" stroke="#1E293B" stroke-width="0.3"/>

  <!-- Background particles / starfield (18 dots) -->
  <circle cx="23" cy="42" r="1.0" fill="#A78BFA" opacity="0.45"/>
  <circle cx="245" cy="28" r="1.4" fill="#06B6D4" opacity="0.35"/>
  <circle cx="58" cy="95" r="0.8" fill="#F472B6" opacity="0.50"/>
  <circle cx="210" cy="78" r="1.2" fill="#22C55E" opacity="0.30"/>
  <circle cx="32" cy="170" r="1.5" fill="#FCD34D" opacity="0.40"/>
  <circle cx="260" cy="155" r="1.0" fill="#A78BFA" opacity="0.55"/>
  <circle cx="15" cy="290" r="1.3" fill="#06B6D4" opacity="0.35"/>
  <circle cx="265" cy="320" r="0.9" fill="#F472B6" opacity="0.50"/>
  <circle cx="48" cy="340" r="1.1" fill="#22C55E" opacity="0.40"/>
  <circle cx="230" cy="350" r="1.4" fill="#A78BFA" opacity="0.30"/>
  <circle cx="120" cy="55" r="1.0" fill="#06B6D4" opacity="0.45"/>
  <circle cx="180" cy="420" r="1.2" fill="#FCD34D" opacity="0.35"/>
  <circle cx="75" cy="440" r="0.8" fill="#F472B6" opacity="0.55"/>
  <circle cx="195" cy="135" r="1.5" fill="#22C55E" opacity="0.30"/>
  <circle cx="100" cy="310" r="1.0" fill="#A78BFA" opacity="0.40"/>
  <circle cx="250" cy="240" r="1.3" fill="#06B6D4" opacity="0.50"/>
  <circle cx="40" cy="230" r="0.9" fill="#FCD34D" opacity="0.45"/>
  <circle cx="155" cy="15" r="1.1" fill="#F472B6" opacity="0.35"/>

