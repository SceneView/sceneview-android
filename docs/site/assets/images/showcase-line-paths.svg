      L72.8,89.1 L84.2,84.1 L96.9,80.1 L110.6,77.3 L125.1,75.6 L140.0,75.0
    "/>
  </g>

  <!-- Ghost Lissajous (phase-shifted, rotated) for depth -->
  <g opacity="0.07" transform="rotate(12,140,180)">
    <path stroke="#A78BFA" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" d="
      M140.0,75.0 L183.1,80.1 L216.9,95.1 L235.0,127.5 L224.6,158.2 L195.8,191.0
      L154.9,222.7 L125.1,241.7 L84.2,264.9 L55.4,279.9 L45.0,285.0 L55.4,279.9
      L96.9,258.0 L140.0,232.5 L183.1,201.8 L216.9,169.0 L235.0,127.5 L216.9,95.1
      L183.1,80.1 L140.0,75.0 L96.9,80.1 L63.1,95.1 L45.0,127.5 L55.4,158.2
      L84.2,191.0 L125.1,222.7 L154.9,241.7 L195.8,264.9 L224.6,279.9 L235.0,285.0
      L224.6,279.9 L183.1,258.0 L140.0,232.5 L96.9,201.8 L63.1,169.0 L45.0,127.5
      L63.1,95.1 L96.9,80.1 L140.0,75.0
    "/>
  </g>

  <!-- Bright intersection nodes where paths cross -->
  <!-- Center crossing at (140, 180) -->
  <circle cx="140" cy="180" r="5" fill="#06B6D4" filter="url(#lp-dot-glow)" opacity="0.5"/>
  <circle cx="140" cy="180" r="2" fill="#FFFFFF" opacity="0.85"/>
  <!-- Top node (140, 75) -->
  <circle cx="140" cy="75" r="4" fill="#A78BFA" filter="url(#lp-dot-glow)" opacity="0.4"/>
  <circle cx="140" cy="75" r="1.5" fill="#FFFFFF" opacity="0.75"/>
  <!-- Crossing at (140, 232.5) -->
  <circle cx="140" cy="232.5" r="4" fill="#22C55E" filter="url(#lp-dot-glow)" opacity="0.4"/>
  <circle cx="140" cy="232.5" r="1.5" fill="#FFFFFF" opacity="0.75"/>
  <!-- Right cusp (235, 127.5) -->
  <circle cx="235" cy="127.5" r="3.5" fill="#06B6D4" filter="url(#lp-dot-glow)" opacity="0.35"/>
  <circle cx="235" cy="127.5" r="1.3" fill="#FFFFFF" opacity="0.7"/>
  <!-- Left cusp (45, 127.5) -->
  <circle cx="45" cy="127.5" r="3.5" fill="#A78BFA" filter="url(#lp-dot-glow)" opacity="0.35"/>
  <circle cx="45" cy="127.5" r="1.3" fill="#FFFFFF" opacity="0.7"/>
  <!-- Bottom-right cusp (235, 285) -->
  <circle cx="235" cy="285" r="3" fill="#22C55E" filter="url(#lp-dot-glow)" opacity="0.3"/>
  <circle cx="235" cy="285" r="1.2" fill="#FFFFFF" opacity="0.65"/>
  <!-- Bottom-left cusp (45, 285) -->
  <circle cx="45" cy="285" r="3" fill="#06B6D4" filter="url(#lp-dot-glow)" opacity="0.3"/>
  <circle cx="45" cy="285" r="1.2" fill="#FFFFFF" opacity="0.65"/>

  <!-- Secondary: faint spiral trace (top right) -->
  <g opacity="0.15" filter="url(#lp-glow4)">
    <path d="
      M222,55 C230,50 236,56 234,64 C232,72 224,76 218,72 C212,68 212,60 218,54
      C224,48 234,48 238,56 C242,64 238,76 230,82 C222,88 210,86 206,78
      C202,70 206,58 214,52 C222,46 234,44 242,52
    " stroke="#A78BFA" stroke-width="1" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Secondary: faint helix trace (left side) -->
  <g opacity="0.10" filter="url(#lp-glow4)">
    <path d="
      M32,115 C38,108 48,108 48,118 C48,128 38,128 38,138 C38,148 48,148 48,158
      C48,168 38,168 38,178 C38,188 48,188 48,198 C48,208 38,208 38,218
    " stroke="#22C55E" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ============================================ -->
  <!-- SINE WAVE (bottom band, centered at y=380)   -->
  <!-- 3.5 cycles, amplitude 25px                   -->
  <!-- ============================================ -->

  <!-- Sine glow layer -->
  <path filter="url(#lp-glow-sine)" opacity="0.30" stroke="#F472B6" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" d="
    M10.0,380.0
    L14.1,388.4 L18.1,395.9 L22.2,401.4 L26.2,404.5 L30.3,404.7 L34.4,402.0 L38.4,396.8 L42.5,389.6
    L46.6,381.2 L50.6,372.7 L54.7,365.1 L58.8,359.2 L62.8,355.7 L66.9,355.1 L70.9,357.4 L75.0,362.3
    L79.1,369.3 L83.1,377.5 L87.2,386.1 L91.2,393.9 L95.3,400.1 L99.4,403.9 L103.4,405.0 L107.5,403.1
