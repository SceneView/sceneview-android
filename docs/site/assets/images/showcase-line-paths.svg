    L209.1,357.4 L213.1,355.1 L217.2,355.7 L221.2,359.2 L225.3,365.1 L229.4,372.7 L233.4,381.2 L237.5,389.6
    L241.6,396.8 L245.6,402.0 L249.7,404.7 L253.8,404.5 L257.8,401.4 L261.9,395.9 L265.9,388.4 L270.0,380.0
  "/>

  <!-- Sine wave main stroke -->
  <path stroke="#F472B6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" d="
    M10.0,380.0
    L14.1,388.4 L18.1,395.9 L22.2,401.4 L26.2,404.5 L30.3,404.7 L34.4,402.0 L38.4,396.8 L42.5,389.6
    L46.6,381.2 L50.6,372.7 L54.7,365.1 L58.8,359.2 L62.8,355.7 L66.9,355.1 L70.9,357.4 L75.0,362.3
