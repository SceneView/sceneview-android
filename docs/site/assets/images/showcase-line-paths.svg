  <!-- ============================================ -->
  <!-- UI: Parameter display                        -->
  <!-- ============================================ -->
  <text x="140" y="310" font-family="'SF Mono', 'Fira Code', monospace, 'Courier New'" font-size="7" fill="#94A3B8" text-anchor="middle" letter-spacing="1.5">A:3  B:2  &#x3B4;:&#x3C0;/2</text>

  <!-- ============================================ -->
  <!-- UI: Toggle pills at bottom                  -->
  <!-- ============================================ -->
  <g transform="translate(52, 432)">
    <!-- Selected: Lissajous -->
    <rect x="0" y="0" width="56" height="20" rx="10" fill="#6750A4"/>
    <text x="28" y="13.5" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="600">Lissajous</text>

    <!-- Sine -->
    <rect x="62" y="0" width="40" height="20" rx="10" fill="none" stroke="#334155" stroke-width="0.5"/>
    <text x="82" y="13.5" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">Sine</text>

    <!-- Spiral -->
    <rect x="108" y="0" width="40" height="20" rx="10" fill="none" stroke="#334155" stroke-width="0.5"/>
    <text x="128" y="13.5" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">Spiral</text>
