    M10,380 C75,362 120,362 140,380 C160,398 205,398 270,380
  "/>

  <!-- Traveling particle on sine wave (bright white dot) -->
  <circle cx="160.3" cy="383.7" r="8" fill="#F472B6" filter="url(#lp-bright)" opacity="0.45"/>
  <circle cx="160.3" cy="383.7" r="3.5" fill="#F472B6" opacity="0.7"/>
  <circle cx="160.3" cy="383.7" r="2" fill="#FFFFFF" opacity="0.95"/>

  <!-- Trailing particle -->
