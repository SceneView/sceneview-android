    L183.1,258.0 L169.4,250.3 L154.9,241.7 L140.0,232.5 L125.1,222.7 L110.6,212.4
    L96.9,201.8 L84.2,191.0 L72.8,180.0 L63.1,169.0 L55.4,158.2 L49.6,147.6
    L46.2,137.3 L45.0,127.5 L46.2,118.3 L49.6,109.7 L55.4,102.0 L63.1,95.1
    L72.8,89.1 L84.2,84.1 L96.9,80.1 L110.6,77.3 L125.1,75.6 L140.0,75.0
  "/>

  <!-- Lissajous main crisp stroke -->
  <g filter="url(#lp-glow4)">
    <path stroke="url(#lp-grad)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" d="
      M140.0,75.0
      L154.9,75.6 L169.4,77.3 L183.1,80.1 L195.8,84.1 L207.2,89.1 L216.9,95.1
      L224.6,102.0 L230.4,109.7 L233.8,118.3 L235.0,127.5 L233.8,137.3 L230.4,147.6
