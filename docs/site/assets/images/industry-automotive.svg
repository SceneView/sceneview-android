<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <defs>
    <linearGradient id="au-bg" x1="0" y1="0" x2="800" y2="420">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0C0A1D"/>
    </linearGradient>
    <linearGradient id="au-speed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
    <linearGradient id="au-road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="au-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="au-glow-sm" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="au-shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#06B6D4" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="800" height="420" rx="32" fill="url(#au-bg)"/>

  <!-- WIDE HUD DISPLAY -->
  <g transform="translate(30, 20)">
    <rect x="0" y="0" width="480" height="260" rx="24" fill="#111827" filter="url(#au-shadow)"/>
    <rect x="2" y="2" width="476" height="256" rx="22" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
    <rect x="12" y="12" width="456" height="236" rx="14" fill="#020617"/>
    <g opacity="0.6">
      <path d="M120,248 L220,120 L260,120 L180,248 Z" fill="url(#au-road)" opacity="0.4"/>
      <path d="M180,248 L260,120 L280,120 L240,248 Z" fill="url(#au-road)" opacity="0.5"/>
      <path d="M240,248 L280,120 L300,120 L300,248 Z" fill="url(#au-road)" opacity="0.5"/>
      <path d="M300,248 L300,120 L320,120 L360,248 Z" fill="url(#au-road)" opacity="0.5"/>
      <line x1="235" y1="248" x2="270" y2="140" stroke="#06B6D4" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.5"/>
      <line x1="325" y1="248" x2="300" y2="140" stroke="#06B6D4" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.5"/>
    </g>
    <g filter="url(#au-glow)">
      <path d="M260,200 L280,150 L300,200 Z" fill="#06B6D4" opacity="0.8"/>
      <path d="M265,195 L280,155 L295,195 Z" fill="#22D3EE" opacity="0.6"/>
    </g>
    <g transform="translate(350, 140)" filter="url(#au-glow-sm)">
      <path d="M0,30 L0,10 Q0,0 10,0 L30,0" stroke="#06B6D4" stroke-width="3" fill="none" stroke-linecap="round"/>
      <polygon points="28,-5 35,0 28,5" fill="#06B6D4"/>
      <text x="0" y="48" font-family="system-ui" font-size="10" fill="#67E8F9" font-weight="600">300m</text>
      <text x="0" y="60" font-family="system-ui" font-size="8" fill="#94A3B8">Turn right on Main St</text>
    </g>
    <g transform="translate(200, 40)">
      <path d="M0,60 A60,60 0 0,1 120,60" stroke="#1E293B" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M0,60 A60,60 0 0,1 90,12" stroke="url(#au-speed)" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#au-glow-sm)"/>
      <text x="60" y="55" font-family="system-ui" font-size="36" fill="white" text-anchor="middle" font-weight="700">72</text>
      <text x="60" y="72" font-family="system-ui" font-size="10" fill="#94A3B8" text-anchor="middle" font-weight="500">km/h</text>
    </g>
    <g transform="translate(30, 30)">
      <rect x="0" y="0" width="80" height="24" rx="12" fill="rgba(16,185,129,0.15)"/>
      <rect x="8" y="8" width="40" height="8" rx="4" fill="#1E293B"/>
      <rect x="8" y="8" width="32" height="8" rx="4" fill="#10B981"/>
      <text x="56" y="17" font-family="system-ui" font-size="9" fill="#10B981" font-weight="600">82%</text>
      <text x="0" y="48" font-family="system-ui" font-size="9" fill="#64748B" font-weight="500">Range</text>
      <text x="0" y="62" font-family="system-ui" font-size="14" fill="white" font-weight="700">342 km</text>
      <text x="0" y="82" font-family="system-ui" font-size="9" fill="#64748B" font-weight="500">Outside</text>
      <text x="0" y="96" font-family="system-ui" font-size="14" fill="white" font-weight="700">18°C</text>
    </g>
    <g transform="translate(370, 30)">
      <rect x="0" y="0" width="85" height="70" rx="14" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
      <line x1="10" y1="35" x2="75" y2="35" stroke="#334155" stroke-width="2"/>
      <line x1="42" y1="10" x2="42" y2="60" stroke="#334155" stroke-width="2"/>
      <line x1="20" y1="15" x2="65" y2="55" stroke="#334155" stroke-width="1.5"/>
      <path d="M42,60 L42,35 L75,35" stroke="#06B6D4" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#au-glow-sm)"/>
      <circle cx="42" cy="50" r="4" fill="#06B6D4" filter="url(#au-glow-sm)"/>
      <circle cx="42" cy="50" r="2" fill="white"/>
    </g>
    <g transform="translate(30, 200)">
      <rect x="0" y="0" width="90" height="28" rx="14" fill="rgba(34,197,94,0.12)"/>
      <circle cx="18" cy="14" r="6" fill="#22C55E" filter="url(#au-glow-sm)"/>
      <text x="32" y="18" font-family="system-ui" font-size="9" fill="#22C55E" font-weight="600">Green 12s</text>
    </g>
    <g transform="translate(140, 225)">
      <rect x="0" y="0" width="200" height="20" rx="10" fill="rgba(6,182,212,0.1)"/>
      <text x="100" y="14" font-family="system-ui" font-size="8" fill="#67E8F9" text-anchor="middle" font-weight="500">Lane Assist  ·  ACC 80 km/h  ·  Autopilot</text>
    </g>
  </g>

  <!-- PHONE — Android Auto -->
  <g transform="translate(560, 50)" filter="url(#au-shadow)">
    <rect x="0" y="0" width="190" height="330" rx="24" fill="#111827"/>
    <rect x="2" y="2" width="186" height="326" rx="22" fill="#1A1A2E"/>
    <rect x="10" y="18" width="170" height="294" rx="6" fill="#0F0F1A"/>
    <rect x="60" y="4" width="70" height="16" rx="8" fill="#111827"/>
    <text x="24" y="34" font-family="system-ui" font-size="8" fill="#94A3B8" font-weight="600">9:41</text>
    <rect x="20" y="44" width="150" height="80" rx="16" fill="#1E293B"/>
    <g transform="translate(32, 56)">
      <circle cx="0" cy="8" r="12" fill="rgba(6,182,212,0.2)"/>
      <path d="M-4,8 L0,2 L4,8" stroke="#06B6D4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <text x="22" y="6" font-family="system-ui" font-size="9" fill="white" font-weight="700">3 min</text>
      <text x="22" y="18" font-family="system-ui" font-size="7" fill="#94A3B8">to destination</text>
    </g>
    <text x="32" y="108" font-family="system-ui" font-size="8" fill="#67E8F9" font-weight="600">Via Highway 101</text>
    <rect x="20" y="134" width="150" height="100" rx="16" fill="#0C0A1D" stroke="#334155" stroke-width="0.5"/>
    <g transform="translate(60, 165)">
      <ellipse cx="35" cy="40" rx="30" ry="5" fill="rgba(6,182,212,0.15)"/>
      <rect x="5" y="18" width="60" height="20" rx="4" fill="#06B6D4"/>
      <rect x="15" y="6" width="35" height="16" rx="3" fill="#0891B2"/>
      <circle cx="18" cy="38" r="5" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <circle cx="52" cy="38" r="5" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <rect x="17" y="8" width="15" height="12" rx="2" fill="#164E63" opacity="0.6"/>
      <rect x="33" y="8" width="15" height="12" rx="2" fill="#164E63" opacity="0.6"/>
      <rect x="63" y="22" width="4" height="5" rx="1" fill="#FDE68A"/>
    </g>
    <text x="95" y="224" font-family="system-ui" font-size="7" fill="#94A3B8" text-anchor="middle">Live vehicle model</text>
    <rect x="20" y="244" width="150" height="48" rx="14" fill="#1E293B"/>
    <g transform="translate(32, 256)">
      <rect x="0" y="0" width="24" height="24" rx="6" fill="#7B61FF"/>
      <text x="12" y="16" font-family="system-ui" font-size="9" fill="white" text-anchor="middle">&#x266A;</text>
      <text x="32" y="8" font-family="system-ui" font-size="8" fill="white" font-weight="600">Night Drive</text>
      <text x="32" y="20" font-family="system-ui" font-size="7" fill="#94A3B8">Synthwave FM</text>
    </g>
    <g transform="translate(30, 298)">
      <circle cx="15" cy="8" r="3" fill="#06B6D4"/>
      <circle cx="50" cy="8" r="3" fill="#64748B"/>
      <circle cx="85" cy="8" r="3" fill="#64748B"/>
      <circle cx="120" cy="8" r="3" fill="#64748B"/>
    </g>
  </g>

  <rect x="170" y="290" width="120" height="18" rx="9" fill="rgba(6,182,212,0.15)"/>
  <text x="230" y="303" font-family="system-ui" font-size="7" fill="#67E8F9" text-anchor="middle" font-weight="600">Built with SceneView</text>
  <rect x="595" y="390" width="120" height="18" rx="9" fill="rgba(6,182,212,0.15)"/>
  <text x="655" y="403" font-family="system-ui" font-size="7" fill="#67E8F9" text-anchor="middle" font-weight="600">Built with SceneView</text>
  <text x="400" y="410" font-family="system-ui" font-size="10" fill="#64748B" text-anchor="middle" font-weight="500">Android Automotive · Head-Up Display · Companion App</text>
</svg>
