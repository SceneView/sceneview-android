<svg xmlns="http://www.w3.org/2000/svg" width="200" height="36" viewBox="0 0 200 36">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Pill background -->
  <rect x="1" y="1" width="198" height="34" rx="17" ry="17"
        fill="#1C1B1F" fill-opacity="0.85"
        stroke="rgba(255,255,255,0.15)" stroke-width="1"
        filter="url(#shadow)"/>
  <!-- SceneView logo icon — stylized diamond/compose shape -->
  <g transform="translate(14, 18)">
    <!-- Diamond shape with layered depth -->
    <path d="M0,-8 L6,0 L0,8 L-6,0 Z" fill="#7B61FF" opacity="0.5"/>
    <path d="M0,-6 L5,0 L0,6 L-5,0 Z" fill="#7B61FF" opacity="0.75"/>
    <path d="M0,-4 L3.5,0 L0,4 L-3.5,0 Z" fill="#7B61FF"/>
    <!-- Small inner highlight -->
    <path d="M0,-2 L1.5,0 L0,2 L-1.5,0 Z" fill="#A78BFA" opacity="0.6"/>
  </g>
  <!-- Text -->
  <text x="28" y="22.5" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="11" font-weight="600" letter-spacing="0.3">Made with SceneView</text>
</svg>
