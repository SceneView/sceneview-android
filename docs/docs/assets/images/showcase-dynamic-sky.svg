<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 480" fill="none">
  <defs>
    <!-- Sky gradient — realistic sunset -->
    <linearGradient id="sky-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0C1445"/>
      <stop offset="20%" stop-color="#1E3A6E"/>
      <stop offset="50%" stop-color="#D4618C"/>
      <stop offset="70%" stop-color="#F4A460"/>
      <stop offset="85%" stop-color="#FFD700"/>
      <stop offset="95%" stop-color="#FFF3E0"/>
    </linearGradient>

    <!-- Sun inner glow -->
    <radialGradient id="sun-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="30%" stop-color="#FFD54F" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#FFB74D" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF8A65" stop-opacity="0"/>
    </radialGradient>

    <!-- Sun outer atmospheric glow -->
    <radialGradient id="sun-atmo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFD54F" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#FFAB40" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#FF7043" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#D4618C" stop-opacity="0"/>
    </radialGradient>

    <!-- Horizon fog gradient -->
    <linearGradient id="fog-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4A460" stop-opacity="0"/>
      <stop offset="40%" stop-color="#FFB74D" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="#FFCC80" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#F4A460" stop-opacity="0"/>
    </linearGradient>

    <!-- Cloud warm gradient -->
    <linearGradient id="cloud1-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4618C" stop-opacity="0"/>
      <stop offset="30%" stop-color="#E8927C" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#F4A460" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D4618C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cloud2-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E3A6E" stop-opacity="0"/>
      <stop offset="30%" stop-color="#8E6AAE" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#C47A8E" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1E3A6E" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cloud3-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F4A460" stop-opacity="0"/>
      <stop offset="25%" stop-color="#FFD54F" stop-opacity="0.3"/>
      <stop offset="75%" stop-color="#FFAB40" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F4A460" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cloud4-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4618C" stop-opacity="0"/>
      <stop offset="40%" stop-color="#B05A7A" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#C47A8E" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#D4618C" stop-opacity="0"/>
    </linearGradient>

    <!-- Hills gradient (background) -->
    <linearGradient id="hill-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#252040"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <!-- Hills gradient (foreground) -->
    <linearGradient id="hill-fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#10101E"/>
    </linearGradient>

    <!-- Slider track gradient -->
    <linearGradient id="slider-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E3A6E"/>
      <stop offset="30%" stop-color="#D4618C"/>
      <stop offset="55%" stop-color="#F4A460"/>
      <stop offset="75%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#1E3A6E"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="sun-blur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="sun-blur-lg" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="cloud-blur" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="cloud-blur-sm" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="star-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>

    <!-- Clipping for phone screen -->
    <clipPath id="screen-clip">
      <rect x="24" y="32" width="232" height="416" rx="6"/>
    </clipPath>
  </defs>

  <!-- Phone frame -->
  <rect x="10" y="10" width="260" height="460" rx="36" fill="#1A1A1A"/>
  <rect x="12" y="12" width="256" height="456" rx="34" fill="#222"/>
  <rect x="24" y="32" width="232" height="416" rx="6" fill="#0C1445"/>
  <rect x="90" y="14" width="100" height="22" rx="11" fill="#1A1A1A"/>

  <!-- All scene content clipped to screen -->
  <g clip-path="url(#screen-clip)">

    <!-- Sky gradient fill -->
    <rect x="24" y="32" width="232" height="416" fill="url(#sky-grad)"/>

    <!-- Stars in the dark upper portion -->
    <g opacity="0.7">
      <circle cx="55" cy="52" r="1" fill="white" filter="url(#star-glow)"/>
      <circle cx="118" cy="40" r="1.3" fill="white" filter="url(#star-glow)"/>
      <circle cx="195" cy="58" r="0.9" fill="white" filter="url(#star-glow)"/>
      <circle cx="165" cy="44" r="1.1" fill="white" filter="url(#star-glow)"/>
      <circle cx="78" cy="68" r="0.8" fill="white" filter="url(#star-glow)"/>
      <circle cx="230" cy="50" r="1" fill="white" filter="url(#star-glow)"/>
      <circle cx="42" cy="80" r="0.7" fill="white"/>
      <circle cx="210" cy="72" r="0.9" fill="white"/>
      <circle cx="145" cy="62" r="0.6" fill="white"/>
      <circle cx="98" cy="55" r="0.7" fill="white"/>
    </g>

    <!-- High clouds (dark blue zone) -->
    <ellipse cx="90" cy="110" rx="55" ry="6" fill="url(#cloud2-grad)" filter="url(#cloud-blur)"/>
    <ellipse cx="200" cy="130" rx="40" ry="5" fill="url(#cloud4-grad)" filter="url(#cloud-blur)"/>

    <!-- Mid clouds (rose zone) -->
    <ellipse cx="160" cy="195" rx="65" ry="7" fill="url(#cloud1-grad)" filter="url(#cloud-blur-sm)"/>
    <ellipse cx="70" cy="220" rx="48" ry="5.5" fill="url(#cloud3-grad)" filter="url(#cloud-blur-sm)"/>

    <!-- Sun outer atmospheric glow (very large, behind everything) -->
    <circle cx="140" cy="340" r="90" fill="url(#sun-atmo)" filter="url(#sun-blur-lg)"/>

    <!-- Sun mid glow -->
    <circle cx="140" cy="340" r="50" fill="url(#sun-glow)" filter="url(#sun-blur)"/>

    <!-- Sun core -->
    <circle cx="140" cy="340" r="22" fill="#FFF9C4"/>
    <circle cx="140" cy="340" r="18" fill="#FFFDE7"/>
    <circle cx="140" cy="338" r="14" fill="white" opacity="0.6"/>

    <!-- Atmospheric fog band at horizon -->
    <rect x="24" y="310" width="232" height="60" fill="url(#fog-grad)"/>

    <!-- Horizon light band (bright line at horizon) -->
    <rect x="24" y="335" width="232" height="10" fill="#FFCC80" opacity="0.06"/>

    <!-- Background hills (further, lighter) -->
    <path d="M24,360 Q60,330 90,345 Q120,355 150,338 Q180,325 210,342 Q240,355 256,340 L256,448 L24,448 Z"
          fill="url(#hill-bg)" opacity="0.85"/>

    <!-- Foreground hills (closer, darker) -->
    <path d="M24,370 Q50,350 80,362 Q110,372 140,355 Q170,340 195,358 Q225,372 256,355 L256,448 L24,448 Z"
          fill="url(#hill-fg)"/>

    <!-- Ground fill below hills -->
    <rect x="24" y="385" width="232" height="63" fill="#10101E"/>

    <!-- Tree silhouettes on hills -->
    <g fill="#0D0D1A">
      <!-- Left cluster -->
      <rect x="58" y="348" width="2.5" height="14"/>
      <ellipse cx="59" cy="345" rx="6" ry="10"/>
      <rect x="72" y="354" width="2" height="10"/>
      <ellipse cx="73" cy="351" rx="4.5" ry="8"/>
      <!-- Right cluster -->
      <rect x="198" y="344" width="2.5" height="16"/>
      <ellipse cx="199" cy="340" rx="7" ry="12"/>
      <rect x="215" y="350" width="2" height="10"/>
      <ellipse cx="216" cy="347" rx="5" ry="9"/>
      <!-- Far right single -->
      <rect x="237" y="345" width="2" height="11"/>
      <ellipse cx="238" cy="342" rx="4" ry="7"/>
    </g>

    <!-- UI overlay: title -->
    <text x="36" y="56" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white" opacity="0.6" font-weight="600">Dynamic Sky</text>

    <!-- UI: Time of day slider -->
    <g transform="translate(36, 405)">
      <!-- Label -->
      <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="white" opacity="0.5" font-weight="600" letter-spacing="0.5">TIME OF DAY</text>
      <!-- Track background -->
      <rect x="0" y="8" width="208" height="4" rx="2" fill="#333" opacity="0.6"/>
      <!-- Track colored -->
      <rect x="0" y="8" width="208" height="4" rx="2" fill="url(#slider-grad)" opacity="0.7"/>
      <!-- Thumb position (golden hour ~72%) -->
      <circle cx="150" cy="10" r="7" fill="#FFD54F" opacity="0.9"/>
      <circle cx="150" cy="10" r="4" fill="white"/>
      <!-- Sun icon near thumb -->
      <text x="150" y="0" font-family="system-ui" font-size="8" fill="#FFD54F" text-anchor="middle" opacity="0.8">&#9788;</text>
    </g>

    <!-- UI: Parameter chips -->
    <g transform="translate(36, 430)">
      <!-- Turbidity chip -->
      <rect x="0" y="0" width="72" height="18" rx="9" fill="#FFD54F" opacity="0.12"/>
      <text x="36" y="12" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#FFD54F" text-anchor="middle" opacity="0.6" font-weight="500">Turbidity: 4</text>
      <!-- Elevation chip -->
      <rect x="80" y="0" width="82" height="18" rx="9" fill="#FFD54F" opacity="0.12"/>
      <text x="121" y="12" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#FFD54F" text-anchor="middle" opacity="0.6" font-weight="500">Elevation: 15&#176;</text>
    </g>

  </g>

  <!-- Home indicator -->
  <rect x="100" y="440" width="80" height="4" rx="2" fill="#666"/>
</svg>
