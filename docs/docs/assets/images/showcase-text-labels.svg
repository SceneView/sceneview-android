<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 480" fill="none">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="tl-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F4F8"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>

    <!-- Blue sphere gradient -->
    <radialGradient id="tl-sphere" cx="0.35" cy="0.3" r="0.65">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="40%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </radialGradient>

    <!-- Gold cylinder gradient -->
    <linearGradient id="tl-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="30%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <linearGradient id="tl-gold-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>

    <!-- Label pill shadow -->
    <filter id="tl-pill-shadow" x="-20%" y="-30%" width="140%" height="180%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#000" flood-opacity="0.12"/>
    </filter>

    <!-- Subtle grid pattern -->
    <pattern id="tl-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#CBD5E1" stroke-width="0.3" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="280" height="480" fill="url(#tl-bg)"/>

  <!-- Title top-left -->
  <text x="16" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#374151" font-weight="700">Text Labels</text>

  <!-- Perspective floor grid -->
  <g opacity="0.35">
    <!-- Converging grid lines to simulate perspective -->
    <line x1="0" y1="480" x2="140" y2="340" stroke="#CBD5E1" stroke-width="0.4"/>
    <line x1="40" y1="480" x2="140" y2="340" stroke="#CBD5E1" stroke-width="0.4"/>
    <line x1="80" y1="480" x2="140" y2="340" stroke="#CBD5E1" stroke-width="0.4"/>
    <line x1="120" y1="480" x2="140" y2="340" stroke="#CBD5E1" stroke-width="0.4"/>
    <line x1="160" y1="480" x2="140" y2="340" stroke="#CBD5E1" stroke-width="0.4"/>
    <line x1="200" y1="480" x2="140" y2="340" stroke="#CBD5E1" stroke-width="0.4"/>
    <line x1="240" y1="480" x2="140" y2="340" stroke="#CBD5E1" stroke-width="0.4"/>
    <line x1="280" y1="480" x2="140" y2="340" stroke="#CBD5E1" stroke-width="0.4"/>
    <!-- Horizontal grid lines (closer together toward horizon) -->
    <line x1="0" y1="460" x2="280" y2="460" stroke="#CBD5E1" stroke-width="0.3"/>
    <line x1="10" y1="440" x2="270" y2="440" stroke="#CBD5E1" stroke-width="0.3"/>
    <line x1="25" y1="420" x2="255" y2="420" stroke="#CBD5E1" stroke-width="0.3"/>
    <line x1="40" y1="400" x2="240" y2="400" stroke="#CBD5E1" stroke-width="0.3"/>
    <line x1="55" y1="385" x2="225" y2="385" stroke="#CBD5E1" stroke-width="0.3"/>
    <line x1="70" y1="372" x2="210" y2="372" stroke="#CBD5E1" stroke-width="0.3"/>
    <line x1="82" y1="362" x2="198" y2="362" stroke="#CBD5E1" stroke-width="0.3"/>
    <line x1="95" y1="352" x2="185" y2="352" stroke="#CBD5E1" stroke-width="0.3"/>
  </g>

  <!-- ==================== -->
  <!-- Object 2: Red Cube (center-left) -->
  <!-- ==================== -->
  <g transform="translate(52, 210)">
    <!-- Isometric cube: 3 visible faces -->
    <!-- Top face -->
    <polygon points="30,0 60,15 30,30 0,15" fill="#EF4444"/>
    <!-- Left face -->
    <polygon points="0,15 30,30 30,62 0,47" fill="#991B1B"/>
    <!-- Right face -->
    <polygon points="30,30 60,15 60,47 30,62" fill="#DC2626"/>
    <!-- Top edge highlight -->
    <line x1="0" y1="15" x2="30" y2="0" stroke="#FCA5A5" stroke-width="0.5" opacity="0.6"/>
    <line x1="30" y1="0" x2="60" y2="15" stroke="#FCA5A5" stroke-width="0.5" opacity="0.6"/>

    <!-- Connector line -->
    <line x1="30" y1="-8" x2="30" y2="0" stroke="#94A3B8" stroke-width="0.5"/>

    <!-- Label pill: "Red Cube" -->
    <g transform="translate(-5, -30)" filter="url(#tl-pill-shadow)">
      <rect x="0" y="0" width="70" height="22" rx="11" fill="white"/>
      <text x="35" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1F2937" text-anchor="middle" font-weight="500">Red Cube</text>
    </g>
  </g>

  <!-- ==================== -->
  <!-- Object 1: Blue Sphere (center-top) -->
  <!-- ==================== -->
  <g transform="translate(140, 120)">
    <!-- Sphere -->
    <circle cx="0" cy="0" r="30" fill="url(#tl-sphere)"/>
    <!-- Specular highlight -->
    <ellipse cx="-8" cy="-10" rx="10" ry="8" fill="white" opacity="0.25"/>
    <ellipse cx="-6" cy="-8" rx="4" ry="3" fill="white" opacity="0.35"/>
    <!-- Subtle rim light -->
    <circle cx="0" cy="0" r="29" fill="none" stroke="white" stroke-width="0.5" opacity="0.15"/>

    <!-- Connector line -->
    <line x1="0" y1="-30" x2="0" y2="-40" stroke="#94A3B8" stroke-width="0.5"/>

    <!-- Label pill: "Planet Earth" -->
    <g transform="translate(-42, -63)" filter="url(#tl-pill-shadow)">
      <rect x="0" y="0" width="84" height="22" rx="11" fill="white"/>
      <text x="42" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1F2937" text-anchor="middle" font-weight="500">Planet Earth</text>
    </g>
  </g>

  <!-- ==================== -->
  <!-- Object 3: Gold Cylinder (center-right) -->
  <!-- ==================== -->
  <g transform="translate(190, 220)">
    <!-- Cylinder body -->
    <rect x="-18" y="-20" width="36" height="45" fill="url(#tl-gold)"/>
    <!-- Bottom ellipse -->
    <ellipse cx="0" cy="25" rx="18" ry="6" fill="#92400E"/>
    <!-- Top ellipse -->
    <ellipse cx="0" cy="-20" rx="18" ry="6" fill="url(#tl-gold-top)"/>
    <!-- Top highlight arc -->
    <ellipse cx="-3" cy="-21" rx="10" ry="3" fill="white" opacity="0.2"/>
    <!-- Side highlight -->
    <rect x="-14" y="-18" width="6" height="40" rx="3" fill="white" opacity="0.1"/>

    <!-- Connector line -->
    <line x1="0" y1="-26" x2="0" y2="-36" stroke="#94A3B8" stroke-width="0.5"/>

    <!-- Label pill: "Gold Cylinder" -->
    <g transform="translate(-48, -58)" filter="url(#tl-pill-shadow)">
      <rect x="0" y="0" width="96" height="22" rx="11" fill="white"/>
      <text x="48" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1F2937" text-anchor="middle" font-weight="500">Gold Cylinder</text>
    </g>
  </g>

  <!-- ==================== -->
  <!-- Object 4: Extruded 3D text "Hello!" -->
  <!-- ==================== -->
  <g transform="translate(42, 340)">
    <!-- Extrusion / side faces (offset darker layer) -->
    <text x="3" y="3" font-family="system-ui, -apple-system, sans-serif" font-size="38" fill="#4F378B" font-weight="900" letter-spacing="-0.5">Hello!</text>
    <text x="2" y="2" font-family="system-ui, -apple-system, sans-serif" font-size="38" fill="#4F378B" font-weight="900" letter-spacing="-0.5">Hello!</text>
    <text x="1.5" y="1.5" font-family="system-ui, -apple-system, sans-serif" font-size="38" fill="#5B4397" font-weight="900" letter-spacing="-0.5">Hello!</text>
    <!-- Front face -->
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="38" fill="#6750A4" font-weight="900" letter-spacing="-0.5">Hello!</text>
    <!-- Specular highlight on top edges -->
    <text x="-0.3" y="-1" font-family="system-ui, -apple-system, sans-serif" font-size="38" fill="white" font-weight="900" letter-spacing="-0.5" opacity="0.15">Hello!</text>
  </g>

  <!-- ==================== -->
  <!-- Billboard effect visualization -->
  <!-- ==================== -->
  <g transform="translate(192, 67)">
    <!-- Curved arrow suggesting rotation -->
    <path d="M 0,12 A 12,12 0 0,1 17,0" fill="none" stroke="#94A3B8" stroke-width="1" stroke-linecap="round"/>
    <!-- Arrow head -->
    <polygon points="17,0 12,-3 14,4" fill="#94A3B8"/>
    <!-- Camera/eye icon -->
    <g transform="translate(22, -6)">
      <!-- Eye outline -->
      <path d="M 0,6 Q 8,-2 16,6 Q 8,14 0,6 Z" fill="none" stroke="#64748B" stroke-width="1"/>
      <!-- Pupil -->
      <circle cx="8" cy="6" r="2.5" fill="#64748B"/>
      <!-- Glint -->
      <circle cx="7" cy="5" r="0.8" fill="white"/>
    </g>
    <text x="8" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="6.5" fill="#94A3B8" text-anchor="middle" font-weight="500">faces camera</text>
  </g>

  <!-- ==================== -->
  <!-- Bottom UI: Billboard toggle pill -->
  <!-- ==================== -->
  <g transform="translate(80, 452)">
    <rect x="0" y="0" width="120" height="24" rx="12" fill="#6750A4"/>
    <text x="16" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="white" font-weight="600">Billboard: ON</text>
    <!-- Toggle indicator -->
    <rect x="88" y="5" width="26" height="14" rx="7" fill="white" opacity="0.3"/>
    <circle cx="107" cy="12" r="5" fill="white"/>
  </g>
</svg>