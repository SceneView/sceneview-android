<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <defs>
    <linearGradient id="gm-bg" x1="0" y1="0" x2="800" y2="420">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="50%" stop-color="#2E1065"/>
      <stop offset="100%" stop-color="#0C0A1D"/>
    </linearGradient>
    <linearGradient id="gm-lava" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EF4444"/><stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="gm-crystal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/><stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
    <filter id="gm-shadow" x="-6%" y="-6%" width="112%" height="118%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#7B61FF" flood-opacity="0.2"/>
    </filter>
    <filter id="gm-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gm-glow-sm" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="gm-phone-clip"><rect x="42" y="38" width="196" height="344" rx="4"/></clipPath>
    <clipPath id="gm-tab-clip"><rect x="492" y="48" width="276" height="224" rx="4"/></clipPath>
  </defs>

  <rect width="800" height="420" rx="32" fill="url(#gm-bg)"/>

  <!-- PHONE — 3D Game Scene -->
  <g filter="url(#gm-shadow)">
    <rect x="30" y="20" width="220" height="380" rx="28" fill="#111827"/>
    <rect x="32" y="22" width="216" height="376" rx="26" fill="#1A1A2E"/>
    <rect x="42" y="38" width="196" height="344" rx="8" fill="#020617"/>
    <rect x="105" y="24" width="70" height="18" rx="9" fill="#111827"/>
    <g clip-path="url(#gm-phone-clip)">
      <!-- Game viewport — dungeon scene -->
      <rect x="42" y="38" width="196" height="260" fill="#0C0A1D"/>
      <!-- Floor tiles -->
      <g opacity="0.2">
        <rect x="42" y="230" width="40" height="40" stroke="#334155" stroke-width="0.5" fill="none"/>
        <rect x="82" y="230" width="40" height="40" stroke="#334155" stroke-width="0.5" fill="none"/>
        <rect x="122" y="230" width="40" height="40" stroke="#334155" stroke-width="0.5" fill="none"/>
        <rect x="162" y="230" width="40" height="40" stroke="#334155" stroke-width="0.5" fill="none"/>
        <rect x="202" y="230" width="36" height="40" stroke="#334155" stroke-width="0.5" fill="none"/>
      </g>
      <!-- Dungeon walls -->
      <rect x="42" y="38" width="30" height="220" fill="#1E293B" opacity="0.5"/>
      <rect x="208" y="38" width="30" height="220" fill="#1E293B" opacity="0.5"/>
      <!-- Torch on wall -->
      <g transform="translate(55, 80)">
        <rect x="0" y="10" width="4" height="16" fill="#78350F"/>
        <circle cx="2" cy="6" r="6" fill="#F97316" opacity="0.4" filter="url(#gm-glow)"/>
        <circle cx="2" cy="6" r="3" fill="#FDE68A"/>
      </g>
      <g transform="translate(218, 120)">
        <rect x="0" y="10" width="4" height="16" fill="#78350F"/>
        <circle cx="2" cy="6" r="6" fill="#F97316" opacity="0.4" filter="url(#gm-glow)"/>
        <circle cx="2" cy="6" r="3" fill="#FDE68A"/>
      </g>
      <!-- Crystal collectible -->
      <g transform="translate(120, 160)" filter="url(#gm-glow-sm)">
        <polygon points="15,0 25,12 20,30 10,30 5,12" fill="url(#gm-crystal)" opacity="0.8"/>
        <polygon points="15,2 22,12 18,26 12,26 8,12" fill="#67E8F9" opacity="0.4"/>
      </g>
      <!-- Character -->
      <g transform="translate(110, 170)">
        <!-- Shadow -->
        <ellipse cx="20" cy="60" rx="15" ry="4" fill="rgba(0,0,0,0.3)"/>
        <!-- Body -->
        <rect x="10" y="25" width="20" height="30" rx="4" fill="#7B61FF"/>
        <!-- Head -->
        <circle cx="20" cy="18" r="12" fill="#A78BFA"/>
        <!-- Helmet -->
        <path d="M8,16 Q10,4 20,2 Q30,4 32,16" fill="#6D28D9"/>
        <!-- Eyes -->
        <circle cx="15" cy="18" r="2" fill="white"/>
        <circle cx="25" cy="18" r="2" fill="white"/>
        <circle cx="15" cy="19" r="1" fill="#1A1A1A"/>
        <circle cx="25" cy="19" r="1" fill="#1A1A1A"/>
        <!-- Sword -->
        <line x1="32" y1="30" x2="42" y2="15" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
        <line x1="42" y1="15" x2="44" y2="10" stroke="#FDE68A" stroke-width="1.5" stroke-linecap="round"/>
        <!-- Shield -->
        <ellipse cx="5" cy="35" rx="6" ry="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      </g>
      <!-- Health bar -->
      <g transform="translate(52, 48)">
        <rect x="0" y="0" width="80" height="10" rx="5" fill="rgba(0,0,0,0.5)"/>
        <rect x="1" y="1" width="60" height="8" rx="4" fill="#22C55E"/>
        <text x="84" y="9" font-family="system-ui" font-size="7" fill="white" font-weight="600">75%</text>
      </g>
      <!-- Score -->
      <g transform="translate(180, 48)">
        <text x="0" y="9" font-family="system-ui" font-size="8" fill="#FDE68A" font-weight="700">Score: 2,450</text>
      </g>
      <!-- Minimap -->
      <g transform="translate(190, 62)">
        <rect x="0" y="0" width="40" height="40" rx="8" fill="rgba(0,0,0,0.5)" stroke="#334155" stroke-width="0.5"/>
        <rect x="8" y="8" width="6" height="24" fill="#334155"/>
        <rect x="18" y="4" width="18" height="6" fill="#334155"/>
        <rect x="26" y="14" width="6" height="20" fill="#334155"/>
        <circle cx="12" cy="26" r="2" fill="#22C55E"/>
        <circle cx="30" cy="10" r="2" fill="#EF4444"/>
      </g>
      <!-- Joystick controls (bottom) -->
      <rect x="42" y="298" width="196" height="84" fill="rgba(0,0,0,0.4)"/>
      <!-- Left joystick -->
      <g transform="translate(82, 325)">
        <circle cx="0" cy="0" r="24" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
        <circle cx="4" cy="-4" r="12" fill="rgba(255,255,255,0.15)"/>
      </g>
      <!-- Action buttons -->
      <g transform="translate(188, 310)">
        <circle cx="0" cy="20" r="14" fill="rgba(123,97,255,0.3)" stroke="#7B61FF" stroke-width="1"/>
        <text x="0" y="24" font-family="system-ui" font-size="9" fill="#A78BFA" text-anchor="middle" font-weight="700">A</text>
        <circle cx="30" cy="0" r="14" fill="rgba(239,68,68,0.3)" stroke="#EF4444" stroke-width="1"/>
        <text x="30" y="4" font-family="system-ui" font-size="9" fill="#FCA5A5" text-anchor="middle" font-weight="700">B</text>
      </g>
    </g>
  </g>
  <rect x="80" y="395" width="120" height="18" rx="9" fill="rgba(123,97,255,0.2)"/>
  <text x="140" y="408" font-family="system-ui" font-size="7" fill="#A78BFA" text-anchor="middle" font-weight="600">Built with SceneView</text>

  <!-- Center badges -->
  <g transform="translate(290, 60)">
    <rect x="0" y="0" width="140" height="30" rx="15" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)"/>
    <text x="70" y="20" font-family="system-ui" font-size="9" fill="white" text-anchor="middle" font-weight="600">PhysicsNode collisions</text>
  </g>
  <g transform="translate(300, 120)">
    <rect x="0" y="0" width="130" height="30" rx="15" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)"/>
    <text x="65" y="20" font-family="system-ui" font-size="9" fill="#67E8F9" text-anchor="middle" font-weight="600">Dynamic lighting</text>
  </g>
  <g transform="translate(290, 180)">
    <rect x="0" y="0" width="145" height="30" rx="15" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)"/>
    <text x="72" y="20" font-family="system-ui" font-size="9" fill="#FDE68A" text-anchor="middle" font-weight="600">Compose UI overlays</text>
  </g>
  <g transform="translate(300, 240)">
    <rect x="0" y="0" width="120" height="30" rx="15" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)"/>
    <text x="60" y="20" font-family="system-ui" font-size="9" fill="#F472B6" text-anchor="middle" font-weight="600">60fps rendering</text>
  </g>

  <!-- TABLET landscape — Level editor -->
  <g filter="url(#gm-shadow)">
    <rect x="478" y="30" width="300" height="260" rx="20" fill="#111827"/>
    <rect x="480" y="32" width="296" height="256" rx="18" fill="#1A1A2E"/>
    <rect x="492" y="48" width="272" height="224" rx="6" fill="#020617"/>
    <circle cx="628" cy="41" r="3" fill="#333"/>
    <g clip-path="url(#gm-tab-clip)">
      <!-- Grid-based level editor -->
      <rect x="492" y="48" width="272" height="24" fill="rgba(255,255,255,0.03)"/>
      <text x="508" y="64" font-family="system-ui" font-size="8" fill="white" font-weight="700">Level Editor — World 3</text>
      <rect x="700" y="54" width="52" height="14" rx="7" fill="rgba(34,197,94,0.15)"/>
      <text x="726" y="64" font-family="system-ui" font-size="6" fill="#22C55E" text-anchor="middle" font-weight="600">Saved</text>
      <!-- 3D grid isometric view -->
      <g transform="translate(530, 100)">
        <!-- Isometric blocks -->
        <g transform="translate(0, 40)">
          <path d="M0,15 L20,25 L40,15 L40,0 L20,-10 L0,0 Z" fill="#334155"/>
          <path d="M40,15 L40,0 L20,-10 L20,5 Z" fill="#1E293B"/>
          <path d="M0,0 L20,-10 L40,0 L20,10 Z" fill="#475569"/>
        </g>
        <g transform="translate(40, 30)">
          <path d="M0,15 L20,25 L40,15 L40,0 L20,-10 L0,0 Z" fill="#334155"/>
          <path d="M40,15 L40,0 L20,-10 L20,5 Z" fill="#1E293B"/>
          <path d="M0,0 L20,-10 L40,0 L20,10 Z" fill="#475569"/>
        </g>
        <g transform="translate(80, 20)">
          <path d="M0,15 L20,25 L40,15 L40,-10 L20,-20 L0,-10 Z" fill="#7B61FF"/>
          <path d="M40,15 L40,-10 L20,-20 L20,5 Z" fill="#6D28D9"/>
          <path d="M0,-10 L20,-20 L40,-10 L20,0 Z" fill="#A78BFA"/>
        </g>
        <g transform="translate(40, 50)">
          <path d="M0,15 L20,25 L40,15 L40,-15 L20,-25 L0,-15 Z" fill="url(#gm-lava)"/>
          <path d="M40,15 L40,-15 L20,-25 L20,5 Z" fill="#DC2626"/>
          <path d="M0,-15 L20,-25 L40,-15 L20,-5 Z" fill="#FB923C"/>
        </g>
        <g transform="translate(120, 30)">
          <path d="M0,15 L20,25 L40,15 L40,0 L20,-10 L0,0 Z" fill="#334155"/>
          <path d="M40,15 L40,0 L20,-10 L20,5 Z" fill="#1E293B"/>
          <path d="M0,0 L20,-10 L40,0 L20,10 Z" fill="#475569"/>
        </g>
        <!-- Crystal on top block -->
        <g transform="translate(92, -2)" filter="url(#gm-glow-sm)">
          <polygon points="8,0 13,6 10,16 6,16 3,6" fill="url(#gm-crystal)" opacity="0.8"/>
        </g>
        <!-- Character on grid -->
        <circle cx="30" cy="40" r="5" fill="#22C55E"/>
        <circle cx="30" cy="40" r="3" fill="#4ADE80"/>
      </g>
      <!-- Tool palette (right) -->
      <rect x="700" y="72" width="60" height="196" fill="rgba(255,255,255,0.03)"/>
      <g transform="translate(708, 82)">
        <rect x="0" y="0" width="44" height="28" rx="8" fill="rgba(123,97,255,0.2)" stroke="#7B61FF" stroke-width="0.5"/>
        <text x="22" y="18" font-family="system-ui" font-size="7" fill="#A78BFA" text-anchor="middle" font-weight="600">Block</text>
        <rect x="0" y="34" width="44" height="28" rx="8" fill="rgba(255,255,255,0.04)" stroke="#334155" stroke-width="0.5"/>
        <text x="22" y="52" font-family="system-ui" font-size="7" fill="#94A3B8" text-anchor="middle">Lava</text>
        <rect x="0" y="68" width="44" height="28" rx="8" fill="rgba(255,255,255,0.04)" stroke="#334155" stroke-width="0.5"/>
        <text x="22" y="86" font-family="system-ui" font-size="7" fill="#94A3B8" text-anchor="middle">Item</text>
        <rect x="0" y="102" width="44" height="28" rx="8" fill="rgba(255,255,255,0.04)" stroke="#334155" stroke-width="0.5"/>
        <text x="22" y="120" font-family="system-ui" font-size="7" fill="#94A3B8" text-anchor="middle">Enemy</text>
        <rect x="0" y="136" width="44" height="28" rx="8" fill="rgba(255,255,255,0.04)" stroke="#334155" stroke-width="0.5"/>
        <text x="22" y="154" font-family="system-ui" font-size="7" fill="#94A3B8" text-anchor="middle">Spawn</text>
      </g>
      <!-- Bottom toolbar -->
      <g transform="translate(502, 246)">
        <rect x="0" y="0" width="188" height="20" rx="10" fill="rgba(255,255,255,0.06)"/>
        <text x="94" y="14" font-family="system-ui" font-size="7" fill="#94A3B8" text-anchor="middle">Play  ·  Undo  ·  Redo  ·  Grid  ·  Camera</text>
      </g>
    </g>
  </g>
  <rect x="568" y="300" width="120" height="18" rx="9" fill="rgba(123,97,255,0.2)"/>
  <text x="628" y="313" font-family="system-ui" font-size="7" fill="#A78BFA" text-anchor="middle" font-weight="600">Built with SceneView</text>

  <text x="400" y="410" font-family="system-ui" font-size="10" fill="#64748B" text-anchor="middle" font-weight="500">3D Games · Level Editors · Interactive Worlds · No Game Engine Needed</text>
</svg>
