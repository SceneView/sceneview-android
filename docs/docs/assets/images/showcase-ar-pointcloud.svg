<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 480" fill="none">
  <defs>
    <!-- Glow filters for each confidence level -->
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feFlood flood-color="#22C55E" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-yellow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feFlood flood-color="#F59E0B" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-red" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feFlood flood-color="#EF4444" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ====== BACKGROUND: Camera view of a living room ====== -->

  <!-- Wall (top 60%) -->
  <rect width="280" height="290" fill="#F5F0EB"/>
  <!-- Subtle wall texture — very faint vertical streaks -->
  <line x1="70" y1="0" x2="70" y2="290" stroke="#EDE8E3" stroke-width="0.5"/>
  <line x1="140" y1="0" x2="140" y2="290" stroke="#EDE8E3" stroke-width="0.5"/>
  <line x1="210" y1="0" x2="210" y2="290" stroke="#EDE8E3" stroke-width="0.5"/>

  <!-- Baseboard -->
  <rect x="0" y="282" width="280" height="8" fill="#E8DDD2"/>
  <line x1="0" y1="282" x2="280" y2="282" stroke="#C4B5A2" stroke-width="0.5"/>
  <line x1="0" y1="290" x2="280" y2="290" stroke="#C4B5A2" stroke-width="0.5"/>

  <!-- Floor (bottom 40%) — wooden planks -->
  <rect x="0" y="290" width="280" height="190" fill="#D4C5B2"/>
  <!-- Floorboard plank lines -->
  <line x1="0" y1="305" x2="280" y2="305" stroke="#C4B5A2" stroke-width="0.3"/>
  <line x1="0" y1="320" x2="280" y2="320" stroke="#C4B5A2" stroke-width="0.3"/>
  <line x1="0" y1="335" x2="280" y2="335" stroke="#C4B5A2" stroke-width="0.3"/>
  <line x1="0" y1="350" x2="280" y2="350" stroke="#C4B5A2" stroke-width="0.3"/>
  <line x1="0" y1="365" x2="280" y2="365" stroke="#C4B5A2" stroke-width="0.3"/>
  <line x1="0" y1="380" x2="280" y2="380" stroke="#C4B5A2" stroke-width="0.3"/>
  <line x1="0" y1="395" x2="280" y2="395" stroke="#C4B5A2" stroke-width="0.3"/>
  <line x1="0" y1="410" x2="280" y2="410" stroke="#C4B5A2" stroke-width="0.3"/>
  <line x1="0" y1="425" x2="280" y2="425" stroke="#C4B5A2" stroke-width="0.3"/>
  <line x1="0" y1="440" x2="280" y2="440" stroke="#C4B5A2" stroke-width="0.3"/>
  <line x1="0" y1="455" x2="280" y2="455" stroke="#C4B5A2" stroke-width="0.3"/>
  <line x1="0" y1="470" x2="280" y2="470" stroke="#C4B5A2" stroke-width="0.3"/>
  <!-- Plank vertical stagger lines -->
  <line x1="90" y1="290" x2="90" y2="305" stroke="#C4B5A2" stroke-width="0.2"/>
  <line x1="200" y1="305" x2="200" y2="320" stroke="#C4B5A2" stroke-width="0.2"/>
  <line x1="60" y1="320" x2="60" y2="335" stroke="#C4B5A2" stroke-width="0.2"/>
  <line x1="170" y1="335" x2="170" y2="350" stroke="#C4B5A2" stroke-width="0.2"/>
  <line x1="110" y1="350" x2="110" y2="365" stroke="#C4B5A2" stroke-width="0.2"/>
  <line x1="220" y1="365" x2="220" y2="380" stroke="#C4B5A2" stroke-width="0.2"/>
  <line x1="45" y1="380" x2="45" y2="395" stroke="#C4B5A2" stroke-width="0.2"/>
  <line x1="155" y1="395" x2="155" y2="410" stroke="#C4B5A2" stroke-width="0.2"/>
  <line x1="80" y1="410" x2="80" y2="425" stroke="#C4B5A2" stroke-width="0.2"/>
  <line x1="190" y1="425" x2="190" y2="440" stroke="#C4B5A2" stroke-width="0.2"/>
  <line x1="130" y1="440" x2="130" y2="455" stroke="#C4B5A2" stroke-width="0.2"/>
  <line x1="240" y1="455" x2="240" y2="470" stroke="#C4B5A2" stroke-width="0.2"/>

  <!-- Slight floor color gradient (darker near wall) -->
  <rect x="0" y="290" width="280" height="15" fill="#CDBFAD" opacity="0.3"/>

  <!-- ====== ARCHITECTURAL HINTS ====== -->

  <!-- Door frame on right wall -->
  <rect x="205" y="50" width="55" height="232" fill="none" stroke="#C4B5A2" stroke-width="1"/>
  <rect x="207" y="52" width="51" height="228" fill="#EDE8E3"/>
  <!-- Door handle -->
  <circle cx="215" cy="170" r="2.5" fill="none" stroke="#B0A090" stroke-width="0.8"/>

  <!-- Window/picture frame on left wall -->
  <rect x="30" y="70" width="65" height="50" rx="1" fill="none" stroke="#C4B5A2" stroke-width="1"/>
  <rect x="32" y="72" width="61" height="46" fill="#E0E7EE" opacity="0.5"/>
  <!-- Window light reflection -->
  <rect x="34" y="74" width="25" height="20" fill="#FFFFFF" opacity="0.15"/>

  <!-- ====== FURNITURE HINTS ====== -->

  <!-- Coffee table (center of room, on floor) -->
  <rect x="90" y="330" width="100" height="50" rx="2" fill="none" stroke="#94A3B8" stroke-width="1"/>
  <!-- Table legs -->
  <line x1="95" y1="380" x2="95" y2="395" stroke="#94A3B8" stroke-width="1"/>
  <line x1="185" y1="380" x2="185" y2="395" stroke="#94A3B8" stroke-width="1"/>
  <!-- Table surface highlight -->
  <rect x="92" y="332" width="96" height="46" rx="1" fill="#B0A899" opacity="0.15"/>

  <!-- Chair (left side, near wall) -->
  <rect x="15" y="200" width="45" height="82" rx="2" fill="none" stroke="#94A3B8" stroke-width="1"/>
  <!-- Chair back -->
  <rect x="15" y="200" width="45" height="30" rx="2" fill="none" stroke="#94A3B8" stroke-width="0.6"/>
  <!-- Chair legs -->
  <line x1="20" y1="282" x2="20" y2="300" stroke="#94A3B8" stroke-width="0.8"/>
  <line x1="55" y1="282" x2="55" y2="300" stroke="#94A3B8" stroke-width="0.8"/>

  <!-- Shelf on wall (right of window) -->
  <line x1="120" y1="130" x2="190" y2="130" stroke="#C4B5A2" stroke-width="1"/>
  <!-- Items on shelf -->
  <rect x="125" y="118" width="12" height="12" rx="1" fill="none" stroke="#B0A090" stroke-width="0.6"/>
  <rect x="142" y="115" width="8" height="15" rx="1" fill="none" stroke="#B0A090" stroke-width="0.6"/>
  <circle cx="165" cy="124" r="5" fill="none" stroke="#B0A090" stroke-width="0.6"/>

  <!-- ====== DETECTED PLANE (floor) ====== -->
  <polygon points="40,310 240,310 260,460 20,460" fill="#22C55E" opacity="0.08"/>
  <polygon points="40,310 240,310 260,460 20,460" fill="none" stroke="#22C55E" opacity="0.3"
    stroke-width="1" stroke-dasharray="6,4"/>
  <!-- Floor label -->
  <text x="140" y="400" font-family="system-ui,sans-serif" font-size="9" fill="#22C55E"
    text-anchor="middle" opacity="0.5" font-weight="500">Floor</text>

  <!-- ====== POINT CLOUD ====== -->

  <!-- HIGH CONFIDENCE points (green) — dense on floor & furniture surfaces -->
  <g filter="url(#glow-green)">
    <!-- Floor cluster — dense -->
    <circle cx="55" cy="315" r="2.5" fill="#22C55E"/>
    <circle cx="78" cy="320" r="2.5" fill="#22C55E"/>
    <circle cx="105" cy="312" r="2.5" fill="#22C55E"/>
    <circle cx="130" cy="318" r="2.5" fill="#22C55E"/>
    <circle cx="155" cy="310" r="2.5" fill="#22C55E"/>
    <circle cx="180" cy="316" r="2.5" fill="#22C55E"/>
    <circle cx="210" cy="314" r="2.5" fill="#22C55E"/>
    <circle cx="235" cy="320" r="2.5" fill="#22C55E"/>
    <circle cx="42" cy="335" r="2.5" fill="#22C55E"/>
    <circle cx="68" cy="340" r="2.5" fill="#22C55E"/>
    <circle cx="95" cy="338" r="2.5" fill="#22C55E"/>
    <circle cx="120" cy="342" r="2.5" fill="#22C55E"/>
    <circle cx="150" cy="336" r="2.5" fill="#22C55E"/>
    <circle cx="175" cy="345" r="2.5" fill="#22C55E"/>
    <circle cx="200" cy="340" r="2.5" fill="#22C55E"/>
    <circle cx="228" cy="338" r="2.5" fill="#22C55E"/>
    <circle cx="250" cy="342" r="2.5" fill="#22C55E"/>
    <circle cx="32" cy="360" r="2.5" fill="#22C55E"/>
    <circle cx="60" cy="365" r="2.5" fill="#22C55E"/>
    <circle cx="88" cy="358" r="2.5" fill="#22C55E"/>
    <circle cx="115" cy="362" r="2.5" fill="#22C55E"/>
    <circle cx="145" cy="368" r="2.5" fill="#22C55E"/>
    <circle cx="170" cy="360" r="2.5" fill="#22C55E"/>
    <circle cx="198" cy="366" r="2.5" fill="#22C55E"/>
    <circle cx="222" cy="358" r="2.5" fill="#22C55E"/>
    <circle cx="248" cy="365" r="2.5" fill="#22C55E"/>
    <circle cx="45" cy="385" r="2.5" fill="#22C55E"/>
    <circle cx="72" cy="390" r="2.5" fill="#22C55E"/>
    <circle cx="100" cy="382" r="2.5" fill="#22C55E"/>
    <circle cx="132" cy="388" r="2.5" fill="#22C55E"/>
    <circle cx="160" cy="392" r="2.5" fill="#22C55E"/>
    <circle cx="188" cy="385" r="2.5" fill="#22C55E"/>
    <circle cx="215" cy="390" r="2.5" fill="#22C55E"/>
    <circle cx="240" cy="388" r="2.5" fill="#22C55E"/>
    <circle cx="55" cy="410" r="2.5" fill="#22C55E"/>
    <circle cx="82" cy="415" r="2.5" fill="#22C55E"/>
    <circle cx="110" cy="408" r="2.5" fill="#22C55E"/>
    <circle cx="140" cy="418" r="2.5" fill="#22C55E"/>
    <circle cx="168" cy="412" r="2.5" fill="#22C55E"/>
    <circle cx="195" cy="416" r="2.5" fill="#22C55E"/>
    <circle cx="225" cy="410" r="2.5" fill="#22C55E"/>
    <circle cx="252" cy="415" r="2.5" fill="#22C55E"/>
    <circle cx="38" cy="435" r="2.5" fill="#22C55E"/>
    <circle cx="65" cy="440" r="2.5" fill="#22C55E"/>
    <circle cx="128" cy="438" r="2.5" fill="#22C55E"/>
    <circle cx="178" cy="442" r="2.5" fill="#22C55E"/>
    <circle cx="208" cy="436" r="2.5" fill="#22C55E"/>
    <circle cx="245" cy="440" r="2.5" fill="#22C55E"/>
    <!-- Furniture surface points -->
    <circle cx="100" cy="335" r="2.5" fill="#22C55E"/>
    <circle cx="120" cy="340" r="2.5" fill="#22C55E"/>
    <circle cx="140" cy="338" r="2.5" fill="#22C55E"/>
    <circle cx="160" cy="335" r="2.5" fill="#22C55E"/>
    <circle cx="180" cy="340" r="2.5" fill="#22C55E"/>
    <!-- Chair surface -->
    <circle cx="25" cy="220" r="2.5" fill="#22C55E"/>
    <circle cx="38" cy="240" r="2.5" fill="#22C55E"/>
    <circle cx="48" cy="255" r="2.5" fill="#22C55E"/>
    <circle cx="30" cy="260" r="2.5" fill="#22C55E"/>
    <!-- Shelf -->
    <circle cx="130" cy="128" r="2.5" fill="#22C55E"/>
    <circle cx="148" cy="128" r="2.5" fill="#22C55E"/>
    <circle cx="168" cy="128" r="2.5" fill="#22C55E"/>
  </g>

  <!-- MEDIUM CONFIDENCE points (yellow) — edges, transitions -->
  <g filter="url(#glow-yellow)">
    <!-- Wall-floor boundary -->
    <circle cx="35" cy="292" r="2" fill="#F59E0B"/>
    <circle cx="70" cy="290" r="2" fill="#F59E0B"/>
    <circle cx="110" cy="292" r="2" fill="#F59E0B"/>
    <circle cx="155" cy="291" r="2" fill="#F59E0B"/>
    <circle cx="195" cy="290" r="2" fill="#F59E0B"/>
    <circle cx="240" cy="292" r="2" fill="#F59E0B"/>
    <!-- Around furniture edges -->
    <circle cx="90" cy="332" r="2" fill="#F59E0B"/>
    <circle cx="190" cy="332" r="2" fill="#F59E0B"/>
    <circle cx="90" cy="378" r="2" fill="#F59E0B"/>
    <circle cx="190" cy="378" r="2" fill="#F59E0B"/>
    <!-- Door frame edges -->
    <circle cx="205" cy="80" r="2" fill="#F59E0B"/>
    <circle cx="205" cy="150" r="2" fill="#F59E0B"/>
    <circle cx="205" cy="220" r="2" fill="#F59E0B"/>
    <circle cx="260" cy="80" r="2" fill="#F59E0B"/>
    <circle cx="260" cy="200" r="2" fill="#F59E0B"/>
    <!-- Window frame -->
    <circle cx="30" cy="72" r="2" fill="#F59E0B"/>
    <circle cx="95" cy="72" r="2" fill="#F59E0B"/>
    <circle cx="30" cy="120" r="2" fill="#F59E0B"/>
    <circle cx="95" cy="120" r="2" fill="#F59E0B"/>
    <!-- Chair edges -->
    <circle cx="15" cy="202" r="2" fill="#F59E0B"/>
    <circle cx="60" cy="202" r="2" fill="#F59E0B"/>
    <circle cx="15" cy="280" r="2" fill="#F59E0B"/>
    <circle cx="60" cy="280" r="2" fill="#F59E0B"/>
    <!-- Scattered mid-wall -->
    <circle cx="140" cy="180" r="2" fill="#F59E0B"/>
    <circle cx="170" cy="200" r="2" fill="#F59E0B"/>
    <!-- Floor edges near far wall -->
    <circle cx="25" cy="455" r="2" fill="#F59E0B"/>
    <circle cx="258" cy="455" r="2" fill="#F59E0B"/>
  </g>

  <!-- LOW CONFIDENCE points (red) — sparse, plain walls, far areas -->
  <g filter="url(#glow-red)">
    <!-- Plain wall area (sparse) -->
    <circle cx="140" cy="55" r="1.5" fill="#EF4444"/>
    <circle cx="180" cy="40" r="1.5" fill="#EF4444"/>
    <circle cx="100" cy="48" r="1.5" fill="#EF4444"/>
    <circle cx="60" cy="160" r="1.5" fill="#EF4444"/>
    <circle cx="140" cy="145" r="1.5" fill="#EF4444"/>
    <circle cx="115" cy="195" r="1.5" fill="#EF4444"/>
    <circle cx="170" cy="160" r="1.5" fill="#EF4444"/>
    <circle cx="85" cy="100" r="1.5" fill="#EF4444"/>
    <circle cx="155" cy="100" r="1.5" fill="#EF4444"/>
    <!-- Open area above furniture -->
    <circle cx="140" cy="250" r="1.5" fill="#EF4444"/>
    <circle cx="200" cy="260" r="1.5" fill="#EF4444"/>
    <!-- Inside door (featureless) -->
    <circle cx="230" cy="120" r="1.5" fill="#EF4444"/>
    <circle cx="240" cy="200" r="1.5" fill="#EF4444"/>
    <!-- Ceiling edges -->
    <circle cx="50" cy="10" r="1.5" fill="#EF4444"/>
    <circle cx="180" cy="8" r="1.5" fill="#EF4444"/>
    <circle cx="250" cy="15" r="1.5" fill="#EF4444"/>
  </g>

  <!-- ====== UI OVERLAYS ====== -->

  <!-- Top bar -->
  <rect x="0" y="0" width="280" height="32" fill="#0F172A" opacity="0.6"/>
  <circle cx="18" cy="16" r="4" fill="#22C55E"/>
  <text x="28" y="20" font-family="system-ui,sans-serif" font-size="11" fill="white" font-weight="600">AR Point Cloud</text>
  <text x="265" y="20" font-family="system-ui,sans-serif" font-size="8" fill="white" text-anchor="end" opacity="0.7">TRACKING</text>

  <!-- Bottom stats bar -->
  <rect x="0" y="448" width="280" height="32" fill="#0F172A" opacity="0.6"/>
  <text x="18" y="468" font-family="system-ui,sans-serif" font-size="8" fill="white" font-weight="500">Points: 847</text>
  <text x="100" y="468" font-family="system-ui,sans-serif" font-size="8" fill="white" font-weight="500">Planes: 3</text>
  <text x="172" y="468" font-family="system-ui,sans-serif" font-size="8" fill="white" font-weight="500">FPS: 60</text>

  <!-- Confidence legend (bottom-right area) -->
  <rect x="210" y="454" width="60" height="22" rx="4" fill="#0F172A" opacity="0.4"/>
  <circle cx="220" cy="460" r="2.5" fill="#22C55E"/>
  <text x="226" y="463" font-family="system-ui,sans-serif" font-size="7" fill="white" opacity="0.8">High</text>
  <circle cx="220" cy="470" r="2" fill="#F59E0B"/>
  <text x="226" y="473" font-family="system-ui,sans-serif" font-size="7" fill="white" opacity="0.8">Med</text>
  <circle cx="248" cy="460" r="1.5" fill="#EF4444"/>
  <text x="253" y="463" font-family="system-ui,sans-serif" font-size="7" fill="white" opacity="0.8">Low</text>
</svg>