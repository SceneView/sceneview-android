<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 480" fill="none">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <!-- Car body radial gradient -->
    <radialGradient id="car-body" cx="0.35" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#991B1B"/>
    </radialGradient>
    <!-- Shadow blur -->
    <filter id="car-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
    <!-- Soft glow for camera indicator -->
    <filter id="cam-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
    <!-- Floor grid fade -->
    <linearGradient id="grid-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94A3B8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#94A3B8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="280" height="480" fill="url(#bg)"/>

  <!-- Subtle floor grid (perspective-like) -->
  <g opacity="0.08">
    <!-- Horizontal lines -->
    <line x1="30" y1="280" x2="250" y2="280" stroke="#94A3B8" stroke-width="0.5"/>
    <line x1="45" y1="295" x2="235" y2="295" stroke="#94A3B8" stroke-width="0.5"/>
    <line x1="55" y1="310" x2="225" y2="310" stroke="#94A3B8" stroke-width="0.5"/>
    <line x1="65" y1="325" x2="215" y2="325" stroke="#94A3B8" stroke-width="0.5"/>
    <line x1="75" y1="340" x2="205" y2="340" stroke="#94A3B8" stroke-width="0.5"/>
    <!-- Vertical converging lines -->
    <line x1="140" y1="260" x2="30" y2="340" stroke="#94A3B8" stroke-width="0.5"/>
    <line x1="140" y1="260" x2="70" y2="340" stroke="#94A3B8" stroke-width="0.5"/>
    <line x1="140" y1="260" x2="110" y2="340" stroke="#94A3B8" stroke-width="0.5"/>
    <line x1="140" y1="260" x2="170" y2="340" stroke="#94A3B8" stroke-width="0.5"/>
    <line x1="140" y1="260" x2="210" y2="340" stroke="#94A3B8" stroke-width="0.5"/>
    <line x1="140" y1="260" x2="250" y2="340" stroke="#94A3B8" stroke-width="0.5"/>
  </g>

  <!-- Title -->
  <text x="20" y="30" font-family="system-ui, sans-serif" font-size="12" fill="white" opacity="0.6" font-weight="600">Camera Controls</text>

  <!-- Car shadow on ground -->
  <ellipse cx="140" cy="275" rx="55" ry="10" fill="#000000" opacity="0.35" filter="url(#car-shadow)"/>

  <!-- ============ CAR ============ -->
  <g transform="translate(90, 220)">
    <!-- Car body (main) -->
    <rect x="0" y="8" width="100" height="38" rx="12" fill="url(#car-body)"/>
    <!-- Roof / cabin -->
    <path d="M25,10 L35,-8 L72,-8 L80,10 Z" fill="url(#car-body)"/>
    <!-- Windshield -->
    <path d="M30,8 L37,-4 L62,-4 L68,8 Z" fill="#1E3A5F" opacity="0.9"/>
    <!-- Rear window -->
    <path d="M70,-2 L74,8 L80,8 L76,-2 Z" fill="#1E3A5F" opacity="0.7"/>
    <!-- Specular highlight on body -->
    <ellipse cx="40" cy="22" rx="32" ry="8" fill="white" opacity="0.15"/>
    <!-- Specular highlight on roof -->
    <ellipse cx="50" cy="0" rx="14" ry="4" fill="white" opacity="0.12"/>
    <!-- Hood line -->
    <line x1="5" y1="24" x2="25" y2="24" stroke="#7F1D1D" stroke-width="0.5" opacity="0.5"/>
    <!-- Trunk line -->
    <line x1="75" y1="24" x2="95" y2="24" stroke="#7F1D1D" stroke-width="0.5" opacity="0.5"/>
    <!-- Headlight -->
    <ellipse cx="3" cy="22" rx="3" ry="4" fill="#FCD34D" opacity="0.7"/>
    <!-- Taillight -->
    <ellipse cx="97" cy="22" rx="3" ry="4" fill="#DC2626" opacity="0.8"/>
    <!-- Wheels -->
    <circle cx="22" cy="46" r="8" fill="#111827"/>
    <circle cx="22" cy="46" r="5" fill="#1F2937"/>
    <circle cx="22" cy="46" r="2" fill="#374151"/>
    <circle cx="78" cy="46" r="8" fill="#111827"/>
    <circle cx="78" cy="46" r="5" fill="#1F2937"/>
    <circle cx="78" cy="46" r="2" fill="#374151"/>
  </g>

  <!-- ============ ORBIT RING ============ -->
  <!-- Dotted orbit circle -->
  <circle cx="140" cy="245" r="110" fill="none" stroke="#94A3B8" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.2"/>

  <!-- Line of sight from camera to car center -->
  <line x1="48" y1="185" x2="140" y2="245" stroke="#6750A4" stroke-width="0.8" opacity="0.3"/>

  <!-- Camera position indicator (wedge/triangle on orbit ring) -->
  <!-- Position at ~top-left of the orbit ring -->
  <g transform="translate(48, 185) rotate(30)">
    <!-- Glow -->
    <circle cx="0" cy="0" r="8" fill="#6750A4" opacity="0.3" filter="url(#cam-glow)"/>
    <!-- Camera wedge shape (pointing toward center) -->
    <polygon points="0,-7 6,5 -6,5" fill="#6750A4"/>
    <polygon points="0,-4 3,3 -3,3" fill="#9D8CD6"/>
  </g>

  <!-- Small orbit direction arc with arrow -->
  <path d="M60,168 A110,110 0 0,1 105,148" stroke="#6750A4" stroke-width="1" fill="none" opacity="0.4" stroke-linecap="round"/>
  <!-- Arrow tip -->
  <polygon points="105,148 98,145 100,153" fill="#6750A4" opacity="0.4"/>

  <!-- ============ AXIS GIZMO (top-right) ============ -->
  <g transform="translate(242, 55)">
    <!-- X axis (red) -->
    <line x1="0" y1="0" x2="20" y2="0" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round"/>
    <text x="24" y="3" font-family="system-ui, sans-serif" font-size="6" fill="#EF4444" font-weight="700">X</text>
    <!-- Y axis (green, pointing up) -->
    <line x1="0" y1="0" x2="0" y2="-20" stroke="#22C55E" stroke-width="1.5" stroke-linecap="round"/>
    <text x="-3" y="-24" font-family="system-ui, sans-serif" font-size="6" fill="#22C55E" font-weight="700">Y</text>
    <!-- Z axis (blue, diagonal) -->
    <line x1="0" y1="0" x2="-12" y2="12" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
    <text x="-20" y="20" font-family="system-ui, sans-serif" font-size="6" fill="#3B82F6" font-weight="700">Z</text>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="2" fill="#CBD5E1"/>
  </g>

  <!-- ============ GESTURE HINTS (bottom) ============ -->
  <g transform="translate(0, 410)" opacity="0.85">
    <!-- 1 Finger: Orbit -->
    <g transform="translate(22, 0)">
      <!-- Circle with curved arrow -->
      <circle cx="12" cy="12" r="5" fill="none" stroke="#94A3B8" stroke-width="0.8"/>
      <circle cx="12" cy="12" r="1.5" fill="#94A3B8"/>
      <!-- Curved orbit arrow -->
      <path d="M18,8 A8,8 0 0,1 20,16" stroke="#94A3B8" stroke-width="0.8" fill="none" stroke-linecap="round"/>
      <polygon points="20,16 18,14 21,14" fill="#94A3B8"/>
      <!-- Label -->
      <text x="12" y="32" font-family="system-ui, sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle" font-weight="500">1 finger</text>
      <text x="12" y="42" font-family="system-ui, sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle" font-weight="600">Orbit</text>
    </g>

    <!-- 2 Fingers: Pan -->
    <g transform="translate(110, 0)">
      <!-- Two dots with directional arrows -->
      <circle cx="8" cy="12" r="2" fill="#94A3B8" opacity="0.7"/>
      <circle cx="16" cy="12" r="2" fill="#94A3B8" opacity="0.7"/>
      <!-- Arrows pointing right -->
      <line x1="20" y1="8" x2="26" y2="8" stroke="#94A3B8" stroke-width="0.8" stroke-linecap="round"/>
      <polygon points="26,8 23,6 23,10" fill="#94A3B8"/>
      <line x1="20" y1="16" x2="26" y2="16" stroke="#94A3B8" stroke-width="0.8" stroke-linecap="round"/>
      <polygon points="26,16 23,14 23,18" fill="#94A3B8"/>
      <!-- Label -->
      <text x="14" y="32" font-family="system-ui, sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle" font-weight="500">2 fingers</text>
      <text x="14" y="42" font-family="system-ui, sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle" font-weight="600">Pan</text>
    </g>

    <!-- Pinch: Zoom -->
    <g transform="translate(205, 0)">
      <!-- Two dots moving apart -->
      <circle cx="6" cy="12" r="2" fill="#94A3B8" opacity="0.7"/>
      <circle cx="22" cy="12" r="2" fill="#94A3B8" opacity="0.7"/>
      <!-- Outward arrows -->
      <line x1="6" y1="12" x2="1" y2="12" stroke="#94A3B8" stroke-width="0.8" stroke-linecap="round"/>
      <polygon points="1,12 4,10 4,14" fill="#94A3B8"/>
      <line x1="22" y1="12" x2="27" y2="12" stroke="#94A3B8" stroke-width="0.8" stroke-linecap="round"/>
      <polygon points="27,12 24,10 24,14" fill="#94A3B8"/>
      <!-- Dashed line between -->
      <line x1="9" y1="12" x2="19" y2="12" stroke="#94A3B8" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.5"/>
      <!-- Label -->
      <text x="14" y="32" font-family="system-ui, sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle" font-weight="500">Pinch</text>
      <text x="14" y="42" font-family="system-ui, sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle" font-weight="600">Zoom</text>
    </g>
  </g>

  <!-- Thin separator line above gesture hints -->
  <line x1="30" y1="400" x2="250" y2="400" stroke="#94A3B8" stroke-width="0.3" opacity="0.2"/>
</svg>
