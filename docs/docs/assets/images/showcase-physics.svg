<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 480" fill="none">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="ph-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="ph-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
    </filter>

    <!-- Motion blur filter -->
    <filter id="ph-motion" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5 0.3"/>
    </filter>

    <!-- Grid fade mask -->
    <linearGradient id="ph-grid-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.5"/>
    </linearGradient>
    <mask id="ph-grid-mask">
      <rect x="0" y="280" width="280" height="200" fill="url(#ph-grid-fade)"/>
    </mask>

    <!-- Sphere 1: Red -->
    <radialGradient id="ph-sphere-red" cx="0.35" cy="0.3" r="0.65" fx="0.3" fy="0.25">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="30%" stop-color="#EF4444"/>
      <stop offset="75%" stop-color="#B91C1C"/>
      <stop offset="100%" stop-color="#7F1D1D"/>
    </radialGradient>

    <!-- Sphere 2: Blue -->
    <radialGradient id="ph-sphere-blue" cx="0.35" cy="0.3" r="0.65" fx="0.3" fy="0.25">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="30%" stop-color="#3B82F6"/>
      <stop offset="75%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </radialGradient>

    <!-- Sphere 3: Green -->
    <radialGradient id="ph-sphere-green" cx="0.35" cy="0.3" r="0.65" fx="0.3" fy="0.25">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="30%" stop-color="#22C55E"/>
      <stop offset="75%" stop-color="#15803D"/>
      <stop offset="100%" stop-color="#14532D"/>
    </radialGradient>

    <!-- Sphere 4: Purple -->
    <radialGradient id="ph-sphere-purple" cx="0.35" cy="0.3" r="0.65" fx="0.3" fy="0.25">
      <stop offset="0%" stop-color="#DDD6FE"/>
      <stop offset="30%" stop-color="#A78BFA"/>
      <stop offset="75%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </radialGradient>

    <!-- Sphere 5: Orange -->
    <radialGradient id="ph-sphere-orange" cx="0.35" cy="0.3" r="0.65" fx="0.3" fy="0.25">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="30%" stop-color="#F59E0B"/>
      <stop offset="75%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#78350F"/>
    </radialGradient>
  </defs>

  <!-- ==================== BACKGROUND ==================== -->
  <rect width="280" height="480" fill="url(#ph-bg)"/>

  <!-- ==================== PERSPECTIVE GRID FLOOR ==================== -->
  <g mask="url(#ph-grid-mask)">
    <!-- Horizontal lines (getting closer together toward vanishing point) -->
    <line x1="-20" y1="480" x2="300" y2="480" stroke="#334155" stroke-width="0.5"/>
    <line x1="-10" y1="460" x2="290" y2="460" stroke="#334155" stroke-width="0.5"/>
    <line x1="0" y1="440" x2="280" y2="440" stroke="#334155" stroke-width="0.5"/>
    <line x1="10" y1="422" x2="270" y2="422" stroke="#334155" stroke-width="0.5"/>
    <line x1="20" y1="406" x2="260" y2="406" stroke="#334155" stroke-width="0.5"/>
    <line x1="30" y1="392" x2="250" y2="392" stroke="#334155" stroke-width="0.5"/>
    <line x1="40" y1="380" x2="240" y2="380" stroke="#334155" stroke-width="0.5"/>
    <line x1="48" y1="370" x2="232" y2="370" stroke="#334155" stroke-width="0.5"/>
    <line x1="56" y1="361" x2="224" y2="361" stroke="#334155" stroke-width="0.5"/>
    <line x1="63" y1="353" x2="217" y2="353" stroke="#334155" stroke-width="0.5"/>
    <line x1="70" y1="346" x2="210" y2="346" stroke="#334155" stroke-width="0.5"/>
    <line x1="76" y1="340" x2="204" y2="340" stroke="#334155" stroke-width="0.5"/>
    <line x1="82" y1="335" x2="198" y2="335" stroke="#334155" stroke-width="0.5"/>
    <line x1="87" y1="330" x2="193" y2="330" stroke="#334155" stroke-width="0.5"/>
    <line x1="92" y1="326" x2="188" y2="326" stroke="#334155" stroke-width="0.5"/>
    <line x1="96" y1="322" x2="184" y2="322" stroke="#334155" stroke-width="0.5"/>
    <line x1="100" y1="319" x2="180" y2="319" stroke="#334155" stroke-width="0.5"/>

    <!-- Vertical lines converging to vanishing point (140, 300) -->
    <line x1="-40" y1="480" x2="140" y2="300" stroke="#334155" stroke-width="0.5"/>
    <line x1="0" y1="480" x2="140" y2="300" stroke="#334155" stroke-width="0.5"/>
    <line x1="35" y1="480" x2="140" y2="300" stroke="#334155" stroke-width="0.5"/>
    <line x1="70" y1="480" x2="140" y2="300" stroke="#334155" stroke-width="0.5"/>
    <line x1="105" y1="480" x2="140" y2="300" stroke="#334155" stroke-width="0.5"/>
    <line x1="140" y1="480" x2="140" y2="300" stroke="#334155" stroke-width="0.5"/>
    <line x1="175" y1="480" x2="140" y2="300" stroke="#334155" stroke-width="0.5"/>
    <line x1="210" y1="480" x2="140" y2="300" stroke="#334155" stroke-width="0.5"/>
    <line x1="245" y1="480" x2="140" y2="300" stroke="#334155" stroke-width="0.5"/>
    <line x1="280" y1="480" x2="140" y2="300" stroke="#334155" stroke-width="0.5"/>
    <line x1="320" y1="480" x2="140" y2="300" stroke="#334155" stroke-width="0.5"/>
  </g>

  <!-- ==================== SHADOWS ON GROUND ==================== -->
  <!-- Shadow for Sphere 1 (Red, mid-air) -->
  <ellipse cx="90" cy="432" rx="18" ry="5" fill="#EF4444" opacity="0.12" filter="url(#ph-shadow)"/>
  <!-- Shadow for Sphere 2 (Blue, near ground) -->
  <ellipse cx="185" cy="438" rx="20" ry="7" fill="#3B82F6" opacity="0.18" filter="url(#ph-shadow)"/>
  <!-- Shadow for Sphere 3 (Green, high up) -->
  <ellipse cx="120" cy="430" rx="10" ry="3" fill="#22C55E" opacity="0.08" filter="url(#ph-shadow)"/>
  <!-- Shadow for Sphere 4 (Purple, bouncing up) -->
  <ellipse cx="210" cy="434" rx="16" ry="5" fill="#A78BFA" opacity="0.12" filter="url(#ph-shadow)"/>
  <!-- Shadow for Sphere 5 (Orange, on ground) -->
  <ellipse cx="155" cy="445" rx="14" ry="6" fill="#F59E0B" opacity="0.2" filter="url(#ph-shadow)"/>

  <!-- ==================== MOTION TRAILS ==================== -->
  <!-- Sphere 1 bounce arc trail -->
  <path d="M 60,420 Q 75,340 90,360" stroke="#EF4444" stroke-width="1" stroke-opacity="0.3" fill="none"
        stroke-dasharray="3,4" stroke-linecap="round"/>

  <!-- Sphere 4 bounce arc trail -->
  <path d="M 190,430 Q 200,340 210,370" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.3" fill="none"
        stroke-dasharray="3,4" stroke-linecap="round"/>

  <!-- Sphere 2 incoming arc trail -->
  <path d="M 160,380 Q 172,410 185,415" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.25" fill="none"
        stroke-dasharray="2,3" stroke-linecap="round"/>

  <!-- ==================== SPHERE 3: Green (high up, distant/small) ==================== -->
  <circle cx="120" cy="320" r="18" fill="url(#ph-sphere-green)"/>
  <!-- Specular highlight -->
  <ellipse cx="114" cy="313" rx="5" ry="4" fill="white" opacity="0.45"/>
  <ellipse cx="116" cy="316" rx="2.5" ry="2" fill="white" opacity="0.2"/>

  <!-- ==================== SPHERE 1: Red (mid-air, with motion blur ghost) ==================== -->
  <!-- Motion blur ghost -->
  <circle cx="90" cy="375" r="28" fill="url(#ph-sphere-red)" opacity="0.1" filter="url(#ph-motion)"/>
  <!-- Main sphere -->
  <circle cx="90" cy="360" r="28" fill="url(#ph-sphere-red)"/>
  <!-- Specular highlight -->
  <ellipse cx="81" cy="349" rx="8" ry="6" fill="white" opacity="0.5"/>
  <ellipse cx="84" cy="353" rx="4" ry="3" fill="white" opacity="0.25"/>
  <!-- Rim light -->
  <path d="M 108,340 A 28,28 0 0,1 112,370" stroke="white" stroke-width="0.8" stroke-opacity="0.12" fill="none"/>

  <!-- ==================== SPHERE 4: Purple (bouncing up, with trail) ==================== -->
  <!-- Trail ghost -->
  <circle cx="210" cy="385" r="24" fill="url(#ph-sphere-purple)" opacity="0.08"/>
  <circle cx="210" cy="378" r="24" fill="url(#ph-sphere-purple)" opacity="0.12"/>
  <!-- Main sphere -->
  <circle cx="210" cy="370" r="24" fill="url(#ph-sphere-purple)"/>
  <!-- Specular highlight -->
  <ellipse cx="202" cy="360" rx="7" ry="5" fill="white" opacity="0.45"/>
  <ellipse cx="205" cy="363" rx="3.5" ry="2.5" fill="white" opacity="0.22"/>
  <!-- Rim light -->
  <path d="M 226,354 A 24,24 0 0,1 228,380" stroke="white" stroke-width="0.7" stroke-opacity="0.1" fill="none"/>

  <!-- ==================== SPHERE 2: Blue (near ground, squashed on impact) ==================== -->
  <g transform="translate(185, 418) scale(1, 0.85) translate(-185, -418)">
    <ellipse cx="185" cy="418" rx="22" ry="22" fill="url(#ph-sphere-blue)"/>
    <!-- Specular highlight -->
    <ellipse cx="178" cy="408" rx="6" ry="5" fill="white" opacity="0.5"/>
    <ellipse cx="180" cy="411" rx="3" ry="2.2" fill="white" opacity="0.25"/>
  </g>
  <!-- Impact ring -->
  <ellipse cx="185" cy="436" rx="24" ry="4" fill="none" stroke="#3B82F6" stroke-width="0.6" stroke-opacity="0.25"/>

  <!-- ==================== SPHERE 5: Orange (rolling on ground) ==================== -->
  <circle cx="155" cy="432" r="16" fill="url(#ph-sphere-orange)"/>
  <!-- Specular highlight -->
  <ellipse cx="150" cy="425" rx="4.5" ry="3.5" fill="white" opacity="0.45"/>
  <ellipse cx="151" cy="427" rx="2.2" ry="1.7" fill="white" opacity="0.2"/>
  <!-- Rolling contact shadow (tight) -->
  <ellipse cx="155" cy="447" rx="10" ry="2.5" fill="#F59E0B" opacity="0.15"/>

  <!-- ==================== UI OVERLAY ==================== -->
  <!-- Top-left label -->
  <text x="16" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white" opacity="0.7" font-weight="600">Physics</text>

  <!-- Bottom info bar -->
  <rect x="0" y="462" width="280" height="18" fill="#0F172A" opacity="0.6"/>
  <text x="24" y="474" font-family="monospace, system-ui" font-size="8" fill="#94A3B8">Gravity: 9.8</text>
  <text x="105" y="474" font-family="monospace, system-ui" font-size="8" fill="#475569">|</text>
  <text x="115" y="474" font-family="monospace, system-ui" font-size="8" fill="#94A3B8">Restitution: 0.7</text>
  <text x="210" y="474" font-family="monospace, system-ui" font-size="8" fill="#475569">|</text>
  <text x="220" y="474" font-family="monospace, system-ui" font-size="8" fill="#94A3B8">Bodies: 5</text>

  <!-- "Tap to throw" floating pill -->
  <rect x="98" y="444" width="84" height="20" rx="10" fill="#1E293B" opacity="0.5"/>
  <rect x="98" y="444" width="84" height="20" rx="10" fill="none" stroke="#475569" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="140" y="457" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.8">Tap to throw</text>
</svg>
