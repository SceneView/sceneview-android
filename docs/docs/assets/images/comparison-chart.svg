<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <defs>
    <linearGradient id="cc-bg" x1="0" y1="0" x2="800" y2="300">
      <stop offset="0%" stop-color="#F5F3FF"/><stop offset="100%" stop-color="#FFF7ED"/>
    </linearGradient>
    <filter id="cc-shadow" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#7B61FF" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="300" rx="24" fill="url(#cc-bg)"/>

  <!-- Title -->
  <text x="400" y="30" font-family="system-ui" font-size="14" fill="#1A1A1A" text-anchor="middle" font-weight="800">Lines of code to display a 3D model</text>

  <!-- Bars -->
  <!-- SceneView -->
  <g transform="translate(60, 55)">
    <rect x="0" y="0" width="120" height="28" rx="14" fill="#7B61FF" filter="url(#cc-shadow)"/>
    <text x="60" y="19" font-family="system-ui" font-size="11" fill="white" text-anchor="middle" font-weight="700">~15 lines</text>
    <text x="130" y="19" font-family="system-ui" font-size="11" fill="#7B61FF" font-weight="700">SceneView</text>
    <rect x="240" y="4" width="60" height="20" rx="10" fill="#DCFCE7"/>
    <text x="270" y="18" font-family="system-ui" font-size="8" fill="#166534" text-anchor="middle" font-weight="600">Compose</text>
    <rect x="306" y="4" width="60" height="20" rx="10" fill="#DCFCE7"/>
    <text x="336" y="18" font-family="system-ui" font-size="8" fill="#166534" text-anchor="middle" font-weight="600">0 XML</text>
    <rect x="372" y="4" width="80" height="20" rx="10" fill="#DCFCE7"/>
    <text x="412" y="18" font-family="system-ui" font-size="8" fill="#166534" text-anchor="middle" font-weight="600">Auto lifecycle</text>
  </g>

  <!-- Sceneform -->
  <g transform="translate(60, 95)">
    <rect x="0" y="0" width="280" height="28" rx="14" fill="#94A3B8" filter="url(#cc-shadow)"/>
    <text x="140" y="19" font-family="system-ui" font-size="11" fill="white" text-anchor="middle" font-weight="700">~80 lines</text>
    <text x="290" y="19" font-family="system-ui" font-size="11" fill="#64748B" font-weight="700">Sceneform</text>
    <rect x="390" y="4" width="70" height="20" rx="10" fill="#FEE2E2"/>
    <text x="425" y="18" font-family="system-ui" font-size="8" fill="#991B1B" text-anchor="middle" font-weight="600">Archived</text>
    <rect x="466" y="4" width="80" height="20" rx="10" fill="#FEF3C7"/>
    <text x="506" y="18" font-family="system-ui" font-size="8" fill="#92400E" text-anchor="middle" font-weight="600">XML + Views</text>
  </g>

  <!-- Raw ARCore -->
  <g transform="translate(60, 135)">
    <rect x="0" y="0" width="440" height="28" rx="14" fill="#CBD5E1" filter="url(#cc-shadow)"/>
    <text x="220" y="19" font-family="system-ui" font-size="11" fill="white" text-anchor="middle" font-weight="700">~200+ lines</text>
    <text x="450" y="19" font-family="system-ui" font-size="11" fill="#64748B" font-weight="700">Raw ARCore</text>
    <rect x="560" y="4" width="100" height="20" rx="10" fill="#FEF3C7"/>
    <text x="610" y="18" font-family="system-ui" font-size="8" fill="#92400E" text-anchor="middle" font-weight="600">No UI layer</text>
  </g>

  <!-- Unity -->
  <g transform="translate(60, 175)">
    <rect x="0" y="0" width="350" height="28" rx="14" fill="#E2E8F0" filter="url(#cc-shadow)"/>
    <text x="175" y="19" font-family="system-ui" font-size="11" fill="#475569" text-anchor="middle" font-weight="700">~50 lines + engine overhead</text>
    <text x="360" y="19" font-family="system-ui" font-size="11" fill="#64748B" font-weight="700">Unity</text>
    <rect x="410" y="4" width="80" height="20" rx="10" fill="#FEE2E2"/>
    <text x="450" y="18" font-family="system-ui" font-size="8" fill="#991B1B" text-anchor="middle" font-weight="600">+50MB APK</text>
    <rect x="496" y="4" width="70" height="20" rx="10" fill="#FEF3C7"/>
    <text x="531" y="18" font-family="system-ui" font-size="8" fill="#92400E" text-anchor="middle" font-weight="600">C# / IL2CPP</text>
  </g>

  <!-- Feature comparison -->
  <g transform="translate(60, 225)">
    <text x="0" y="0" font-family="system-ui" font-size="11" fill="#1A1A1A" font-weight="700">Why developers choose SceneView:</text>
    <g transform="translate(0, 16)">
      <rect x="0" y="0" width="150" height="26" rx="13" fill="white" stroke="#E9D5FF" stroke-width="1"/>
      <circle cx="16" cy="13" r="7" fill="#DCFCE7"/>
      <text x="16" y="17" font-family="system-ui" font-size="8" fill="#166534" text-anchor="middle" font-weight="700">&#x2713;</text>
      <text x="30" y="17" font-family="system-ui" font-size="9" fill="#333" font-weight="600">Compose-native</text>

      <rect x="158" y="0" width="145" height="26" rx="13" fill="white" stroke="#E9D5FF" stroke-width="1"/>
      <circle cx="174" cy="13" r="7" fill="#DCFCE7"/>
      <text x="174" y="17" font-family="system-ui" font-size="8" fill="#166534" text-anchor="middle" font-weight="700">&#x2713;</text>
      <text x="188" y="17" font-family="system-ui" font-size="9" fill="#333" font-weight="600">Zero boilerplate</text>

      <rect x="311" y="0" width="130" height="26" rx="13" fill="white" stroke="#E9D5FF" stroke-width="1"/>
      <circle cx="327" cy="13" r="7" fill="#DCFCE7"/>
      <text x="327" y="17" font-family="system-ui" font-size="8" fill="#166534" text-anchor="middle" font-weight="700">&#x2713;</text>
      <text x="341" y="17" font-family="system-ui" font-size="9" fill="#333" font-weight="600">~5MB APK size</text>

      <rect x="449" y="0" width="125" height="26" rx="13" fill="white" stroke="#E9D5FF" stroke-width="1"/>
      <circle cx="465" cy="13" r="7" fill="#DCFCE7"/>
      <text x="465" y="17" font-family="system-ui" font-size="8" fill="#166534" text-anchor="middle" font-weight="700">&#x2713;</text>
      <text x="479" y="17" font-family="system-ui" font-size="9" fill="#333" font-weight="600">Apache 2.0</text>

      <rect x="582" y="0" width="145" height="26" rx="13" fill="white" stroke="#E9D5FF" stroke-width="1"/>
      <circle cx="598" cy="13" r="7" fill="#DCFCE7"/>
      <text x="598" y="17" font-family="system-ui" font-size="8" fill="#166534" text-anchor="middle" font-weight="700">&#x2713;</text>
      <text x="612" y="17" font-family="system-ui" font-size="9" fill="#333" font-weight="600">Active + AI-ready</text>
    </g>
  </g>
</svg>
