<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <defs>
    <linearGradient id="ed-bg" x1="0" y1="0" x2="800" y2="420">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="50%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#FFF7ED"/>
    </linearGradient>
    <linearGradient id="ed-globe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/><stop offset="40%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="ed-land" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22C55E"/><stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <filter id="ed-shadow" x="-6%" y="-6%" width="112%" height="118%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#3B82F6" flood-opacity="0.12"/>
    </filter>
    <filter id="ed-shadow-sm" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <clipPath id="ed-phone-clip"><rect x="42" y="38" width="196" height="344" rx="4"/></clipPath>
    <clipPath id="ed-tab-clip"><rect x="492" y="48" width="276" height="224" rx="4"/></clipPath>
  </defs>

  <rect width="800" height="420" rx="32" fill="url(#ed-bg)"/>

  <!-- PHONE — Interactive Globe -->
  <g filter="url(#ed-shadow)">
    <rect x="30" y="20" width="220" height="380" rx="28" fill="#E5E5E5"/>
    <rect x="32" y="22" width="216" height="376" rx="26" fill="#F5F5F5"/>
    <rect x="42" y="38" width="196" height="344" rx="8" fill="white"/>
    <rect x="105" y="24" width="70" height="18" rx="9" fill="#E5E5E5"/>
    <g clip-path="url(#ed-phone-clip)">
      <!-- Status bar -->
      <rect x="42" y="38" width="196" height="22" fill="#FAFAFA"/>
      <text x="56" y="52" font-family="system-ui" font-size="8" fill="#666" font-weight="600">9:41</text>
      <!-- App bar -->
      <rect x="42" y="60" width="196" height="32" fill="white"/>
      <text x="60" y="80" font-family="system-ui" font-size="10" fill="#1A1A1A" font-weight="700">World Geography</text>
      <!-- 3D viewport -->
      <rect x="52" y="98" width="176" height="176" rx="20" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="0.5"/>
      <!-- Globe -->
      <g transform="translate(100, 160)">
        <circle cx="40" cy="26" r="55" fill="url(#ed-globe)"/>
        <!-- Continents (simplified) -->
        <path d="M20,-15 Q30,-20 40,-15 Q50,-10 45,0 Q40,5 30,5 Q20,0 20,-15 Z" fill="url(#ed-land)" opacity="0.8"/>
        <path d="M50,10 Q60,5 65,15 Q60,25 50,20 Z" fill="url(#ed-land)" opacity="0.7"/>
        <path d="M10,15 Q20,10 25,20 Q20,30 15,28 Q5,22 10,15 Z" fill="url(#ed-land)" opacity="0.75"/>
        <path d="M35,25 Q45,20 55,30 Q50,40 40,38 Q30,35 35,25 Z" fill="url(#ed-land)" opacity="0.7"/>
        <!-- Grid lines -->
        <ellipse cx="40" cy="26" rx="55" ry="20" fill="none" stroke="white" stroke-width="0.5" opacity="0.2"/>
        <ellipse cx="40" cy="26" rx="20" ry="55" fill="none" stroke="white" stroke-width="0.5" opacity="0.2"/>
        <line x1="-15" y1="26" x2="95" y2="26" stroke="white" stroke-width="0.5" opacity="0.2"/>
        <!-- Highlight -->
        <circle cx="25" cy="10" r="15" fill="white" opacity="0.15"/>
        <!-- Pin marker -->
        <g transform="translate(40, -5)">
          <circle cx="0" cy="-5" r="6" fill="#EF4444"/>
          <path d="M-4,-5 L0,4 L4,-5" fill="#EF4444"/>
          <circle cx="0" cy="-5" r="3" fill="white"/>
        </g>
      </g>
      <!-- Info callout -->
      <rect x="60" y="260" width="160" height="48" rx="14" fill="white" stroke="#BFDBFE" stroke-width="1" filter="url(#ed-shadow-sm)"/>
      <g transform="translate(72, 270)">
        <circle cx="8" cy="12" r="8" fill="#EF4444" opacity="0.8"/>
        <text x="8" y="16" font-family="system-ui" font-size="7" fill="white" text-anchor="middle" font-weight="700">!</text>
        <text x="24" y="8" font-family="system-ui" font-size="8" fill="#1A1A1A" font-weight="700">Paris, France</text>
        <text x="24" y="20" font-family="system-ui" font-size="7" fill="#64748B">Pop. 2.1M · Eiffel Tower</text>
      </g>
      <!-- Quiz button -->
      <rect x="60" y="316" width="80" height="28" rx="14" fill="#3B82F6"/>
      <text x="100" y="334" font-family="system-ui" font-size="9" fill="white" text-anchor="middle" font-weight="700">Start Quiz</text>
      <rect x="146" y="316" width="80" height="28" rx="14" fill="#F0F9FF" stroke="#BFDBFE"/>
      <text x="186" y="334" font-family="system-ui" font-size="9" fill="#3B82F6" text-anchor="middle" font-weight="700">Explore</text>
      <!-- Rotate hint -->
      <text x="140" y="356" font-family="system-ui" font-size="7" fill="#94A3B8" text-anchor="middle">Drag to rotate globe</text>
      <rect x="108" y="370" width="64" height="4" rx="2" fill="#CCC"/>
    </g>
  </g>
  <rect x="80" y="395" width="120" height="18" rx="9" fill="#DBEAFE"/>
  <text x="140" y="408" font-family="system-ui" font-size="7" fill="#3B82F6" text-anchor="middle" font-weight="600">Built with SceneView</text>

  <!-- Center badges -->
  <g transform="translate(290, 55)">
    <rect x="0" y="0" width="140" height="32" rx="16" fill="white" filter="url(#ed-shadow-sm)"/>
    <text x="16" y="22" font-family="system-ui" font-size="14">&#x1F30D;</text>
    <text x="40" y="21" font-family="system-ui" font-size="9" fill="#333" font-weight="600">Interactive globes</text>
  </g>
  <g transform="translate(300, 115)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="white" filter="url(#ed-shadow-sm)"/>
    <text x="16" y="22" font-family="system-ui" font-size="14">&#x1F9EA;</text>
    <text x="40" y="21" font-family="system-ui" font-size="9" fill="#333" font-weight="600">Lab simulations</text>
  </g>
  <g transform="translate(290, 175)">
    <rect x="0" y="0" width="145" height="32" rx="16" fill="white" filter="url(#ed-shadow-sm)"/>
    <text x="16" y="22" font-family="system-ui" font-size="14">&#x1F4D0;</text>
    <text x="40" y="21" font-family="system-ui" font-size="9" fill="#333" font-weight="600">3D math visualizer</text>
  </g>
  <g transform="translate(300, 235)">
    <rect x="0" y="0" width="125" height="32" rx="16" fill="white" filter="url(#ed-shadow-sm)"/>
    <text x="16" y="22" font-family="system-ui" font-size="14">&#x1F3AF;</text>
    <text x="40" y="21" font-family="system-ui" font-size="9" fill="#333" font-weight="600">Quiz gamification</text>
  </g>

  <!-- TABLET — Solar System / STEM -->
  <g filter="url(#ed-shadow)">
    <rect x="478" y="30" width="300" height="260" rx="20" fill="#E5E5E5"/>
    <rect x="480" y="32" width="296" height="256" rx="18" fill="#F5F5F5"/>
    <rect x="492" y="48" width="272" height="224" rx="6" fill="#0C0A1D"/>
    <circle cx="628" cy="41" r="3" fill="#D4D4D4"/>
    <g clip-path="url(#ed-tab-clip)">
      <!-- Space background -->
      <rect x="492" y="48" width="272" height="224" fill="#0C0A1D"/>
      <!-- Stars -->
      <g opacity="0.5">
        <circle cx="510" cy="70" r="1" fill="white"/><circle cx="560" cy="60" r="0.8" fill="white"/>
        <circle cx="620" cy="75" r="1.2" fill="white"/><circle cx="680" cy="55" r="0.8" fill="white"/>
        <circle cx="740" cy="80" r="1" fill="white"/><circle cx="530" cy="110" r="0.6" fill="white"/>
        <circle cx="700" cy="120" r="0.8" fill="white"/><circle cx="510" cy="200" r="1" fill="white"/>
        <circle cx="750" cy="190" r="0.6" fill="white"/><circle cx="600" cy="250" r="0.8" fill="white"/>
      </g>
      <!-- App bar overlay -->
      <rect x="502" y="56" width="252" height="24" rx="12" fill="rgba(255,255,255,0.06)"/>
      <text x="518" y="72" font-family="system-ui" font-size="8" fill="white" font-weight="700">Solar System Explorer</text>
      <rect x="692" y="60" width="52" height="16" rx="8" fill="rgba(59,130,246,0.2)"/>
      <text x="718" y="72" font-family="system-ui" font-size="6" fill="#93C5FD" text-anchor="middle" font-weight="600">AR Mode</text>
      <!-- Sun -->
      <g transform="translate(522, 140)">
        <circle cx="0" cy="0" r="18" fill="#FDE68A" opacity="0.3"/>
        <circle cx="0" cy="0" r="12" fill="#FCD34D"/>
        <circle cx="0" cy="0" r="8" fill="#FEF3C7"/>
      </g>
      <!-- Orbit rings -->
      <ellipse cx="522" cy="140" rx="40" ry="18" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
      <ellipse cx="522" cy="140" rx="70" ry="30" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
      <ellipse cx="522" cy="140" rx="100" ry="42" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
      <ellipse cx="522" cy="140" rx="135" ry="55" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
      <ellipse cx="522" cy="140" rx="170" ry="68" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
      <!-- Planets -->
      <circle cx="555" cy="128" r="3" fill="#D4D4D8"/>
      <circle cx="580" cy="118" r="4" fill="#FB923C"/>
      <circle cx="612" cy="112" r="5" fill="#3B82F6"/>
      <circle cx="614" cy="113" r="1.5" fill="#94A3B8"/>
      <circle cx="648" cy="104" r="4" fill="#EF4444"/>
      <circle cx="690" cy="96" r="9" fill="#D97706"/>
      <!-- Saturn with ring -->
      <g transform="translate(690, 96)">
        <ellipse cx="0" cy="0" rx="14" ry="3" fill="none" stroke="#FCD34D" stroke-width="1" opacity="0.5" transform="rotate(-15)"/>
      </g>
      <!-- Selected planet info -->
      <rect x="590" y="172" width="156" height="52" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(59,130,246,0.3)" stroke-width="0.5"/>
      <g transform="translate(600, 180)">
        <circle cx="10" cy="14" r="8" fill="#3B82F6"/>
        <text x="10" y="18" font-family="system-ui" font-size="6" fill="white" text-anchor="middle" font-weight="700">&#x1F30D;</text>
        <text x="28" y="10" font-family="system-ui" font-size="8" fill="white" font-weight="700">Earth</text>
        <text x="28" y="22" font-family="system-ui" font-size="6" fill="#94A3B8">12,742 km · 365 days · 1 moon</text>
        <text x="28" y="34" font-family="system-ui" font-size="6" fill="#93C5FD" font-weight="600">Tap to explore surface</text>
      </g>
      <!-- Bottom planet pills -->
      <g transform="translate(502, 244)">
        <rect x="0" y="0" width="40" height="18" rx="9" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
        <text x="20" y="12" font-family="system-ui" font-size="6" fill="#94A3B8" text-anchor="middle">Mercury</text>
        <rect x="44" y="0" width="36" height="18" rx="9" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
        <text x="62" y="12" font-family="system-ui" font-size="6" fill="#94A3B8" text-anchor="middle">Venus</text>
        <rect x="84" y="0" width="36" height="18" rx="9" fill="rgba(59,130,246,0.2)" stroke="#3B82F6" stroke-width="0.5"/>
        <text x="102" y="12" font-family="system-ui" font-size="6" fill="#93C5FD" text-anchor="middle" font-weight="600">Earth</text>
        <rect x="124" y="0" width="34" height="18" rx="9" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
        <text x="141" y="12" font-family="system-ui" font-size="6" fill="#94A3B8" text-anchor="middle">Mars</text>
        <rect x="162" y="0" width="40" height="18" rx="9" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
        <text x="182" y="12" font-family="system-ui" font-size="6" fill="#94A3B8" text-anchor="middle">Jupiter</text>
        <rect x="206" y="0" width="40" height="18" rx="9" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
        <text x="226" y="12" font-family="system-ui" font-size="6" fill="#94A3B8" text-anchor="middle">Saturn</text>
      </g>
    </g>
  </g>
  <rect x="568" y="300" width="120" height="18" rx="9" fill="#DBEAFE"/>
  <text x="628" y="313" font-family="system-ui" font-size="7" fill="#3B82F6" text-anchor="middle" font-weight="600">Built with SceneView</text>

  <text x="400" y="410" font-family="system-ui" font-size="10" fill="#64748B" text-anchor="middle" font-weight="500">Geography · Solar System · Lab Simulations · STEM Visualization</text>
</svg>
