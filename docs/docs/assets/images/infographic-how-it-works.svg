<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <rect width="800" height="220" fill="#FFFBFE"/>

  <!-- Dotted connecting lines -->
  <line x1="250" y1="100" x2="350" y2="100" stroke="#CAC4D0" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="450" y1="100" x2="550" y2="100" stroke="#CAC4D0" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Step 1: Write Compose -->
  <circle cx="200" cy="40" r="10" fill="#F4EFF4"/>
  <text x="200" y="44" text-anchor="middle" fill="#625B71" font-family="sans-serif" font-size="11" font-weight="500">1</text>
  <text x="200" y="105" text-anchor="middle" fill="#6750A4" font-family="monospace" font-size="24" font-weight="400">{ }</text>
  <text x="200" y="150" text-anchor="middle" fill="#49454F" font-family="sans-serif" font-size="11">Write Compose</text>

  <!-- Step 2: Add nodes -->
  <circle cx="400" cy="40" r="10" fill="#F4EFF4"/>
  <text x="400" y="44" text-anchor="middle" fill="#625B71" font-family="sans-serif" font-size="11" font-weight="500">2</text>
  <circle cx="400" cy="84" r="6" fill="#D0BCFF"/>
  <circle cx="391" cy="102" r="6" fill="#EFB8C8"/>
  <circle cx="409" cy="102" r="6" fill="#B4C5E4"/>
  <text x="400" y="150" text-anchor="middle" fill="#49454F" font-family="sans-serif" font-size="11">Add nodes</text>

  <!-- Step 3: Ship -->
  <circle cx="600" cy="40" r="10" fill="#F4EFF4"/>
  <text x="600" y="44" text-anchor="middle" fill="#625B71" font-family="sans-serif" font-size="11" font-weight="500">3</text>
  <polyline points="588,97 596,105 612,87" fill="none" stroke="#C8E6C9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="600" y="150" text-anchor="middle" fill="#49454F" font-family="sans-serif" font-size="11">Ship</text>
</svg>