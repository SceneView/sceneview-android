<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 480" fill="none">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="mv-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>

    <!-- HDRI warm band -->
    <linearGradient id="mv-hdri" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3E0" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFF3E0" stop-opacity="0"/>
    </linearGradient>

    <!-- Helmet radial gradient (bronze) -->
    <radialGradient id="mv-helmet-fill" cx="0.35" cy="0.3" r="0.7" fx="0.3" fy="0.25">
      <stop offset="0%" stop-color="#D4A373"/>
      <stop offset="50%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#3D2B0E"/>
    </radialGradient>

    <!-- Specular highlight -->
    <radialGradient id="mv-spec" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Ground shadow blur -->
    <filter id="mv-ground-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>

    <!-- Subtle glow for helmet -->
    <filter id="mv-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>

    <!-- Grid line gradient (fades out) -->
    <linearGradient id="mv-grid-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#334155" stop-opacity="0"/>
    </linearGradient>

    <!-- Slider track gradient -->
    <linearGradient id="mv-slider" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="280" height="480" fill="url(#mv-bg)"/>

  <!-- HDRI warm band at top -->
  <rect x="0" y="0" width="280" height="120" fill="url(#mv-hdri)"/>

  <!-- Perspective grid floor -->
  <g opacity="0.2">
    <!-- Horizontal lines (perspective converging) -->
    <line x1="0" y1="360" x2="280" y2="360" stroke="#334155" stroke-width="0.4" opacity="0.3"/>
    <line x1="0" y1="380" x2="280" y2="380" stroke="#334155" stroke-width="0.4" opacity="0.25"/>
    <line x1="0" y1="400" x2="280" y2="400" stroke="#334155" stroke-width="0.5" opacity="0.2"/>
    <line x1="0" y1="420" x2="280" y2="420" stroke="#334155" stroke-width="0.5" opacity="0.15"/>
    <line x1="0" y1="440" x2="280" y2="440" stroke="#334155" stroke-width="0.6" opacity="0.1"/>
    <line x1="0" y1="460" x2="280" y2="460" stroke="#334155" stroke-width="0.6" opacity="0.05"/>
    <!-- Vertical lines (converging to vanishing point at center) -->
    <line x1="140" y1="340" x2="0" y2="480" stroke="#334155" stroke-width="0.4" opacity="0.15"/>
    <line x1="140" y1="340" x2="40" y2="480" stroke="#334155" stroke-width="0.4" opacity="0.15"/>
    <line x1="140" y1="340" x2="80" y2="480" stroke="#334155" stroke-width="0.4" opacity="0.15"/>
    <line x1="140" y1="340" x2="120" y2="480" stroke="#334155" stroke-width="0.4" opacity="0.15"/>
    <line x1="140" y1="340" x2="160" y2="480" stroke="#334155" stroke-width="0.4" opacity="0.15"/>
    <line x1="140" y1="340" x2="200" y2="480" stroke="#334155" stroke-width="0.4" opacity="0.15"/>
    <line x1="140" y1="340" x2="240" y2="480" stroke="#334155" stroke-width="0.4" opacity="0.15"/>
    <line x1="140" y1="340" x2="280" y2="480" stroke="#334155" stroke-width="0.4" opacity="0.15"/>
  </g>

  <!-- Ground shadow -->
  <ellipse cx="140" cy="340" rx="65" ry="12" fill="#000000" opacity="0.4" filter="url(#mv-ground-shadow)"/>

  <!-- Orbit ring (dotted) -->
  <ellipse cx="140" cy="260" rx="90" ry="90" fill="none" stroke="#94A3B8" stroke-width="0.5" stroke-dasharray="3,5" opacity="0.3"/>

  <!-- Small orbit dot indicator -->
  <circle cx="230" cy="260" r="2" fill="#94A3B8" opacity="0.5"/>

  <!-- === DAMAGED HELMET === -->
  <g transform="translate(140, 230)">

    <!-- Helmet glow (ambient light) -->
    <ellipse cx="0" cy="0" rx="68" ry="72" fill="#D4A373" opacity="0.04" filter="url(#mv-glow)"/>

    <!-- Main helmet dome -->
    <ellipse cx="0" cy="-5" rx="60" ry="65" fill="url(#mv-helmet-fill)"/>

    <!-- Helmet top ridge / crest -->
    <path d="M-8,-68 Q0,-78 8,-68" stroke="#8B6914" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M-5,-66 Q0,-73 5,-66" stroke="#D4A373" stroke-width="1" fill="none" opacity="0.3"/>

    <!-- Visor slot (horizontal opening) -->
    <rect x="-38" y="-18" width="76" height="10" rx="4" fill="#0A0A12" opacity="0.85"/>
    <!-- Visor inner darkness -->
    <rect x="-34" y="-16" width="68" height="6" rx="2.5" fill="#050510"/>
    <!-- Visor subtle reflection -->
    <line x1="-30" y1="-14" x2="10" y2="-14" stroke="#94A3B8" stroke-width="0.4" opacity="0.2" stroke-linecap="round"/>

    <!-- Surface detail: brow line -->
    <path d="M-45,-25 Q0,-40 45,-25" stroke="#3D2B0E" stroke-width="0.8" fill="none" opacity="0.4"/>

    <!-- Surface detail: cheek contour lines -->
    <path d="M-48,5 Q-42,20 -30,30" stroke="#3D2B0E" stroke-width="0.6" fill="none" opacity="0.3"/>
    <path d="M48,5 Q42,20 30,30" stroke="#3D2B0E" stroke-width="0.6" fill="none" opacity="0.3"/>

    <!-- Metallic sheen reflections -->
    <path d="M-35,-50 Q-25,-45 -20,-35" stroke="#D4A373" stroke-width="0.6" fill="none" opacity="0.25"/>
    <path d="M-25,-55 Q-15,-48 -8,-38" stroke="#D4A373" stroke-width="0.5" fill="none" opacity="0.2"/>
    <path d="M20,15 Q30,10 35,0" stroke="#D4A373" stroke-width="0.4" fill="none" opacity="0.15"/>

    <!-- Battle damage: scratch 1 (long diagonal) -->
    <path d="M-20,-40 Q-10,-25 5,-15" stroke="#1A1A2E" stroke-width="0.8" fill="none" opacity="0.5" stroke-linecap="round"/>
    <!-- Scratch highlight edge -->
    <path d="M-19,-39 Q-9,-24 6,-14" stroke="#D4A373" stroke-width="0.3" fill="none" opacity="0.2" stroke-linecap="round"/>

    <!-- Battle damage: scratch 2 (shorter, steeper) -->
    <path d="M15,-30 Q20,-18 18,-5" stroke="#1A1A2E" stroke-width="0.8" fill="none" opacity="0.45" stroke-linecap="round"/>
    <path d="M16,-29 Q21,-17 19,-4" stroke="#D4A373" stroke-width="0.3" fill="none" opacity="0.18" stroke-linecap="round"/>

    <!-- Battle damage: scratch 3 (small nick) -->
    <path d="M-30,10 L-22,18" stroke="#1A1A2E" stroke-width="0.7" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M-29,11 L-21,19" stroke="#D4A373" stroke-width="0.3" fill="none" opacity="0.15" stroke-linecap="round"/>

    <!-- Specular highlight (top-left) -->
    <ellipse cx="-22" cy="-42" rx="14" ry="18" fill="url(#mv-spec)" opacity="0.2"/>

    <!-- Rim light (left edge) -->
    <path d="M-58,-20 Q-62,0 -55,30 Q-48,50 -35,58" stroke="#D4A373" stroke-width="0.5" fill="none" opacity="0.3"/>

    <!-- Helmet bottom edge -->
    <path d="M-50,40 Q-30,58 0,62 Q30,58 50,40" stroke="#3D2B0E" stroke-width="1" fill="none" opacity="0.5"/>

    <!-- Neck opening hint -->
    <ellipse cx="0" cy="55" rx="30" ry="8" fill="#0A0A12" opacity="0.3"/>
  </g>

  <!-- === UI ELEMENTS === -->

  <!-- Top-left label -->
  <text x="16" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#FFFFFF" opacity="0.6" font-weight="500">Model Viewer</text>

  <!-- Bottom center: play/pause button -->
  <g transform="translate(140, 430)">
    <!-- Button circle -->
    <circle cx="0" cy="0" r="10" fill="none" stroke="#FFFFFF" stroke-width="0.8" opacity="0.4"/>
    <!-- Play triangle -->
    <polygon points="-3,-5 -3,5 5,0" fill="#FFFFFF" opacity="0.4"/>
  </g>

  <!-- Animation label -->
  <text x="140" y="452" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle" opacity="0.8">Animation: Rotate</text>

  <!-- Right side: vertical slider (exposure) -->
  <g transform="translate(262, 200)">
    <!-- Track -->
    <rect x="-2" y="0" width="4" height="60" rx="2" fill="#FFFFFF" opacity="0.08"/>
    <!-- Filled portion -->
    <rect x="-2" y="20" width="4" height="40" rx="2" fill="url(#mv-slider)"/>
    <!-- Thumb -->
    <circle cx="0" cy="20" r="4" fill="#FFFFFF" opacity="0.3" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.4"/>
    <!-- Label -->
    <text x="0" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="6" fill="#94A3B8" text-anchor="middle" opacity="0.5">EV</text>
  </g>
</svg>