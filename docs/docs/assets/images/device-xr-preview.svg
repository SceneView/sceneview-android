<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" fill="none">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="xr-bg" x1="0" y1="0" x2="480" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="50%" stop-color="#16103a"/>
      <stop offset="100%" stop-color="#0d0b26"/>
    </linearGradient>
    <!-- Floor gradient -->
    <linearGradient id="xr-floor" x1="240" y1="180" x2="240" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7B61FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7B61FF" stop-opacity="0.02"/>
    </linearGradient>
    <!-- Card glow -->
    <radialGradient id="xr-glow" cx="240" cy="140" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7B61FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7B61FF" stop-opacity="0"/>
    </radialGradient>
    <!-- Drop shadow for cards -->
    <filter id="xr-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7B61FF" flood-opacity="0.3"/>
    </filter>
    <!-- Smaller shadow -->
    <filter id="xr-shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <!-- Chair shadow -->
    <filter id="chair-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#06B6D4" flood-opacity="0.25"/>
    </filter>
    <!-- Accent glow -->
    <linearGradient id="xr-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B61FF"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="280" fill="url(#xr-bg)" rx="12"/>
  <rect width="480" height="280" fill="url(#xr-glow)" rx="12"/>

  <!-- Grid lines on floor -->
  <g opacity="0.15" stroke="#7B61FF" stroke-width="0.5">
    <!-- Horizontal grid lines (perspective) -->
    <line x1="40" y1="200" x2="440" y2="200"/>
    <line x1="60" y1="220" x2="420" y2="220"/>
    <line x1="80" y1="240" x2="400" y2="240"/>
    <line x1="100" y1="260" x2="380" y2="260"/>
    <!-- Vertical grid lines (converging) -->
    <line x1="240" y1="180" x2="240" y2="270"/>
    <line x1="200" y1="180" x2="160" y2="270"/>
    <line x1="280" y1="180" x2="320" y2="270"/>
    <line x1="160" y1="180" x2="80" y2="270"/>
    <line x1="320" y1="180" x2="400" y2="270"/>
    <line x1="120" y1="185" x2="20" y2="270"/>
    <line x1="360" y1="185" x2="460" y2="270"/>
  </g>
  <!-- Floor plane fill -->
  <rect x="0" y="180" width="480" height="100" fill="url(#xr-floor)" rx="0"/>

  <!-- === Floating Chair (center) === -->
  <g filter="url(#chair-shadow)" transform="translate(210, 80)">
    <!-- Chair seat -->
    <rect x="10" y="50" width="60" height="8" rx="2" fill="#06B6D4"/>
    <!-- Chair back -->
    <rect x="12" y="10" width="8" height="44" rx="2" fill="#06B6D4" opacity="0.9"/>
    <rect x="60" y="10" width="8" height="44" rx="2" fill="#06B6D4" opacity="0.9"/>
    <rect x="12" y="10" width="56" height="6" rx="2" fill="#06B6D4"/>
    <!-- Backrest panel -->
    <rect x="18" y="14" width="44" height="34" rx="3" fill="#7B61FF" opacity="0.5"/>
    <!-- Chair legs -->
    <rect x="14" y="58" width="4" height="30" rx="1" fill="#9a8aff" opacity="0.8"/>
    <rect x="62" y="58" width="4" height="30" rx="1" fill="#9a8aff" opacity="0.8"/>
    <rect x="14" y="84" width="56" height="4" rx="2" fill="#9a8aff" opacity="0.6"/>
    <!-- Cross bar -->
    <rect x="34" y="64" width="4" height="22" rx="1" fill="#9a8aff" opacity="0.5"/>
  </g>
  <!-- Chair ground shadow -->
  <ellipse cx="248" cy="195" rx="30" ry="5" fill="#06B6D4" opacity="0.15"/>

  <!-- === Left Card: Customize panel === -->
  <g filter="url(#xr-shadow)" transform="translate(28, 50)">
    <!-- Card body -->
    <rect width="130" height="150" rx="12" fill="white" opacity="0.95"/>
    <rect width="130" height="150" rx="12" fill="none" stroke="#7B61FF" stroke-width="0.5" opacity="0.3"/>

    <!-- Title -->
    <text x="14" y="28" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1a1a2e">Tap to customize</text>

    <!-- Divider -->
    <line x1="14" y1="38" x2="116" y2="38" stroke="#e5e5ea" stroke-width="1"/>

    <!-- Color label -->
    <text x="14" y="56" font-family="system-ui, sans-serif" font-size="9" fill="#8888aa" font-weight="500">COLOR</text>

    <!-- Color picker circles -->
    <circle cx="26" cy="72" r="9" fill="#3B82F6" stroke="#7B61FF" stroke-width="2"/>
    <circle cx="50" cy="72" r="9" fill="#EF4444"/>
    <circle cx="74" cy="72" r="9" fill="#22C55E"/>
    <circle cx="98" cy="72" r="9" fill="#9CA3AF"/>

    <!-- Checkmark on selected -->
    <path d="M22 72 L25 75 L30 69" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Size label -->
    <text x="14" y="100" font-family="system-ui, sans-serif" font-size="9" fill="#8888aa" font-weight="500">SIZE</text>
    <!-- Size pills -->
    <rect x="14" y="106" width="22" height="16" rx="4" fill="#f0f0f5"/>
    <text x="25" y="117" font-family="system-ui, sans-serif" font-size="8" fill="#555" text-anchor="middle">S</text>
    <rect x="40" y="106" width="22" height="16" rx="4" fill="#7B61FF"/>
    <text x="51" y="117" font-family="system-ui, sans-serif" font-size="8" fill="white" text-anchor="middle">M</text>
    <rect x="66" y="106" width="22" height="16" rx="4" fill="#f0f0f5"/>
    <text x="77" y="117" font-family="system-ui, sans-serif" font-size="8" fill="#555" text-anchor="middle">L</text>

    <!-- Price -->
    <text x="14" y="143" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#1a1a2e">$299</text>
    <text x="56" y="143" font-family="system-ui, sans-serif" font-size="9" fill="#22C55E" font-weight="600">In Stock</text>
  </g>

  <!-- === Right Card: Material panel === -->
  <g filter="url(#xr-shadow)" transform="translate(330, 65)">
    <!-- Card body (slightly smaller - farther away) -->
    <rect width="115" height="120" rx="10" fill="white" opacity="0.92"/>
    <rect width="115" height="120" rx="10" fill="none" stroke="#06B6D4" stroke-width="0.5" opacity="0.3"/>

    <!-- Title -->
    <text x="12" y="24" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#1a1a2e">Material</text>

    <!-- Divider -->
    <line x1="12" y1="32" x2="103" y2="32" stroke="#e5e5ea" stroke-width="1"/>

    <!-- Material swatches -->
    <!-- Wood -->
    <rect x="12" y="40" width="38" height="28" rx="6" fill="#C68642"/>
    <line x1="18" y1="48" x2="44" y2="48" stroke="#A0522D" stroke-width="0.5" opacity="0.5"/>
    <line x1="16" y1="54" x2="46" y2="54" stroke="#A0522D" stroke-width="0.5" opacity="0.4"/>
    <line x1="20" y1="60" x2="42" y2="60" stroke="#A0522D" stroke-width="0.5" opacity="0.3"/>
    <text x="31" y="78" font-family="system-ui, sans-serif" font-size="7" fill="#888" text-anchor="middle">Oak</text>

    <!-- Fabric -->
    <rect x="58" y="40" width="38" height="28" rx="6" fill="#6366F1"/>
    <text x="77" y="78" font-family="system-ui, sans-serif" font-size="7" fill="#888" text-anchor="middle">Fabric</text>
    <!-- Fabric texture dots -->
    <g fill="white" opacity="0.15">
      <circle cx="65" cy="48" r="0.8"/><circle cx="71" cy="48" r="0.8"/><circle cx="77" cy="48" r="0.8"/><circle cx="83" cy="48" r="0.8"/><circle cx="89" cy="48" r="0.8"/>
      <circle cx="68" cy="53" r="0.8"/><circle cx="74" cy="53" r="0.8"/><circle cx="80" cy="53" r="0.8"/><circle cx="86" cy="53" r="0.8"/>
      <circle cx="65" cy="58" r="0.8"/><circle cx="71" cy="58" r="0.8"/><circle cx="77" cy="58" r="0.8"/><circle cx="83" cy="58" r="0.8"/><circle cx="89" cy="58" r="0.8"/>
    </g>

    <!-- Leather -->
    <rect x="12" y="84" width="38" height="28" rx="6" fill="#8B4513"/>
    <text x="31" y="78" font-family="system-ui, sans-serif" font-size="7" fill="#888" text-anchor="middle" dy="44">Leather</text>
    <!-- Selected indicator -->
    <rect x="12" y="84" width="38" height="28" rx="6" fill="none" stroke="#06B6D4" stroke-width="2"/>

    <!-- Metal -->
    <rect x="58" y="84" width="38" height="28" rx="6" fill="#B0B0B0"/>
    <rect x="58" y="84" width="38" height="14" rx="6" fill="white" opacity="0.15"/>
    <text x="77" y="122" font-family="system-ui, sans-serif" font-size="7" fill="#888" text-anchor="middle">Chrome</text>
  </g>

  <!-- === Hand / Controller cursor === -->
  <g transform="translate(140, 170)" opacity="0.9">
    <!-- Cursor ray -->
    <line x1="0" y1="0" x2="-20" y2="20" stroke="#06B6D4" stroke-width="1.5" opacity="0.6"/>
    <!-- Hand icon (simplified) -->
    <g transform="translate(-28, 18)" fill="#06B6D4">
      <!-- Palm -->
      <rect x="0" y="4" width="14" height="12" rx="3"/>
      <!-- Thumb -->
      <rect x="-3" y="6" width="6" height="5" rx="2"/>
      <!-- Finger -->
      <rect x="2" y="-2" width="4" height="8" rx="2"/>
      <rect x="7" y="0" width="3.5" height="6" rx="1.5"/>
    </g>
    <!-- Cursor dot -->
    <circle cx="0" cy="0" r="4" fill="#06B6D4" opacity="0.4"/>
    <circle cx="0" cy="0" r="2" fill="#06B6D4"/>
  </g>

  <!-- === Code badge === -->
  <g transform="translate(12, 12)">
    <rect width="88" height="22" rx="6" fill="#1a1a2e" stroke="#7B61FF" stroke-width="0.5" opacity="0.9"/>
    <text x="10" y="15" font-family="system-ui, monospace" font-size="9" fill="#7B61FF" font-weight="600">XRScene { }</text>
  </g>

  <!-- === Spatial depth particles === -->
  <g opacity="0.3">
    <circle cx="60" cy="30" r="1" fill="#7B61FF"/>
    <circle cx="420" cy="45" r="1.5" fill="#06B6D4"/>
    <circle cx="380" cy="20" r="0.8" fill="#7B61FF"/>
    <circle cx="100" cy="250" r="1.2" fill="#06B6D4"/>
    <circle cx="450" cy="240" r="0.8" fill="#7B61FF"/>
    <circle cx="200" cy="15" r="1" fill="#06B6D4"/>
    <circle cx="340" cy="260" r="1" fill="#7B61FF"/>
  </g>

  <!-- Subtle border -->
  <rect width="480" height="280" rx="12" fill="none" stroke="#7B61FF" stroke-width="0.5" opacity="0.2"/>
</svg>
