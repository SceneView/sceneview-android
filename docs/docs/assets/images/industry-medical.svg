      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="med-tab-clip"><rect x="42" y="38" width="336" height="244" rx="4"/></clipPath>
    <clipPath id="med-phone-clip"><rect x="552" y="58" width="176" height="304" rx="4"/></clipPath>
  </defs>

  <rect width="800" height="420" rx="32" fill="url(#med-bg)"/>

