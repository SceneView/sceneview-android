<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 480" fill="none">
  <defs>
    <filter id="chair-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
    <radialGradient id="seat-grad" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#7FA3B0"/>
      <stop offset="100%" stop-color="#5A7E8A"/>
    </radialGradient>
    <radialGradient id="back-grad" cx="45%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#6B919E"/>
      <stop offset="100%" stop-color="#4E717D"/>
    </radialGradient>
    <radialGradient id="arm-grad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#6F949F"/>
      <stop offset="100%" stop-color="#567B86"/>
    </radialGradient>
    <linearGradient id="floor-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#C89B6A"/>
    </linearGradient>
    <clipPath id="screen-clip">
      <rect x="24" y="32" width="232" height="416" rx="6"/>
    </clipPath>
  </defs>

  <!-- Phone frame -->
  <rect x="10" y="10" width="260" height="460" rx="36" fill="#1A1A1A"/>
  <rect x="12" y="12" width="256" height="456" rx="34" fill="#2A2A2A"/>
  <rect x="24" y="32" width="232" height="416" rx="6" fill="#F0E8DC"/>
  <rect x="90" y="14" width="100" height="22" rx="11" fill="#1A1A1A"/>

  <!-- Clipped screen content -->
  <g clip-path="url(#screen-clip)">

    <!-- === ROOM BACKGROUND (simulated camera view) === -->

    <!-- Wall -->
    <rect x="24" y="32" width="232" height="258" fill="#F0E8DC"/>

    <!-- Subtle wall texture - faint vertical streaks -->
    <line x1="80" y1="32" x2="80" y2="290" stroke="#E8DFCF" stroke-width="0.3" opacity="0.5"/>
    <line x1="140" y1="32" x2="140" y2="290" stroke="#E8DFCF" stroke-width="0.3" opacity="0.5"/>
    <line x1="200" y1="32" x2="200" y2="290" stroke="#E8DFCF" stroke-width="0.3" opacity="0.5"/>

    <!-- Window on the left wall -->
    <rect x="40" y="72" width="70" height="100" rx="2" fill="#E8F4F8" stroke="#C4B5A2" stroke-width="1.2"/>
    <!-- Window panes -->
    <line x1="75" y1="72" x2="75" y2="172" stroke="#C4B5A2" stroke-width="0.8"/>
    <line x1="40" y1="122" x2="110" y2="122" stroke="#C4B5A2" stroke-width="0.8"/>
    <!-- Window sill -->
    <rect x="36" y="170" width="78" height="5" rx="1" fill="#C4B5A2"/>
    <!-- Sky reflection in window -->
    <rect x="42" y="74" width="31" height="46" rx="1" fill="#D4EBF2" opacity="0.4"/>

    <!-- Small framed picture on right wall -->
    <rect x="185" y="100" width="50" height="65" rx="2" fill="#E5DDD0" stroke="#C4B5A2" stroke-width="1"/>
    <rect x="190" y="105" width="40" height="40" rx="1" fill="#D6CFC2"/>
    <circle cx="205" cy="120" r="8" fill="#C4B8A6" opacity="0.5"/>
    <rect x="198" y="130" width="14" height="8" rx="1" fill="#B8AD9C" opacity="0.4"/>

    <!-- Baseboard / wall-floor boundary -->
    <rect x="24" y="286" width="232" height="6" fill="#C4B5A2"/>
    <line x1="24" y1="286" x2="256" y2="286" stroke="#B8A994" stroke-width="0.5"/>

    <!-- Floor with wood planks -->
    <rect x="24" y="292" width="232" height="156" fill="url(#floor-grad)"/>

    <!-- Wood plank lines -->
    <line x1="24" y1="296" x2="256" y2="296" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="300" x2="256" y2="300" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="304" x2="256" y2="304" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="308" x2="256" y2="308" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="312" x2="256" y2="312" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="316" x2="256" y2="316" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="320" x2="256" y2="320" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="324" x2="256" y2="324" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="328" x2="256" y2="328" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="332" x2="256" y2="332" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="336" x2="256" y2="336" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="340" x2="256" y2="340" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="344" x2="256" y2="344" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="348" x2="256" y2="348" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="352" x2="256" y2="352" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="356" x2="256" y2="356" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="360" x2="256" y2="360" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="364" x2="256" y2="364" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="368" x2="256" y2="368" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="372" x2="256" y2="372" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="376" x2="256" y2="376" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="380" x2="256" y2="380" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="384" x2="256" y2="384" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="388" x2="256" y2="388" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="392" x2="256" y2="392" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="396" x2="256" y2="396" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="400" x2="256" y2="400" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="404" x2="256" y2="404" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="408" x2="256" y2="408" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="412" x2="256" y2="412" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="416" x2="256" y2="416" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="420" x2="256" y2="420" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="424" x2="256" y2="424" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="428" x2="256" y2="428" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="432" x2="256" y2="432" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="436" x2="256" y2="436" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="440" x2="256" y2="440" stroke="#C4956A" stroke-width="0.3"/>
    <line x1="24" y1="444" x2="256" y2="444" stroke="#C4956A" stroke-width="0.3"/>

    <!-- Vertical plank seams (staggered) -->
    <line x1="90" y1="292" x2="90" y2="448" stroke="#C4956A" stroke-width="0.2" opacity="0.4"/>
    <line x1="160" y1="292" x2="160" y2="448" stroke="#C4956A" stroke-width="0.2" opacity="0.4"/>
    <line x1="120" y1="340" x2="120" y2="448" stroke="#C4956A" stroke-width="0.2" opacity="0.3"/>
    <line x1="195" y1="310" x2="195" y2="448" stroke="#C4956A" stroke-width="0.2" opacity="0.3"/>

    <!-- === AR DETECTED PLANE (perspective quadrilateral) === -->
    <polygon points="60,380 220,380 240,440 40,440" fill="#6750A4" fill-opacity="0.06"/>
    <polygon points="60,380 220,380 240,440 40,440" fill="none" stroke="#6750A4" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="6,4"/>

    <!-- Grid dots within the plane -->
    <g opacity="0.15">
      <circle cx="80" cy="390" r="1.2" fill="#6750A4"/>
      <circle cx="110" cy="390" r="1.2" fill="#6750A4"/>
      <circle cx="140" cy="390" r="1.2" fill="#6750A4"/>
      <circle cx="170" cy="390" r="1.2" fill="#6750A4"/>
      <circle cx="200" cy="390" r="1.2" fill="#6750A4"/>
      <circle cx="70" cy="400" r="1.2" fill="#6750A4"/>
      <circle cx="100" cy="400" r="1.2" fill="#6750A4"/>
      <circle cx="130" cy="400" r="1.2" fill="#6750A4"/>
      <circle cx="160" cy="400" r="1.2" fill="#6750A4"/>
      <circle cx="190" cy="400" r="1.2" fill="#6750A4"/>
      <circle cx="220" cy="400" r="1.2" fill="#6750A4"/>
      <circle cx="65" cy="410" r="1.2" fill="#6750A4"/>
      <circle cx="95" cy="410" r="1.2" fill="#6750A4"/>
      <circle cx="125" cy="410" r="1.2" fill="#6750A4"/>
      <circle cx="155" cy="410" r="1.2" fill="#6750A4"/>
      <circle cx="185" cy="410" r="1.2" fill="#6750A4"/>
      <circle cx="215" cy="410" r="1.2" fill="#6750A4"/>
      <circle cx="55" cy="420" r="1.2" fill="#6750A4"/>
      <circle cx="85" cy="420" r="1.2" fill="#6750A4"/>
      <circle cx="115" cy="420" r="1.2" fill="#6750A4"/>
      <circle cx="145" cy="420" r="1.2" fill="#6750A4"/>
      <circle cx="175" cy="420" r="1.2" fill="#6750A4"/>
      <circle cx="205" cy="420" r="1.2" fill="#6750A4"/>
      <circle cx="235" cy="420" r="1.2" fill="#6750A4"/>
      <circle cx="50" cy="430" r="1.2" fill="#6750A4"/>
      <circle cx="80" cy="430" r="1.2" fill="#6750A4"/>
      <circle cx="110" cy="430" r="1.2" fill="#6750A4"/>
      <circle cx="140" cy="430" r="1.2" fill="#6750A4"/>
      <circle cx="170" cy="430" r="1.2" fill="#6750A4"/>
      <circle cx="200" cy="430" r="1.2" fill="#6750A4"/>
      <circle cx="230" cy="430" r="1.2" fill="#6750A4"/>
    </g>

    <!-- === PLACED FURNITURE — Modern armchair === -->
    <g transform="translate(110, 340)">

      <!-- Shadow on the floor -->
      <ellipse cx="30" cy="62" rx="38" ry="7" fill="#000" opacity="0.08" filter="url(#chair-shadow)"/>

      <!-- Chair legs (4 thin lines) -->
      <line x1="6" y1="52" x2="4" y2="62" stroke="#4B5563" stroke-width="2" stroke-linecap="round"/>
      <line x1="54" y1="52" x2="56" y2="62" stroke="#4B5563" stroke-width="2" stroke-linecap="round"/>
      <line x1="10" y1="52" x2="8" y2="60" stroke="#4B5563" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="50" y1="52" x2="52" y2="60" stroke="#4B5563" stroke-width="1.5" stroke-linecap="round"/>

      <!-- Back cushion -->
      <rect x="4" y="2" width="52" height="32" rx="10" fill="url(#back-grad)"/>
      <!-- Back cushion highlight -->
      <rect x="10" y="5" width="28" height="14" rx="6" fill="#7FA8B4" opacity="0.35"/>

      <!-- Seat cushion -->
      <rect x="0" y="28" width="60" height="26" rx="8" fill="url(#seat-grad)"/>
      <!-- Seat cushion highlight -->
      <ellipse cx="24" cy="36" rx="16" ry="6" fill="#8AB4C0" opacity="0.3"/>

      <!-- Left armrest -->
      <rect x="-6" y="14" width="12" height="30" rx="5" fill="url(#arm-grad)"/>
      <!-- Right armrest -->
      <rect x="54" y="14" width="12" height="30" rx="5" fill="url(#arm-grad)"/>

      <!-- Subtle cushion seam -->
      <line x1="30" y1="30" x2="30" y2="52" stroke="#4E717D" stroke-width="0.4" opacity="0.3"/>
    </g>

    <!-- === AR RETICLE / CROSSHAIR === -->
    <g transform="translate(140, 330)" opacity="0.7">
      <!-- Outer circle -->
      <circle cx="0" cy="0" r="12" fill="none" stroke="#6750A4" stroke-width="1"/>
      <!-- Crosshair lines -->
      <line x1="-16" y1="0" x2="-6" y2="0" stroke="#6750A4" stroke-width="1"/>
      <line x1="6" y1="0" x2="16" y2="0" stroke="#6750A4" stroke-width="1"/>
      <line x1="0" y1="-16" x2="0" y2="-6" stroke="#6750A4" stroke-width="1"/>
      <line x1="0" y1="6" x2="0" y2="16" stroke="#6750A4" stroke-width="1"/>
      <!-- Center dot -->
      <circle cx="0" cy="0" r="2" fill="#6750A4"/>
    </g>

    <!-- "Tap to place" floating pill -->
    <rect x="100" y="350" width="80" height="22" rx="11" fill="rgba(0,0,0,0.55)"/>
    <text x="140" y="364" font-family="system-ui, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="500">Tap to place</text>

    <!-- === TOP BAR === -->
    <rect x="24" y="32" width="232" height="32" fill="rgba(0,0,0,0.5)"/>
    <!-- Tracking status dot -->
    <circle cx="42" cy="48" r="4" fill="#22C55E" opacity="0.9"/>
    <!-- Title -->
    <text x="54" y="52" font-family="system-ui, sans-serif" font-size="11" fill="white" font-weight="600">AR Placement</text>
    <!-- Back arrow hint -->
    <text x="244" y="52" font-family="system-ui, sans-serif" font-size="8" fill="white" text-anchor="end" opacity="0.6">Tracking</text>

    <!-- === BOTTOM UI === -->

    <!-- Scale indicator pill -->
    <rect x="30" y="424" width="36" height="20" rx="10" fill="rgba(0,0,0,0.45)"/>
    <text x="48" y="437" font-family="system-ui, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="600">1:1</text>

    <!-- Gesture hints -->
    <rect x="74" y="424" width="176" height="20" rx="10" fill="rgba(0,0,0,0.35)"/>
    <text x="162" y="437" font-family="system-ui, sans-serif" font-size="8" fill="white" text-anchor="middle" opacity="0.85">Pinch to scale · Drag to move</text>

  </g>
</svg>
