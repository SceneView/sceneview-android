<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 720" width="400" height="720">
  <defs>
    <linearGradient id="bg-ar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="60%" stop-color="#E8D5B7"/>
      <stop offset="100%" stop-color="#C4A882"/>
    </linearGradient>
    <linearGradient id="plane-ar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(108,53,170,0.3)"/>
      <stop offset="100%" stop-color="rgba(108,53,170,0.05)"/>
    </linearGradient>
    <linearGradient id="model-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B7355"/>
      <stop offset="50%" stop-color="#6B5338"/>
      <stop offset="100%" stop-color="#4A3728"/>
    </linearGradient>
    <linearGradient id="visor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#0091EA"/>
      <stop offset="100%" stop-color="#2962FF"/>
    </linearGradient>
    <filter id="shadow-ar1">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <filter id="glow-ar1">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="screen-ar1">
      <rect x="16" y="16" width="368" height="688" rx="20"/>
    </clipPath>
  </defs>

  <!-- Device frame -->
  <rect width="400" height="720" rx="32" fill="#1a1a1a"/>
  <rect x="4" y="4" width="392" height="712" rx="28" fill="#2a2a2a"/>

  <!-- Screen content -->
  <g clip-path="url(#screen-ar1)">
    <!-- Camera background (living room feel) -->
    <rect x="16" y="16" width="368" height="688" fill="url(#bg-ar1)"/>

    <!-- Floor / surface with perspective -->
    <polygon points="16,500 384,500 384,704 16,704" fill="#D4C4A8" opacity="0.6"/>
    <polygon points="80,500 320,500 384,704 16,704" fill="#C9B896" opacity="0.4"/>

    <!-- AR plane detection mesh (purple grid) -->
    <g opacity="0.5">
      <polygon points="120,480 280,480 340,580 60,580" fill="url(#plane-ar1)" stroke="#6c35aa" stroke-width="1"/>
      <!-- Grid lines -->
      <line x1="140" y1="480" x2="100" y2="580" stroke="#6c35aa" stroke-width="0.5" opacity="0.4"/>
      <line x1="160" y1="480" x2="140" y2="580" stroke="#6c35aa" stroke-width="0.5" opacity="0.4"/>
      <line x1="200" y1="480" x2="200" y2="580" stroke="#6c35aa" stroke-width="0.5" opacity="0.4"/>
      <line x1="240" y1="480" x2="260" y2="580" stroke="#6c35aa" stroke-width="0.5" opacity="0.4"/>
      <line x1="260" y1="480" x2="300" y2="580" stroke="#6c35aa" stroke-width="0.5" opacity="0.4"/>
      <line x1="100" y1="510" x2="300" y2="510" stroke="#6c35aa" stroke-width="0.5" opacity="0.3"/>
      <line x1="80" y1="540" x2="320" y2="540" stroke="#6c35aa" stroke-width="0.5" opacity="0.3"/>
      <line x1="70" y1="560" x2="330" y2="560" stroke="#6c35aa" stroke-width="0.5" opacity="0.3"/>
    </g>

    <!-- 3D Model - Sci-fi helmet on the plane -->
    <g filter="url(#shadow-ar1)" transform="translate(200,430)">
      <!-- Shadow on ground -->
      <ellipse cx="0" cy="80" rx="60" ry="12" fill="rgba(0,0,0,0.25)"/>

      <!-- Helmet body -->
      <ellipse cx="0" cy="-20" rx="55" ry="65" fill="url(#model-body)"/>
      <ellipse cx="0" cy="-30" rx="50" ry="55" fill="#7B6345"/>

      <!-- Visor -->
      <ellipse cx="0" cy="-25" rx="40" ry="25" fill="url(#visor)" filter="url(#glow-ar1)"/>
      <ellipse cx="-8" cy="-28" rx="12" ry="8" fill="rgba(255,255,255,0.3)"/>

      <!-- Helmet details -->
      <path d="M-45,-40 Q-50,-60 -35,-75 Q0,-95 35,-75 Q50,-60 45,-40" fill="none" stroke="#5A4530" stroke-width="3"/>
      <circle cx="-30" cy="-55" r="4" fill="#FFD54F"/>
      <circle cx="30" cy="-55" r="4" fill="#FFD54F"/>
      <rect x="-8" y="15" width="16" height="8" rx="2" fill="#5A4530"/>

      <!-- Antenna -->
      <line x1="0" y1="-82" x2="0" y2="-100" stroke="#8B7355" stroke-width="2"/>
      <circle cx="0" cy="-102" r="4" fill="#00E5FF" filter="url(#glow-ar1)"/>
    </g>

    <!-- AR reticle / anchor indicator -->
    <g transform="translate(200,520)" opacity="0.8">
      <circle r="20" fill="none" stroke="#6c35aa" stroke-width="2" stroke-dasharray="4,4">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle r="3" fill="#6c35aa"/>
    </g>

    <!-- UI overlay - top instruction -->
    <rect x="60" y="50" width="280" height="44" rx="22" fill="rgba(0,0,0,0.5)"/>
    <text x="200" y="77" text-anchor="middle" fill="white" font-family="system-ui" font-size="14" font-weight="500">Tap to place model on surface</text>

    <!-- Bottom model picker -->
    <rect x="16" y="640" width="368" height="64" fill="rgba(0,0,0,0.6)"/>
    <rect x="50" y="652" width="90" height="36" rx="18" fill="#6c35aa"/>
    <text x="95" y="675" text-anchor="middle" fill="white" font-family="system-ui" font-size="13" font-weight="600">Helmet</text>
    <rect x="155" y="652" width="90" height="36" rx="18" fill="rgba(255,255,255,0.15)"/>
    <text x="200" y="675" text-anchor="middle" fill="white" font-family="system-ui" font-size="13">Robot</text>
    <rect x="260" y="652" width="90" height="36" rx="18" fill="rgba(255,255,255,0.15)"/>
    <text x="305" y="675" text-anchor="middle" fill="white" font-family="system-ui" font-size="13">Chair</text>
  </g>

  <!-- Notch -->
  <rect x="140" y="16" width="120" height="28" rx="14" fill="#1a1a1a"/>
</svg>
