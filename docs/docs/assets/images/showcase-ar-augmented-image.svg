<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 720" width="400" height="720">
  <defs>
    <linearGradient id="bg-ar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F0E8"/>
      <stop offset="100%" stop-color="#E8E0D0"/>
    </linearGradient>
    <linearGradient id="hologram" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6c35aa" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="glow-ar2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="screen-ar2">
      <rect x="16" y="16" width="368" height="688" rx="20"/>
    </clipPath>
  </defs>

  <!-- Device frame -->
  <rect width="400" height="720" rx="32" fill="#1a1a1a"/>
  <rect x="4" y="4" width="392" height="712" rx="28" fill="#2a2a2a"/>

  <g clip-path="url(#screen-ar2)">
    <!-- Camera background (desk/table surface) -->
    <rect x="16" y="16" width="368" height="688" fill="url(#bg-ar2)"/>

    <!-- Table surface with perspective -->
    <polygon points="16,280 384,280 384,704 16,704" fill="#D4B896"/>
    <polygon points="16,280 384,280 350,320 50,320" fill="#C9AD86"/>

    <!-- Book / printed image on table (detected target) -->
    <g transform="translate(200,420) rotate(-5)">
      <!-- Book shadow -->
      <rect x="-82" y="-52" width="164" height="104" rx="2" fill="rgba(0,0,0,0.15)" transform="translate(4,4)"/>
      <!-- Book -->
      <rect x="-80" y="-50" width="160" height="100" rx="2" fill="white" stroke="#ddd" stroke-width="1"/>
      <!-- Cover image placeholder (product photo) -->
      <rect x="-70" y="-40" width="140" height="60" rx="1" fill="#E8E0D8"/>
      <text x="0" y="-5" text-anchor="middle" fill="#999" font-family="system-ui" font-size="10">PRODUCT CATALOG</text>
      <text x="0" y="35" text-anchor="middle" fill="#666" font-family="system-ui" font-size="8">Spring Collection 2026</text>

      <!-- AR detection frame (green corners) -->
      <g stroke="#4CAF50" stroke-width="3" fill="none">
        <path d="M-80,-50 L-80,-30 M-80,-50 L-60,-50"/>
        <path d="M80,-50 L80,-30 M80,-50 L60,-50"/>
        <path d="M-80,50 L-80,30 M-80,50 L-60,50"/>
        <path d="M80,50 L80,30 M80,50 L60,50"/>
      </g>
    </g>

    <!-- 3D holographic model floating above the book -->
    <g transform="translate(200,280)" filter="url(#glow-ar2)">
      <!-- Holographic sneaker / shoe -->
      <g opacity="0.9">
        <!-- Sole -->
        <path d="M-50,30 Q-55,35 -40,40 L40,40 Q55,35 50,30 L40,25 L-40,25 Z" fill="#6c35aa"/>
        <!-- Shoe body -->
        <path d="M-40,25 Q-50,10 -45,-5 Q-35,-20 -10,-25 L30,-25 Q50,-20 50,0 Q50,15 40,25 L-40,25 Z" fill="url(#hologram)"/>
        <!-- Swoosh / stripe -->
        <path d="M-30,15 Q0,-5 40,-10" fill="none" stroke="white" stroke-width="2.5" opacity="0.7"/>
        <!-- Laces -->
        <line x1="-5" y1="-20" x2="5" y2="-22" stroke="white" stroke-width="1.5" opacity="0.5"/>
        <line x1="0" y1="-15" x2="10" y2="-17" stroke="white" stroke-width="1.5" opacity="0.5"/>
        <line x1="5" y1="-10" x2="15" y2="-12" stroke="white" stroke-width="1.5" opacity="0.5"/>
      </g>

      <!-- Holographic scan lines -->
      <g opacity="0.15">
        <line x1="-60" y1="-20" x2="60" y2="-20" stroke="#00E5FF" stroke-width="0.5"/>
        <line x1="-60" y1="-10" x2="60" y2="-10" stroke="#00E5FF" stroke-width="0.5"/>
        <line x1="-60" y1="0" x2="60" y2="0" stroke="#00E5FF" stroke-width="0.5"/>
        <line x1="-60" y1="10" x2="60" y2="10" stroke="#00E5FF" stroke-width="0.5"/>
        <line x1="-60" y1="20" x2="60" y2="20" stroke="#00E5FF" stroke-width="0.5"/>
        <line x1="-60" y1="30" x2="60" y2="30" stroke="#00E5FF" stroke-width="0.5"/>
      </g>

      <!-- Floating particles -->
      <circle cx="-40" cy="-30" r="2" fill="#00E5FF" opacity="0.6">
        <animate attributeName="cy" values="-30;-40;-30" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="35" cy="-35" r="1.5" fill="#6c35aa" opacity="0.5">
        <animate attributeName="cy" values="-35;-45;-35" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="-40" r="2.5" fill="#00E5FF" opacity="0.4">
        <animate attributeName="cy" values="-40;-55;-40" dur="3s" repeatCount="indefinite"/>
      </circle>

      <!-- Info label -->
      <g transform="translate(65,-10)">
        <rect x="0" y="-12" width="80" height="24" rx="4" fill="rgba(0,0,0,0.6)"/>
        <text x="40" y="5" text-anchor="middle" fill="white" font-family="system-ui" font-size="10" font-weight="500">Air Max 90</text>
        <line x1="-5" y1="0" x2="0" y2="0" stroke="#00E5FF" stroke-width="1.5"/>
      </g>
    </g>

    <!-- Status bar -->
    <rect x="60" y="50" width="280" height="44" rx="22" fill="rgba(76,175,80,0.85)"/>
    <text x="200" y="77" text-anchor="middle" fill="white" font-family="system-ui" font-size="14" font-weight="500">Image detected — tracking</text>

    <!-- Bottom info -->
    <rect x="16" y="640" width="368" height="64" fill="rgba(0,0,0,0.6)"/>
    <text x="200" y="665" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="system-ui" font-size="11">AUGMENTED IMAGE</text>
    <text x="200" y="688" text-anchor="middle" fill="white" font-family="system-ui" font-size="14" font-weight="500">Point camera at catalog to see 3D preview</text>
  </g>

  <rect x="140" y="16" width="120" height="28" rx="14" fill="#1a1a1a"/>
</svg>
