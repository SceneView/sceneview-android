<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 720" width="400" height="720">
  <defs>
    <linearGradient id="sky-3d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="30%" stop-color="#FF8C42"/>
      <stop offset="60%" stop-color="#FFB366"/>
      <stop offset="100%" stop-color="#FFF5E6"/>
    </linearGradient>
    <linearGradient id="helmet-3d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A6741"/>
      <stop offset="50%" stop-color="#3D5636"/>
      <stop offset="100%" stop-color="#2E3D28"/>
    </linearGradient>
    <linearGradient id="visor-3d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <filter id="shadow-3d">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
    <filter id="glow-3d">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="screen-3d1">
      <rect x="16" y="16" width="368" height="688" rx="20"/>
    </clipPath>
  </defs>

  <!-- Device frame -->
  <rect width="400" height="720" rx="32" fill="#1a1a1a"/>
  <rect x="4" y="4" width="392" height="712" rx="28" fill="#2a2a2a"/>

  <g clip-path="url(#screen-3d1)">
    <!-- Sunset sky background -->
    <rect x="16" y="16" width="368" height="688" fill="url(#sky-3d)"/>

    <!-- Sun -->
    <circle cx="300" cy="180" r="50" fill="#FFD54F" opacity="0.8" filter="url(#glow-3d)"/>
    <circle cx="300" cy="180" r="35" fill="#FFECB3"/>

    <!-- Clouds -->
    <g opacity="0.4" fill="white">
      <ellipse cx="100" cy="120" rx="60" ry="15"/>
      <ellipse cx="80" cy="115" rx="30" ry="12"/>
      <ellipse cx="250" cy="90" rx="40" ry="10"/>
    </g>

    <!-- Ground plane with reflection -->
    <rect x="16" y="450" width="368" height="254" fill="#2E3D28" opacity="0.3"/>

    <!-- Damaged Helmet - centered, dramatic -->
    <g transform="translate(200,320)" filter="url(#shadow-3d)">
      <!-- Main dome -->
      <ellipse cx="0" cy="-20" rx="80" ry="90" fill="url(#helmet-3d)"/>

      <!-- Side panels -->
      <path d="M-75,-10 Q-85,10 -80,40 Q-75,60 -60,70 L-60,-30 Q-65,-25 -75,-10" fill="#354E30"/>
      <path d="M75,-10 Q85,10 80,40 Q75,60 60,70 L60,-30 Q65,-25 75,-10" fill="#354E30"/>

      <!-- Visor (golden, dramatic) -->
      <path d="M-55,-30 Q-60,-10 -50,15 Q-20,40 20,40 Q50,40 55,15 Q60,-10 55,-30 Q30,-50 0,-50 Q-30,-50 -55,-30" fill="url(#visor-3d)" filter="url(#glow-3d)"/>

      <!-- Visor reflection -->
      <path d="M-40,-35 Q-30,-45 0,-45 Q15,-45 25,-40 Q10,-25 -20,-20 Q-35,-25 -40,-35" fill="rgba(255,255,255,0.25)"/>

      <!-- Battle damage scratches -->
      <line x1="30" y1="-60" x2="45" y2="-40" stroke="#2A3A25" stroke-width="2" opacity="0.6"/>
      <line x1="35" y1="-55" x2="50" y2="-35" stroke="#2A3A25" stroke-width="1.5" opacity="0.4"/>
      <line x1="-50" y1="20" x2="-35" y2="35" stroke="#2A3A25" stroke-width="2" opacity="0.5"/>

      <!-- Chin guard -->
      <path d="M-40,55 Q-30,75 0,80 Q30,75 40,55 L35,45 Q20,60 0,62 Q-20,60 -35,45 Z" fill="#3D5636"/>

      <!-- Ear pieces -->
      <circle cx="-72" cy="10" r="12" fill="#354E30" stroke="#4A6741" stroke-width="2"/>
      <circle cx="72" cy="10" r="12" fill="#354E30" stroke="#4A6741" stroke-width="2"/>
      <circle cx="-72" cy="10" r="5" fill="#FFD54F" opacity="0.5"/>
      <circle cx="72" cy="10" r="5" fill="#FFD54F" opacity="0.5"/>

      <!-- Top crest -->
      <path d="M-15,-85 Q0,-95 15,-85 L10,-70 Q0,-75 -10,-70 Z" fill="#4A6741"/>
    </g>

    <!-- Orbit camera indicator -->
    <g transform="translate(200,320)" opacity="0.3">
      <ellipse rx="120" ry="40" fill="none" stroke="white" stroke-width="1" stroke-dasharray="6,4" transform="rotate(-15)">
        <animateTransform attributeName="transform" type="rotate" from="-15" to="345" dur="8s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <!-- Title overlay -->
    <text x="40" y="60" fill="rgba(0,0,0,0.7)" font-family="system-ui" font-size="22" font-weight="700">Model Viewer</text>
    <text x="40" y="82" fill="rgba(0,0,0,0.4)" font-family="system-ui" font-size="13">Drag to orbit · Pinch to zoom</text>

    <!-- SceneView badge -->
    <g transform="translate(280,630)">
      <rect x="0" y="0" width="90" height="32" rx="16" fill="rgba(108,53,170,0.85)"/>
      <text x="45" y="21" text-anchor="middle" fill="white" font-family="system-ui" font-size="12" font-weight="600">SceneView</text>
    </g>
  </g>

  <rect x="140" y="16" width="120" height="28" rx="14" fill="#1a1a1a"/>
</svg>
