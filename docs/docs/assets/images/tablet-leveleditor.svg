<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320" font-family="system-ui, sans-serif">
  <defs>
    <linearGradient id="tBezel4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E5E7EB"/>
      <stop offset="100%" stop-color="#9CA3AF"/>
    </linearGradient>
    <linearGradient id="editorBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="greenBlock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="greenSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="blueBlock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="blueSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="orangeBlock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="orangeSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
    <linearGradient id="yellowBlock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="100%" stop-color="#FACC15"/>
    </linearGradient>
    <linearGradient id="yellowSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CA8A04"/>
      <stop offset="100%" stop-color="#A16207"/>
    </linearGradient>
  </defs>

  <!-- Tablet frame -->
  <rect x="5" y="10" width="410" height="300" rx="20" ry="20" fill="url(#tBezel4)" stroke="#6B7280" stroke-width="1"/>
  <rect x="7" y="12" width="406" height="296" rx="18" ry="18" fill="none" stroke="#D1D5DB" stroke-width="0.5"/>
  <circle cx="210" cy="18" r="2.5" fill="#4B5563"/>
  <circle cx="210" cy="18" r="1.2" fill="#1F2937"/>

  <!-- Screen -->
  <rect x="18" y="26" width="384" height="268" rx="4" fill="url(#editorBg)"/>

  <!-- Top toolbar -->
  <rect x="18" y="26" width="384" height="26" fill="white" stroke="#E2E8F0" stroke-width="0.5"/>

  <!-- Title -->
  <text x="32" y="43" font-size="7" font-weight="700" fill="#0F172A">Level Editor</text>
  <text x="90" y="43" font-size="5" fill="#64748B">— World 1-3</text>

  <!-- Undo/Redo -->
  <g transform="translate(160, 32)">
    <rect x="0" y="0" width="18" height="16" rx="4" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
    <path d="M6 8 L9 5 L9 7 L13 7 L13 9 L9 9 L9 11Z" fill="#64748B"/>
    <rect x="22" y="0" width="18" height="16" rx="4" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
    <path d="M36 8 L33 5 L33 7 L29 7 L29 9 L33 9 L33 11Z" fill="#64748B"/>
  </g>

  <!-- Play button -->
  <rect x="210" y="32" width="40" height="16" rx="8" fill="#22C55E"/>
  <polygon points="222,36 222,44 228,40" fill="white"/>
  <text x="234" y="43" font-size="5.5" font-weight="600" fill="white">Play</text>

  <!-- Save / Test -->
  <rect x="340" y="32" width="24" height="16" rx="4" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
  <text x="352" y="43" text-anchor="middle" font-size="5.5" fill="#64748B">Save</text>
  <rect x="370" y="32" width="26" height="16" rx="4" fill="#22C55E" fill-opacity="0.1" stroke="#22C55E" stroke-width="0.8"/>
  <text x="383" y="43" text-anchor="middle" font-size="5.5" font-weight="600" fill="#22C55E">Test</text>

  <!-- Left palette sidebar -->
  <rect x="18" y="52" width="52" height="242" fill="white" stroke="#E2E8F0" stroke-width="0.5"/>

  <!-- Palette title -->
  <text x="44" y="66" text-anchor="middle" font-size="5.5" font-weight="700" fill="#0F172A">Blocks</text>
  <line x1="24" y1="71" x2="64" y2="71" stroke="#F1F5F9" stroke-width="1"/>

  <!-- Green block palette item -->
  <rect x="24" y="76" width="40" height="30" rx="4" fill="#F0FDF4" stroke="#22C55E" stroke-width="1"/>
  <g transform="translate(44, 87)">
    <polygon points="0,-6 10,0 0,6 -10,0" fill="url(#greenBlock)"/>
    <polygon points="-10,0 -10,4 0,10 0,6" fill="url(#greenSide)"/>
    <polygon points="10,0 10,4 0,10 0,6" fill="#15803D"/>
  </g>
  <text x="44" y="103" text-anchor="middle" font-size="4" fill="#64748B">Grass</text>

  <!-- Blue block -->
  <rect x="24" y="110" width="40" height="30" rx="4" fill="#EFF6FF" stroke="#D1D5DB" stroke-width="0.5"/>
  <g transform="translate(44, 121)">
    <polygon points="0,-6 10,0 0,6 -10,0" fill="url(#blueBlock)"/>
    <polygon points="-10,0 -10,4 0,10 0,6" fill="url(#blueSide)"/>
    <polygon points="10,0 10,4 0,10 0,6" fill="#1D4ED8"/>
  </g>
  <text x="44" y="137" text-anchor="middle" font-size="4" fill="#64748B">Water</text>

  <!-- Orange block -->
  <rect x="24" y="144" width="40" height="30" rx="4" fill="#FFF7ED" stroke="#D1D5DB" stroke-width="0.5"/>
  <g transform="translate(44, 155)">
    <polygon points="0,-6 10,0 0,6 -10,0" fill="url(#orangeBlock)"/>
    <polygon points="-10,0 -10,4 0,10 0,6" fill="url(#orangeSide)"/>
    <polygon points="10,0 10,4 0,10 0,6" fill="#C2410C"/>
  </g>
  <text x="44" y="171" text-anchor="middle" font-size="4" fill="#64748B">Brick</text>

  <!-- Yellow block -->
  <rect x="24" y="178" width="40" height="30" rx="4" fill="#FEFCE8" stroke="#D1D5DB" stroke-width="0.5"/>
  <g transform="translate(44, 189)">
    <polygon points="0,-6 10,0 0,6 -10,0" fill="url(#yellowBlock)"/>
    <polygon points="-10,0 -10,4 0,10 0,6" fill="url(#yellowSide)"/>
    <polygon points="10,0 10,4 0,10 0,6" fill="#A16207"/>
  </g>
  <text x="44" y="205" text-anchor="middle" font-size="4" fill="#64748B">Sand</text>

  <!-- Divider -->
  <line x1="24" y1="214" x2="64" y2="214" stroke="#F1F5F9" stroke-width="1"/>
  <text x="44" y="225" text-anchor="middle" font-size="5.5" font-weight="700" fill="#0F172A">Items</text>

  <!-- Character icon -->
  <rect x="24" y="232" width="18" height="22" rx="3" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
  <g transform="translate(33, 239)">
    <circle cx="0" cy="-3" r="3" fill="#F87171"/>
    <rect x="-3" y="0" width="6" height="6" rx="1" fill="#3B82F6"/>
    <rect x="-3.5" y="6" width="3" height="4" rx="0.5" fill="#1E40AF"/>
    <rect x="0.5" y="6" width="3" height="4" rx="0.5" fill="#1E40AF"/>
  </g>

  <!-- Tree icon -->
  <rect x="46" y="232" width="18" height="22" rx="3" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
  <g transform="translate(55, 240)">
    <rect x="-1" y="2" width="2" height="5" fill="#92400E"/>
    <polygon points="0,-5 5,2 -5,2" fill="#22C55E"/>
    <polygon points="0,-3 4,1 -4,1" fill="#4ADE80" fill-opacity="0.5"/>
  </g>

  <!-- Coin icon -->
  <rect x="24" y="258" width="18" height="22" rx="3" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
  <circle cx="33" cy="269" r="5" fill="#FACC15" stroke="#CA8A04" stroke-width="0.6"/>
  <text x="33" y="271.5" text-anchor="middle" font-size="5" font-weight="700" fill="#A16207">$</text>

  <!-- Flag icon -->
  <rect x="46" y="258" width="18" height="22" rx="3" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
  <line x1="52" y1="264" x2="52" y2="276" stroke="#64748B" stroke-width="1"/>
  <polygon points="52,264 60,267 52,270" fill="#EF4444"/>

  <!-- Main canvas - isometric grid with blocks -->
  <g transform="translate(230, 180)">
    <!-- Grid floor tiles -->
    <!-- Row 1 -->
    <polygon points="0,-60 20,-50 0,-40 -20,-50" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.3"/>
    <polygon points="20,-50 40,-40 20,-30 0,-40" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="0.3"/>
    <polygon points="40,-40 60,-30 40,-20 20,-30" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.3"/>
    <polygon points="60,-30 80,-20 60,-10 40,-20" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="0.3"/>
    <polygon points="80,-20 100,-10 80,0 60,-10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.3"/>
    <!-- Row 2 -->
    <polygon points="-20,-50 0,-40 -20,-30 -40,-40" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="0.3"/>
    <polygon points="0,-40 20,-30 0,-20 -20,-30" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.3"/>
    <polygon points="20,-30 40,-20 20,-10 0,-20" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="0.3"/>
    <polygon points="40,-20 60,-10 40,0 20,-10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.3"/>
    <polygon points="60,-10 80,0 60,10 40,0" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="0.3"/>
    <!-- Row 3 -->
    <polygon points="-40,-40 -20,-30 -40,-20 -60,-30" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.3"/>
    <polygon points="-20,-30 0,-20 -20,-10 -40,-20" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="0.3"/>
    <polygon points="0,-20 20,-10 0,0 -20,-10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.3"/>
    <polygon points="20,-10 40,0 20,10 0,0" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="0.3"/>
    <polygon points="40,0 60,10 40,20 20,10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.3"/>
    <!-- Row 4 -->
    <polygon points="-60,-30 -40,-20 -60,-10 -80,-20" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="0.3"/>
    <polygon points="-40,-20 -20,-10 -40,0 -60,-10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.3"/>
    <polygon points="-20,-10 0,0 -20,10 -40,0" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="0.3"/>
    <polygon points="0,0 20,10 0,20 -20,10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.3"/>
    <polygon points="20,10 40,20 20,30 0,20" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="0.3"/>
    <!-- Row 5 -->
    <polygon points="-80,-20 -60,-10 -80,0 -100,-10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.3"/>
    <polygon points="-60,-10 -40,0 -60,10 -80,0" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="0.3"/>
    <polygon points="-40,0 -20,10 -40,20 -60,10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.3"/>
    <polygon points="-20,10 0,20 -20,30 -40,20" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="0.3"/>
    <polygon points="0,20 20,30 0,40 -20,30" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.3"/>

    <!-- GREEN BLOCKS - grass wall -->
    <g transform="translate(-40, -20)">
      <polygon points="0,-6 20,4 0,14 -20,4" fill="url(#greenBlock)"/>
      <polygon points="-20,4 -20,14 0,24 0,14" fill="url(#greenSide)"/>
      <polygon points="20,4 20,14 0,24 0,14" fill="#15803D"/>
    </g>
    <g transform="translate(-20, -10)">
      <polygon points="0,-6 20,4 0,14 -20,4" fill="url(#greenBlock)"/>
      <polygon points="-20,4 -20,14 0,24 0,14" fill="url(#greenSide)"/>
      <polygon points="20,4 20,14 0,24 0,14" fill="#15803D"/>
    </g>
    <g transform="translate(0, 0)">
      <polygon points="0,-6 20,4 0,14 -20,4" fill="url(#greenBlock)"/>
      <polygon points="-20,4 -20,14 0,24 0,14" fill="url(#greenSide)"/>
      <polygon points="20,4 20,14 0,24 0,14" fill="#15803D"/>
    </g>

    <!-- Stacked green block (tower) -->
    <g transform="translate(-20, -20)">
      <polygon points="0,-6 20,4 0,14 -20,4" fill="url(#greenBlock)"/>
      <polygon points="-20,4 -20,14 0,24 0,14" fill="url(#greenSide)"/>
      <polygon points="20,4 20,14 0,24 0,14" fill="#15803D"/>
    </g>

    <!-- BLUE BLOCKS - water -->
    <g transform="translate(-60, 10)">
      <polygon points="0,-4 20,6 0,16 -20,6" fill="url(#blueBlock)" fill-opacity="0.7"/>
      <polygon points="-20,6 -20,12 0,22 0,16" fill="url(#blueSide)" fill-opacity="0.7"/>
      <polygon points="20,6 20,12 0,22 0,16" fill="#1D4ED8" fill-opacity="0.7"/>
    </g>
    <g transform="translate(-40, 20)">
      <polygon points="0,-4 20,6 0,16 -20,6" fill="url(#blueBlock)" fill-opacity="0.7"/>
      <polygon points="-20,6 -20,12 0,22 0,16" fill="url(#blueSide)" fill-opacity="0.7"/>
      <polygon points="20,6 20,12 0,22 0,16" fill="#1D4ED8" fill-opacity="0.7"/>
    </g>

    <!-- ORANGE BLOCKS - brick structure -->
    <g transform="translate(40, -20)">
      <polygon points="0,-6 20,4 0,14 -20,4" fill="url(#orangeBlock)"/>
      <polygon points="-20,4 -20,14 0,24 0,14" fill="url(#orangeSide)"/>
      <polygon points="20,4 20,14 0,24 0,14" fill="#C2410C"/>
    </g>
    <g transform="translate(60, -10)">
      <polygon points="0,-6 20,4 0,14 -20,4" fill="url(#orangeBlock)"/>
      <polygon points="-20,4 -20,14 0,24 0,14" fill="url(#orangeSide)"/>
      <polygon points="20,4 20,14 0,24 0,14" fill="#C2410C"/>
    </g>
    <!-- Stacked orange -->
    <g transform="translate(40, -30)">
      <polygon points="0,-6 20,4 0,14 -20,4" fill="url(#orangeBlock)"/>
      <polygon points="-20,4 -20,14 0,24 0,14" fill="url(#orangeSide)"/>
      <polygon points="20,4 20,14 0,24 0,14" fill="#C2410C"/>
    </g>

    <!-- YELLOW BLOCK (sand) -->
    <g transform="translate(20, 10)">
      <polygon points="0,-6 20,4 0,14 -20,4" fill="url(#yellowBlock)"/>
      <polygon points="-20,4 -20,14 0,24 0,14" fill="url(#yellowSide)"/>
      <polygon points="20,4 20,14 0,24 0,14" fill="#A16207"/>
    </g>

    <!-- Tree on grid -->
    <g transform="translate(-60, -30)">
      <rect x="-1.5" y="-4" width="3" height="8" fill="#92400E"/>
      <polygon points="0,-16 8,-4 -8,-4" fill="#22C55E"/>
      <polygon points="0,-20 6,-10 -6,-10" fill="#4ADE80"/>
    </g>

    <!-- Another tree -->
    <g transform="translate(60, 10)">
      <rect x="-1.5" y="-4" width="3" height="8" fill="#92400E"/>
      <polygon points="0,-16 8,-4 -8,-4" fill="#22C55E"/>
      <polygon points="0,-20 6,-10 -6,-10" fill="#4ADE80"/>
    </g>

    <!-- Character figure -->
    <g transform="translate(5, -30)">
      <ellipse cx="0" cy="4" rx="5" ry="2" fill="#000" fill-opacity="0.08"/>
      <circle cx="0" cy="-12" r="4" fill="#F87171"/>
      <circle cx="-1.5" cy="-13" r="0.7" fill="white"/>
      <circle cx="1.5" cy="-13" r="0.7" fill="white"/>
      <circle cx="-1.5" cy="-13" r="0.35" fill="#1F2937"/>
      <circle cx="1.5" cy="-13" r="0.35" fill="#1F2937"/>
      <rect x="-3.5" y="-8" width="7" height="7" rx="1.5" fill="#3B82F6"/>
      <rect x="-6" y="-7" width="2.5" height="5" rx="1" fill="#3B82F6"/>
      <rect x="3.5" y="-7" width="2.5" height="5" rx="1" fill="#3B82F6"/>
      <rect x="-3.5" y="-1" width="3" height="5" rx="1" fill="#1E40AF"/>
      <rect x="0.5" y="-1" width="3" height="5" rx="1" fill="#1E40AF"/>
    </g>

    <!-- Coin floating -->
    <g transform="translate(30, -40)">
      <circle cx="0" cy="0" r="4" fill="#FACC15" stroke="#CA8A04" stroke-width="0.5"/>
      <text x="0" y="2" text-anchor="middle" font-size="4" font-weight="700" fill="#A16207">$</text>
      <line x1="6" y1="-4" x2="8" y2="-6" stroke="#FACC15" stroke-width="0.5"/>
      <line x1="7" y1="-2" x2="9" y2="-2" stroke="#FACC15" stroke-width="0.5"/>
    </g>

    <!-- Flag -->
    <g transform="translate(80, -15)">
      <line x1="0" y1="5" x2="0" y2="-15" stroke="#64748B" stroke-width="1.2"/>
      <polygon points="0,-15 12,-12 0,-8" fill="#EF4444"/>
    </g>

    <!-- Hover selection indicator -->
    <polygon points="-20,-10 0,-20 20,-10 0,0" fill="#22C55E" fill-opacity="0.15" stroke="#22C55E" stroke-width="1" stroke-dasharray="2,1"/>
  </g>

  <!-- Bottom status bar -->
  <rect x="70" y="275" width="332" height="19" fill="white" fill-opacity="0.8"/>

  <!-- Grid info -->
  <text x="82" y="287" font-size="4.5" fill="#94A3B8">Grid: 8x8 · Blocks: 9 · Items: 4</text>

  <!-- Layer selector -->
  <g transform="translate(230, 279)">
    <text x="0" y="7" font-size="4.5" fill="#64748B">Layer:</text>
    <rect x="28" y="0" width="14" height="12" rx="3" fill="#22C55E" fill-opacity="0.15" stroke="#22C55E" stroke-width="0.6"/>
    <text x="35" y="8.5" text-anchor="middle" font-size="5" font-weight="600" fill="#22C55E">1</text>
    <rect x="46" y="0" width="14" height="12" rx="3" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
    <text x="53" y="8.5" text-anchor="middle" font-size="5" fill="#94A3B8">2</text>
    <rect x="64" y="0" width="14" height="12" rx="3" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
    <text x="71" y="8.5" text-anchor="middle" font-size="5" fill="#94A3B8">3</text>
  </g>

  <!-- Zoom controls -->
  <g transform="translate(355, 279)">
    <rect x="0" y="0" width="14" height="12" rx="3" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
    <text x="7" y="9" text-anchor="middle" font-size="8" fill="#64748B">-</text>
    <rect x="16" y="0" width="14" height="12" rx="3" fill="#F1F5F9" stroke="#D1D5DB" stroke-width="0.5"/>
    <text x="23" y="9" text-anchor="middle" font-size="8" fill="#64748B">+</text>
  </g>

  <text x="392" y="287" text-anchor="end" font-size="4" fill="#22C55E" fill-opacity="0.6">SceneView 3D</text>
</svg>