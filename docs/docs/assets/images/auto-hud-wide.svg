<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 240">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <!-- Road surface gradient -->
    <linearGradient id="roadSurface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>

    <!-- Road fog fade at top -->
    <linearGradient id="roadFog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020617" stop-opacity="1"/>
      <stop offset="40%" stop-color="#020617" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </linearGradient>

    <!-- Speed arc gradient -->
    <linearGradient id="speedArcGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>

    <!-- Speed arc background -->
    <linearGradient id="speedArcBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>

    <!-- Lane assist glow -->
    <linearGradient id="laneAssistGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Status bar bg -->
    <linearGradient id="statusBarBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Nav arrow glow gradient -->
    <radialGradient id="navGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>

    <!-- Route progress gradient -->
    <linearGradient id="routeProgress" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="60%" stop-color="#06B6D4"/>
      <stop offset="60%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>

    <!-- Side mirror gradient -->
    <linearGradient id="mirrorBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Cyan detection glow filter -->
    <filter id="cyanGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Green glow -->
    <filter id="greenGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Larger glow for nav arrow -->
    <filter id="arrowGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Traffic light active glow -->
    <filter id="trafficGreenGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Display clip -->
    <clipPath id="panelClip">
      <rect x="2" y="2" width="516" height="236" rx="6"/>
    </clipPath>
  </defs>

  <!-- Main background -->
  <rect width="520" height="240" fill="url(#bg)" rx="6"/>
  <rect x="1" y="1" width="518" height="238" rx="6" fill="none" stroke="#1E293B" stroke-width="0.5"/>

  <g clip-path="url(#panelClip)">

    <!-- ============================================ -->
    <!-- TOP STATUS BAR                               -->
    <!-- ============================================ -->
    <rect x="0" y="0" width="520" height="22" fill="url(#statusBarBg)"/>
    <line x1="0" y1="22" x2="520" y2="22" stroke="#1E293B" stroke-width="0.5" opacity="0.6"/>

    <!-- Temperature left -->
    <text x="18" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white" opacity="0.8">22°C</text>

    <!-- Time center -->
    <text x="260" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle" letter-spacing="1">14:32</text>

    <!-- Battery right -->
    <g transform="translate(458, 6)">
      <rect x="0" y="0" width="22" height="11" rx="2" fill="none" stroke="#22C55E" stroke-width="0.8" opacity="0.7"/>
      <rect x="22" y="3" width="2" height="5" rx="0.5" fill="#22C55E" opacity="0.7"/>
      <rect x="2" y="2" width="15" height="7" rx="1" fill="#22C55E" opacity="0.6"/>
    </g>
    <text x="494" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#22C55E" opacity="0.9">78%</text>


    <!-- ============================================ -->
    <!-- 3D ROAD — CENTER                             -->
    <!-- ============================================ -->
    <g>
      <!-- Road trapezoid: wide at bottom, narrow at vanishing point -->
      <polygon points="260,60 240,60 110,230 410,230 280,60" fill="url(#roadSurface)"/>

      <!-- Fog overlay at vanishing point -->
      <rect x="110" y="40" width="300" height="80" fill="url(#roadFog)"/>

      <!-- Solid left edge line -->
      <line x1="240" y1="60" x2="110" y2="230" stroke="#475569" stroke-width="1.2" opacity="0.7"/>
      <!-- Solid right edge line -->
      <line x1="280" y1="60" x2="410" y2="230" stroke="#475569" stroke-width="1.2" opacity="0.7"/>

      <!-- Center amber divider — dashes converging -->
      <line x1="260" y1="75" x2="260" y2="85" stroke="#F59E0B" stroke-width="1.2" opacity="0.7"/>
      <line x1="260" y1="95" x2="260" y2="108" stroke="#F59E0B" stroke-width="1.4" opacity="0.6"/>
      <line x1="260" y1="118" x2="260" y2="135" stroke="#F59E0B" stroke-width="1.6" opacity="0.5"/>
      <line x1="260" y1="148" x2="260" y2="170" stroke="#F59E0B" stroke-width="2" opacity="0.4"/>
      <line x1="260" y1="185" x2="260" y2="215" stroke="#F59E0B" stroke-width="2.5" opacity="0.3"/>

      <!-- Left lane dashes (between left edge and center) -->
      <line x1="250" y1="75" x2="248" y2="85" stroke="white" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,6"/>
      <line x1="244" y1="100" x2="238" y2="120" stroke="white" stroke-width="1" opacity="0.35" stroke-dasharray="4,7"/>
      <line x1="232" y1="135" x2="222" y2="165" stroke="white" stroke-width="1.2" opacity="0.3" stroke-dasharray="5,8"/>
      <line x1="212" y1="180" x2="195" y2="220" stroke="white" stroke-width="1.5" opacity="0.2" stroke-dasharray="6,10"/>

      <!-- Right lane dashes (between center and right edge) -->
      <line x1="270" y1="75" x2="272" y2="85" stroke="white" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,6"/>
      <line x1="276" y1="100" x2="282" y2="120" stroke="white" stroke-width="1" opacity="0.35" stroke-dasharray="4,7"/>
      <line x1="288" y1="135" x2="298" y2="165" stroke="white" stroke-width="1.2" opacity="0.3" stroke-dasharray="5,8"/>
      <line x1="308" y1="180" x2="325" y2="220" stroke="white" stroke-width="1.5" opacity="0.2" stroke-dasharray="6,10"/>

      <!-- ===== LANE ASSIST green lines ===== -->
      <!-- Left lane boundary (driver's lane = center-left) -->
      <line x1="250" y1="70" x2="175" y2="230" stroke="#22C55E" stroke-width="1" opacity="0.4" filter="url(#greenGlow)"/>
      <!-- Right lane boundary -->
      <line x1="270" y1="70" x2="345" y2="230" stroke="#22C55E" stroke-width="1" opacity="0.4" filter="url(#greenGlow)"/>

      <!-- ===== DETECTED VEHICLES ===== -->
      <!-- Far vehicle (98m) -->
      <g filter="url(#cyanGlow)">
        <rect x="253" y="78" width="14" height="5" rx="1" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.5"/>
      </g>
      <text x="260" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="6" fill="#06B6D4" text-anchor="middle" opacity="0.6">98m</text>

      <!-- Mid vehicle (56m) -->
      <g filter="url(#cyanGlow)">
        <rect x="246" y="108" width="28" height="10" rx="1.5" fill="none" stroke="#06B6D4" stroke-width="1.2" opacity="0.7"/>
      </g>
      <text x="260" y="104" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#06B6D4" text-anchor="middle" opacity="0.8">56m</text>

      <!-- Closest vehicle (24m) — slightly left lane -->
      <g filter="url(#cyanGlow)">
        <rect x="218" y="152" width="45" height="18" rx="2" fill="none" stroke="#06B6D4" stroke-width="1.5" opacity="0.9"/>
        <!-- Headlight indicators -->
        <rect x="220" y="154" width="4" height="3" rx="0.5" fill="#06B6D4" opacity="0.4"/>
        <rect x="257" y="154" width="4" height="3" rx="0.5" fill="#06B6D4" opacity="0.4"/>
      </g>
      <text x="240" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#06B6D4" text-anchor="middle" font-weight="600">24m</text>

      <!-- ===== TRAFFIC LIGHT (top-right of road) ===== -->
      <g transform="translate(295, 38)">
        <!-- Housing -->
        <rect x="0" y="0" width="10" height="26" rx="2" fill="#0F172A" stroke="#1E293B" stroke-width="0.5"/>
        <!-- Red (off) -->
        <circle cx="5" cy="6" r="3" fill="#1E293B"/>
        <!-- Amber (off) -->
        <circle cx="5" cy="13" r="3" fill="#1E293B"/>
        <!-- Green (active) -->
        <circle cx="5" cy="20" r="3" fill="#22C55E" filter="url(#trafficGreenGlow)"/>
      </g>
    </g>


    <!-- ============================================ -->
    <!-- SPEED GAUGE — LEFT                           -->
    <!-- ============================================ -->
    <g transform="translate(68, 115)">
      <!-- Arc background track (270° sweep) -->
      <!-- Arc from 135° to 405° (135° to 45°), radius 55 -->
      <path d="M -38.89,38.89 A 55,55 0 1,1 38.89,38.89" fill="none" stroke="#1E293B" stroke-width="5" stroke-linecap="round"/>

      <!-- Active arc (gradient) — ~75% filled for 112 km/h -->
      <path d="M -38.89,38.89 A 55,55 0 1,1 33.5,33.5" fill="none" stroke="url(#speedArcGrad)" stroke-width="5" stroke-linecap="round" filter="url(#softGlow)"/>

      <!-- Tick marks around arc -->
      <g stroke="white" stroke-width="0.8" opacity="0.25">
        <!-- Bottom-left (0) -->
        <line x1="-41" y1="41" x2="-36" y2="36"/>
        <!-- Left -->
        <line x1="-55" y1="0" x2="-49" y2="0"/>
        <!-- Top-left -->
        <line x1="-41" y1="-41" x2="-36" y2="-36"/>
        <!-- Top -->
        <line x1="0" y1="-55" x2="0" y2="-49"/>
        <!-- Top-right -->
        <line x1="41" y1="-41" x2="36" y2="-36"/>
        <!-- Right -->
        <line x1="55" y1="0" x2="49" y2="0"/>
        <!-- Bottom-right (max) -->
        <line x1="41" y1="41" x2="36" y2="36"/>
      </g>

      <!-- Minor ticks -->
      <g stroke="white" stroke-width="0.5" opacity="0.12">
        <line x1="-51.3" y1="20.5" x2="-46" y2="18.4"/>
        <line x1="-51.3" y1="-20.5" x2="-46" y2="-18.4"/>
        <line x1="-20.5" y1="-51.3" x2="-18.4" y2="-46"/>
        <line x1="20.5" y1="-51.3" x2="18.4" y2="-46"/>
        <line x1="51.3" y1="-20.5" x2="46" y2="-18.4"/>
        <line x1="51.3" y1="20.5" x2="46" y2="18.4"/>
      </g>

      <!-- Speed number -->
      <text x="0" y="8" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">112</text>
      <!-- Unit -->
      <text x="0" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle" letter-spacing="0.5">km/h</text>
    </g>


    <!-- ============================================ -->
    <!-- NAVIGATION — RIGHT                           -->
    <!-- ============================================ -->
    <g transform="translate(410, 50)">
      <!-- Glow backdrop -->
      <circle cx="45" cy="30" r="35" fill="url(#navGlow)"/>

      <!-- Large turn arrow (right turn) -->
      <g filter="url(#arrowGlow)">
        <path d="M 25,52 L 25,30 Q 25,18 37,18 L 55,18 L 48,10 L 57,18 L 48,26 L 55,18"
              fill="none" stroke="#06B6D4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Arrowhead -->
        <polygon points="55,18 47,12 47,24" fill="#06B6D4"/>
      </g>

      <!-- Turn instruction -->
      <text x="45" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#06B6D4" text-anchor="middle" font-weight="600">Turn right in 200m</text>

      <!-- Street name -->
      <text x="45" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.9">Hauptstraße</text>

      <!-- Route progress bar -->
      <rect x="10" y="92" width="70" height="3" rx="1.5" fill="#1E293B"/>
      <rect x="10" y="92" width="42" height="3" rx="1.5" fill="#06B6D4" opacity="0.8"/>
      <circle cx="52" cy="93.5" r="2" fill="#06B6D4" filter="url(#softGlow)"/>
    </g>


    <!-- ============================================ -->
    <!-- BOTTOM INFO STRIP                            -->
    <!-- ============================================ -->
    <rect x="0" y="218" width="520" height="22" fill="#020617" opacity="0.7"/>
    <line x1="0" y1="218" x2="520" y2="218" stroke="#1E293B" stroke-width="0.5" opacity="0.4"/>

    <text x="80" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#64748B" text-anchor="middle" letter-spacing="0.3">Range: 342km</text>
    <text x="165" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#64748B" text-anchor="middle">|</text>
    <text x="260" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#64748B" text-anchor="middle" letter-spacing="0.3">ADAS: Active</text>
    <text x="350" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#64748B" text-anchor="middle">|</text>
    <text x="440" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#64748B" text-anchor="middle" letter-spacing="0.3">Music: Now Playing</text>


    <!-- ============================================ -->
    <!-- SIDE MIRRORS                                 -->
    <!-- ============================================ -->
    <!-- Left side mirror -->
    <g opacity="0.5">
      <polygon points="0,200 0,230 45,230 35,200" fill="url(#mirrorBg)" stroke="#1E293B" stroke-width="0.5"/>
      <!-- Tiny vehicle highlight in mirror -->
      <rect x="12" y="212" width="8" height="4" rx="1" fill="#EF4444" opacity="0.3"/>
      <rect x="25" y="218" width="5" height="3" rx="0.5" fill="#F59E0B" opacity="0.2"/>
    </g>

    <!-- Right side mirror -->
    <g opacity="0.5">
      <polygon points="520,200 520,230 475,230 485,200" fill="url(#mirrorBg)" stroke="#1E293B" stroke-width="0.5"/>
      <!-- Tiny vehicle highlight in mirror -->
      <rect x="498" y="215" width="7" height="3" rx="0.5" fill="#EF4444" opacity="0.25"/>
    </g>

  </g>
</svg>