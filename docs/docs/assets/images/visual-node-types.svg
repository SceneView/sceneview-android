<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <style>
    .node-label { font-family: 'Google Sans', 'Segoe UI', system-ui, sans-serif; font-size: 11px; font-weight: 500; fill: #49454F; text-anchor: middle; }
  </style>

  <!-- Row 1 -->

  <!-- ModelNode — rotated rounded square -->
  <g transform="translate(100, 60)">
    <rect x="-20" y="-20" width="40" height="40" rx="10" fill="#D0BCFF" transform="rotate(15)"/>
    <text y="42" class="node-label">ModelNode</text>
  </g>

  <!-- LightNode — circle with radiating dots -->
  <g transform="translate(300, 60)">
    <circle cx="0" cy="0" r="16" fill="#FFD8E4"/>
    <circle cx="0" cy="-26" r="3" fill="#FFD8E4"/>
    <circle cx="0" cy="26" r="3" fill="#FFD8E4"/>
    <circle cx="-26" cy="0" r="3" fill="#FFD8E4"/>
    <circle cx="26" cy="0" r="3" fill="#FFD8E4"/>
    <text y="42" class="node-label">LightNode</text>
  </g>

  <!-- CubeNode — hexagon (isometric cube hint) -->
  <g transform="translate(500, 60)">
    <polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" fill="#B4C5E4"/>
    <text y="42" class="node-label">CubeNode</text>
  </g>

  <!-- AnchorNode — pin: circle + vertical line -->
  <g transform="translate(700, 60)">
    <circle cx="0" cy="-8" r="12" fill="#C8E6C9"/>
    <line x1="0" y1="4" x2="0" y2="22" stroke="#C8E6C9" stroke-width="4" stroke-linecap="round"/>
    <text y="42" class="node-label">AnchorNode</text>
  </g>

  <!-- Row 2 -->

  <!-- VideoNode — rounded rect with play triangle -->
  <g transform="translate(100, 190)">
    <rect x="-24" y="-16" width="48" height="32" rx="8" fill="#EFB8C8"/>
    <polygon points="-6,-8 -6,8 8,0" fill="white" opacity="0.85"/>
    <text y="42" class="node-label">VideoNode</text>
  </g>

  <!-- TextNode — bold "A" -->
  <g transform="translate(300, 190)">
    <text y="8" font-family="'Google Sans', 'Segoe UI', system-ui, sans-serif" font-size="24" font-weight="700" fill="#D0BCFF" text-anchor="middle">A</text>
    <text y="42" class="node-label">TextNode</text>
  </g>

  <!-- PathNode — S-curve -->
  <g transform="translate(500, 190)">
    <path d="M-20,-14 C-6,-14 6,14 20,14" fill="none" stroke="#B4C5E4" stroke-width="2" stroke-linecap="round"/>
    <text y="42" class="node-label">PathNode</text>
  </g>

  <!-- ViewNode — two overlapping rounded rectangles -->
  <g transform="translate(700, 190)">
    <rect x="-16" y="-14" width="32" height="28" rx="6" fill="#C8E6C9" opacity="0.5"/>
    <rect x="-12" y="-18" width="32" height="28" rx="6" fill="#C8E6C9"/>
    <text y="42" class="node-label">ViewNode</text>
  </g>
</svg>