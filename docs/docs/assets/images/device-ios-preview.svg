<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 480" fill="none">
  <defs>
    <!-- Screen background gradient -->
    <linearGradient id="screen-bg" x1="140" y1="20" x2="140" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F2F2F7"/>
    </linearGradient>
    <!-- Shoe upper body radial for volume -->
    <radialGradient id="shoe-body" cx="0.4" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#F9FAFB"/>
      <stop offset="100%" stop-color="#E5E7EB"/>
    </radialGradient>
    <!-- Shoe shadow -->
    <radialGradient id="shoe-shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Button gradient -->
    <linearGradient id="ar-btn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#0066CC"/>
    </linearGradient>
    <!-- Frame highlight -->
    <linearGradient id="frame-edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A3A3C"/>
      <stop offset="50%" stop-color="#1C1C1E"/>
      <stop offset="100%" stop-color="#2C2C2E"/>
    </linearGradient>
    <!-- Subtle card shadow -->
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <filter id="btn-shadow" x="-5%" y="-10%" width="110%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#007AFF" flood-opacity="0.3"/>
    </filter>
    <!-- Orbit ring dash -->
    <pattern id="orbit-dash" patternUnits="userSpaceOnUse" width="6" height="1">
      <rect width="3" height="1" fill="#D1D5DB"/>
    </pattern>
  </defs>

  <!-- ==================== IPHONE FRAME ==================== -->
  <!-- Outer body (space gray titanium) -->
  <rect x="10" y="10" width="260" height="460" rx="40" fill="url(#frame-edge)"/>
  <!-- Titanium edge highlight -->
  <rect x="10" y="10" width="260" height="460" rx="40" fill="none" stroke="#4A4A4E" stroke-width="0.5" opacity="0.4"/>

  <!-- Side buttons — right edge -->
  <!-- Power button -->
  <rect x="268" y="120" width="3" height="28" rx="1.5" fill="#2C2C2E"/>
  <!-- Left edge — volume up -->
  <rect x="9" y="130" width="3" height="10" rx="1" fill="#2C2C2E"/>
  <!-- Volume down -->
  <rect x="9" y="148" width="3" height="10" rx="1" fill="#2C2C2E"/>
  <!-- Silent switch -->
  <rect x="9" y="112" width="3" height="6" rx="1" fill="#2C2C2E"/>

  <!-- Inner screen -->
  <rect x="18" y="18" width="244" height="444" rx="34" fill="url(#screen-bg)" clip-path="url(#screen-clip)"/>

  <!-- Dynamic Island -->
  <rect x="115" y="24" width="50" height="14" rx="7" fill="#000000"/>
  <!-- Camera lens in Dynamic Island -->
  <circle cx="148" cy="31" r="3" fill="#1A1A2E" opacity="0.5"/>
  <circle cx="148" cy="31" r="1.5" fill="#0D0D1A" opacity="0.7"/>

  <!-- ==================== STATUS BAR ==================== -->
  <!-- Time -->
  <text x="38" y="30" font-family="-apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif" font-size="10" font-weight="700" fill="#1C1C1E" letter-spacing="0.2">9:41</text>
  <!-- Signal bars -->
  <g transform="translate(216, 23)">
    <rect x="0" y="5" width="2.5" height="3" rx="0.5" fill="#1C1C1E" opacity="0.35"/>
    <rect x="3.5" y="3.5" width="2.5" height="4.5" rx="0.5" fill="#1C1C1E" opacity="0.5"/>
    <rect x="7" y="2" width="2.5" height="6" rx="0.5" fill="#1C1C1E" opacity="0.7"/>
    <rect x="10.5" y="0" width="2.5" height="8" rx="0.5" fill="#1C1C1E"/>
  </g>
  <!-- WiFi icon -->
  <g transform="translate(233, 24)">
    <path d="M4 7 A1 1 0 1 1 4.01 7" fill="#1C1C1E"/>
    <path d="M1.5 4.5 Q4 2.5 6.5 4.5" fill="none" stroke="#1C1C1E" stroke-width="1" stroke-linecap="round"/>
    <path d="M-0.5 2.5 Q4 -0.5 8.5 2.5" fill="none" stroke="#1C1C1E" stroke-width="1" stroke-linecap="round"/>
  </g>
  <!-- Battery -->
  <g transform="translate(245, 24)">
    <rect x="0" y="0" width="16" height="8" rx="2" fill="none" stroke="#1C1C1E" stroke-width="0.8"/>
    <rect x="16" y="2" width="1.5" height="4" rx="0.75" fill="#1C1C1E" opacity="0.35"/>
    <rect x="1.5" y="1.5" width="13" height="5" rx="1" fill="#34C759"/>
  </g>

  <!-- ==================== NAVIGATION BAR ==================== -->
  <!-- Back chevron -->
  <path d="M32 52 L27 58 L32 64" fill="none" stroke="#007AFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Title -->
  <text x="140" y="61" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="12" font-weight="700" fill="#1C1C1E" text-anchor="middle">Product View</text>
  <!-- Share icon (box with arrow) -->
  <g transform="translate(244, 51)">
    <rect x="0" y="4" width="10" height="9" rx="1.5" fill="none" stroke="#007AFF" stroke-width="1.3"/>
    <line x1="5" y1="10" x2="5" y2="0" stroke="#007AFF" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M2.5 3 L5 0 L7.5 3" fill="none" stroke="#007AFF" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Separator line -->
  <line x1="18" y1="72" x2="262" y2="72" stroke="#E5E5EA" stroke-width="0.5"/>

  <!-- ==================== 3D PRODUCT AREA ==================== -->
  <!-- Light viewport background -->
  <rect x="28" y="78" width="224" height="210" rx="16" fill="#FAFAFA" filter="url(#card-shadow)"/>
  <rect x="28" y="78" width="224" height="210" rx="16" fill="none" stroke="#F0F0F0" stroke-width="0.5"/>

  <!-- Orbit ring (dotted circle around shoe) -->
  <ellipse cx="140" cy="190" rx="80" ry="25" fill="none" stroke="#D1D5DB" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- 360 rotation icon top-right -->
  <g transform="translate(228, 90)" opacity="0.4">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#8E8E93" stroke-width="0.8"/>
    <path d="M-3 -5 A6.5 6.5 0 1 1 -5.5 1.5" fill="none" stroke="#8E8E93" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M-3 -5 L-5.5 -3.5 L-1 -3.5" fill="#8E8E93"/>
  </g>

  <!-- ==================== SNEAKER (3/4 VIEW) ==================== -->
  <g transform="translate(140, 185)">
    <!-- Ground shadow -->
    <ellipse cx="0" cy="48" rx="65" ry="10" fill="url(#shoe-shadow)"/>

    <!-- === SOLE === -->
    <!-- Outsole (dark tread) -->
    <path d="M-58 32 Q-62 40 -54 44 L52 44 Q62 40 58 32 Z" fill="#374151"/>
    <!-- Tread texture lines -->
    <line x1="-46" y1="40" x2="-38" y2="40" stroke="#4B5563" stroke-width="0.6"/>
    <line x1="-32" y1="40" x2="-24" y2="40" stroke="#4B5563" stroke-width="0.6"/>
    <line x1="-18" y1="40" x2="-10" y2="40" stroke="#4B5563" stroke-width="0.6"/>
    <line x1="-4" y1="40" x2="4" y2="40" stroke="#4B5563" stroke-width="0.6"/>
    <line x1="10" y1="40" x2="18" y2="40" stroke="#4B5563" stroke-width="0.6"/>
    <line x1="24" y1="40" x2="32" y2="40" stroke="#4B5563" stroke-width="0.6"/>
    <line x1="38" y1="40" x2="46" y2="40" stroke="#4B5563" stroke-width="0.6"/>

    <!-- Midsole (white cushion) -->
    <path d="M-56 28 Q-58 36 -54 36 L52 36 Q58 36 56 28 Z" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="0.5"/>
    <!-- Air unit detail in midsole -->
    <ellipse cx="-20" cy="32" rx="12" ry="2.5" fill="none" stroke="#E5E7EB" stroke-width="0.5"/>
    <ellipse cx="25" cy="32" rx="10" ry="2.5" fill="none" stroke="#E5E7EB" stroke-width="0.5"/>

    <!-- === UPPER BODY === -->
    <!-- Main shoe upper (white with volume) -->
    <path d="M-54 28 Q-58 -2 -24 -20 L32 -20 Q60 -4 56 28 Z" fill="url(#shoe-body)" stroke="#E5E7EB" stroke-width="0.3"/>

    <!-- Toe box (slightly different shade) -->
    <path d="M-54 28 Q-56 8 -44 0 Q-30 -8 -14 -2 L-14 28 Z" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="0.3"/>
    <!-- Toe cap stitching -->
    <path d="M-44 0 Q-30 -4 -14 2" fill="none" stroke="#D1D5DB" stroke-width="0.4" stroke-dasharray="2 1.5"/>

    <!-- iOS Blue swoosh/accent stripe -->
    <path d="M-40 20 Q-15 2 44 8" fill="none" stroke="#007AFF" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
    <!-- Swoosh highlight -->
    <path d="M-38 19 Q-14 3 42 9" fill="none" stroke="#3395FF" stroke-width="1" stroke-linecap="round" opacity="0.4"/>

    <!-- Heel counter -->
    <path d="M38 -18 Q50 -12 54 0 L56 28 L42 28 L40 -4 Q38 -14 36 -18" fill="#F0F1F3" stroke="#E5E7EB" stroke-width="0.3"/>
    <!-- Heel pull tab (blue accent) -->
    <rect x="44" y="-16" width="5" height="12" rx="2" fill="#007AFF"/>

    <!-- Collar / ankle opening -->
    <path d="M16 -20 Q32 -28 46 -22 Q56 -16 54 -4" fill="none" stroke="#D1D5DB" stroke-width="1"/>
    <!-- Inner collar padding -->
    <path d="M18 -18 Q30 -24 42 -20" fill="none" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>

    <!-- Tongue -->
    <path d="M4 -20 Q6 -36 16 -40 Q26 -36 28 -20" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="0.5"/>
    <!-- Tongue logo -->
    <rect x="11" y="-34" width="10" height="5" rx="1" fill="#007AFF" opacity="0.15"/>
    <text x="16" y="-30.5" font-family="sans-serif" font-size="3.5" font-weight="700" fill="#007AFF" text-anchor="middle" opacity="0.6">AIR</text>

    <!-- Lace holes -->
    <circle cx="6" cy="-12" r="1.5" fill="#9CA3AF" stroke="#6B7280" stroke-width="0.3"/>
    <circle cx="12" cy="-18" r="1.5" fill="#9CA3AF" stroke="#6B7280" stroke-width="0.3"/>
    <circle cx="22" cy="-18" r="1.5" fill="#9CA3AF" stroke="#6B7280" stroke-width="0.3"/>
    <circle cx="26" cy="-12" r="1.5" fill="#9CA3AF" stroke="#6B7280" stroke-width="0.3"/>

    <!-- Laces (crossing pattern) -->
    <line x1="7" y1="-12" x2="22" y2="-18" stroke="#E5E7EB" stroke-width="1" stroke-linecap="round"/>
    <line x1="12" y1="-18" x2="26" y2="-12" stroke="#E5E7EB" stroke-width="1" stroke-linecap="round"/>
    <line x1="9" y1="-15" x2="24" y2="-15" stroke="#E5E7EB" stroke-width="0.8" stroke-linecap="round"/>

    <!-- Panel stitching detail -->
    <path d="M-30 24 Q-20 10 0 6 Q20 4 40 12" fill="none" stroke="#E5E7EB" stroke-width="0.4" stroke-dasharray="1.5 1.5"/>
  </g>

  <!-- ==================== PRODUCT INFO ==================== -->
  <!-- Product name -->
  <text x="140" y="310" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="14" font-weight="700" fill="#1C1C1E" text-anchor="middle">Air Runner Pro</text>
  <!-- Price -->
  <text x="140" y="326" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="12" fill="#1C1C1E" text-anchor="middle">$189</text>

  <!-- ==================== COLOR SWATCHES ==================== -->
  <g transform="translate(140, 348)">
    <!-- White (selected with blue border) -->
    <circle cx="-27" cy="0" r="8" fill="#FFFFFF" stroke="#007AFF" stroke-width="2"/>
    <!-- Checkmark in selected -->
    <path d="M-30 0 L-28 2 L-24 -2" stroke="#007AFF" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Black -->
    <circle cx="-7" cy="0" r="8" fill="#1C1C1E" stroke="#E5E7EB" stroke-width="0.5"/>
    <!-- Red -->
    <circle cx="13" cy="0" r="8" fill="#DC2626" stroke="#E5E7EB" stroke-width="0.5"/>
    <!-- Green -->
    <circle cx="33" cy="0" r="8" fill="#16A34A" stroke="#E5E7EB" stroke-width="0.5"/>
  </g>

  <!-- ==================== VIEW IN AR BUTTON ==================== -->
  <g transform="translate(36, 370)">
    <rect width="208" height="36" rx="18" fill="url(#ar-btn)" filter="url(#btn-shadow)"/>
    <!-- AR cube icon -->
    <g transform="translate(72, 10)">
      <!-- Cube wireframe -->
      <path d="M0 4 L6 0.5 L12 4 L12 11 L6 14.5 L0 11 Z" fill="none" stroke="white" stroke-width="1" stroke-linejoin="round" opacity="0.9"/>
      <line x1="6" y1="7.5" x2="6" y2="14.5" stroke="white" stroke-width="0.8" opacity="0.7"/>
      <line x1="0" y1="4" x2="6" y2="7.5" stroke="white" stroke-width="0.8" opacity="0.7"/>
      <line x1="12" y1="4" x2="6" y2="7.5" stroke="white" stroke-width="0.8" opacity="0.7"/>
      <!-- AR corner brackets -->
      <path d="M-3 2 L-3 -2 L1 -2" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M11 -2 L15 -2 L15 2" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="104" y="23" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle" letter-spacing="0.3">View in AR</text>
  </g>

  <!-- ==================== TAB BAR ==================== -->
  <!-- Tab bar background -->
  <rect x="18" y="418" width="244" height="40" fill="#FBFBFB" opacity="0.95"/>
  <line x1="18" y1="418" x2="262" y2="418" stroke="#E5E5EA" stroke-width="0.5"/>

  <!-- Home icon (filled = active) -->
  <g transform="translate(60, 428)">
    <path d="M0 8 L0 12 L4 12 L4 8 L6 8 L6 12 L10 12 L10 8 L12 8 L6 2 L5 0 L0 8 Z" fill="#007AFF" transform="scale(0.8)"/>
    <text x="5" y="18" font-family="sans-serif" font-size="5" fill="#007AFF" text-anchor="middle">Home</text>
  </g>
  <!-- Search icon -->
  <g transform="translate(112, 428)">
    <circle cx="4" cy="4" r="3.5" fill="none" stroke="#8E8E93" stroke-width="1.2"/>
    <line x1="6.5" y1="6.5" x2="9" y2="9" stroke="#8E8E93" stroke-width="1.2" stroke-linecap="round"/>
    <text x="5" y="18" font-family="sans-serif" font-size="5" fill="#8E8E93" text-anchor="middle">Search</text>
  </g>
  <!-- Heart icon -->
  <g transform="translate(164, 428)">
    <path d="M5 3 C5 1 3 0 1.5 0 C0 0 -1 1.5 -1 3 C-1 6 5 9 5 9 C5 9 11 6 11 3 C11 1.5 10 0 8.5 0 C7 0 5 1 5 3 Z" fill="none" stroke="#8E8E93" stroke-width="1" transform="scale(0.75) translate(1,0)"/>
    <text x="5" y="18" font-family="sans-serif" font-size="5" fill="#8E8E93" text-anchor="middle">Saved</text>
  </g>
  <!-- Person icon -->
  <g transform="translate(216, 428)">
    <circle cx="4" cy="2.5" r="2.5" fill="none" stroke="#8E8E93" stroke-width="1"/>
    <path d="M-1 10 Q-1 6 4 6 Q9 6 9 10" fill="none" stroke="#8E8E93" stroke-width="1" stroke-linecap="round"/>
    <text x="4" y="18" font-family="sans-serif" font-size="5" fill="#8E8E93" text-anchor="middle">Profile</text>
  </g>

  <!-- ==================== HOME INDICATOR ==================== -->
  <rect x="120" y="456" width="40" height="4" rx="2" fill="#1C1C1E" opacity="0.2"/>

  <!-- ==================== VERSION BADGE (top-right corner of frame) ==================== -->
  <g transform="translate(232, 6)">
    <rect width="30" height="16" rx="8" fill="#6750A4"/>
    <text x="15" y="11.5" font-family="-apple-system, 'SF Pro Text', sans-serif" font-size="8" font-weight="700" fill="white" text-anchor="middle">v4.1</text>
  </g>

  <!-- ==================== FRAME OUTER HIGHLIGHT ==================== -->
  <rect x="10" y="10" width="260" height="460" rx="40" fill="none" stroke="white" stroke-width="0.3" opacity="0.15"/>
</svg>
