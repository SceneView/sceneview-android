<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 480" fill="none">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <!-- Road surface gradient (fog effect) -->
    <linearGradient id="road-fill" x1="140" y1="440" x2="140" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="60%" stop-color="#1E293B" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Speed arc gradient -->
    <linearGradient id="speed-arc" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>

    <!-- Cyan glow for detection -->
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#06B6D4" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Green glow for lane assist -->
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#22C55E" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Traffic light green glow -->
    <filter id="glow-light" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0.4"/>
    </radialGradient>

    <!-- Horizon glow -->
    <radialGradient id="horizon-glow" cx="50%" cy="0%" r="80%" fx="50%" fy="0%">
      <stop offset="0%" stop-color="#1E3A5F" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- === BACKGROUND === -->
  <rect width="280" height="480" fill="url(#bg)"/>

  <!-- Horizon atmospheric glow -->
  <ellipse cx="140" cy="195" rx="180" ry="60" fill="url(#horizon-glow)"/>

  <!-- Faint horizon line -->
  <line x1="0" y1="200" x2="280" y2="200" stroke="#334155" stroke-width="0.5" opacity="0.4"/>

  <!-- === 3D ROAD === -->
  <!-- Road surface trapezoid: wide at bottom, narrow at vanishing point -->
  <polygon points="0,480 280,480 170,200 110,200" fill="url(#road-fill)"/>

  <!-- Asphalt texture lines (subtle horizontal marks) -->
  <line x1="20" y1="460" x2="260" y2="460" stroke="#334155" stroke-width="0.3" opacity="0.3"/>
  <line x1="30" y1="440" x2="250" y2="440" stroke="#334155" stroke-width="0.3" opacity="0.25"/>
  <line x1="40" y1="420" x2="240" y2="420" stroke="#334155" stroke-width="0.3" opacity="0.2"/>
  <line x1="48" y1="400" x2="232" y2="400" stroke="#334155" stroke-width="0.3" opacity="0.18"/>
  <line x1="55" y1="380" x2="225" y2="380" stroke="#334155" stroke-width="0.3" opacity="0.15"/>
  <line x1="62" y1="360" x2="218" y2="360" stroke="#334155" stroke-width="0.3" opacity="0.12"/>
  <line x1="68" y1="340" x2="212" y2="340" stroke="#334155" stroke-width="0.3" opacity="0.1"/>
  <line x1="74" y1="320" x2="206" y2="320" stroke="#334155" stroke-width="0.3" opacity="0.08"/>
  <line x1="80" y1="300" x2="200" y2="300" stroke="#334155" stroke-width="0.3" opacity="0.06"/>

  <!-- Road edges (solid white) -->
  <line x1="0" y1="480" x2="110" y2="200" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <line x1="280" y1="480" x2="170" y2="200" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>

  <!-- Center line (solid amber) -->
  <line x1="140" y1="480" x2="140" y2="200" stroke="#F59E0B" stroke-width="1.5" opacity="0.7"/>

  <!-- Left lane dashes (converging perspective) -->
  <!-- Bottom dashes (wider spacing) -->
  <line x1="70" y1="475" x2="77" y2="460" stroke="#FFFFFF" stroke-width="1.2" opacity="0.6"/>
  <line x1="82" y1="448" x2="87" y2="435" stroke="#FFFFFF" stroke-width="1.1" opacity="0.55"/>
  <line x1="91" y1="423" x2="95" y2="413" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <line x1="98" y1="403" x2="101" y2="395" stroke="#FFFFFF" stroke-width="0.9" opacity="0.45"/>
  <line x1="103" y1="387" x2="105" y2="380" stroke="#FFFFFF" stroke-width="0.8" opacity="0.4"/>
  <line x1="107" y1="373" x2="108.5" y2="367" stroke="#FFFFFF" stroke-width="0.7" opacity="0.35"/>
  <line x1="110" y1="361" x2="111" y2="356" stroke="#FFFFFF" stroke-width="0.6" opacity="0.3"/>
  <line x1="112.5" y1="350" x2="113.5" y2="346" stroke="#FFFFFF" stroke-width="0.5" opacity="0.25"/>
  <line x1="114.5" y1="340" x2="115.3" y2="337" stroke="#FFFFFF" stroke-width="0.4" opacity="0.2"/>

  <!-- Right lane dashes (converging perspective) -->
  <line x1="210" y1="475" x2="203" y2="460" stroke="#FFFFFF" stroke-width="1.2" opacity="0.6"/>
  <line x1="198" y1="448" x2="193" y2="435" stroke="#FFFFFF" stroke-width="1.1" opacity="0.55"/>
  <line x1="189" y1="423" x2="185" y2="413" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <line x1="182" y1="403" x2="179" y2="395" stroke="#FFFFFF" stroke-width="0.9" opacity="0.45"/>
  <line x1="177" y1="387" x2="175" y2="380" stroke="#FFFFFF" stroke-width="0.8" opacity="0.4"/>
  <line x1="173" y1="373" x2="171.5" y2="367" stroke="#FFFFFF" stroke-width="0.7" opacity="0.35"/>
  <line x1="170" y1="361" x2="169" y2="356" stroke="#FFFFFF" stroke-width="0.6" opacity="0.3"/>
  <line x1="167.5" y1="350" x2="166.5" y2="346" stroke="#FFFFFF" stroke-width="0.5" opacity="0.25"/>
  <line x1="165.5" y1="340" x2="164.7" y2="337" stroke="#FFFFFF" stroke-width="0.4" opacity="0.2"/>

  <!-- === LANE ASSIST (green lane boundaries) === -->
  <g filter="url(#glow-green)">
    <line x1="70" y1="478" x2="118" y2="260" stroke="#22C55E" stroke-width="1.5" opacity="0.4"/>
    <line x1="210" y1="478" x2="162" y2="260" stroke="#22C55E" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- === DETECTED VEHICLES === -->

  <!-- Far car (y=220, smallest) -->
  <g filter="url(#glow-cyan)" opacity="0.5">
    <rect x="134" y="218" width="12" height="6" rx="2" fill="none" stroke="#06B6D4" stroke-width="0.8"/>
    <!-- Bounding box -->
    <rect x="130" y="214" width="20" height="14" rx="1" fill="none" stroke="#06B6D4" stroke-width="0.5" stroke-dasharray="2,1.5"/>
  </g>
  <text x="140" y="212" font-family="system-ui,sans-serif" font-size="5" fill="#06B6D4" text-anchor="middle" opacity="0.6">120m</text>

  <!-- Medium car (y=260) -->
  <g filter="url(#glow-cyan)" opacity="0.7">
    <rect x="127.5" y="255" width="25" height="12" rx="3" fill="none" stroke="#06B6D4" stroke-width="1.2"/>
    <!-- Headlights -->
    <rect x="130" y="264" width="3" height="1.5" rx="0.5" fill="#F59E0B" opacity="0.6"/>
    <rect x="147" y="264" width="3" height="1.5" rx="0.5" fill="#F59E0B" opacity="0.6"/>
    <!-- Bounding box -->
    <rect x="122" y="249" width="36" height="24" rx="1" fill="none" stroke="#06B6D4" stroke-width="0.7" stroke-dasharray="3,2"/>
  </g>
  <text x="140" y="247" font-family="system-ui,sans-serif" font-size="6.5" fill="#06B6D4" text-anchor="middle" opacity="0.8">68m</text>

  <!-- Closest car (y=320, largest) -->
  <g filter="url(#glow-cyan)">
    <rect x="120" y="310" width="40" height="20" rx="5" fill="none" stroke="#06B6D4" stroke-width="1.5"/>
    <!-- Roof line -->
    <line x1="127" y1="314" x2="153" y2="314" stroke="#06B6D4" stroke-width="0.5" opacity="0.5"/>
    <!-- Taillights -->
    <rect x="122" y="326" width="5" height="2" rx="1" fill="#EF4444" opacity="0.7"/>
    <rect x="153" y="326" width="5" height="2" rx="1" fill="#EF4444" opacity="0.7"/>
    <!-- Bounding box -->
    <rect x="113" y="303" width="54" height="34" rx="2" fill="none" stroke="#06B6D4" stroke-width="0.8" stroke-dasharray="4,3"/>
  </g>
  <text x="140" y="300" font-family="system-ui,sans-serif" font-size="8" fill="#06B6D4" text-anchor="middle" font-weight="600">32m</text>

  <!-- === SPEED ARC (left side) === -->
  <g transform="translate(60, 400)">
    <!-- Arc background -->
    <path d="M -35,-30 A 50,50 0 0,1 35,-30" fill="none" stroke="#1E293B" stroke-width="4" stroke-linecap="round"/>
    <!-- Speed arc (colored portion — ~75% filled for 87 km/h) -->
    <path d="M -35,-30 A 50,50 0 0,1 28,-38" fill="none" stroke="url(#speed-arc)" stroke-width="4" stroke-linecap="round"/>
    <!-- Current speed indicator dot -->
    <circle cx="28" cy="-38" r="3" fill="#F59E0B"/>
    <circle cx="28" cy="-38" r="5" fill="#F59E0B" opacity="0.2"/>
    <!-- Speed number -->
    <text x="0" y="-8" font-family="system-ui,sans-serif" font-size="28" fill="#FFFFFF" text-anchor="middle" font-weight="800">87</text>
    <!-- Unit -->
    <text x="0" y="5" font-family="system-ui,sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">km/h</text>
  </g>

  <!-- === LANE ASSIST CHIP (right side, near bottom) === -->
  <g transform="translate(170, 390)">
    <rect x="0" y="0" width="80" height="22" rx="11" fill="rgba(34,197,94,0.1)" stroke="#22C55E" stroke-width="0.8" opacity="0.8"/>
    <!-- Steering wheel icon (simplified) -->
    <circle cx="14" cy="11" r="5" fill="none" stroke="#22C55E" stroke-width="0.8"/>
    <circle cx="14" cy="11" r="1.5" fill="#22C55E"/>
    <line x1="14" y1="7" x2="14" y2="6" stroke="#22C55E" stroke-width="0.6"/>
    <text x="25" y="15" font-family="system-ui,sans-serif" font-size="7" fill="#22C55E" font-weight="600">Lane Assist</text>
  </g>

  <!-- === TOP HUD BAR === -->
  <rect x="0" y="0" width="280" height="30" fill="#0F172A" opacity="0.7"/>
  <!-- Green status dot + text -->
  <circle cx="14" cy="15" r="3" fill="#22C55E" filter="url(#glow-light)"/>
  <text x="22" y="18" font-family="system-ui,sans-serif" font-size="10" fill="#22C55E" font-weight="600">Autopilot Active</text>
  <!-- Object count -->
  <text x="266" y="18" font-family="system-ui,sans-serif" font-size="9" fill="#94A3B8" text-anchor="end">3 objects detected</text>

  <!-- === TRAFFIC LIGHT (top right area) === -->
  <g transform="translate(258, 38)">
    <rect x="0" y="0" width="8" height="18" rx="2" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
    <circle cx="4" cy="4" r="2" fill="#EF4444" opacity="0.25"/>
    <circle cx="4" cy="9" r="2" fill="#F59E0B" opacity="0.25"/>
    <circle cx="4" cy="14" r="2" fill="#22C55E" filter="url(#glow-light)"/>
  </g>

  <!-- === BOTTOM INFO BAR === -->
  <rect x="0" y="458" width="280" height="22" fill="#0F172A" opacity="0.5"/>
  <text x="14" y="473" font-family="system-ui,sans-serif" font-size="8" fill="#94A3B8">Next turn: 1.2km</text>
  <text x="140" y="473" font-family="system-ui,sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">|</text>
  <text x="266" y="473" font-family="system-ui,sans-serif" font-size="8" fill="#94A3B8" text-anchor="end">ETA: 12min</text>

  <!-- Vignette overlay -->
  <rect width="280" height="480" fill="url(#vignette)"/>
</svg>
