<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 480" fill="none">
  <defs>
    <!-- Bloom filters - triple layer for convincing glow -->
    <filter id="bloom-inner" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="over"/>
    </filter>
    <filter id="bloom-outer" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <filter id="bloom-mega" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="bloom-small" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="bloom-particle" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="reflection-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <!-- Vignette gradient -->
    <radialGradient id="vignette" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#0A0A1A" stop-opacity="0"/>
      <stop offset="65%" stop-color="#0A0A1A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0A0A1A" stop-opacity="0.7"/>
    </radialGradient>

    <!-- Magenta sphere gradient -->
    <radialGradient id="sphere-magenta" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#F9A8D4"/>
      <stop offset="40%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#9D174D"/>
    </radialGradient>

    <!-- Floor fade -->
    <linearGradient id="floor-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A1A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A0A1A" stop-opacity="0.85"/>
    </linearGradient>

    <!-- Torus body gradient -->
    <linearGradient id="torus-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>

    <!-- Clip for scene area -->
    <clipPath id="scene-clip">
      <rect x="0" y="0" width="280" height="480" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="280" height="480" fill="#0A0A1A"/>

  <!-- Subtle ambient light from above -->
  <ellipse cx="140" cy="100" rx="160" ry="80" fill="#06B6D4" opacity="0.02"/>

  <!-- === GROUND PLANE - Perspective grid === -->
  <g opacity="0.25">
    <!-- Horizontal lines (receding) -->
    <line x1="20" y1="340" x2="260" y2="340" stroke="#1E293B" stroke-width="0.3"/>
    <line x1="30" y1="355" x2="250" y2="355" stroke="#1E293B" stroke-width="0.35"/>
    <line x1="10" y1="370" x2="270" y2="370" stroke="#1E293B" stroke-width="0.4"/>
    <line x1="0" y1="385" x2="280" y2="385" stroke="#1E293B" stroke-width="0.45"/>
    <line x1="0" y1="400" x2="280" y2="400" stroke="#1E293B" stroke-width="0.5"/>
    <line x1="0" y1="418" x2="280" y2="418" stroke="#1E293B" stroke-width="0.5"/>
    <!-- Converging vertical lines -->
    <line x1="140" y1="320" x2="0" y2="440" stroke="#1E293B" stroke-width="0.3"/>
    <line x1="140" y1="320" x2="40" y2="440" stroke="#1E293B" stroke-width="0.3"/>
    <line x1="140" y1="320" x2="80" y2="440" stroke="#1E293B" stroke-width="0.3"/>
    <line x1="140" y1="320" x2="120" y2="440" stroke="#1E293B" stroke-width="0.3"/>
    <line x1="140" y1="320" x2="160" y2="440" stroke="#1E293B" stroke-width="0.3"/>
    <line x1="140" y1="320" x2="200" y2="440" stroke="#1E293B" stroke-width="0.3"/>
    <line x1="140" y1="320" x2="240" y2="440" stroke="#1E293B" stroke-width="0.3"/>
    <line x1="140" y1="320" x2="280" y2="440" stroke="#1E293B" stroke-width="0.3"/>
  </g>

  <!-- Grid highlight on floor beneath torus -->
  <ellipse cx="140" cy="370" rx="70" ry="12" fill="#06B6D4" opacity="0.04"/>

  <!-- === TORUS / RING - Triple-layer bloom === -->

  <!-- Layer 3: Mega outer bloom (widest, faintest) -->
  <g filter="url(#bloom-mega)">
    <ellipse cx="140" cy="210" rx="72" ry="28" fill="none" stroke="#06B6D4" stroke-width="18" opacity="0.12"/>
  </g>

  <!-- Layer 2: Outer bloom -->
  <g filter="url(#bloom-outer)">
    <ellipse cx="140" cy="210" rx="72" ry="28" fill="none" stroke="#06B6D4" stroke-width="10" opacity="0.25"/>
  </g>

  <!-- Layer 1: Inner glow -->
  <g filter="url(#bloom-inner)">
    <ellipse cx="140" cy="210" rx="72" ry="28" fill="none" stroke="#06B6D4" stroke-width="5" opacity="0.6"/>
  </g>

  <!-- Core torus shape - front arc (visible part) -->
  <ellipse cx="140" cy="210" rx="72" ry="28" fill="none" stroke="url(#torus-grad)" stroke-width="3"/>

  <!-- Torus 3D thickness - inner ellipse (hole) -->
  <ellipse cx="140" cy="210" rx="52" ry="16" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.3"/>

  <!-- Torus highlight streak -->
  <ellipse cx="120" cy="200" rx="25" ry="5" fill="none" stroke="white" stroke-width="0.8" opacity="0.25" transform="rotate(-10, 120, 200)"/>

  <!-- === MAGENTA SPHERE with bloom === -->

  <!-- Sphere mega bloom -->
  <g filter="url(#bloom-mega)">
    <circle cx="195" cy="170" r="22" fill="#EC4899" opacity="0.1"/>
  </g>

  <!-- Sphere outer bloom -->
  <g filter="url(#bloom-outer)">
    <circle cx="195" cy="170" r="18" fill="#EC4899" opacity="0.2"/>
  </g>

  <!-- Sphere inner glow -->
  <g filter="url(#bloom-inner)">
    <circle cx="195" cy="170" r="14" fill="#EC4899" opacity="0.4"/>
  </g>

  <!-- Sphere body -->
  <circle cx="195" cy="170" r="14" fill="url(#sphere-magenta)"/>

  <!-- Sphere specular highlight -->
  <circle cx="190" cy="164" r="4" fill="white" opacity="0.35"/>
  <circle cx="192" cy="167" r="1.5" fill="white" opacity="0.6"/>

  <!-- === PARTICLE DOTS with glow === -->

  <!-- Particle 1 - purple -->
  <g filter="url(#bloom-particle)">
    <circle cx="78" cy="175" r="2.5" fill="#A78BFA" opacity="0.8"/>
  </g>
  <circle cx="78" cy="175" r="1.5" fill="#A78BFA"/>
  <circle cx="78" cy="175" r="0.6" fill="white" opacity="0.7"/>

  <!-- Particle 2 - cyan -->
  <g filter="url(#bloom-particle)">
    <circle cx="210" cy="240" r="2" fill="#22D3EE" opacity="0.7"/>
  </g>
  <circle cx="210" cy="240" r="1.2" fill="#22D3EE"/>
  <circle cx="210" cy="240" r="0.5" fill="white" opacity="0.6"/>

  <!-- Particle 3 - pink -->
  <g filter="url(#bloom-particle)">
    <circle cx="100" cy="260" r="1.8" fill="#F472B6" opacity="0.7"/>
  </g>
  <circle cx="100" cy="260" r="1" fill="#F472B6"/>
  <circle cx="100" cy="260" r="0.4" fill="white" opacity="0.5"/>

  <!-- Particle 4 - small cyan far -->
  <g filter="url(#bloom-particle)">
    <circle cx="60" cy="140" r="1.2" fill="#22D3EE" opacity="0.5"/>
  </g>
  <circle cx="60" cy="140" r="0.7" fill="#22D3EE"/>

  <!-- Particle 5 - tiny white -->
  <circle cx="230" cy="150" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="170" cy="135" r="0.6" fill="white" opacity="0.2"/>

  <!-- === REFLECTIONS on ground plane === -->
  <g filter="url(#reflection-blur)" opacity="0.12" transform="translate(0, 320) scale(1, -0.35) translate(0, -210)">
    <!-- Torus reflection -->
    <ellipse cx="140" cy="210" rx="72" ry="28" fill="none" stroke="#06B6D4" stroke-width="4"/>
  </g>

  <g filter="url(#reflection-blur)" opacity="0.08" transform="translate(0, 310) scale(1, -0.3) translate(0, -170)">
    <!-- Sphere reflection -->
    <circle cx="195" cy="170" r="14" fill="#EC4899"/>
  </g>

  <!-- Floor gradient fade -->
  <rect x="0" y="330" width="280" height="150" fill="url(#floor-fade)"/>

  <!-- === LENS FLARE HEXAGONS === -->
  <!-- Hexagon 1 near torus -->
  <polygon points="115,195 118,193 121,195 121,199 118,201 115,199" fill="#06B6D4" opacity="0.08"/>
  <!-- Hexagon 2 near sphere -->
  <polygon points="205,160 208,158 211,160 211,164 208,166 205,164" fill="#EC4899" opacity="0.07"/>
  <!-- Hexagon 3 scattered -->
  <polygon points="160,185 162,183.5 164,185 164,188 162,189.5 160,188" fill="#06B6D4" opacity="0.06"/>

  <!-- Light streak across torus -->
  <line x1="85" y1="208" x2="195" y2="212" stroke="white" stroke-width="0.3" opacity="0.08"/>

  <!-- === VIGNETTE OVERLAY === -->
  <rect width="280" height="480" fill="url(#vignette)"/>

  <!-- === UI OVERLAYS === -->

  <!-- Top-left label -->
  <text x="16" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white" opacity="0.6" font-weight="500">Post-Processing</text>

  <!-- SSAO label near shadow area -->
  <text x="85" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#64748B" opacity="0.5" font-weight="500" letter-spacing="1">SSAO</text>

  <!-- Bottom effect toggle pills -->
  <g transform="translate(16, 438)">
    <!-- Bloom pill -->
    <rect x="0" y="0" width="52" height="20" rx="10" fill="#1E293B"/>
    <text x="26" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="500" opacity="0.9">&#x2713; Bloom</text>

    <!-- Vignette pill -->
    <rect x="58" y="0" width="62" height="20" rx="10" fill="#1E293B"/>
    <text x="89" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="500" opacity="0.9">&#x2713; Vignette</text>

    <!-- ACES pill -->
    <rect x="126" y="0" width="50" height="20" rx="10" fill="#1E293B"/>
    <text x="151" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="500" opacity="0.9">&#x2713; ACES</text>

    <!-- FXAA pill -->
    <rect x="182" y="0" width="50" height="20" rx="10" fill="#1E293B"/>
    <text x="207" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="500" opacity="0.9">&#x2713; FXAA</text>
  </g>
</svg>