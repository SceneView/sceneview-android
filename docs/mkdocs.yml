site_name: SceneView
site_description: 3D and AR for Jetpack Compose, powered by Google Filament and ARCore
site_url: https://sceneview.github.io/
repo_url: https://github.com/SceneView/sceneview-android
repo_name: SceneView/sceneview-android
edit_uri: edit/main/docs/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

nav:
  - Home: index.md
  - Showcase: showcase.md
  - Codelabs:
    - codelabs/index.md
    - 3D with Compose: codelabs/codelab-3d-compose.md
    - AR with Compose: codelabs/codelab-ar-compose.md
    - "Guide: Physics": codelabs/guide-physics.md
    - "Guide: Dynamic sky & fog": codelabs/guide-dynamic-sky.md
    - "Guide: Reflection probes": codelabs/guide-reflection-probes.md
    - "Guide: Lines & text": codelabs/guide-lines-text.md
  - Migration guide: migration.md
  - Changelog: changelog.md
  - API reference:
    - API (3D — sceneview): https://sceneview.github.io/api/sceneview-android/sceneview/
    - API (AR — arsceneview): https://sceneview.github.io/api/sceneview-android/arsceneview/

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: kotlin
          class: language-kotlin
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SceneView/sceneview-android
    - icon: fontawesome/brands/discord
      link: https://discord.gg/UbNDDBTNqb
  # analytics:
  #   provider: google
  #   property: G-XXXXXXXXXX  # TODO: replace with real property ID

extra_css:
  - stylesheets/extra.css
