site_name: SceneView
site_description: 3D & AR for Kotlin — Compose-native scenes on Android, XR, and beyond. Powered by Google Filament.
site_url: https://sceneview.github.io/
repo_url: https://github.com/SceneView/sceneview-android
repo_name: SceneView/sceneview-android
edit_uri: edit/main/docs/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Google Sans
    code: JetBrains Mono
  icon:
    logo: material/cube-outline
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

nav:
  - Home: index.md
  - Try the Demo: try.md
  - Get Started:
    - Quickstart: quickstart.md
    - API Cheatsheet: cheatsheet.md
    - Recipes: recipes.md
    - FAQ: faq.md
    - Troubleshooting: troubleshooting.md
  - Guides:
    - Architecture: architecture.md
    - Integrations: integrations.md
    - Performance: performance.md
    - Testing: testing.md
  - Features:
    - Why SceneView: showcase.md
    - Use Cases: use-cases.md
    - AI-Assisted Development: ai-development.md
    - vs. Alternatives: comparison.md
    - v4.0 Preview: v4-preview.md
  - Codelabs:
    - codelabs/index.md
    - 3D with Compose: codelabs/codelab-3d-compose.md
    - AR with Compose: codelabs/codelab-ar-compose.md
    - Dynamic Sky: codelabs/guide-dynamic-sky.md
    - Lines & Text: codelabs/guide-lines-text.md
    - Physics: codelabs/guide-physics.md
    - Reflection Probes: codelabs/guide-reflection-probes.md
  - API:
    - API (3D — sceneview): https://sceneview.github.io/api/sceneview-android/sceneview/
    - API (AR — arsceneview): https://sceneview.github.io/api/sceneview-android/arsceneview/
  - Samples: samples.md
  - Contribute: contributing.md
  - Changelog: changelog.md
  - Migration: migration.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: kotlin
          class: language-kotlin
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SceneView/sceneview-android
    - icon: fontawesome/brands/discord
      link: https://discord.gg/UbNDDBTNqb
  analytics:
    provider: google
    property: G-XXXXXXXXXX

extra_css:
  - stylesheets/extra.css
  - stylesheets/m3-expressive.css
  - stylesheets/m3-enhancements.css
  - stylesheets/m3-flagship.css

extra_javascript:
  - assets/javascripts/m3-interactions.js
