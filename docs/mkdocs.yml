site_name: SceneView
site_description: Compose-native 3D & AR library powered by Google Filament and ARCore
site_url: https://sceneview.github.io/
repo_url: https://github.com/SceneView/sceneview
repo_name: SceneView/sceneview
edit_uri: edit/main/docs/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Google Sans
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

nav:
  - Home: index.md
  - Codelabs:
    - codelabs/index.md
    - 3D with Compose: codelabs/codelab-3d-compose.md
    - AR with Compose: codelabs/codelab-ar-compose.md
  - Migration guide: migration.md
  - Changelog: changelog.md
  - API reference:
    - API (3D — sceneview): https://sceneview.github.io/api/sceneview/sceneview/
    - API (AR — arsceneview): https://sceneview.github.io/api/sceneview/arsceneview/

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: kotlin
          class: language-kotlin
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SceneView/sceneview
    - icon: fontawesome/brands/discord
      link: https://discord.gg/UbNDDBTNqb
  analytics:
    provider: google
    property: G-XXXXXXXXXX

extra_css:
  - stylesheets/extra.css
