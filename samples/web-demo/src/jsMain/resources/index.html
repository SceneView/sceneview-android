<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SceneView Web Demo — 3D &amp; AR Viewer</title>
    <meta name="description" content="SceneView Web Demo: 3D model viewer with Sketchfab search, geometry DSL showcase, and WebXR AR/VR — powered by Filament.js (WASM).">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sv-blue: #005bc1;
            --sv-blue-light: #a4c1ff;
            --sv-purple: #6446cd;
            --sv-purple-light: #d2a8ff;
            --sv-green: #00b894;
            --sv-green-light: #55efc4;
            --sv-dark: #0D1117;
            --sv-dark-surface: #161B22;
            --sv-dark-card: #1c2333;
            --sv-dark-overlay: rgba(13, 17, 23, 0.88);
            --sv-text: #f3f4f6;
            --sv-text-dim: #9ca3af;
            --sv-text-faint: #6b7280;
            --sv-border: rgba(255,255,255,0.08);
            --sv-border-hover: rgba(255,255,255,0.18);
            --sv-radius-sm: 8px;
            --sv-radius: 12px;
            --sv-radius-lg: 16px;
            --sv-radius-pill: 28px;
            --sv-font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --sv-glass: rgba(22, 27, 34, 0.75);
            --sv-glass-border: rgba(255,255,255,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: var(--sv-dark);
            font-family: var(--sv-font);
            color: var(--sv-text);
        }

        /* ---- Canvas ---- */
        #scene-canvas {
            width: 100%; height: 100%; display: block;
            position: absolute; top: 0; left: 0; z-index: 0;
        }

        /* ---- Top bar ---- */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 30;
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 20px; gap: 12px;
            background: linear-gradient(180deg, var(--sv-dark-overlay) 60%, transparent 100%);
            pointer-events: none;
        }
        .top-bar > * { pointer-events: auto; }

        .logo {
            display: flex; align-items: center; gap: 10px;
            text-decoration: none; color: var(--sv-text);
            flex-shrink: 0;
        }
        .logo-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--sv-blue), var(--sv-purple));
            border-radius: var(--sv-radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 16px; color: white;
        }
        .logo-text { font-weight: 700; font-size: 18px; letter-spacing: -0.02em; }
        .logo-version {
            font-size: 11px; font-weight: 500;
            color: var(--sv-blue-light);
            background: rgba(0, 91, 193, 0.15);
            padding: 2px 8px; border-radius: 6px;
        }

        .top-right {
            display: flex; align-items: center; gap: 8px;
            flex-shrink: 0;
        }
        .icon-btn {
            width: 36px; height: 36px;
            border: 1px solid var(--sv-border);
            border-radius: 10px;
            background: rgba(255,255,255,0.04);
            color: var(--sv-text-dim);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
            font-size: 16px;
        }
        .icon-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--sv-border-hover);
            color: var(--sv-text);
        }

        /* ---- Tab bar ---- */
        .tab-bar {
            position: fixed; top: 56px; left: 50%; transform: translateX(-50%);
            z-index: 25;
            display: flex; gap: 4px;
            background: var(--sv-glass);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--sv-glass-border);
            border-radius: var(--sv-radius-pill);
            padding: 4px;
        }
        .tab-btn {
            padding: 8px 18px;
            border: none; border-radius: 24px;
            background: transparent;
            color: var(--sv-text-dim);
            font-size: 13px; font-weight: 600; font-family: var(--sv-font);
            cursor: pointer; white-space: nowrap;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: var(--sv-text); background: rgba(255,255,255,0.06); }
        .tab-btn.active {
            background: var(--sv-blue);
            color: white;
        }

        /* ---- Panels ---- */
        .panel {
            position: fixed; z-index: 20;
            display: none;
        }
        .panel.active { display: flex; }

        /* Search panel (Model Viewer tab) */
        .search-panel {
            left: 20px; top: 110px; bottom: 80px;
            width: 320px;
            flex-direction: column; gap: 10px;
        }
        .search-box {
            display: flex; gap: 0;
            border-radius: var(--sv-radius);
            overflow: hidden;
            border: 1px solid var(--sv-border);
            background: var(--sv-glass);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        }
        .search-input {
            flex: 1;
            padding: 12px 14px;
            border: none; outline: none;
            background: transparent;
            color: var(--sv-text);
            font-size: 14px; font-family: var(--sv-font);
        }
        .search-input::placeholder { color: var(--sv-text-faint); }
        .search-btn {
            padding: 12px 16px;
            border: none;
            background: var(--sv-blue);
            color: white;
            font-size: 14px; font-weight: 600; font-family: var(--sv-font);
            cursor: pointer;
            transition: background 0.15s;
        }
        .search-btn:hover { background: #0050aa; }

        .search-results {
            flex: 1;
            overflow-y: auto;
            display: flex; flex-direction: column; gap: 8px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }
        .search-results::-webkit-scrollbar { width: 4px; }
        .search-results::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .result-card {
            display: flex; gap: 10px; align-items: center;
            padding: 10px;
            background: var(--sv-glass);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--sv-border);
            border-radius: var(--sv-radius);
            cursor: pointer;
            transition: all 0.2s;
        }
        .result-card:hover {
            border-color: var(--sv-blue);
            background: rgba(0, 91, 193, 0.12);
        }
        .result-card.active {
            border-color: var(--sv-blue);
            background: rgba(0, 91, 193, 0.2);
        }
        .result-thumb {
            width: 56px; height: 56px;
            border-radius: var(--sv-radius-sm);
            object-fit: cover;
            background: var(--sv-dark-surface);
            flex-shrink: 0;
        }
        .result-info { flex: 1; min-width: 0; }
        .result-name {
            font-size: 13px; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .result-author {
            font-size: 11px; color: var(--sv-text-faint);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-top: 2px;
        }
        .result-views {
            font-size: 10px; color: var(--sv-text-faint);
            margin-top: 2px;
        }

        .search-status {
            text-align: center;
            padding: 20px;
            color: var(--sv-text-faint);
            font-size: 13px;
        }
        .search-status.error { color: #f87171; }

        /* Geometry panel */
        .geometry-panel {
            left: 20px; top: 110px; bottom: 80px;
            width: 320px;
            flex-direction: column; gap: 10px;
            overflow-y: auto;
        }
        .geo-card {
            background: var(--sv-glass);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--sv-border);
            border-radius: var(--sv-radius);
            padding: 14px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .geo-card-header {
            display: flex; align-items: center; justify-content: space-between;
        }
        .geo-card-title {
            font-size: 14px; font-weight: 600;
        }
        .geo-add-btn {
            padding: 6px 14px;
            border: none; border-radius: 20px;
            background: var(--sv-blue);
            color: white;
            font-size: 12px; font-weight: 600; font-family: var(--sv-font);
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }
        .geo-add-btn:hover { background: #0050aa; }
        .geo-add-btn:active { transform: scale(0.95); }

        .geo-controls {
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
        }
        .geo-controls label {
            font-size: 12px; color: var(--sv-text-dim);
            display: flex; align-items: center; gap: 6px;
        }
        .color-picker {
            width: 28px; height: 28px;
            border: 2px solid var(--sv-border);
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }
        .color-picker::-webkit-color-swatch-wrapper { padding: 0; }
        .color-picker::-webkit-color-swatch { border: none; border-radius: 4px; }
        .color-picker::-moz-color-swatch { border: none; border-radius: 4px; }

        .geo-slider {
            width: 80px; height: 4px;
            -webkit-appearance: none; appearance: none;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            outline: none;
        }
        .geo-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 14px; height: 14px;
            background: var(--sv-blue);
            border-radius: 50%;
            cursor: pointer;
        }
        .geo-slider::-moz-range-thumb {
            width: 14px; height: 14px;
            background: var(--sv-blue);
            border: none; border-radius: 50%;
            cursor: pointer;
        }

        .geo-clear-btn {
            padding: 8px 16px;
            border: 1px solid var(--sv-border);
            border-radius: 20px;
            background: transparent;
            color: var(--sv-text-dim);
            font-size: 12px; font-weight: 500; font-family: var(--sv-font);
            cursor: pointer;
            transition: all 0.15s;
            align-self: center;
        }
        .geo-clear-btn:hover {
            border-color: #f87171;
            color: #f87171;
            background: rgba(248, 113, 113, 0.08);
        }

        /* ---- Controls info ---- */
        .controls-info {
            position: fixed; bottom: 20px; left: 20px; z-index: 15;
            display: flex; flex-direction: column; gap: 4px;
            font-size: 12px; color: var(--sv-text-faint);
            pointer-events: none;
        }
        .controls-info .row { display: flex; align-items: center; gap: 6px; }
        .controls-info kbd {
            display: inline-block; padding: 1px 6px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 4px;
            font-family: var(--sv-font); font-size: 11px;
            background: rgba(255,255,255,0.04);
            color: var(--sv-text-faint);
        }

        /* ---- Bottom bar ---- */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 20px;
            background: linear-gradient(0deg, var(--sv-dark-overlay) 60%, transparent 100%);
            pointer-events: none;
        }
        .bottom-bar > * { pointer-events: auto; }

        .powered-by { font-size: 12px; color: var(--sv-text-faint); }
        .powered-by a {
            color: var(--sv-blue-light); text-decoration: none; font-weight: 500;
        }
        .powered-by a:hover { text-decoration: underline; }

        .xr-buttons { display: flex; gap: 8px; }
        .xr-btn {
            display: none;
            padding: 10px 20px;
            border: none; border-radius: var(--sv-radius-pill);
            font-family: var(--sv-font);
            font-size: 13px; font-weight: 600;
            cursor: pointer; letter-spacing: 0.01em;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .xr-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        .xr-btn:active { transform: translateY(0); }
        #enter-ar {
            background: linear-gradient(135deg, #6446cd, #d2a8ff);
            color: white;
        }
        #enter-vr {
            background: linear-gradient(135deg, #00b894, #55efc4);
            color: var(--sv-dark);
        }

        /* ---- Loading overlay ---- */
        .loading-overlay {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: var(--sv-dark);
            transition: opacity 0.5s ease;
        }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; }

        .loading-spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(0, 91, 193, 0.2);
            border-top-color: var(--sv-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            margin-top: 16px; font-size: 14px; font-weight: 500;
            color: var(--sv-text-dim);
        }
        .loading-model-name {
            margin-top: 6px; font-size: 12px;
            color: var(--sv-text-faint);
        }
        .loading-bar-track {
            width: 200px; height: 3px; margin-top: 20px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px; overflow: hidden;
        }
        .loading-bar-fill {
            width: 0%; height: 100%;
            background: var(--sv-blue);
            border-radius: 2px;
            animation: loading-progress 2s ease-in-out infinite;
        }
        @keyframes loading-progress {
            0% { width: 0%; } 50% { width: 60%; } 100% { width: 100%; }
        }

        /* Inline loading chip */
        .loading-chip {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 50; display: none;
            padding: 10px 20px;
            background: var(--sv-glass);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--sv-glass-border);
            border-radius: var(--sv-radius-pill);
            font-size: 13px; font-weight: 500;
            color: var(--sv-text-dim);
            gap: 10px; align-items: center;
        }
        .loading-chip.visible { display: flex; }
        .loading-chip .mini-spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(0, 91, 193, 0.2);
            border-top-color: var(--sv-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Auto-rotate toggle */
        .auto-rotate-btn {
            padding: 8px 14px;
            border: 1px solid var(--sv-border);
            border-radius: 10px;
            background: rgba(255,255,255,0.04);
            color: var(--sv-text-dim);
            font-size: 12px; font-weight: 500; font-family: var(--sv-font);
            cursor: pointer;
            transition: all 0.2s;
        }
        .auto-rotate-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--sv-border-hover);
        }
        .auto-rotate-btn.active {
            background: rgba(0, 91, 193, 0.2);
            border-color: var(--sv-blue);
            color: var(--sv-blue-light);
        }

        /* ---- Responsive ---- */
        @media (max-width: 768px) {
            .search-panel, .geometry-panel {
                left: 10px; right: 10px; top: auto; bottom: 70px;
                width: auto; max-height: 45vh;
            }
            .tab-bar { top: 52px; }
            .top-bar { padding: 10px 14px; }
            .logo-text { font-size: 16px; }
            .logo-version { font-size: 10px; }
            .bottom-bar { padding: 10px 14px; }
            .controls-info { display: none; }
            .xr-btn { padding: 8px 16px; font-size: 12px; }
            .tab-btn { padding: 6px 14px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <!-- Loading overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Initializing Filament engine...</div>
        <div id="loading-model-name" class="loading-model-name"></div>
        <div class="loading-bar-track"><div class="loading-bar-fill"></div></div>
    </div>

    <!-- Loading chip for model switching -->
    <div id="loading-chip" class="loading-chip">
        <div class="mini-spinner"></div>
        <span id="loading-chip-text">Loading model...</span>
    </div>

    <!-- Canvas -->
    <canvas id="scene-canvas"></canvas>

    <!-- Top bar -->
    <header class="top-bar">
        <a href="https://sceneview.github.io" target="_blank" class="logo" title="SceneView — 3D and AR for Compose and SwiftUI">
            <div class="logo-icon">S</div>
            <span class="logo-text">SceneView</span>
            <span id="version-badge" class="logo-version">v3.6.1</span>
        </a>
        <div class="top-right">
            <button id="auto-rotate-toggle" class="auto-rotate-btn active" title="Toggle auto-rotation">Auto-rotate</button>
            <a href="https://github.com/sceneview/sceneview" target="_blank" class="icon-btn" title="View on GitHub">
                <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
            </a>
        </div>
    </header>

    <!-- Tab bar -->
    <nav class="tab-bar">
        <button class="tab-btn active" data-tab="viewer">Model Viewer</button>
        <button class="tab-btn" data-tab="geometry">Geometry</button>
    </nav>

    <!-- Search panel (Model Viewer tab) -->
    <div id="panel-viewer" class="panel search-panel active">
        <div class="search-box">
            <input id="search-input" class="search-input" type="text" placeholder="Search Sketchfab models..." autocomplete="off">
            <button id="search-btn" class="search-btn">Search</button>
        </div>
        <div id="search-results" class="search-results">
            <div class="search-status">Type a query and press Search to find downloadable 3D models on Sketchfab.</div>
        </div>
    </div>

    <!-- Geometry panel -->
    <div id="panel-geometry" class="panel geometry-panel">
        <div class="geo-card">
            <div class="geo-card-header">
                <span class="geo-card-title">Cube</span>
                <button class="geo-add-btn" data-geo="cube">Add</button>
            </div>
            <div class="geo-controls">
                <label>Color <input type="color" class="color-picker" data-geo-color="cube" value="#4488ff"></label>
                <label>Size <input type="range" class="geo-slider" data-geo-size="cube" min="0.2" max="3" step="0.1" value="1"></label>
            </div>
        </div>
        <div class="geo-card">
            <div class="geo-card-header">
                <span class="geo-card-title">Sphere</span>
                <button class="geo-add-btn" data-geo="sphere">Add</button>
            </div>
            <div class="geo-controls">
                <label>Color <input type="color" class="color-picker" data-geo-color="sphere" value="#ff4488"></label>
                <label>Radius <input type="range" class="geo-slider" data-geo-size="sphere" min="0.2" max="2" step="0.1" value="0.5"></label>
            </div>
        </div>
        <div class="geo-card">
            <div class="geo-card-header">
                <span class="geo-card-title">Cylinder</span>
                <button class="geo-add-btn" data-geo="cylinder">Add</button>
            </div>
            <div class="geo-controls">
                <label>Color <input type="color" class="color-picker" data-geo-color="cylinder" value="#44ff88"></label>
                <label>Radius <input type="range" class="geo-slider" data-geo-size="cylinder" min="0.2" max="2" step="0.1" value="0.5"></label>
            </div>
        </div>
        <div class="geo-card">
            <div class="geo-card-header">
                <span class="geo-card-title">Plane</span>
                <button class="geo-add-btn" data-geo="plane">Add</button>
            </div>
            <div class="geo-controls">
                <label>Color <input type="color" class="color-picker" data-geo-color="plane" value="#ffaa44"></label>
                <label>Size <input type="range" class="geo-slider" data-geo-size="plane" min="0.5" max="5" step="0.5" value="2"></label>
            </div>
        </div>
        <button id="geo-clear" class="geo-clear-btn">Clear All Geometry</button>
    </div>

    <!-- Camera controls info -->
    <div id="controls-info" class="controls-info">
        <div class="row"><kbd>Drag</kbd> Orbit</div>
        <div class="row"><kbd>Scroll</kbd> Zoom</div>
        <div class="row"><kbd>Right-drag</kbd> Pan</div>
    </div>

    <!-- Bottom bar -->
    <footer class="bottom-bar">
        <div class="powered-by">
            Powered by <a href="https://sceneview.github.io" target="_blank">SceneView</a> + <a href="https://github.com/google/filament" target="_blank">Filament.js</a> + WebXR
        </div>
        <div class="xr-buttons">
            <button id="enter-ar" class="xr-btn">Enter AR</button>
            <button id="enter-vr" class="xr-btn">Enter VR</button>
        </div>
    </footer>

    <script src="web-model-viewer.js"></script>
</body>
</html>
