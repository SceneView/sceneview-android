name: sceneview_flutter_demo
description: Feature showcase for the SceneView Flutter bridge — 3D and AR.
version: 3.6.1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  sceneview_flutter:
    path: ../../flutter/sceneview_flutter
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - environments/
