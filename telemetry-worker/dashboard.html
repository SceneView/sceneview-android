<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SceneView Telemetry</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --border: #2a2d3a;
  --text: #e2e4ed;
  --muted: #7b7f9a;
  --accent: #5b8dee;
  --accent2: #3ecf8e;
  --danger: #e85d75;
  --warn: #f5a623;
  --radius: 8px;
  --font: system-ui, -apple-system, sans-serif;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f4f5f9;
    --surface: #ffffff;
    --border: #dde0ec;
    --text: #1a1d27;
    --muted: #6b6f8a;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 1.5rem 1rem;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: .75rem;
  margin-bottom: 1.5rem;
}
header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -.01em; }
header h1 span { color: var(--accent); }
.meta { font-size: .75rem; color: var(--muted); }
.btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: .4rem .85rem;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: .8rem;
  transition: border-color .15s;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger:hover { border-color: var(--danger); color: var(--danger); }

/* Summary cards */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: .75rem;
  margin-bottom: 1.5rem;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
}
.card-label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .4rem; }
.card-value { font-size: 1.75rem; font-weight: 700; line-height: 1; }
.card-value.accent { color: var(--accent); }
.card-value.green { color: var(--accent2); }
.card-sub { font-size: .7rem; color: var(--muted); margin-top: .3rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Sections */
.sections {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1rem;
}
.section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.section-header {
  padding: .75rem 1rem;
  border-bottom: 1px solid var(--border);
  font-size: .8rem;
  font-weight: 600;
  letter-spacing: .02em;
  color: var(--muted);
  text-transform: uppercase;
}
.section-body { padding: .5rem 0; }

/* Tables */
table { width: 100%; border-collapse: collapse; font-size: .82rem; }
th { text-align: left; padding: .35rem 1rem; font-size: .7rem; color: var(--muted); font-weight: 500; letter-spacing: .05em; text-transform: uppercase; }
td { padding: .45rem 1rem; border-top: 1px solid var(--border); }
tr:first-child td { border-top: none; }
.num { text-align: right; font-variant-numeric: tabular-nums; color: var(--accent); font-weight: 600; }
.bar-wrap { display: flex; align-items: center; gap: .5rem; }
.bar-bg { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }
.bar-fill.green { background: var(--accent2); }

/* Sparkline (CSS bar chart) */
.spark-wrap { padding: .75rem 1rem 1rem; }
.spark-bars {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 80px;
}
.spark-bar {
  flex: 1;
  background: var(--accent);
  border-radius: 2px 2px 0 0;
  min-height: 2px;
  transition: height .3s;
  position: relative;
}
.spark-bar:hover::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 4px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--border);
  color: var(--text);
  font-size: .65rem;
  padding: .2rem .4rem;
  border-radius: 4px;
  white-space: nowrap;
  pointer-events: none;
  z-index: 10;
}
.spark-labels {
  display: flex;
  justify-content: space-between;
  margin-top: .35rem;
  font-size: .65rem;
  color: var(--muted);
}

/* Auth modal */
#auth-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
#auth-overlay.hidden { display: none; }
.auth-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.75rem;
  width: min(400px, 90vw);
}
.auth-box h2 { font-size: 1rem; margin-bottom: .25rem; }
.auth-box p { font-size: .8rem; color: var(--muted); margin-bottom: 1rem; }
.auth-box input {
  width: 100%; padding: .6rem .75rem;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); border-radius: var(--radius);
  font-size: .875rem; margin-bottom: .75rem;
  outline: none;
}
.auth-box input:focus { border-color: var(--accent); }
.auth-row { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }
.auth-row label { font-size: .75rem; color: var(--muted); flex: 1; min-width: 120px; }
.btn-primary {
  background: var(--accent); border: none; color: #fff;
  padding: .5rem 1.25rem; border-radius: var(--radius);
  cursor: pointer; font-size: .85rem; font-weight: 600;
}
.btn-primary:hover { opacity: .9; }
.base-row { display: flex; gap: .5rem; margin-bottom: .75rem; }
.base-row input { flex: 1; margin-bottom: 0; }

/* Status */
.status-bar {
  display: flex; align-items: center; gap: .5rem;
  font-size: .75rem; color: var(--muted);
}
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
.dot.ok { background: var(--accent2); }
.dot.err { background: var(--danger); }
.loading { opacity: .4; }
.empty { padding: 1.5rem 1rem; text-align: center; color: var(--muted); font-size: .8rem; }
</style>
</head>
<body>

<div id="auth-overlay">
  <div class="auth-box">
    <h2>SceneView Telemetry</h2>
    <p>Enter your worker URL and bearer token to connect.</p>
    <div class="base-row">
      <input id="input-base" type="url" placeholder="https://your-worker.workers.dev" spellcheck="false">
    </div>
    <input id="input-token" type="password" placeholder="Bearer token (leave blank if none)" spellcheck="false">
    <div class="auth-row">
      <label><input type="checkbox" id="input-remember" checked> Remember in localStorage</label>
      <button class="btn-primary" onclick="connect()">Connect</button>
    </div>
  </div>
</div>

<header>
  <div>
    <h1>SceneView <span>Telemetry</span></h1>
    <div class="meta" id="base-url-label"></div>
  </div>
  <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">
    <div class="status-bar">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Connecting…</span>
    </div>
    <button class="btn" onclick="refresh()">Refresh</button>
    <button class="btn btn-danger" onclick="logout()">Disconnect</button>
  </div>
</header>

<div class="cards">
  <div class="card">
    <div class="card-label">Events (24h)</div>
    <div class="card-value accent" id="c-total">—</div>
    <div class="card-sub" id="c-tools-inits">—</div>
  </div>
  <div class="card">
    <div class="card-label">Unique clients</div>
    <div class="card-value green" id="c-clients">—</div>
    <div class="card-sub">distinct client IDs</div>
  </div>
  <div class="card">
    <div class="card-label">Top tool</div>
    <div class="card-value" id="c-top-tool" style="font-size:1.1rem;padding-top:.2rem">—</div>
    <div class="card-sub" id="c-top-tool-count">—</div>
  </div>
  <div class="card">
    <div class="card-label">Top version</div>
    <div class="card-value" id="c-top-ver" style="font-size:1.1rem;padding-top:.2rem">—</div>
    <div class="card-sub" id="c-top-ver-count">—</div>
  </div>
</div>

<div class="sections">
  <div class="section">
    <div class="section-header">Tool usage — top 20 (24h)</div>
    <div class="section-body" id="tools-body"><div class="empty loading">Loading…</div></div>
  </div>

  <div class="section">
    <div class="section-header">Version adoption (24h)</div>
    <div class="section-body" id="versions-body"><div class="empty loading">Loading…</div></div>
  </div>

  <div class="section" style="grid-column: 1 / -1">
    <div class="section-header">Daily events — last 30 days</div>
    <div class="spark-wrap" id="spark-body"><div class="empty loading">Loading…</div></div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var BASE_URL = '';
  var TOKEN = '';
  var timer = null;
  var REFRESH_MS = 60000;

  // ── Persist / restore ────────────────────────────────────────────────────
  function save() {
    try {
      localStorage.setItem('tv_base', BASE_URL);
      localStorage.setItem('tv_token', TOKEN);
    } catch (_) {}
  }

  function restore() {
    try {
      var b = localStorage.getItem('tv_base');
      var t = localStorage.getItem('tv_token');
      if (b) { BASE_URL = b; TOKEN = t || ''; return true; }
    } catch (_) {}
    return false;
  }

  // ── Auth overlay ─────────────────────────────────────────────────────────
  function showAuth() {
    document.getElementById('auth-overlay').classList.remove('hidden');
    var b = document.getElementById('input-base');
    b.value = BASE_URL || window.location.origin;
    document.getElementById('input-token').value = TOKEN || '';
  }

  function hideAuth() {
    document.getElementById('auth-overlay').classList.add('hidden');
  }

  window.connect = function () {
    var b = document.getElementById('input-base').value.trim().replace(/\/$/, '');
    var t = document.getElementById('input-token').value.trim();
    var remember = document.getElementById('input-remember').checked;
    if (!b) { alert('Please enter a worker URL.'); return; }
    BASE_URL = b;
    TOKEN = t;
    if (remember) save();
    document.getElementById('base-url-label').textContent = BASE_URL;
    hideAuth();
    refresh();
  };

  window.logout = function () {
    clearInterval(timer);
    try { localStorage.removeItem('tv_base'); localStorage.removeItem('tv_token'); } catch (_) {}
    BASE_URL = ''; TOKEN = '';
    showAuth();
  };

  // ── Fetch helper ─────────────────────────────────────────────────────────
  function apiFetch(path) {
    var headers = { 'Accept': 'application/json' };
    if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
    return fetch(BASE_URL + path, { headers: headers }).then(function (r) {
      if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
      return r.json();
    });
  }

  // ── Render helpers ───────────────────────────────────────────────────────
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderTable(container, rows, cols, barCol, barColor) {
    if (!rows || rows.length === 0) {
      container.innerHTML = '<div class="empty">No data</div>';
      return;
    }
    var max = rows.reduce(function (m, r) { return Math.max(m, r[barCol] || 0); }, 0);
    var html = '<table><thead><tr>';
    cols.forEach(function (c) { html += '<th>' + esc(c.label) + '</th>'; });
    html += '<th style="text-align:right">Count</th></tr></thead><tbody>';
    rows.forEach(function (r, i) {
      html += '<tr>';
      cols.forEach(function (c) { html += '<td>' + esc(r[c.key]) + '</td>'; });
      var pct = max > 0 ? Math.round((r[barCol] / max) * 100) : 0;
      html += '<td><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill' +
        (barColor === 'green' ? ' green' : '') + '" style="width:' + pct + '%"></div></div>' +
        '<span class="num">' + esc(r[barCol]) + '</span></div></td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  }

  function renderSparkline(container, data) {
    if (!data || data.length === 0) {
      container.innerHTML = '<div class="empty">No timeseries data</div>';
      return;
    }
    var max = data.reduce(function (m, d) { return Math.max(m, d.value || 0); }, 0);
    var bars = '';
    data.forEach(function (d) {
      var pct = max > 0 ? Math.round(((d.value || 0) / max) * 100) : 0;
      var tip = (d.time || '') + ': ' + (d.value || 0);
      bars += '<div class="spark-bar" style="height:' + Math.max(pct, 2) + '%" data-tip="' + esc(tip) + '"></div>';
    });
    var first = data[0] ? data[0].time : '';
    var last = data[data.length - 1] ? data[data.length - 1].time : '';
    container.innerHTML =
      '<div class="spark-bars">' + bars + '</div>' +
      '<div class="spark-labels"><span>' + esc(first) + '</span><span>' + esc(last) + '</span></div>';
  }

  function setStatus(ok, msg) {
    var dot = document.getElementById('status-dot');
    dot.className = 'dot ' + (ok === true ? 'ok' : ok === false ? 'err' : '');
    document.getElementById('status-text').textContent = msg;
  }

  // ── Main refresh ─────────────────────────────────────────────────────────
  window.refresh = function () {
    if (!BASE_URL) return;
    setStatus(null, 'Refreshing…');

    Promise.all([
      apiFetch('/v1/stats'),
      apiFetch('/v1/timeseries?metric=events&days=30')
    ]).then(function (results) {
      var stats = results[0];
      var ts = results[1];

      // Summary cards
      var t = stats.totals || {};
      document.getElementById('c-total').textContent = t.total != null ? t.total.toLocaleString() : '—';
      document.getElementById('c-tools-inits').textContent =
        (t.tools != null ? t.tools.toLocaleString() + ' tool calls' : '—') +
        ' / ' + (t.inits != null ? t.inits.toLocaleString() + ' inits' : '—');
      document.getElementById('c-clients').textContent = t.unique_clients != null ? t.unique_clients.toLocaleString() : '—';

      var topTools = stats.topTools || [];
      var topTool = topTools[0];
      document.getElementById('c-top-tool').textContent = topTool ? topTool.tool : '—';
      document.getElementById('c-top-tool-count').textContent = topTool ? topTool.count.toLocaleString() + ' calls' : '—';

      var versions = stats.versions || [];
      var topVer = versions[0];
      document.getElementById('c-top-ver').textContent = topVer ? topVer.mcp_ver : '—';
      document.getElementById('c-top-ver-count').textContent = topVer ? topVer.count.toLocaleString() + ' events' : '—';

      // Tool table
      renderTable(
        document.getElementById('tools-body'),
        topTools,
        [{ label: 'Tool', key: 'tool' }],
        'count'
      );

      // Versions table
      renderTable(
        document.getElementById('versions-body'),
        versions,
        [{ label: 'Version', key: 'mcp_ver' }],
        'count',
        'green'
      );

      // Sparkline
      renderSparkline(document.getElementById('spark-body'), ts.data || []);

      setStatus(true, 'Updated ' + new Date().toLocaleTimeString());
    }).catch(function (err) {
      setStatus(false, 'Error: ' + err.message);
      if (err.message.startsWith('401')) {
        document.getElementById('tools-body').innerHTML = '<div class="empty">Unauthorized — check token</div>';
        document.getElementById('versions-body').innerHTML = '<div class="empty">Unauthorized — check token</div>';
        document.getElementById('spark-body').innerHTML = '<div class="empty">Unauthorized — check token</div>';
      }
    });
  };

  // ── Auto-refresh ─────────────────────────────────────────────────────────
  function startTimer() {
    clearInterval(timer);
    timer = setInterval(window.refresh, REFRESH_MS);
  }

  // ── Boot ─────────────────────────────────────────────────────────────────
  if (restore() && BASE_URL) {
    document.getElementById('base-url-label').textContent = BASE_URL;
    hideAuth();
    refresh();
    startTimer();
  } else {
    showAuth();
  }

  // Restart timer after manual refresh
  var origRefresh = window.refresh;
  window.refresh = function () { origRefresh(); startTimer(); };

})();
</script>
</body>
</html>
