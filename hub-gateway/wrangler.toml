name = "hub-mcp"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Public URL (after first `wrangler deploy`):
#   https://hub-mcp.mcp-tools-lab.workers.dev
# Custom domain (future): hub.mcp-tools-lab.dev
#
# This is Gateway #2, sibling of sceneview-mcp gateway #1.
# Scope: 16+ active non-SceneView MCPs from the portfolio
# (architecture, realestate, french-admin, ecommerce-3d, legal-docs,
# finance, education, social-media, health-fitness, + 3 active 3D
# verticals). sceneview-mcp is NOT served here — it has its own
# gateway at sceneview-mcp.mcp-tools-lab.workers.dev.
#
# Decision 2026-04-11 (session B):
#   - Pricing: unified "Portfolio Access" plan (29 EUR/mo) + Team (79 EUR/mo).
#   - Auth: shared with Gateway #1 via the same D1 + KV bindings, so one
#     API key can be used across both gateways. Access control is
#     enforced tool-side based on the user's sub tier.
#   - Multiplexing: single /mcp endpoint, package-prefixed tool names
#     (e.g. "architecture__list_models"), mirroring Gateway #1's pattern.

[vars]
ENVIRONMENT = "production"
# Absolute public URL, without trailing slash. Used for Stripe
# checkout success/cancel URLs. Re-point this at the custom domain
# once it is wired.
GATEWAY_BASE_URL = "https://hub-mcp.mcp-tools-lab.workers.dev"
# Stripe price ids for the Portfolio Access plans. Placeholders until
# the Stripe dashboard entries are created for Gateway #2 — see
# README.md for the wiring checklist.
STRIPE_PRICE_PORTFOLIO_MONTHLY = "price_REDACTED_PORT_MO_GW2"
STRIPE_PRICE_PORTFOLIO_YEARLY = "price_REDACTED_PORT_YR_GW2"
STRIPE_PRICE_TEAM_MONTHLY = "price_REDACTED_TEAM_MO_GW2"
STRIPE_PRICE_TEAM_YEARLY = "price_REDACTED_TEAM_YR_GW2"

# ── Shared infrastructure with Gateway #1 ──────────────────────────────────
#
# Reusing the Gateway #1 D1 + KV means a single `users` / `api_keys`
# table across both gateways: one sub = access everywhere. DO NOT create
# a new D1 here — that would split the user base and break the
# unified-portfolio value prop.

[[d1_databases]]
binding = "DB"
database_name = "sceneview-mcp"
database_id = "REDACTED-D1-DATABASE-ID"
# Migrations live in mcp-gateway/migrations — Gateway #2 is a
# read/write consumer of the same schema, not the owner.

[[kv_namespaces]]
binding = "RL_KV"
id = "REDACTED-KV-NAMESPACE-ID"

# Secrets (set with `wrangler secret put <NAME>`):
#   STRIPE_SECRET_KEY     — Stripe secret key (sk_live_... in prod).
#                           Can share the same Stripe account as Gateway #1,
#                           but the Portfolio price ids MUST be distinct
#                           from the sceneview Pro/Team ones above.
#   STRIPE_WEBHOOK_SECRET — whsec_... signing secret for /stripe/webhook.
#                           Gateway #2 needs its own webhook endpoint in
#                           the Stripe dashboard (different URL = different
#                           signing secret).
