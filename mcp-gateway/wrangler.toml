name = "sceneview-mcp"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Public URL: https://sceneview-mcp.workers.dev
# Custom domain (future): mcp.sceneview.dev

[vars]
ENVIRONMENT = "production"
DASHBOARD_BASE_URL = "https://sceneview-mcp.mcp-tools-lab.workers.dev"
MAGIC_LINK_FROM_EMAIL = "SceneView MCP <no-reply@sceneview.dev>"
# Stripe price ids (set to match the products you create in the Stripe
# dashboard before go-live). These are vars, NOT secrets, because the
# price ids are not sensitive.
STRIPE_PRICE_PRO_MONTHLY = "price_1TL04hEr7tnnFQbdZuwed6FR"
STRIPE_PRICE_PRO_YEARLY = "price_1TL04hEr7tnnFQbdy7JgehgP"
STRIPE_PRICE_TEAM_MONTHLY = "price_1TL08SEr7tnnFQbdScSMu31p"
STRIPE_PRICE_TEAM_YEARLY = "price_1TL08SEr7tnnFQbdSX9InHx8"

# D1 database — provision with:
#   wrangler d1 create sceneview-mcp
# then paste the database_id below.
[[d1_databases]]
binding = "DB"
database_name = "sceneview-mcp"
database_id = "8aaddcda-e36e-4287-9222-1df924426c9f"
migrations_dir = "migrations"

# KV namespace for rate limiting counters and auth cache — provision with:
#   wrangler kv namespace create RL_KV
# then paste the id below.
[[kv_namespaces]]
binding = "RL_KV"
id = "9a40d334be6149f7a4ba18451a60245f"

# Secrets (set with `wrangler secret put <NAME>`):
#   JWT_SECRET            — 32+ random bytes, used to sign dashboard JWTs
#   RESEND_API_KEY        — Resend API key for magic-link emails
#   STRIPE_SECRET_KEY     — Stripe secret key (sk_live_... in prod)
#   STRIPE_WEBHOOK_SECRET — whsec_... signing secret for /stripe/webhook
#
# For local dev, copy .dev.vars.example to .dev.vars and fill in test values.
