name: Feature request
description: Suggest a new feature or API improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation you're hitting.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API / behaviour
      description: Show what the Kotlin code would look like with your proposed change.
      render: kotlin

  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - sceneview (3D only)
        - arsceneview (AR)
        - SceneViewSwift (iOS)
        - sceneview-core (KMP)
        - Both / Multiple
        - Other (MCP, samples, docs)
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'd like to implement this myself (see [CONTRIBUTING.md](../CONTRIBUTING.md))
