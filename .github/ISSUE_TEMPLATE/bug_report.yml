name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: check the [migration guide](../MIGRATION.md) if you upgraded from v2.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform are you using?
      options:
        - Android
        - iOS
        - macOS
        - visionOS
        - Web
        - Desktop
        - Android TV
        - Flutter
        - React Native
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - sceneview (3D only)
        - arsceneview (AR)
        - SceneViewSwift (Apple)
        - sceneview-web (Web)
        - sceneview-core (KMP)
        - MCP server
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SceneView version
      placeholder: "3.5.0"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device / OS
      placeholder: "Pixel 8 Pro — Android 14 / iPhone 15 Pro — iOS 17.4"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Paste the smallest code snippet that reproduces the bug, or step-by-step instructions.
      render: kotlin
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      render: text

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / screen recordings
      description: Drag and drop images or videos here if applicable.
