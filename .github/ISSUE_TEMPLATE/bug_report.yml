name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: check the [migration guide](../MIGRATION.md) if you upgraded from v2.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Paste the smallest Kotlin snippet that reproduces the bug.
      render: kotlin
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SceneView version
      placeholder: "3.0.0"
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - sceneview (3D only)
        - arsceneview (AR)
        - SceneViewSwift (iOS)
        - sceneview-core (KMP)
        - Both / Multiple
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      render: text

  - type: textarea
    id: device
    attributes:
      label: Device / OS
      placeholder: "Pixel 8 Pro — Android 14"
