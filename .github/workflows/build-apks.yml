name: Build sample APKs

on:
  push:
    branches: [main]
    paths:
      - 'sceneview/**'
      - 'arsceneview/**'
      - 'sceneview-core/**'
      - 'samples/**'
      - 'gradle/**'
      - 'build.gradle*'
      - 'settings.gradle*'
      - 'gradle.properties'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: build-apks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build sample APKs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - run: chmod +x ./gradlew

      - name: Build all sample APKs
        run: |
          ./gradlew \
            :samples:android-demo:assembleDebug \
            :samples:android-tv-demo:assembleDebug \
            --console=plain

      - name: Collect APKs
        run: |
          mkdir -p dist
          for sample in android-demo android-tv-demo; do
            apk=$(find "samples/$sample/build/outputs/apk/debug" -name "*.apk" | head -1)
            if [ -n "$apk" ]; then
              cp "$apk" "dist/sceneview-${sample}.apk"
            fi
          done

      - name: Upload APKs
        uses: actions/upload-artifact@v7
        with:
          name: sample-apks
          path: dist/*.apk
          if-no-files-found: warn
          retention-days: 90

      - name: Attach to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
