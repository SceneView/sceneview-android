name: quality-gate

# Full pre-merge verification: runs the same .claude/scripts/quality-gate.sh
# that contributors run locally before pushing. Includes:
#   - Version sync across all modules
#   - Security checks (no secrets, no tracked local.properties)
#   - Deprecated SceneView API detector (Scene{}/ARScene{} regressions)
#   - Demo app asset integrity (bundled refs + CDN URLs)
#   - Android assembleDebug + unit tests
#   - MCP unit tests
#   - Website asset rules (no Google Fonts, Three.js, model-viewer, CDNs)
#
# Two-tier strategy:
#   - pr-check.yml runs the deprecated-API detector early (~1s) for fast fail.
#   - quality-gate.yml runs the full gate (~5-10 min) on every PR + push to main.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# One run per ref; cancel older in-progress runs to save resources.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality gate (full)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so quality-gate.sh can run git diff/ls-files against
          # main and so version checks can resolve historical refs.
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # PRs read the cache (no writes from forks). Pushes to main repopulate it.
          cache-read-only: ${{ github.event_name != 'push' }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - name: Install MCP dependencies
        # `npm ci` runs the prepare script which builds dist/, so MCP tests can run.
        run: cd mcp && npm ci

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Write local.properties
        # quality-gate.sh invokes ./gradlew, which needs sdk.dir on Linux runners.
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run quality gate
        shell: bash
        run: bash .claude/scripts/quality-gate.sh

      - name: Upload validate-demo-assets log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validate-demo-assets-log
          path: /tmp/validate-demo-assets.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload check-deprecated-api log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: check-deprecated-api-log
          path: /tmp/check-deprecated-api.log
          if-no-files-found: ignore
          retention-days: 7
