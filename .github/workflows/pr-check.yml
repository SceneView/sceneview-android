name: PR Check

# Fast feedback on every pull request — must pass before merge.
# Full CI (ci.yml) also runs in parallel for deeper checks.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same PR to save resources
concurrency:
  group: pr-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Quick Android compile check ───────────────────────────────────────────
  compile-android:
    name: Compile Android (debug)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Check for deprecated SceneView API refs
        shell: bash
        run: bash .claude/scripts/check-deprecated-api.sh --all

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - run: chmod +x ./gradlew
      - uses: gradle/actions/wrapper-validation@v6

      - name: Assemble all
        run: |
          ./gradlew assembleDebug --stacktrace

      - name: Unit tests
        run: |
          ./gradlew \
            :sceneview:testDebugUnitTest \
            :arsceneview:testDebugUnitTest \
            --stacktrace

  # ── Lint check ────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - run: chmod +x ./gradlew

      - name: Run lint
        run: |
          ./gradlew \
            :sceneview:lintDebug \
            :arsceneview:lintDebug \
            --stacktrace

      - name: Upload lint reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pr-lint-reports-${{ github.event.pull_request.number }}
          path: |
            sceneview/build/reports/lint-results-debug.html
            arsceneview/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 7

  # ── KMP core check ────────────────────────────────────────────────────────
  compile-kmp:
    name: Compile KMP core
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - run: chmod +x ./gradlew

      - name: Compile KMP core (all targets)
        run: ./gradlew :sceneview-core:assemble --stacktrace

      - name: KMP unit tests (JS)
        continue-on-error: true
        run: ./gradlew :sceneview-core:jsTest --stacktrace

  # ── Demo app asset integrity ────────────────────────────────────────────
  # Catches broken model/HDR references in any samples/* demo app, both
  # for bundled file paths and for CDN URLs. This is the automated
  # backstop for the class of bugs that reached main during sessions 19
  # and 34 (TV demo models that were never bundled, web-demo 404 URLs).
  # The script exits 1 on the first broken reference.
  validate-demo-assets:
    name: Validate demo app asset references
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      # Self-test first: assert the validator still detects broken refs on
      # a synthetic fixture. If this regresses, the real run below will
      # report a false PASS and we'll miss actual bugs.
      - name: Self-test validate-demo-assets.sh
        run: bash .claude/scripts/test-validate-demo-assets.sh

      - name: Run validate-demo-assets.sh (full, with CDN checks)
        run: bash .claude/scripts/validate-demo-assets.sh

  # ── Web demo production build ───────────────────────────────────────────
  # Protects the webpack.config.d/filament.js polyfill fix from session 34.
  # filament.js imports node core modules (path, fs, crypto) unconditionally
  # and webpack 5 no longer auto-polyfills them, so `jsBrowserProductionWebpack`
  # fails hard without the resolve.fallback override.
  compile-web-demo:
    name: Build web-demo (Kotlin/JS + Filament.js)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - run: chmod +x ./gradlew

      - name: jsBrowserProductionWebpack
        run: ./gradlew :samples:web-demo:jsBrowserProductionWebpack --stacktrace

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: web-demo-bundle
          # Kotlin/JS webpack plugin writes to build/kotlin-webpack/js/productionExecutable/
          # (not build/dist/js/productionExecutable/ — that path was a guess).
          path: samples/web-demo/build/kotlin-webpack/js/productionExecutable/
          retention-days: 7
          if-no-files-found: warn

  # ── Flutter demo APK ────────────────────────────────────────────────────
  # Protects the Kotlin 2.0 Compose Compiler plugin wiring in
  # flutter/sceneview_flutter/android/build.gradle. Without it, any PR that
  # touches the plugin module silently breaks `flutter build apk`.
  build-flutter-demo:
    name: Build flutter-demo APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: flutter pub get
        working-directory: samples/flutter-demo
        run: flutter pub get

      - name: flutter analyze (infos allowed, errors fail)
        working-directory: samples/flutter-demo
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: flutter build apk --debug
        working-directory: samples/flutter-demo
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: flutter-demo-apk
          path: samples/flutter-demo/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
          if-no-files-found: warn
