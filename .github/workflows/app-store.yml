name: Deploy iOS Demo to TestFlight

# PREREQUISITES (Thomas manual actions):
# 1. Create an iOS Distribution certificate in Apple Developer portal
# 2. Export it as .p12 WITH a password you remember
# 3. base64 encode it: base64 -i certificate.p12 | pbcopy
# 4. Set GitHub secrets:
#    - IOS_BUILD_CERTIFICATE_BASE64: the base64 string from step 3
#    - IOS_BUILD_CERTIFICATE_PASSWORD: the password from step 2
#    - IOS_PROVISIONING_PROFILE_BASE64: base64-encoded .mobileprovision
#    - APP_STORE_CONNECT_KEY_ID, APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_API_KEY
#
# ALTERNATIVE: Use Xcode Cloud (free 25 hrs/month) — zero certificate management.
# See docs/ios-build-guide.md for details.

on:
  # Disabled automatic trigger — requires Apple Distribution certificate + App Store Connect setup
  # Re-enable push trigger once all secrets are configured (see PREREQUISITES above)
  # push:
  #   branches: [main]
  #   paths:
  #     - 'SceneViewSwift/**'
  #     - 'samples/ios-demo/**'
  workflow_dispatch:

# Only one TestFlight deploy at a time
concurrency:
  group: testflight-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 60
    defaults:
      run:
        working-directory: samples/ios-demo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use latest Xcode available (16.2+ needed for RealityKit iOS 18 APIs)
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          echo "Using Xcode: $(xcode-select -p)"
          xcodebuild -version

      - name: Validate secrets exist
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_BUILD_CERTIFICATE_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          MISSING=()
          [ -z "$BUILD_CERTIFICATE_BASE64" ]       && MISSING+=("IOS_BUILD_CERTIFICATE_BASE64")
          [ -z "$P12_PASSWORD" ]                   && MISSING+=("IOS_BUILD_CERTIFICATE_PASSWORD")
          [ -z "$BUILD_PROVISION_PROFILE_BASE64" ] && MISSING+=("IOS_PROVISIONING_PROFILE_BASE64")
          [ -z "$APP_STORE_CONNECT_KEY_ID" ]       && MISSING+=("APP_STORE_CONNECT_KEY_ID")
          [ -z "$APP_STORE_CONNECT_ISSUER_ID" ]    && MISSING+=("APP_STORE_CONNECT_ISSUER_ID")
          [ -z "$APP_STORE_CONNECT_API_KEY" ]      && MISSING+=("APP_STORE_CONNECT_API_KEY")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            echo "See the workflow comments for setup instructions."
            exit 1
          fi
          # Validate base64 decodes to a valid PKCS12 file
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > /tmp/test_cert.p12
          FILE_TYPE=$(file /tmp/test_cert.p12)
          echo "Certificate file type: $FILE_TYPE"
          rm -f /tmp/test_cert.p12

      - name: Install the Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_BUILD_CERTIFICATE_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}_${{ github.run_attempt }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PROFILE_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PROFILE_PATH

          # Verify the .p12 can be read with the given password before keychain import
          if ! openssl pkcs12 -in "$CERTIFICATE_PATH" -passin "pass:$P12_PASSWORD" -nokeys -noout 2>/dev/null; then
            echo "::error::P12 password verification failed. The IOS_BUILD_CERTIFICATE_PASSWORD secret does not match the certificate. Re-export the .p12 from Keychain Access with the correct password and update both secrets."
            exit 1
          fi
          echo "P12 password verified successfully."

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          # Extract UUID and install provisioning profile
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $PROFILE_PATH))
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "Installed provisioning profile: $PROFILE_UUID"
          echo "PROVISIONING_PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

      - name: Cache Swift Package dependencies
        uses: actions/cache@v4
        with:
          path: samples/ios-demo/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('samples/ios-demo/SceneViewDemo.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme SceneViewDemo \
            -project SceneViewDemo.xcodeproj \
            -clonedSourcePackagesDirPath SourcePackages

      - name: Build archive
        run: |
          xcodebuild archive \
            -project SceneViewDemo.xcodeproj \
            -scheme SceneViewDemo \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/SceneViewDemo.xcarchive \
            -clonedSourcePackagesDirPath SourcePackages \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            -allowProvisioningUpdates \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=5G3DZ3TH45 \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_UUID"

      - name: Export IPA and upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          # Create App Store Connect API key file for xcodebuild authentication
          mkdir -p ~/.private_keys
          echo "$APP_STORE_CONNECT_API_KEY" > ~/.private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>5G3DZ3TH45</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>io.github.sceneview.demo</key>
              <string>PROVISIONING_PROFILE_UUID_PLACEHOLDER</string>
            </dict>
          </dict>
          </plist>
          PLIST

          # Replace placeholder with actual UUID (can't use shell vars inside heredoc with quotes)
          sed -i '' "s/PROVISIONING_PROFILE_UUID_PLACEHOLDER/$PROVISIONING_PROFILE_UUID/" $RUNNER_TEMP/ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/SceneViewDemo.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8 \
            -authenticationKeyID $APP_STORE_CONNECT_API_KEY_ID \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_API_ISSUER_ID

      - name: Clean up keychain and keys
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -rf ~/.private_keys 2>/dev/null || true
