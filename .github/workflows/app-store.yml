name: Deploy iOS Demo to TestFlight

# PREREQUISITES (Thomas manual actions):
# 1. Create an iOS Distribution certificate in Apple Developer portal
# 2. Export it as .p12 WITH a password you remember
# 3. base64 encode it: base64 -i certificate.p12 | pbcopy
# 4. Set GitHub secrets:
#    - IOS_BUILD_CERTIFICATE_BASE64: the base64 string from step 3
#    - IOS_BUILD_CERTIFICATE_PASSWORD: the password from step 2
#    - IOS_PROVISIONING_PROFILE_BASE64: base64-encoded .mobileprovision
#    - APP_STORE_CONNECT_KEY_ID, APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_API_KEY
#
# ALTERNATIVE: Use Xcode Cloud (free 25 hrs/month) — zero certificate management.
# See docs/ios-build-guide.md for details.

on:
  push:
    tags:
      - 'ios-demo-v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: macos-15
    defaults:
      run:
        working-directory: samples/ios-demo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Try Xcode 16 first (newer runners), then 15.4, then default
          sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          echo "Using Xcode: $(xcode-select -p)"
          xcodebuild -version

      - name: Validate secrets exist
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_BUILD_CERTIFICATE_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "::error::IOS_BUILD_CERTIFICATE_BASE64 secret is empty. Export your .p12 certificate and base64-encode it."
            exit 1
          fi
          if [ -z "$P12_PASSWORD" ]; then
            echo "::error::IOS_BUILD_CERTIFICATE_PASSWORD secret is empty. Set the password used when exporting the .p12."
            exit 1
          fi
          if [ -z "$BUILD_PROVISION_PROFILE_BASE64" ]; then
            echo "::error::IOS_PROVISIONING_PROFILE_BASE64 secret is empty. Download the provisioning profile from Apple Developer and base64-encode it."
            exit 1
          fi
          # Validate base64 decodes to a valid PKCS12 file
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > /tmp/test_cert.p12
          FILE_TYPE=$(file /tmp/test_cert.p12)
          echo "Certificate file type: $FILE_TYPE"
          rm -f /tmp/test_cert.p12

      - name: Install the Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_BUILD_CERTIFICATE_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}_${{ github.run_attempt }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PROFILE_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PROFILE_PATH

          # Verify the .p12 can be read with the given password before keychain import
          if ! openssl pkcs12 -in "$CERTIFICATE_PATH" -passin "pass:$P12_PASSWORD" -nokeys -noout 2>/dev/null; then
            echo "::error::P12 password verification failed. The IOS_BUILD_CERTIFICATE_PASSWORD secret does not match the certificate. Re-export the .p12 from Keychain Access with the correct password and update both secrets."
            exit 1
          fi
          echo "P12 password verified successfully."

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          # Extract UUID and install provisioning profile
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $PROFILE_PATH))
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "Installed provisioning profile: $PROFILE_UUID"
          echo "PROVISIONING_PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme SceneViewDemo \
            -project SceneViewDemo.xcodeproj \
            -clonedSourcePackagesDirPath SourcePackages \
            -destination 'generic/platform=iOS'

      - name: Build archive
        run: |
          xcodebuild archive \
            -project SceneViewDemo.xcodeproj \
            -scheme SceneViewDemo \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/SceneViewDemo.xcarchive \
            -destination 'generic/platform=iOS' \
            -clonedSourcePackagesDirPath SourcePackages \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM=5G3DZ3TH45 \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_UUID"

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>5G3DZ3TH45</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>io.github.sceneview.demo</key>
              <string>PROVISIONING_PROFILE_UUID_PLACEHOLDER</string>
            </dict>
          </dict>
          </plist>
          PLIST

          # Replace placeholder with actual UUID (can't use shell vars inside heredoc with quotes)
          sed -i '' "s/PROVISIONING_PROFILE_UUID_PLACEHOLDER/$PROVISIONING_PROFILE_UUID/" $RUNNER_TEMP/ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/SceneViewDemo.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          # Write API key to file (required by notarytool/altool)
          mkdir -p ~/.private_keys
          echo "$APP_STORE_CONNECT_API_KEY" > ~/.private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/SceneViewDemo.ipa" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"

      - name: Clean up keychain and keys
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -rf ~/.private_keys 2>/dev/null || true
