name: Publish docs site

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'marketing/codelabs/**'
      - 'MIGRATION.md'
      - 'CHANGELOG.md'
  workflow_dispatch:

jobs:
  publish:
    name: Build and deploy docs site
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Sync content into docs
        run: |
          cp marketing/codelabs/codelab-3d-compose.md docs/docs/codelabs/codelab-3d-compose.md
          cp marketing/codelabs/codelab-ar-compose.md docs/docs/codelabs/codelab-ar-compose.md
          cp MIGRATION.md docs/docs/migration.md
          cp CHANGELOG.md docs/docs/changelog.md

      - name: Build site
        run: mkdocs build --config-file docs/mkdocs.yml --site-dir site

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.PERSONAL_TOKEN }}
          external_repository: SceneView/sceneview.github.io
          publish_branch: main
          publish_dir: ./site
          destination_dir: .
          full_commit_message: Deploy docs site
          enable_jekyll: false
