name: Discord Notifications

# Posts to Discord when a release is published or an issue is opened.
#
# SETUP: Add a DISCORD_WEBHOOK_URL secret in your repo settings:
#   1. In Discord, go to Server Settings > Integrations > Webhooks > New Webhook
#   2. Choose the channel (e.g. #releases or #announcements)
#   3. Copy the webhook URL
#   4. In GitHub, go to Settings > Secrets and variables > Actions > New repository secret
#   5. Name: DISCORD_WEBHOOK_URL   Value: <the webhook URL>

on:
  release:
    types: [published]
  issues:
    types: [opened]

permissions:
  contents: read

jobs:
  notify-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post release to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret is not set — skipping notification."
            exit 0
          fi

          PRERELEASE="${{ github.event.release.prerelease }}"

          if [ "$PRERELEASE" = "true" ]; then
            EMOJI="🧪"
            LABEL="Pre-release"
          else
            EMOJI="🚀"
            LABEL="New Release"
          fi

          PAYLOAD=$(jq -n \
            --arg title "$EMOJI $LABEL: ${{ github.event.release.tag_name }}" \
            --arg name "${{ github.event.release.name }}" \
            --arg url "${{ github.event.release.html_url }}" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{embeds: [{title: $title, description: ("**" + $name + "**\n\n[View release notes](" + $url + ")"), color: 3447003, footer: {text: "SceneView — 3D & AR SDK"}, timestamp: $ts}]}')

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::warning::Discord webhook returned HTTP $HTTP_STATUS"
          else
            echo "Discord notification sent (HTTP $HTTP_STATUS)"
          fi

  notify-issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post new issue to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret is not set — skipping notification."
            exit 0
          fi

          PAYLOAD=$(jq -n \
            --arg title "🐛 New Issue #${{ github.event.issue.number }}" \
            --arg issue_title "${{ github.event.issue.title }}" \
            --arg url "${{ github.event.issue.html_url }}" \
            --arg author "${{ github.event.issue.user.login }}" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{embeds: [{title: $title, description: ("**" + $issue_title + "**\n\nOpened by [" + $author + "](https://github.com/" + $author + ")\n[View issue](" + $url + ")"), color: 15105570, footer: {text: "SceneView — 3D & AR SDK"}, timestamp: $ts}]}')

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::warning::Discord webhook returned HTTP $HTTP_STATUS"
          else
            echo "Discord notification sent (HTTP $HTTP_STATUS)"
          fi
