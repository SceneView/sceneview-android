name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew assembleDebug --stacktrace

      - name: Lint
        run: ./gradlew :sceneview:lintDebug :arsceneview:lintDebug --stacktrace

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            sceneview/build/reports/lint-results-debug.html
            arsceneview/build/reports/lint-results-debug.html
          if-no-files-found: ignore

  # AR samples run on x86_64 Linux where the ARCore emulator APK is supported.
  # Apple Silicon Macs only have ARM64 QEMU and cannot run the x86 ARCore emulator APK locally.
  ar-emulator:
    name: AR emulator QA
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - run: chmod +x ./gradlew

      - name: Build AR samples
        run: ./gradlew :samples:ar-model-viewer:assembleDebug :samples:ar-augmented-image:assembleDebug :samples:ar-point-cloud:assembleDebug --stacktrace

      - name: Download ARCore emulator APK
        run: |
          curl -L -o arcore-emulator.apk \
            "https://github.com/google-ar/arcore-android-sdk/releases/download/1.53.0/Google_Play_Services_for_AR_1.53.0_x86_for_emulator.apk"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AR emulator test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: Pixel_6_AR
          emulator-options: -no-window -no-audio -gpu swiftshader_indirect -camera-back virtualscene -partition-size 4096
          disable-animations: true
          script: |
            #!/usr/bin/env bash
            set -e

            # Wait for launcher to fully settle
            sleep 20
            adb shell input keyevent 82 || true   # unlock screen
            sleep 5
            # Dismiss any ANR/permission dialogs
            adb shell input keyevent 4 || true
            adb shell input keyevent 4 || true
            adb shell input keyevent 4 || true

            # Install ARCore emulator APK
            adb install -r arcore-emulator.apk

            # Install sample APKs
            adb install -r samples/ar-model-viewer/build/outputs/apk/debug/ar-model-viewer-debug.apk
            adb install -r samples/ar-point-cloud/build/outputs/apk/debug/ar-point-cloud-debug.apk
            adb install -r samples/ar-augmented-image/build/outputs/apk/debug/ar-augmented-image-debug.apk

            # Grant camera permissions upfront
            adb shell pm grant io.github.sceneview.sample.armodelviewer android.permission.CAMERA || true
            adb shell pm grant io.github.sceneview.sample.arpointcloud android.permission.CAMERA || true
            adb shell pm grant io.github.sceneview.sample.araugmentedimage android.permission.CAMERA || true

            # Kill the Pixel Launcher before each sample so its ANR dialog never appears
            # ar-model-viewer
            adb shell am force-stop com.google.android.apps.nexuslauncher || true
            adb shell am start -S --activity-clear-task -n io.github.sceneview.sample.armodelviewer/.MainActivity
            sleep 20
            adb exec-out screencap -p > ar-model-viewer.png

            # ar-point-cloud
            adb shell am force-stop com.google.android.apps.nexuslauncher || true
            adb shell am start -S --activity-clear-task -n io.github.sceneview.sample.arpointcloud/.MainActivity
            sleep 20
            adb exec-out screencap -p > ar-point-cloud.png

            # ar-augmented-image
            adb shell am force-stop com.google.android.apps.nexuslauncher || true
            adb shell am start -S --activity-clear-task -n io.github.sceneview.sample.araugmentedimage/.MainActivity
            sleep 20
            adb exec-out screencap -p > ar-augmented-image.png

            echo "AR screenshots captured"

      - name: Upload AR screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ar-emulator-screenshots
          path: "*.png"
          if-no-files-found: ignore
