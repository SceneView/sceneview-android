name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'website-static/**'
      - 'docs/**'
      - 'marketing/**'
      - 'mcp*/**'
      - '*.md'
      - 'llms*.txt'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'website-static/**'
      - 'docs/**'
      - 'marketing/**'
      - 'mcp*/**'
      - '*.md'
      - 'llms*.txt'
      - 'LICENSE'
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR to save resources
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - run: chmod +x ./gradlew

      - name: Build libraries + samples
        run: |
          ./gradlew \
            assembleDebug \
            :samples:android-demo:assembleDebug \
            :samples:android-tv-demo:assembleDebug \
            --stacktrace

      - name: Unit tests
        run: ./gradlew :sceneview:testDebugUnitTest :arsceneview:testDebugUnitTest --stacktrace

      - name: Lint
        run: ./gradlew :sceneview:lintDebug :arsceneview:lintDebug --stacktrace

      - name: Upload lint reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            sceneview/build/reports/lint-results-debug.html
            arsceneview/build/reports/lint-results-debug.html
          if-no-files-found: ignore

  # ── Web & Desktop modules (Kotlin/JS + Compose Desktop) ──────────────────
  web-desktop:
    name: Build web & desktop
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: chmod +x ./gradlew

      - name: Build all web & desktop targets
        # continue-on-error because web/desktop samples are stubs; real failures still surface
        continue-on-error: true
        run: |
          ./gradlew \
            :sceneview-core:jsMainClasses \
            :sceneview-web:jsMainClasses \
            :samples:web-demo:compileKotlinJs \
            :samples:desktop-demo:compileKotlinDesktop \
            --stacktrace

      - name: JS tests (informational)
        continue-on-error: true
        run: ./gradlew :sceneview-core:jsTest --stacktrace
