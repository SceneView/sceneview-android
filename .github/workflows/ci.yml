name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'website-static/**'
      - 'docs/**'
      - 'marketing/**'
      - 'mcp*/**'
      - '*.md'
      - 'llms*.txt'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'website-static/**'
      - 'docs/**'
      - 'marketing/**'
      - 'mcp*/**'
      - '*.md'
      - 'llms*.txt'
      - 'LICENSE'
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR to save resources
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - run: chmod +x ./gradlew

      - name: Build libraries + samples
        run: |
          ./gradlew \
            assembleDebug \
            :samples:android-demo:assembleDebug \
            :samples:android-tv-demo:assembleDebug \
            --stacktrace

      - name: Unit tests
        run: ./gradlew :sceneview:testDebugUnitTest :arsceneview:testDebugUnitTest --stacktrace

      - name: Lint
        run: ./gradlew :sceneview:lintDebug :arsceneview:lintDebug --stacktrace

      - name: Upload lint reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: |
            sceneview/build/reports/lint-results-debug.html
            arsceneview/build/reports/lint-results-debug.html
          if-no-files-found: ignore

  # ── Web & Desktop modules (Kotlin/JS + Compose Desktop) ──────────────────
  web-desktop:
    name: Build web & desktop
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - run: chmod +x ./gradlew

      - name: Build web targets
        run: |
          ./gradlew \
            :sceneview-core:jsMainClasses \
            :sceneview-web:jsMainClasses \
            :samples:web-demo:compileKotlinJs \
            --stacktrace

      # Full production webpack bundle. Goes beyond `compileKotlinJs` because
      # it runs the real webpack 5 pipeline against filament.js, which
      # imports Node core modules (path, fs, crypto) unconditionally and
      # fails hard without samples/web-demo/webpack.config.d/filament.js.
      # Keeps session 34's polyfill fix protected on every main push.
      - name: web-demo production webpack
        run: ./gradlew :samples:web-demo:jsBrowserProductionWebpack --stacktrace

      - name: Build desktop targets
        # continue-on-error: desktop is a Compose Canvas placeholder, not a real Filament target
        continue-on-error: true
        run: ./gradlew :samples:desktop-demo:compileKotlinDesktop --stacktrace

      - name: JS tests (informational)
        continue-on-error: true
        run: ./gradlew :sceneview-core:jsTest --stacktrace

  # ── Flutter demo build ──────────────────────────────────────────────────
  # Protects the Kotlin 2.0 Compose Compiler plugin wiring in
  # flutter/sceneview_flutter/android/build.gradle. Without this job, a
  # direct push to main that removes the plugin (or downgrades Kotlin)
  # only shows up the next time someone runs `flutter build apk`.
  flutter-demo:
    name: Build flutter-demo APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: flutter pub get
        working-directory: samples/flutter-demo
        run: flutter pub get

      - name: flutter analyze
        working-directory: samples/flutter-demo
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: flutter build apk --debug
        working-directory: samples/flutter-demo
        run: flutter build apk --debug
