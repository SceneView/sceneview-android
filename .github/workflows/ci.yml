name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew assembleDebug --stacktrace

      - name: Lint
        run: ./gradlew :sceneview:lintDebug :arsceneview:lintDebug --stacktrace

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            sceneview/build/reports/lint-results-debug.html
            arsceneview/build/reports/lint-results-debug.html
          if-no-files-found: ignore

  # AR samples run on x86_64 Linux where the ARCore emulator APK is supported.
  # Apple Silicon Macs only have ARM64 QEMU and cannot run the x86 ARCore emulator APK locally.
  ar-emulator:
    name: AR emulator QA
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - run: chmod +x ./gradlew

      - name: Build AR samples
        run: ./gradlew :samples:ar-model-viewer:assembleDebug :samples:ar-augmented-image:assembleDebug :samples:ar-point-cloud:assembleDebug --stacktrace

      - name: Download ARCore emulator APK
        run: |
          curl -L -o arcore-emulator.apk \
            "https://github.com/google-ar/arcore-android-sdk/releases/download/1.53.0/Google_Play_Services_for_AR_1.53.0_x86_for_emulator.apk"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AR emulator test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: Pixel_6_AR
          emulator-options: -no-window -no-audio -gpu swiftshader_indirect -camera-back virtualscene -partition-size 4096
          disable-animations: true
          script: |
            #!/usr/bin/env bash
            set -e

            # Wait for launcher to fully settle
            sleep 20
            adb shell input keyevent 82 || true   # unlock screen
            sleep 5
            # Dismiss any ANR/permission dialogs
            adb shell input keyevent 4 || true
            adb shell input keyevent 4 || true
            adb shell input keyevent 4 || true

            # Install ARCore emulator APK
            adb install -r arcore-emulator.apk

            # Install sample APKs
            adb install -r samples/ar-model-viewer/build/outputs/apk/debug/ar-model-viewer-debug.apk
            adb install -r samples/ar-point-cloud/build/outputs/apk/debug/ar-point-cloud-debug.apk
            adb install -r samples/ar-augmented-image/build/outputs/apk/debug/ar-augmented-image-debug.apk

            # Grant camera permissions upfront
            adb shell pm grant io.github.sceneview.sample.armodelviewer android.permission.CAMERA || true
            adb shell pm grant io.github.sceneview.sample.arpointcloud android.permission.CAMERA || true
            adb shell pm grant io.github.sceneview.sample.araugmentedimage android.permission.CAMERA || true

            # ---------------------------------------------------------------------------
            # inject_motion: simulate phone movement via the emulator console so ARCore
            # transitions from INITIALIZING → TRACKING and the virtual scene camera feed
            # becomes visible. Without motion the virtual scene is static, ARCore never
            # gets visual odometry, and the camera surface stays white.
            #
            # The emulator console lives on port 5554. We authenticate with the token
            # written to ~/.emulator_console_auth_token and inject accelerometer /
            # gyroscope deltas. When the sensor values change, the virtualscene renderer
            # moves the camera through the 3D room, giving ARCore real image motion.
            # ---------------------------------------------------------------------------
            inject_motion() {
              local port="${1:-5554}"
              local token
              token=$(cat ~/.emulator_console_auth_token 2>/dev/null || true)
              if [ -z "$token" ]; then
                echo "  [motion] no auth token found, skipping sensor injection"
                return 0
              fi
              echo "  [motion] injecting sensor motion on port $port"
              # Each printf+nc call sets a new sensor value; the virtual scene camera
              # moves with it, producing the image change ARCore needs for SLAM.
              _send() { printf 'auth %s\r\n%s\r\nquit\r\n' "$token" "$1" \
                          | nc -w 2 localhost "$port" > /dev/null 2>&1 || true; }
              _send "sensor set acceleration 0.4:9.5:0.3"  ; sleep 1
              _send "sensor set gyroscope 0.25:0.10:0.20"  ; sleep 1
              _send "sensor set acceleration -0.3:9.7:0.5" ; sleep 1
              _send "sensor set gyroscope -0.15:0.20:-0.10"; sleep 1
              _send "sensor set acceleration 0.2:9.8:-0.2" ; sleep 1
              _send "sensor set gyroscope 0.10:-0.10:0.15" ; sleep 1
              _send "sensor set acceleration 0:9.8:0"      ; sleep 1
              _send "sensor set gyroscope 0:0:0"
              echo "  [motion] sensor injection complete"
            }

            # Helper: launch an app, inject motion, wait for ARCore to track + detect a
            # plane, then capture the screenshot. Takes package, activity, output file.
            capture_ar_screenshot() {
              local pkg="$1" activity="$2" out="$3"
              echo "--- $pkg ---"
              adb shell am force-stop com.google.android.apps.nexuslauncher || true
              adb shell am start -S --activity-clear-task -n "${pkg}/${activity}"
              # Give ARCore time to initialize before we start moving
              sleep 10
              # Inject motion so the virtual scene camera moves → ARCore tracks
              inject_motion 5554
              # Wait for plane detection (30 s total from launch is usually enough)
              sleep 20
              adb exec-out screencap -p > "$out"
              echo "  saved $out"
            }

            capture_ar_screenshot \
              io.github.sceneview.sample.armodelviewer .MainActivity ar-model-viewer.png

            capture_ar_screenshot \
              io.github.sceneview.sample.arpointcloud .MainActivity ar-point-cloud.png

            capture_ar_screenshot \
              io.github.sceneview.sample.araugmentedimage .MainActivity ar-augmented-image.png

            echo "AR screenshots captured"

      - name: Upload AR screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ar-emulator-screenshots
          path: "*.png"
          if-no-files-found: ignore
