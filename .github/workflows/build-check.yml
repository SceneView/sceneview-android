name: Build Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Debug build + lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build library
        run: ./gradlew :sceneview:assembleDebug :arsceneview:assembleDebug --stacktrace

      - name: Lint
        run: ./gradlew :sceneview:lintDebug :arsceneview:lintDebug --stacktrace

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            sceneview/build/reports/lint-results-debug.html
            arsceneview/build/reports/lint-results-debug.html
          if-no-files-found: ignore