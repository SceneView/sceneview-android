name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  # ── 1. Publish Android library to Maven Central ────────────────────────────
  publish-library:
    name: Publish to Maven Central
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - run: chmod +x ./gradlew

      - name: Publish
        run: ./gradlew publishAllPublicationsToMavenCentralRepository --no-daemon --no-parallel
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_NEXUS_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_NEXUS_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

  # ── 2. Build and publish Dokka API docs ────────────────────────────────────
  publish-api-docs:
    name: Publish API docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - run: chmod +x ./gradlew

      - name: Generate Dokka docs
        run: ./gradlew dokkaHtmlMultiModule

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PERSONAL_TOKEN }}
          external_repository: SceneView/sceneview.github.io
          publish_branch: main
          publish_dir: ./build/dokka/htmlMultiModule
          destination_dir: api/sceneview
          full_commit_message: "API docs ${{ github.ref_name }}"
          enable_jekyll: false

  # ── 3. Publish MCP to npm ──────────────────────────────────────────────────
  publish-mcp:
    name: Publish MCP to npm
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: mcp
        run: npm ci

      - name: Sync version from tag
        working-directory: mcp
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version "$VERSION" --no-git-tag-version
          sed -i "s/version: \"[^\"]*\"/version: \"$VERSION\"/" src/index.ts

      - name: Build
        working-directory: mcp
        run: npm run prepare

      - name: Publish
        working-directory: mcp
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── 4. Create GitHub Release with auto-generated notes ────────────────────
  create-release:
    name: Create GitHub Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [publish-library]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
