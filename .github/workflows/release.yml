name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

# Only one release at a time
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── 1. Publish Android library to Maven Central ────────────────────────────
  publish-library:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - run: chmod +x ./gradlew

      - name: Publish
        run: ./gradlew publishAndReleaseToMavenCentral --no-daemon --no-parallel --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_NEXUS_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_NEXUS_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

  # ── 2. Build and publish Dokka API docs ────────────────────────────────────
  publish-api-docs:
    name: Publish API docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - run: chmod +x ./gradlew

      - name: Generate Dokka docs
        run: ./gradlew :sceneview:dokkaHtml :arsceneview:dokkaHtml || echo "::warning::Dokka generation failed — skipping"
        continue-on-error: true

      - name: Upload Dokka artifact
        uses: actions/upload-artifact@v7
        with:
          name: dokka-api-docs
          path: |
            sceneview/build/dokka/
            arsceneview/build/dokka/
          retention-days: 1
          if-no-files-found: ignore

  # ── 3. Publish MCP to npm ──────────────────────────────────────────────────
  publish-mcp:
    name: Publish MCP to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: mcp
        run: npm ci

      - name: Check if version already published
        id: check-mcp
        working-directory: mcp
        run: |
          # MCP has its own version cycle — always use package.json version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Check the *specific* version rather than the latest dist-tag.
          # npm view <pkg>@<ver> version returns the version string if it exists,
          # or exits non-zero / returns empty if it has never been published.
          PUBLISHED=$(npm view "sceneview-mcp@$VERSION" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "::notice::sceneview-mcp@$VERSION already published — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing sceneview-mcp@$VERSION (not yet on npm)"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.check-mcp.outputs.skip != 'true'
        working-directory: mcp
        run: npm run prepare

      - name: Test
        if: steps.check-mcp.outputs.skip != 'true'
        working-directory: mcp
        run: npm test

      - name: Publish
        if: steps.check-mcp.outputs.skip != 'true'
        working-directory: mcp
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── 4. Publish sceneview-web to npm ────────────────────────────────────────
  publish-web:
    name: Publish sceneview-web to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: chmod +x ./gradlew

      - name: Check if version already published
        id: check-web
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION=$(node -p "require('./sceneview-web/package.json').version" 2>/dev/null || echo "0.0.0")
          else
            VERSION=${GITHUB_REF_NAME#v}
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Check the *specific* version rather than the latest dist-tag.
          # npm view <pkg>@<ver> version returns the version string if it exists,
          # or exits non-zero / returns empty if it has never been published.
          PUBLISHED=$(npm view "sceneview-web@$VERSION" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "::notice::sceneview-web@$VERSION already published — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing sceneview-web@$VERSION (not yet on npm)"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build sceneview-web JS library
        if: steps.check-web.outputs.skip != 'true'
        run: ./gradlew :sceneview-web:jsBrowserProductionWebpack

      - name: Prepare and publish npm package
        if: steps.check-web.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ steps.check-web.outputs.version }}"
          BUILD_DIR="sceneview-web/build/kotlin-webpack/js/productionExecutable"
          cat > "$BUILD_DIR/package.json" << EOF
          {
            "name": "sceneview-web",
            "version": "$VERSION",
            "description": "SceneView for Web — 3D rendering with Filament.js (WebGL2/WASM)",
            "main": "sceneview-web.js",
            "keywords": ["3d", "webgl", "filament", "sceneview", "gltf", "wasm"],
            "homepage": "https://github.com/sceneview/sceneview",
            "repository": {
              "type": "git",
              "url": "https://github.com/sceneview/sceneview.git",
              "directory": "sceneview-web"
            },
            "license": "Apache-2.0"
          }
          EOF
          cd "$BUILD_DIR"
          npm publish --access public

  # ── 5. Create GitHub Release with auto-generated notes ────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [publish-library, publish-mcp, publish-web]
    if: always() && needs.publish-library.result == 'success' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
