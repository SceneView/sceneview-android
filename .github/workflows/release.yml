name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  # ── 1. Publish Android library to Maven Central ────────────────────────────
  publish-library:
    name: Publish to Maven Central
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - run: chmod +x ./gradlew

      - name: Publish
        run: ./gradlew publishAllPublicationsToMavenCentralRepository --no-daemon --no-parallel
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_NEXUS_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_NEXUS_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

  # ── 2. Build and publish Dokka API docs ────────────────────────────────────
  publish-api-docs:
    name: Publish API docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - run: chmod +x ./gradlew

      - name: Generate Dokka docs
        run: ./gradlew dokkaHtmlMultiModule

      - name: Upload Dokka artifact
        uses: actions/upload-artifact@v4
        with:
          name: dokka-api-docs
          path: ./build/dokka/htmlMultiModule
          retention-days: 1

  # ── 2b. Rebuild docs site with Dokka API docs included ───────────────────
  rebuild-docs-with-api:
    name: Rebuild docs site
    needs: publish-api-docs
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/docs.yml

  # ── 3. Publish MCP to npm ──────────────────────────────────────────────────
  publish-mcp:
    name: Publish MCP to npm
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: mcp
        run: npm ci

      - name: Sync version from tag
        working-directory: mcp
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version "$VERSION" --no-git-tag-version
          sed -i "s/version: \"[^\"]*\"/version: \"$VERSION\"/" src/index.ts

      - name: Build
        working-directory: mcp
        run: npm run prepare

      - name: Test
        working-directory: mcp
        run: npm test

      - name: Publish
        working-directory: mcp
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── 4. Create GitHub Release with auto-generated notes ────────────────────
  create-release:
    name: Create GitHub Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [publish-library]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
