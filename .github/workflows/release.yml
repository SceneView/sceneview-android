name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  # ── 1. Publish Android library to Maven Central ────────────────────────────
  publish-library:
    name: Publish to Maven Central
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - run: chmod +x ./gradlew

      - name: Publish
        run: ./gradlew publishAllPublicationsToMavenCentralRepository --no-daemon --no-parallel
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_NEXUS_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_NEXUS_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

  # ── 2. Build and publish Dokka API docs ────────────────────────────────────
  publish-api-docs:
    name: Publish API docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - run: chmod +x ./gradlew

      - name: Generate Dokka docs
        run: ./gradlew :sceneview:dokkaHtml :arsceneview:dokkaHtml || echo "::warning::Dokka generation failed — skipping"
        continue-on-error: true

      - name: Upload Dokka artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dokka-api-docs
          path: |
            sceneview/build/dokka/
            arsceneview/build/dokka/
          retention-days: 1
          if-no-files-found: ignore

  # ── 3. Publish MCP to npm ──────────────────────────────────────────────────
  publish-mcp:
    name: Publish MCP to npm
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: mcp
        run: npm ci

      - name: Sync version from tag
        working-directory: mcp
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "$VERSION" ]; then
            npm version "$VERSION" --no-git-tag-version
          fi
          sed -i "s/version: \"[^\"]*\"/version: \"$VERSION\"/" src/index.ts

      - name: Build
        working-directory: mcp
        run: npm run prepare

      - name: Test
        working-directory: mcp
        run: npm test

      - name: Publish
        working-directory: mcp
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── 4. Publish sceneview-web to npm ────────────────────────────────────────
  publish-web:
    name: Publish sceneview-web to npm
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: chmod +x ./gradlew

      - name: Build sceneview-web JS library
        run: ./gradlew :sceneview-web:jsBrowserProductionLibraryDistribution

      - name: Prepare npm package
        working-directory: sceneview-web/build/dist/js/productionLibrary
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cat > package.json << EOF
          {
            "name": "@sceneview/sceneview-web",
            "version": "$VERSION",
            "description": "SceneView for Web — 3D rendering with Filament.js (WebGL2/WASM)",
            "main": "sceneview-web.js",
            "types": "sceneview-web.d.ts",
            "keywords": ["3d", "webgl", "filament", "sceneview", "gltf", "wasm"],
            "homepage": "https://github.com/SceneView/sceneview",
            "repository": {
              "type": "git",
              "url": "https://github.com/SceneView/sceneview.git",
              "directory": "sceneview-web"
            },
            "license": "Apache-2.0"
          }
          EOF

      - name: Publish
        working-directory: sceneview-web/build/dist/js/productionLibrary
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── 5. Create GitHub Release with auto-generated notes ────────────────────
  create-release:
    name: Create GitHub Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [publish-library, publish-mcp, publish-web]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
