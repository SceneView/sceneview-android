name: Stale issues and PRs

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 90
          days-before-close: 7
          stale-issue-message: >
            This issue has been inactive for 90 days. It will close in 7 days
            unless there is new activity. If still relevant, please comment or
            provide an update.
          close-issue-message: >
            Closing after prolonged inactivity. If this is still present in the
            latest release, please open a new issue with up-to-date information.
          stale-pr-message: >
            This PR has been inactive for 90 days. It will close in 7 days
            unless there is new activity.
          close-pr-message: >
            Closing after prolonged inactivity. Feel free to reopen when ready.
          exempt-issue-labels: 'acknowledged,needs-triage,bug'
          exempt-pr-labels: 'work-in-progress'
          operations-per-run: 100
