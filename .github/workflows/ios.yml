name: iOS CI

on:
  push:
    branches: [main]
    paths:
      - 'SceneViewSwift/**'
      - 'samples/ios-demo/**'
      - '.github/workflows/ios.yml'
  pull_request:
    branches: [main]
    paths:
      - 'SceneViewSwift/**'
      - 'samples/ios-demo/**'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build & Test (iOS)
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          echo "Using Xcode: $(xcode-select -p)"
          xcodebuild -version

      - name: Build Swift Package (iOS)
        working-directory: SceneViewSwift
        run: |
          xcodebuild build \
            -scheme SceneViewSwift \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -skipMacroValidation \
            | tail -20

      - name: Run tests
        working-directory: SceneViewSwift
        continue-on-error: true
        run: |
          xcodebuild test \
            -scheme SceneViewSwift \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -skipMacroValidation \
            | tail -30
