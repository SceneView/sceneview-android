name: Publish v3.6.2

# One-shot workflow to publish v3.6.2 to Maven Central + npm
# Triggered by push to main (this file being added triggers it)
# DELETE THIS FILE after successful publication

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-v3.6.2.yml'

permissions:
  contents: write

jobs:
  publish-maven:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - run: chmod +x ./gradlew

      - name: Publish to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral --no-daemon --no-parallel --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_NEXUS_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_NEXUS_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish sceneview-mcp
        working-directory: mcp
        run: |
          npm ci && npm run prepare && npm test
          npm publish --access public || echo 'Already published'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-tag-and-release:
    name: Create v3.6.2 tag + GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-maven, publish-npm]
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create tag v3.6.2
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag -a v3.6.2 -m 'Release v3.6.2' || true
          git push origin v3.6.2 || true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.6.2
          name: 'v3.6.2 — Cross-Platform Parity + Render Testing'
          generate_release_notes: true
          make_latest: true
