<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meridian Properties — SceneView Demo</title>
<meta name="description" content="Architecture visualization rendered with SceneView and Filament.js WASM. Real-time PBR 3D in the browser.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow: hidden; font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
    height: 100vh; background: #000;
  }
  /* Polyhaven docklands night sky */
  #sky {
    position: fixed; inset: 0; z-index: 0;
    background: url('environments/sky/docklands_2k.jpg') center/cover no-repeat;
    filter: brightness(0.3) saturate(1.2) contrast(1.1);
  }
  canvas {
    position: relative; z-index: 1;
    width: 100%; height: 100%; display: block; cursor: grab;
  }
  canvas:active { cursor: grabbing; }

  #header {
    position: absolute; top: 20px; left: 24px; z-index: 10; pointer-events: none;
    animation: fadeIn 1s ease-out;
  }
  #header .card {
    background: rgba(10,15,25,0.5); backdrop-filter: blur(20px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 14px 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  #header h1 { font-size: 1.35rem; font-weight: 700; color: #fff; }
  #header p { font-size: 0.75rem; color: rgba(255,255,255,0.45); margin-top: 3px; }

  #stats {
    position: absolute; bottom: 24px; left: 24px; z-index: 10;
    display: flex;
    background: rgba(10,15,25,0.5); backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; overflow: hidden;
    animation: fadeIn 1.2s ease-out;
    box-shadow: 0 4px 24px rgba(0,0,0,0.2);
  }
  #stats .stat {
    padding: 12px 22px; text-align: center;
    border-right: 1px solid rgba(255,255,255,0.04);
  }
  #stats .stat:last-child { border-right: none; }
  #stats .val { font-size: 1.2rem; font-weight: 700; color: #fff; }
  #stats .label {
    font-size: 0.55rem; color: rgba(255,255,255,0.35);
    text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px;
  }

  #badge {
    position: absolute; bottom: 24px; right: 24px; z-index: 10;
    display: flex; align-items: center; gap: 8px;
    background: rgba(10,15,25,0.4); backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 8px 16px;
  }
  #badge .rendered { color: rgba(255,255,255,0.4); font-size: 0.65rem; }

  @keyframes fadeIn {
    0% { opacity: 0; transform: translateY(-6px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div id="sky"></div>

<div id="header"><div class="card">
  <h1>Meridian Properties</h1>
  <p>Downtown Development Project</p>
</div></div>

<div id="stats">
  <div class="stat"><div class="val">12</div><div class="label">Units</div></div>
  <div class="stat"><div class="val">45,000</div><div class="label">Sq Ft</div></div>
  <div class="stat"><div class="val">$28M</div><div class="label">Valuation</div></div>
</div>

<div id="badge">
  <span class="rendered">Rendered by</span>
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7v10l10 5 10-5V7L12 2z" stroke="#60a5fa" stroke-width="1.6" fill="rgba(96,165,250,0.1)"/><path d="M12 22V12M2 7l10 5 10-5" stroke="#60a5fa" stroke-width="1.6"/></svg>
  <span style="color:rgba(255,255,255,0.85);font-weight:600;font-size:0.75rem;">SceneView</span>
</div>

<canvas id="viewer"></canvas>

<script src="js/filament/filament.js"></script>
<script src="js/sceneview.js?v=140"></script>
<script>
SceneView.modelViewer("viewer", "models/DamagedHelmet.glb", {
  backgroundColor: [0.03, 0.035, 0.055, 1.0],
  fov: 38,
  iblIntensity: 55000,
}).then(function(instance) {
  console.log("SceneView: Architecture demo loaded (Filament WASM + Polyhaven docklands sky)");
}).catch(function(err) {
  console.error("SceneView architecture failed:", err);
});
</script>
</body>
</html>
