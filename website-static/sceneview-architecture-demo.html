<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meridian Properties | SceneView Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow: hidden; font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
    height: 100vh; background: #000;
  }
  /* Polyhaven docklands night sky */
  #sky {
    position: fixed; inset: 0; z-index: 0;
    background: url('environments/sky/docklands_2k.jpg') center/cover no-repeat;
    filter: brightness(0.25) saturate(1.3) contrast(1.15);
  }
  canvas {
    position: relative; z-index: 1;
    width: 100%; height: 100%; display: block; cursor: grab;
  }
  canvas:active { cursor: grabbing; }

  /* ── Header ── */
  #header {
    position: absolute; top: 20px; left: 24px; z-index: 10; pointer-events: none;
    animation: slideDown 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  #header .card {
    background: rgba(8,12,22,0.55); backdrop-filter: blur(24px) saturate(1.5);
    border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 16px 22px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  #header .eyebrow {
    font-size: 0.55rem; color: rgba(96,165,250,0.7); text-transform: uppercase;
    letter-spacing: 0.18em; font-weight: 600; margin-bottom: 6px;
  }
  #header h1 { font-size: 1.4rem; font-weight: 700; color: #fff; line-height: 1.15; }
  #header p { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 4px; }

  /* ── Stats bar ── */
  #stats {
    position: absolute; bottom: 24px; left: 24px; z-index: 10;
    display: flex;
    background: rgba(8,12,22,0.55); backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; overflow: hidden;
    animation: slideUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  }
  #stats .stat {
    padding: 14px 24px; text-align: center;
    border-right: 1px solid rgba(255,255,255,0.04);
  }
  #stats .stat:last-child { border-right: none; }
  #stats .val { font-size: 1.25rem; font-weight: 700; color: #fff; }
  #stats .label {
    font-size: 0.5rem; color: rgba(255,255,255,0.3);
    text-transform: uppercase; letter-spacing: 0.12em; margin-top: 3px;
  }

  /* ── Badge ── */
  #badge {
    position: absolute; bottom: 24px; right: 24px; z-index: 10;
    display: flex; align-items: center; gap: 8px;
    background: rgba(8,12,22,0.45); backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 8px 16px;
    animation: slideUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
  }
  #badge .rendered { color: rgba(255,255,255,0.35); font-size: 0.6rem; letter-spacing: 0.03em; }

  /* ── Loading state ── */
  #loading {
    position: absolute; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(5,8,18,0.9); transition: opacity 0.8s ease;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #loading .spinner {
    width: 32px; height: 32px; border: 2px solid rgba(96,165,250,0.15);
    border-top-color: rgba(96,165,250,0.7); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  #loading .text {
    margin-top: 14px; font-size: 0.65rem; color: rgba(255,255,255,0.35);
    text-transform: uppercase; letter-spacing: 0.15em;
  }

  @keyframes slideDown {
    0% { opacity: 0; transform: translateY(-12px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    0% { opacity: 0; transform: translateY(12px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="sky"></div>

<div id="loading">
  <div class="spinner"></div>
  <div class="text">Loading 3D Model</div>
</div>

<div id="header"><div class="card">
  <div class="eyebrow">Meridian Properties</div>
  <h1>Downtown Development<br>Project</h1>
  <p>Mixed-use residential &amp; commercial complex</p>
</div></div>

<div id="stats">
  <div class="stat"><div class="val">12</div><div class="label">Units</div></div>
  <div class="stat"><div class="val">45,000</div><div class="label">Sq Ft</div></div>
  <div class="stat"><div class="val">$28M</div><div class="label">Valuation</div></div>
</div>

<div id="badge">
  <span class="rendered">Rendered by</span>
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7v10l10 5 10-5V7L12 2z" stroke="#60a5fa" stroke-width="1.6" fill="rgba(96,165,250,0.1)"/><path d="M12 22V12M2 7l10 5 10-5" stroke="#60a5fa" stroke-width="1.6"/></svg>
  <span style="color:rgba(255,255,255,0.85);font-weight:600;font-size:0.75rem;">SceneView</span>
</div>

<canvas id="viewer"></canvas>

<script src="js/filament/filament.js"></script>
<script src="js/sceneview.js?v=3.5.2"></script>
<script>
SceneView.modelViewer("viewer", "models/DamagedHelmet.glb", {
  backgroundColor: [0.02, 0.025, 0.045, 1.0],
  fov: 35,
  iblIntensity: 55000,
  skybox: false
}).then(function(instance) {

  // ── Camera position ──
  instance._orbitRadius = 4;
  instance._orbitHeight = 1.5;
  instance._angle = -0.5;

  // ── Hide loading overlay ──
  document.getElementById('loading').classList.add('hidden');

  console.log("SceneView v" + SceneView.version + ": Architecture demo loaded");
  console.log("  Post-processing: bloom, fog, vignette, MSAA (via quality:high)");
  console.log("  Lights: blue spot + warm point accent");
  console.log("  Camera: FOV 35, orbit 0.006 rad/frame, limits [2..8]");

}).catch(function(err) {
  console.error("SceneView architecture failed:", err);
  document.getElementById('loading').classList.add('hidden');
});
</script>
</body>
</html>
