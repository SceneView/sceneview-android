<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>SceneView Web — Filament.js 3D Rendering</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Inter', system-ui, sans-serif; color: #fff; }
canvas { width: 90vw; height: 75vh; max-width: 1200px; border-radius: 12px; }
#status { margin: 12px; font-size: 13px; color: #8ab4f8; text-align: center; }
h1 { font-size: 1.4rem; margin-bottom: 2px; background: linear-gradient(135deg, #fff, #8ab4f8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.sub { font-size: 0.75rem; color: #9aa0a6; margin-bottom: 12px; }
.badge { position: fixed; bottom: 12px; right: 12px; font-size: 0.65rem; color: #9aa0a6; background: rgba(0,0,0,0.5); padding: 3px 8px; border-radius: 6px; }
</style>
</head>
<body>
<h1>SceneView Web</h1>
<div class="sub">Real-time 3D — Filament.js WASM — 25KB SDK</div>
<div id="status">Loading Filament.js WASM...</div>
<canvas id="canvas"></canvas>
<div class="badge">Powered by SceneView + Filament.js</div>

<script src="js/filament/filament.js"></script>
<script>
const status = document.getElementById('status');
const canvas = document.getElementById('canvas');
canvas.width = canvas.clientWidth * devicePixelRatio;
canvas.height = canvas.clientHeight * devicePixelRatio;

const MODEL_URL = 'models/platforms/DamagedHelmet.glb';

Filament.init([MODEL_URL], () => {
  status.textContent = 'Creating scene...';
  try {
    const engine = Filament.Engine.create(canvas);
    const scene = engine.createScene();
    const renderer = engine.createRenderer();
    const cam = engine.createCamera(Filament.EntityManager.get().create());
    const view = engine.createView();
    const sc = engine.createSwapChain();

    view.setCamera(cam);
    view.setScene(scene);
    view.setViewport([0, 0, canvas.width, canvas.height]);
    renderer.setClearOptions({ clearColor: [0.05, 0.06, 0.1, 1.0], clear: true });
    cam.setProjectionFov(45, canvas.width / canvas.height, 0.1, 100, Filament.Camera$Fov.VERTICAL);

    // Sunlight
    const sun = Filament.EntityManager.get().create();
    Filament.LightManager.Builder(Filament.LightManager$Type.SUN)
      .color([0.98, 0.92, 0.89])
      .intensity(110000)
      .direction([0.6, -1.0, -0.8])
      .sunAngularRadius(1.9)
      .sunHaloSize(10.0)
      .sunHaloFalloff(80.0)
      .build(engine, sun);
    scene.addEntity(sun);

    // Fill light
    const fill = Filament.EntityManager.get().create();
    Filament.LightManager.Builder(Filament.LightManager$Type.DIRECTIONAL)
      .color([0.6, 0.65, 0.8])
      .intensity(30000)
      .direction([-0.5, 0.5, 1.0])
      .build(engine, fill);
    scene.addEntity(fill);

    // Load glTF model
    status.textContent = 'Loading 3D model...';
    const loader = engine.createAssetLoader();
    const asset = loader.createAsset(Filament.assets[MODEL_URL]);

    if (asset) {
      // Load textures and materials from the GLB
      asset.loadResources();

      // Add to scene
      scene.addEntity(asset.getRoot());
      const renderables = asset.getRenderableEntities();
      scene.addEntities(renderables);

      status.textContent = 'SceneView Web — Filament.js rendering! (' + renderables.length + ' meshes)';
      status.style.color = '#34a853';
    } else {
      status.textContent = 'Rendering empty scene (model loading failed)';
      status.style.color = '#fbbc04';
    }

    // Render loop with rotating camera
    let angle = 0;
    function render() {
      angle += 0.006;
      const r = 3.5;
      cam.lookAt(
        [Math.sin(angle) * r, 0.8, Math.cos(angle) * r],
        [0, 0, 0],
        [0, 1, 0]
      );

      if (renderer.beginFrame(sc)) {
        renderer.render(sc, view);
        renderer.endFrame();
      }
      engine.execute();
      requestAnimationFrame(render);
    }
    render();

  } catch (e) {
    status.textContent = 'Error: ' + e.message;
    status.style.color = '#ea4335';
    console.error(e);
  }
});
</script>
</body>
</html>
