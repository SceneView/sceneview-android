<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SceneView 3D Chart</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; overflow: hidden; font-family: -apple-system, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif; }
  canvas { display: block; }
  #header { position: absolute; top: 20px; left: 28px; z-index: 10; pointer-events: none; }
  #header h1 { font-size: 1.6rem; font-weight: 700; color: #f1f5f9; transition: opacity 0.6s; letter-spacing: -0.01em; }
  #header p { font-size: 0.9rem; color: #94a3b8; margin-top: 4px; transition: opacity 0.6s; }
  #badge {
    position: absolute; bottom: 20px; right: 24px; z-index: 10;
    display: flex; align-items: center; gap: 7px;
    background: rgba(255,255,255,0.9); border: 1px solid rgba(0,0,0,0.05);
    border-radius: 8px; padding: 7px 14px; backdrop-filter: blur(8px);
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  #badge svg { width: 16px; height: 16px; }
  #badge .rendered { color: #94a3b8; font-size: 0.65rem; margin-right: 2px; }
  #tooltip {
    position: absolute; display: none; background: rgba(255,255,255,0.97);
    border: 1px solid rgba(0,0,0,0.06); border-radius: 12px;
    padding: 14px 18px; color: #1e293b; pointer-events: none; z-index: 20;
    backdrop-filter: blur(16px); min-width: 170px; box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  }
  #tooltip .label { color: #64748b; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; }
  #tooltip .value { font-size: 1.6rem; font-weight: 700; margin-top: 3px; color: #0f172a; }
  #tooltip .sub { color: #22c55e; font-size: 0.75rem; margin-top: 4px; font-weight: 600; }
  #scene-label {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    z-index: 10; pointer-events: none; text-align: center;
  }
  #scene-label .num { font-size: 0.65rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; }
  #scene-label .dots { display: flex; gap: 6px; justify-content: center; margin-top: 6px; }
  #scene-label .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: all 0.4s; }
  #scene-label .dot.active { background: rgba(255,255,255,0.7); width: 18px; border-radius: 3px; }
</style>
</head>
<body>
<div id="header">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
    <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
      <rect width="32" height="32" rx="7" fill="#1e3a5f"/>
      <path d="M8 16h4l3-6 4 12 3-6h4" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="16" cy="8" r="2.5" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
      <circle cx="16" cy="8" r="1" fill="#60a5fa"/>
    </svg>
    <span style="font-size:1rem;font-weight:700;color:#e2e8f0;">Apex Ventures</span>
  </div>
  <h1 id="title">Q1 2026 Revenue by Region</h1>
  <p id="subtitle">Board meeting dashboard</p>
</div>
<div id="badge">
  <span class="rendered">Rendered by</span>
  <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7v10l10 5 10-5V7L12 2z" stroke="#3b82f6" stroke-width="1.8" fill="rgba(59,130,246,0.08)"/><path d="M12 22V12M2 7l10 5 10-5" stroke="#3b82f6" stroke-width="1.8"/></svg>
  <span style="color:#334155;font-weight:600;font-size:0.72rem;">SceneView</span>
</div>
<div id="scene-label">
  <div class="dots" id="dots"></div>
</div>
<div id="tooltip"></div>

<script type="importmap">{"imports":{"three":"js/three/three.module.js","three/addons/environments/RoomEnvironment.js":"js/three/RoomEnvironment.js","three/addons/loaders/RGBELoader.js":"js/three/RGBELoader.js"}}</script>
<script type="module">
import * as THREE from 'three';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

// === SCENES DATA ===
const scenes = [
  {
    title: "Q1 2026 Revenue by Region",
    subtitle: "Year-over-year performance",
    bars: [
      { label: "North America", value: 4.2, growth: "+12%", color: 0x2563eb },
      { label: "Europe", value: 3.1, growth: "+8%", color: 0x4f46e5 },
      { label: "Asia Pacific", value: 2.8, growth: "+22%", color: 0x7c3aed },
      { label: "Latin America", value: 1.4, growth: "+15%", color: 0x9333ea },
      { label: "Middle East", value: 0.9, growth: "+31%", color: 0xc026d3 },
    ],
    prefix: "$", suffix: "M",
  },
  {
    title: "Quarterly Revenue Trend",
    subtitle: "Consistent growth trajectory",
    bars: [
      { label: "Q1 2025", value: 8.2, growth: "", color: 0x475569 },
      { label: "Q2 2025", value: 9.1, growth: "+11%", color: 0x6366f1 },
      { label: "Q3 2025", value: 10.8, growth: "+19%", color: 0x818cf8 },
      { label: "Q4 2025", value: 11.5, growth: "+6%", color: 0xa78bfa },
      { label: "Q1 2026", value: 12.4, growth: "+8%", color: 0x2563eb },
    ],
    prefix: "$", suffix: "M",
  },
  {
    title: "Product Line Breakdown",
    subtitle: "SaaS platform leading growth",
    bars: [
      { label: "SaaS Platform", value: 5.8, growth: "+28%", color: 0x0ea5e9 },
      { label: "Consulting", value: 3.2, growth: "+5%", color: 0x6366f1 },
      { label: "Data Analytics", value: 2.1, growth: "+42%", color: 0x8b5cf6 },
      { label: "Cloud Infra", value: 1.3, growth: "+18%", color: 0xd946ef },
    ],
    prefix: "$", suffix: "M",
  },
  {
    title: "2026 Annual Forecast",
    subtitle: "On track to exceed targets",
    bars: [
      { label: "Revenue", value: 48.6, growth: "+24%", color: 0x2563eb },
      { label: "ARR", value: 42.0, growth: "+31%", color: 0x7c3aed },
      { label: "Pipeline", value: 85.0, growth: "+18%", color: 0x0ea5e9 },
    ],
    prefix: "$", suffix: "M",
  },
];

const SCENE_DURATION = 8.0; // seconds per scene
const TRANSITION_DURATION = 1.0;

let scene, camera, renderer;
let currentBars = [];
let animStartTime = 0;
let currentSceneIndex = -1;

function glassMaterial(color) {
  return new THREE.MeshPhysicalMaterial({
    color,
    roughness: 0.05,
    metalness: 0.0,
    clearcoat: 1.0,
    clearcoatRoughness: 0.02,
    transparent: true,
    opacity: 1.0,
    envMapIntensity: 2.5,
    reflectivity: 1.0,
    ior: 2.0,
    thickness: 3.0,
    transmission: 0.85,
    specularIntensity: 1.0,
    specularColor: new THREE.Color(0xffffff),
    attenuationColor: new THREE.Color(color),
    attenuationDistance: 0.8,
    sheen: 0.4,
    sheenColor: new THREE.Color(color),
    sheenRoughness: 0.15,
  });
}

async function init() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 100);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  // Load HDRs
  const pmremGenerator = new THREE.PMREMGenerator(renderer);
  pmremGenerator.compileEquirectangularShader();
  try {
    const loader = new RGBELoader();
    const skyTexture = await new Promise((res, rej) => {
      loader.load('https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/citrus_orchard_road_puresky_1k.hdr', res, undefined, rej);
    });
    const envMap = pmremGenerator.fromEquirectangular(skyTexture).texture;
    scene.background = envMap;
    scene.environment = envMap;
    skyTexture.dispose();
  } catch(e) {
    scene.environment = pmremGenerator.fromScene(new RoomEnvironment()).texture;
  }
  pmremGenerator.dispose();

  // Lighting
  scene.add(new THREE.AmbientLight(0xd0d8e8, 0.2));
  const key = new THREE.DirectionalLight(0xfff8f0, 0.6);
  key.position.set(5, 12, 7);
  key.castShadow = true;
  key.shadow.mapSize.set(2048, 2048);
  key.shadow.camera.near = 0.5; key.shadow.camera.far = 40;
  key.shadow.camera.left = -12; key.shadow.camera.right = 12;
  key.shadow.camera.top = 12; key.shadow.camera.bottom = -4;
  key.shadow.radius = 8; key.shadow.bias = -0.001;
  scene.add(key);

  // Reflective ground — mirrors the sky
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(60, 40),
    new THREE.MeshStandardMaterial({ color: 0x445566, roughness: 0.15, metalness: 0.4, envMapIntensity: 1.5 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.01;
  ground.receiveShadow = true;
  scene.add(ground);

  // Scene dots UI
  const dotsEl = document.getElementById('dots');
  scenes.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.id = 'dot-' + i;
    dotsEl.appendChild(d);
  });

  // Interaction
  renderer.domElement.addEventListener('wheel', e => {
    camera.position.z = Math.max(10, Math.min(24, camera.position.z + e.deltaY * 0.008));
  });
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  animStartTime = performance.now() / 1000;
  animate();
}

function clearBars() {
  currentBars.forEach(b => {
    scene.remove(b.group);
    b.group.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
  });
  currentBars = [];
}

function buildScene(sceneData) {
  clearBars();
  const spacing = sceneData.bars.length <= 3 ? 2.4 : 1.9;
  const offset = -(sceneData.bars.length - 1) * spacing / 2;

  sceneData.bars.forEach((d, i) => {
    const group = new THREE.Group();
    group.position.x = offset + i * spacing;
    const maxVal = Math.max(...sceneData.bars.map(b => b.value));
    const targetH = (d.value / maxVal) * 4.0; // normalize: tallest bar = 4 units

    // Glass bar
    const bar = new THREE.Mesh(new THREE.BoxGeometry(0.85, targetH, 0.85), glassMaterial(d.color));
    bar.position.y = targetH / 2;
    bar.castShadow = true;
    bar.receiveShadow = true;
    bar.userData = d;
    group.add(bar);

    // Glow
    const glow = new THREE.Mesh(
      new THREE.PlaneGeometry(1.8, 1.8),
      new THREE.MeshBasicMaterial({ color: d.color, transparent: true, opacity: 0.08, side: THREE.DoubleSide })
    );
    glow.rotation.x = -Math.PI / 2;
    glow.position.y = 0.006;
    group.add(glow);

    // Value label
    const vc = document.createElement('canvas');
    vc.width = 200; vc.height = 56;
    const vx = vc.getContext('2d');
    vx.fillStyle = '#f1f5f9';
    vx.font = '700 28px -apple-system, SF Pro Display, sans-serif';
    vx.textAlign = 'center';
    vx.fillText(sceneData.prefix + d.value + sceneData.suffix, 100, 36);
    const valSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(vc), transparent: true, opacity: 0 }));
    valSprite.position.y = targetH + 0.5;
    valSprite.scale.set(2.0, 0.6, 1);
    group.add(valSprite);

    // Growth badge
    if (d.growth) {
      const gc = document.createElement('canvas');
      gc.width = 96; gc.height = 40;
      const gx = gc.getContext('2d');
      gx.fillStyle = 'rgba(34,197,94,0.2)';
      gx.beginPath(); gx.roundRect(8,4,80,32,12); gx.fill();
      gx.fillStyle = '#4ade80';
      gx.font = '700 17px -apple-system, sans-serif';
      gx.textAlign = 'center';
      gx.fillText(d.growth, 48, 26);
      const growthSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(gc), transparent: true, opacity: 0 }));
      growthSprite.position.y = targetH + 0.95;
      growthSprite.scale.set(0.9, 0.38, 1);
      group.add(growthSprite);
      currentBars.push({ group, targetH, valSprite, growthSprite, bar });
    } else {
      currentBars.push({ group, targetH, valSprite, growthSprite: null, bar });
    }

    // Name
    const nc = document.createElement('canvas');
    nc.width = 256; nc.height = 48;
    const nx = nc.getContext('2d');
    nx.fillStyle = '#94a3b8';
    nx.font = '500 17px -apple-system, SF Pro Display, sans-serif';
    nx.textAlign = 'center';
    nx.fillText(d.label, 128, 30);
    const nameSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(nc), transparent: true, opacity: 0 }));
    nameSprite.position.set(0, -0.5, 1.1);
    nameSprite.scale.set(2.1, 0.4, 1);
    group.add(nameSprite);
    currentBars[currentBars.length - 1].nameSprite = nameSprite;

    group.scale.y = 0.001;
    scene.add(group);
  });

  // Trend line
  if (sceneData.bars.length >= 3) {
    const trendGroup = new THREE.Group();
    trendGroup.userData.isTrend = true;
    const maxVal = Math.max(...sceneData.bars.map(b => b.value));
    const pts = sceneData.bars.map((d, i) => {
      const h = (d.value / maxVal) * 4.0;
      return new THREE.Vector3(offset + i * spacing, h, 0);
    });
    const curve = new THREE.CatmullRomCurve3(pts);
    trendGroup.add(new THREE.Mesh(
      new THREE.TubeGeometry(curve, 32, 0.02, 6, false),
      new THREE.MeshPhysicalMaterial({ color: 0x3b82f6, roughness: 0.2, metalness: 0.3, transparent: true, opacity: 0, emissive: 0x3b82f6, emissiveIntensity: 0.3 })
    ));
    sceneData.bars.forEach((d, i) => {
      const h = (d.value / maxVal) * 4.0;
      const sp = new THREE.Mesh(
        new THREE.SphereGeometry(0.06, 16, 16),
        new THREE.MeshPhysicalMaterial({ color: 0xffffff, emissive: d.color, emissiveIntensity: 0.5, transparent: true, opacity: 0 })
      );
      sp.position.set(offset + i * spacing, h, 0);
      trendGroup.add(sp);
    });
    scene.add(trendGroup);
    currentBars.trendGroup = trendGroup;
  }
}

function smoothstep(a, b, t) {
  t = Math.max(0, Math.min(1, (t - a) / (b - a)));
  return t * t * (3 - 2 * t);
}

function easeOutElastic(t) {
  if (t === 0 || t === 1) return t;
  return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * (2 * Math.PI) / 3) + 1;
}

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now() / 1000;
  const elapsed = now - animStartTime;

  const totalDuration = SCENE_DURATION + TRANSITION_DURATION;
  const loopTime = elapsed % (scenes.length * totalDuration);
  const newSceneIndex = Math.floor(loopTime / totalDuration) % scenes.length;
  const sceneTime = loopTime - newSceneIndex * totalDuration;

  // Switch scene
  if (newSceneIndex !== currentSceneIndex) {
    currentSceneIndex = newSceneIndex;
    const sd = scenes[currentSceneIndex];
    // Fade out title, change, fade in
    const titleEl = document.getElementById('title');
    const subEl = document.getElementById('subtitle');
    titleEl.style.opacity = '0'; subEl.style.opacity = '0';
    setTimeout(() => {
      titleEl.textContent = sd.title;
      subEl.textContent = sd.subtitle;
      titleEl.style.opacity = '1'; subEl.style.opacity = '1';
    }, 400);
    buildScene(sd);
    // Update dots
    scenes.forEach((_, i) => {
      document.getElementById('dot-' + i).className = 'dot' + (i === currentSceneIndex ? ' active' : '');
    });
  }

  // === SMOOTH CONTINUOUS CAMERA — never jumps, always moving ===
  const globalIntro = smoothstep(0, 4.0, elapsed);

  // Continuous slow orbit — always based on total elapsed, never resets
  const orbitAngle = elapsed * 0.1;
  const orbitX = Math.sin(orbitAngle) * 4.0;
  const orbitZ = 12 + Math.cos(orbitAngle * 0.6) * 2.0;
  const breatheY = Math.sin(elapsed * 0.15) * 0.4;

  // Camera height: stay low to see sky above bars
  const baseY = 3.0 + Math.sin(elapsed * 0.08) * 0.5;

  // Intro: start far and high, come to final position
  const startX = -6, startY = 8, startZ = 22;
  const camX = startX + (orbitX - startX) * globalIntro;
  const camY = startY + (baseY - startY) * globalIntro + breatheY * globalIntro;
  const camZ = startZ + (orbitZ - startZ) * globalIntro;

  // Look at center of bars, slightly up to frame sky
  const lookY = 4.0 + (2.0 - 4.0) * globalIntro;

  camera.position.set(camX, camY, camZ);
  camera.lookAt(0, lookY, 0);
  camera.fov = 50 - 10 * globalIntro;
  camera.updateProjectionMatrix();

  // === BAR ANIMATIONS ===
  const barAnimDuration = 1.0;
  currentBars.forEach((b, i) => {
    if (!b || !b.group) return;
    const delay = 0.3 + i * 0.1;
    const t = Math.max(0, Math.min(1, (sceneTime - delay) / barAnimDuration));
    const ease = easeOutElastic(t);
    b.group.scale.y = Math.max(0.001, ease);

    // Labels
    const lT = Math.max(0, Math.min(1, (sceneTime - delay - barAnimDuration * 0.3) / 0.5));
    if (b.valSprite) b.valSprite.material.opacity = lT;
    if (b.nameSprite) b.nameSprite.material.opacity = lT;
    if (b.growthSprite) b.growthSprite.material.opacity = Math.max(0, Math.min(1, (sceneTime - delay - barAnimDuration * 0.6) / 0.4));

    // Exit animation before scene change
    const exitStart = SCENE_DURATION - 0.8;
    const exitT = smoothstep(exitStart, exitStart + 0.6, sceneTime);
    if (exitT > 0) {
      b.group.scale.y *= (1 - exitT);
      if (b.valSprite) b.valSprite.material.opacity *= (1 - exitT);
      if (b.nameSprite) b.nameSprite.material.opacity *= (1 - exitT);
      if (b.growthSprite) b.growthSprite.material.opacity *= (1 - exitT);
    }

    // Pulse when settled
    if (t >= 1 && exitT === 0) {
      b.group.scale.y = 1 + Math.sin(elapsed * 1.2 + i * 0.9) * 0.005;
    }
  });

  // Trend line
  if (currentBars.trendGroup) {
    const tT = smoothstep(1.5, 2.5, sceneTime);
    const exitStart = SCENE_DURATION - 0.8;
    const exitT = smoothstep(exitStart, exitStart + 0.6, sceneTime);
    currentBars.trendGroup.traverse(o => {
      if (o.material && o !== currentBars.trendGroup) o.material.opacity = tT * 0.6 * (1 - exitT);
    });
  }

  renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
