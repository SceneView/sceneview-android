<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SceneView Wrapper Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; font-family: 'Inter', system-ui, sans-serif; color: #fff; height: 100vh; display: flex; flex-direction: column; }
.header { text-align: center; padding: 16px; }
h1 { font-size: 1.3rem; background: linear-gradient(135deg, #fff, #8ab4f8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.sub { font-size: 0.75rem; color: #9aa0a6; margin-top: 2px; }
#status { font-size: 0.8rem; color: #8ab4f8; margin-top: 8px; }
canvas { flex: 1; width: 100%; cursor: grab; }
canvas:active { cursor: grabbing; }
.models { display: flex; gap: 8px; justify-content: center; padding: 12px; flex-wrap: wrap; }
.models button { background: rgba(26,115,232,0.15); border: 1px solid rgba(26,115,232,0.3); color: #8ab4f8; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-family: inherit; transition: all 0.2s; }
.models button:hover, .models button.active { background: rgba(26,115,232,0.3); border-color: #1a73e8; color: #fff; }
.code { text-align: center; padding: 8px; font-size: 0.7rem; color: #9aa0a6; }
.code code { background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 4px; color: #8ab4f8; font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>

<div class="header">
<h1>SceneView Wrapper Test</h1>
<div class="sub">Uses ONLY SceneView.modelViewer() — no inline Filament code.</div>
<div id="status">Loading...</div>
</div>

<canvas id="viewer"></canvas>

<div class="models">
<button class="active" onclick="load(this, 'DamagedHelmet')">Damaged Helmet</button>
<button onclick="load(this, 'SheenChair')">Sheen Chair</button>
<button onclick="load(this, 'ToyCar')">Toy Car</button>
<button onclick="load(this, 'GlassVaseFlowers')">Glass Vase</button>
<button onclick="load(this, 'Fox')">Fox</button>
<button onclick="load(this, 'Duck')">Duck</button>
</div>

<div class="code">
<code>SceneView.modelViewer("viewer", modelUrl)</code>
</div>

<!-- Only one script needed — sceneview.js loads Filament.js CDN automatically -->
<script src="js/sceneview.js"></script>
<script>
const BASE = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models';
const MODELS = {
  'DamagedHelmet': BASE + '/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
  'SheenChair':    BASE + '/SheenChair/glTF-Binary/SheenChair.glb',
  'ToyCar':        BASE + '/ToyCar/glTF-Binary/ToyCar.glb',
  'GlassVaseFlowers': BASE + '/GlassVaseFlowers/glTF-Binary/GlassVaseFlowers.glb',
  'Fox':           BASE + '/Fox/glTF-Binary/Fox.glb',
  'Duck':          BASE + '/Duck/glTF-Binary/Duck.glb'
};

const status = document.getElementById('status');
let currentViewer = null;

// One-liner API: SceneView.modelViewer("canvas", "model.glb")
SceneView.modelViewer("viewer", MODELS['DamagedHelmet']).then(function(viewer) {
  currentViewer = viewer;
  status.textContent = 'Drag to rotate · Scroll to zoom';
  status.style.color = '#34a853';
}).catch(function(err) {
  status.textContent = 'Error: ' + err.message;
  status.style.color = '#ea4335';
  console.error(err);
});

function load(btn, name) {
  document.querySelectorAll('.models button').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  if (currentViewer) {
    status.textContent = 'Loading model...';
    status.style.color = '#8ab4f8';
    currentViewer.loadModel(MODELS[name]).then(function() {
      status.textContent = 'Drag to rotate · Scroll to zoom';
      status.style.color = '#34a853';
    }).catch(function(err) {
      status.textContent = 'Error: ' + err.message;
      status.style.color = '#ea4335';
    });
  }
}
</script>
</body>
</html>
