<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SceneView 3D</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { background: transparent; overflow: hidden; }
    model-viewer { width: 100vw; height: 100vh; --poster-color: transparent; }
  </style>
</head>
<body>
  <script>
    const params = new URLSearchParams(window.location.search);
    const model = params.get('model');
    if (model) {
      document.body.innerHTML = `<model-viewer src="${model}" auto-rotate camera-controls shadow-intensity="1" environment-image="neutral" style="width:100%;height:100%"></model-viewer>`;
    }
  </script>
</body>
</html>
