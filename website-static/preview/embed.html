<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SceneView 3D</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script src="../js/filament/filament.js"></script>
  <script src="../js/sceneview.js?v=3.5.2"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { background: transparent; overflow: hidden; }
    canvas { width: 100vw !important; height: 100vh !important; display: block; }
  </style>
</head>
<body>
  <canvas id="viewer"></canvas>
  <script>
    var params = new URLSearchParams(window.location.search);
    var model = params.get('model');
    if (model && /^https?:\/\/.+\.(glb|gltf|usdz)(\?.*)?$/i.test(model)) {
      SceneView.modelViewer('viewer', model);
    }
  </script>
</body>
</html>
