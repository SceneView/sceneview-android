<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SceneView 3D Preview</title>
  <meta name="description" content="Interactive 3D preview — powered by SceneView">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <script src="../js/filament/filament.js"></script>
  <script src="../js/sceneview.js?v=3.5.1"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #111827;
      color: #f9fafb;
      min-height: 100vh;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #1f2937;
      border-bottom: 1px solid #374151;
    }
    .header a { color: #8ab4f8; text-decoration: none; font-weight: 600; }
    .header .actions { display: flex; gap: 12px; }
    .header .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.8rem;
      text-decoration: none;
      font-weight: 500;
      border: none;
      cursor: pointer;
    }
    .btn-share { background: #374151; color: #d1d5db; }
    .viewer {
      width: 100%;
      height: calc(100vh - 56px);
    }
    canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
    .empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: calc(100vh - 56px);
      text-align: center;
      color: #6b7280;
    }
    .empty h2 { color: #8ab4f8; margin-bottom: 0.5rem; }
    .empty code {
      display: block;
      background: #1f2937;
      padding: 12px 20px;
      border-radius: 8px;
      margin-top: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: #d1d5db;
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="/">SceneView</a>
    <div class="actions" id="actions" style="display:none">
      <button class="btn btn-share" id="share-btn" type="button">Share</button>
    </div>
  </div>

  <div class="viewer" id="viewer-container">
    <canvas id="viewer"></canvas>
  </div>
  <div class="empty" id="empty" style="display:none">
    <div>
      <h2>3D Preview</h2>
      <p>Pass a model URL to preview it:</p>
      <code>sceneview.github.io/preview?model=https://example.com/model.glb</code>
    </div>
  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var modelUrl = params.get('model');
    var autoRotate = params.get('rotate') !== 'false';

    var viewerContainer = document.getElementById('viewer-container');
    var empty = document.getElementById('empty');
    var actions = document.getElementById('actions');

    if (modelUrl) {
      actions.style.display = 'flex';
      SceneView.modelViewer('viewer', modelUrl, { autoRotate: autoRotate });

      document.getElementById('share-btn').addEventListener('click', function (e) {
        if (navigator.share) {
          navigator.share({ title: 'SceneView 3D Preview', url: window.location.href });
        } else {
          navigator.clipboard.writeText(window.location.href);
          e.target.textContent = 'Link copied!';
          setTimeout(function () { e.target.textContent = 'Share'; }, 2000);
        }
      });
    } else {
      viewerContainer.style.display = 'none';
      empty.style.display = 'flex';
    }
  </script>
</body>
</html>
