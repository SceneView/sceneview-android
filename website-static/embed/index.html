<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SceneView 3D Embed</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <!-- SceneView.js — Filament PBR renderer -->
  <script src="../js/filament/filament.js"></script>
  <script src="../js/sceneview.js?v=3.5.2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: var(--bg-color, #1a1a2e);
      display: flex;
      flex-direction: column;
    }

    #viewer-container {
      flex: 1;
      position: relative;
      min-height: 0;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-color, #1a1a2e);
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-top-color: #5b8def;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      color: #aaa;
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
    }

    .error-message.visible { display: flex; }

    .error-message div { max-width: 320px; }

    .error-message code {
      display: block;
      margin-top: 8px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      font-size: 12px;
      word-break: break-all;
      color: #ccc;
    }

    .watermark {
      position: absolute;
      bottom: 8px;
      right: 10px;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.35);
      text-decoration: none;
      z-index: 5;
      transition: color 0.2s;
      pointer-events: auto;
    }

    .watermark:hover { color: rgba(255, 255, 255, 0.7); }

    .watermark svg {
      width: 12px;
      height: 12px;
      opacity: 0.5;
    }

    .footer {
      flex-shrink: 0;
      text-align: center;
      padding: 4px 8px;
      background: rgba(0, 0, 0, 0.3);
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .footer a {
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }

    .footer a:hover { color: rgba(255, 255, 255, 0.7); }

    .footer.hidden { display: none; }
  </style>
</head>
<body>
  <div id="viewer-container">
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
    </div>

    <div class="error-message" id="error">
      <div>
        <strong>No model specified</strong><br>
        Add a <code>?model=URL_TO_GLB</code> parameter to the embed URL.
      </div>
    </div>

    <canvas id="viewer"></canvas>

    <a class="watermark" href="https://sceneview.github.io" target="_blank" rel="noopener" title="SceneView — 3D & AR SDK">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      SceneView
    </a>
  </div>

  <div class="footer" id="footer">
    <a href="https://sceneview.github.io" target="_blank" rel="noopener">Powered by SceneView</a>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var modelUrl = params.get('model');
      var autorotate = params.get('autorotate') !== 'false';
      var bg = params.get('bg');
      var nofooter = params.has('nofooter');

      var loading = document.getElementById('loading');
      var error = document.getElementById('error');
      var footer = document.getElementById('footer');
      var canvas = document.getElementById('viewer');

      if (bg) {
        var color = bg.startsWith('#') ? bg : '#' + bg;
        document.body.style.setProperty('--bg-color', color);
        document.body.style.background = color;
      }

      if (nofooter) footer.classList.add('hidden');

      if (!modelUrl) {
        loading.classList.add('hidden');
        canvas.style.display = 'none';
        error.classList.add('visible');
        return;
      }

      SceneView.modelViewer('viewer', modelUrl, { autoRotate: autorotate })
        .then(function () { loading.classList.add('hidden'); })
        .catch(function () { loading.classList.add('hidden'); });

      setTimeout(function () { loading.classList.add('hidden'); }, 15000);
    })();
  </script>
</body>
</html>
