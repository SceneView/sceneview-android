<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8AB4F8"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <linearGradient id="rg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#1A73E8"/>
    </linearGradient>
    <linearGradient id="lg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A73E8"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>

  <!-- Isometric cube — compact for favicon -->
  <!-- Left face -->
  <polygon points="16,18 7,13 7,22 16,27" fill="url(#lg)"/>
  <!-- Right face -->
  <polygon points="16,18 25,13 25,22 16,27" fill="url(#rg)"/>
  <!-- Top face -->
  <polygon points="16,9 25,14 16,19 7,14" fill="url(#tg)"/>

  <!-- Viewport brackets — subtle at small size -->
  <polyline points="4,7 4,4 7,4"
            fill="none" stroke="#1A73E8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="28,7 28,4 25,4"
            fill="none" stroke="#1A73E8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="4,25 4,28 7,28"
            fill="none" stroke="#1A73E8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="28,25 28,28 25,28"
            fill="none" stroke="#1A73E8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
