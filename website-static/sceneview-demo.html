<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SceneView Web Demo — Interactive 3D Model Viewer</title>
<meta name="description" content="Interactive 3D model viewer demo powered by SceneView Web and Filament.js WASM. Switch between glTF models with real-time PBR rendering.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://sceneview.github.io/sceneview-demo.html">
<meta property="og:title" content="SceneView Web Demo — Interactive 3D Model Viewer">
<meta property="og:description" content="Interactive 3D model viewer powered by Filament.js WASM. Real-time PBR rendering in the browser.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sceneview.github.io/sceneview-demo.html">
<meta property="og:image" content="https://sceneview.github.io/favicon.svg">
<meta property="og:site_name" content="SceneView">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="SceneView Web Demo — 3D Model Viewer">
<meta name="twitter:description" content="Interactive 3D model viewer powered by Filament.js WASM. Real-time PBR rendering in the browser.">
<meta name="twitter:image" content="https://sceneview.github.io/favicon.svg">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; font-family: 'Inter', system-ui, sans-serif; color: #fff; height: 100vh; display: flex; flex-direction: column; }
.header { text-align: center; padding: 16px; }
h1 { font-size: 1.3rem; background: linear-gradient(135deg, #fff, #8ab4f8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.sub { font-size: 0.75rem; color: #9aa0a6; margin-top: 2px; }
#status { font-size: 0.8rem; color: #8ab4f8; margin-top: 8px; }
canvas { flex: 1; width: 100%; cursor: grab; }
canvas:active { cursor: grabbing; }
.models { display: flex; gap: 8px; justify-content: center; padding: 12px; flex-wrap: wrap; }
.models button { background: rgba(26,115,232,0.15); border: 1px solid rgba(26,115,232,0.3); color: #8ab4f8; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-family: inherit; transition: all 0.2s; }
.models button:hover, .models button.active { background: rgba(26,115,232,0.3); border-color: #1a73e8; color: #fff; }
.code { text-align: center; padding: 8px; font-size: 0.7rem; color: #9aa0a6; }
.code code { background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 4px; color: #8ab4f8; font-family: 'JetBrains Mono', monospace; }
.badge { position: fixed; bottom: 8px; right: 8px; font-size: 0.6rem; color: #666; }
</style>
</head>
<body>

<div class="header">
<h1>SceneView Web</h1>
<div class="sub">One line of code. Real-time PBR 3D. Powered by Filament.js WASM.</div>
<div id="status">Loading...</div>
</div>

<canvas id="viewer"></canvas>

<div class="models">
<button class="active" onclick="load(this, 'DamagedHelmet')">Damaged Helmet</button>
<button onclick="load(this, 'SheenChair')">Sheen Chair</button>
<button onclick="load(this, 'ToyCar')">Toy Car</button>
<button onclick="load(this, 'GlassVaseFlowers')">Glass Vase</button>
<button onclick="load(this, 'Fox')">Fox</button>
<button onclick="load(this, 'Duck')">Duck</button>
<button onclick="load(this, 'CarConcept')">Car Concept</button>
<button onclick="load(this, 'SunglassesKhronos')">Sunglasses</button>
<button onclick="load(this, 'ChronographWatch')">Watch</button>
<button onclick="load(this, 'MaterialsVariantsShoe')">Shoe</button>
<button onclick="load(this, 'IridescenceLamp')">Iridescent Lamp</button>
<button onclick="load(this, 'MosquitoInAmber')">Mosquito in Amber</button>
<button onclick="load(this, 'BoomBox')">BoomBox</button>
<button onclick="load(this, 'WaterBottle')">Water Bottle</button>
</div>

<div class="code">
<code>&lt;script src="sceneview.js"&gt;&lt;/script&gt;</code><br>
<code style="margin-top:4px;display:inline-block">SceneView.modelViewer("canvas", "model.glb")</code>
</div>

<div class="badge">Powered by SceneView + Filament.js</div>

<script src="js/filament/filament.js"></script>
<script src="js/sceneview.js?v=3.6.0"></script>
<script>
var BASE = 'models/platforms';
var MODELS = {
  'DamagedHelmet':        BASE + '/DamagedHelmet.glb',
  'SheenChair':           BASE + '/SheenChair.glb',
  'ToyCar':               BASE + '/ToyCar.glb',
  'GlassVaseFlowers':     BASE + '/GlassVaseFlowers.glb',
  'Fox':                  BASE + '/Fox.glb',
  'Duck':                 BASE + '/Duck.glb',
  'CarConcept':           BASE + '/CarConcept.glb',
  'SunglassesKhronos':    BASE + '/SunglassesKhronos.glb',
  'ChronographWatch':     BASE + '/ChronographWatch.glb',
  'MaterialsVariantsShoe':BASE + '/MaterialsVariantsShoe.glb',
  'IridescenceLamp':      BASE + '/IridescenceLamp.glb',
  'MosquitoInAmber':      BASE + '/MosquitoInAmber.glb',
  'WaterBottle':          BASE + '/WaterBottle.glb',
  'BoomBox':              BASE + '/BoomBox.glb'
};

var status = document.getElementById('status');
var viewer = null;

SceneView.modelViewer('viewer', MODELS['DamagedHelmet']).then(function(v) {
  viewer = v;
  status.textContent = 'Drag to rotate \u00b7 Scroll to zoom';
  status.style.color = '#34a853';
}).catch(function(e) {
  status.textContent = 'Error: ' + e.message;
  status.style.color = '#ea4335';
  console.error(e);
});

function load(btn, name) {
  document.querySelectorAll('.models button').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  if (viewer) {
    status.textContent = 'Loading...';
    status.style.color = '#8ab4f8';
    viewer.loadModel(MODELS[name]).then(function() {
      status.textContent = 'Drag to rotate \u00b7 Scroll to zoom';
      status.style.color = '#34a853';
    });
  }
}
</script>
</body>
</html>
