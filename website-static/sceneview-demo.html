<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SceneView Web Demo — Interactive 3D Model Viewer</title>
<meta name="description" content="Interactive 3D model viewer demo powered by SceneView Web and Filament.js WASM. Switch between glTF models with real-time PBR rendering.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://sceneview.github.io/sceneview-demo.html">
<meta property="og:title" content="SceneView Web Demo — Interactive 3D Model Viewer">
<meta property="og:description" content="Interactive 3D model viewer powered by Filament.js WASM. Real-time PBR rendering in the browser.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sceneview.github.io/sceneview-demo.html">
<meta property="og:image" content="https://sceneview.github.io/favicon.svg">
<meta property="og:site_name" content="SceneView">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="SceneView Web Demo — 3D Model Viewer">
<meta name="twitter:image" content="https://sceneview.github.io/favicon.svg">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; font-family: 'Inter', system-ui, sans-serif; color: #fff; height: 100vh; display: flex; flex-direction: column; }
.header { text-align: center; padding: 16px; }
h1 { font-size: 1.3rem; background: linear-gradient(135deg, #fff, #8ab4f8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.sub { font-size: 0.75rem; color: #9aa0a6; margin-top: 2px; }
#status { font-size: 0.8rem; color: #8ab4f8; margin-top: 8px; }
canvas { flex: 1; width: 100%; cursor: grab; }
canvas:active { cursor: grabbing; }
.models { display: flex; gap: 8px; justify-content: center; padding: 12px; flex-wrap: wrap; }
.models button { background: rgba(26,115,232,0.15); border: 1px solid rgba(26,115,232,0.3); color: #8ab4f8; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-family: inherit; transition: all 0.2s; }
.models button:hover, .models button.active { background: rgba(26,115,232,0.3); border-color: #1a73e8; color: #fff; }
.code { text-align: center; padding: 8px; font-size: 0.7rem; color: #9aa0a6; }
.code code { background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 4px; color: #8ab4f8; font-family: 'JetBrains Mono', monospace; }
.badge { position: fixed; bottom: 8px; right: 8px; font-size: 0.6rem; color: #666; }
</style>
</head>
<body>

<div class="header">
<h1>SceneView Web</h1>
<div class="sub">One line of code. Real-time PBR 3D. Powered by Filament.js WASM.</div>
<div id="status">Loading...</div>
</div>

<canvas id="viewer"></canvas>

<div class="models">
<button class="active" onclick="load(this, 'DamagedHelmet')">Damaged Helmet</button>
<button onclick="load(this, 'SheenChair')">Sheen Chair</button>
<button onclick="load(this, 'ToyCar')">Toy Car</button>
<button onclick="load(this, 'GlassVaseFlowers')">Glass Vase</button>
<button onclick="load(this, 'Fox')">Fox</button>
<button onclick="load(this, 'Duck')">Duck</button>
</div>

<div class="code">
<code>&lt;script src="sceneview.js"&gt;&lt;/script&gt;</code><br>
<code style="margin-top:4px;display:inline-block">SceneView.modelViewer("canvas", "model.glb")</code>
</div>

<div class="badge">Powered by SceneView + Filament.js</div>

<script src="https://cdn.jsdelivr.net/npm/filament@1.52.3/filament.js"></script>
<script src="js/sceneview.js"></script>
<script>
const BASE = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models';
const MODELS = {
  'DamagedHelmet': BASE + '/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
  'SheenChair':    BASE + '/SheenChair/glTF-Binary/SheenChair.glb',
  'ToyCar':        BASE + '/ToyCar/glTF-Binary/ToyCar.glb',
  'GlassVaseFlowers': BASE + '/GlassVaseFlowers/glTF-Binary/GlassVaseFlowers.glb',
  'Fox':           BASE + '/Fox/glTF-Binary/Fox.glb',
  'Duck':          BASE + '/Duck/glTF-Binary/Duck.glb'
};

const status = document.getElementById('status');
let viewer = null;

// Wait for Filament WASM to be ready, then use one-liner
const DEFAULT_MODEL = MODELS['DamagedHelmet'];
Filament.init([DEFAULT_MODEL], function() {
  status.textContent = 'Creating viewer...';
  try {
    const canvas = document.getElementById('viewer');
    canvas.width = canvas.clientWidth * devicePixelRatio;
    canvas.height = canvas.clientHeight * devicePixelRatio;

    const engine = Filament.Engine.create(canvas);
    const scene = engine.createScene();
    const renderer = engine.createRenderer();
    const cam = engine.createCamera(Filament.EntityManager.get().create());
    const view = engine.createView();
    const sc = engine.createSwapChain();

    view.setCamera(cam);
    view.setScene(scene);
    view.setViewport([0, 0, canvas.width, canvas.height]);
    renderer.setClearOptions({ clearColor: [0.05, 0.06, 0.1, 1.0], clear: true });
    cam.setProjectionFov(45, canvas.width / canvas.height, 0.1, 100, Filament.Camera$Fov.VERTICAL);

    // Lights
    const sun = Filament.EntityManager.get().create();
    Filament.LightManager.Builder(Filament.LightManager$Type.SUN)
      .color([0.98, 0.92, 0.89]).intensity(110000).direction([0.6, -1, -0.8])
      .sunAngularRadius(1.9).sunHaloSize(10).sunHaloFalloff(80)
      .build(engine, sun);
    scene.addEntity(sun);

    const fill = Filament.EntityManager.get().create();
    Filament.LightManager.Builder(Filament.LightManager$Type.DIRECTIONAL)
      .color([0.6, 0.65, 0.8]).intensity(30000).direction([-0.5, 0.5, 1])
      .build(engine, fill);
    scene.addEntity(fill);

    // Load default model
    const loader = engine.createAssetLoader();
    let currentAsset = null;

    function loadModel(url) {
      if (Filament.assets[url]) {
        showModel(url);
      } else {
        status.textContent = 'Downloading model...';
        status.style.color = '#8ab4f8';
        Filament.init([url], function() { showModel(url); });
      }
    }

    function showModel(url) {
      // Remove old
      if (currentAsset) {
        scene.remove(currentAsset.getRoot());
        currentAsset.getRenderableEntities().forEach(e => scene.remove(e));
      }
      const asset = loader.createAsset(Filament.assets[url]);
      if (asset) {
        asset.loadResources();
        scene.addEntity(asset.getRoot());
        scene.addEntities(asset.getRenderableEntities());
        currentAsset = asset;
        status.textContent = 'Drag to rotate · Scroll to zoom';
        status.style.color = '#34a853';
      }
    }

    showModel(DEFAULT_MODEL);

    // Orbit controls
    let angle = 0, orbitR = 3.5, orbitH = 0.8, dragging = false, lastX = 0, lastY = 0, autoRotate = true;

    canvas.addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; autoRotate = false; });
    canvas.addEventListener('mousemove', e => { if (!dragging) return; angle -= (e.clientX - lastX) * 0.005; orbitH += (e.clientY - lastY) * 0.01; lastX = e.clientX; lastY = e.clientY; });
    canvas.addEventListener('mouseup', () => dragging = false);
    canvas.addEventListener('mouseleave', () => dragging = false);
    canvas.addEventListener('wheel', e => { e.preventDefault(); orbitR *= (1 + e.deltaY * 0.001); orbitR = Math.max(0.5, Math.min(20, orbitR)); }, { passive: false });
    canvas.addEventListener('touchstart', e => { if (e.touches.length === 1) { dragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; autoRotate = false; } });
    canvas.addEventListener('touchmove', e => { if (!dragging) return; e.preventDefault(); angle -= (e.touches[0].clientX - lastX) * 0.005; orbitH += (e.touches[0].clientY - lastY) * 0.01; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; }, { passive: false });
    canvas.addEventListener('touchend', () => dragging = false);

    // Render loop
    function render() {
      if (autoRotate) angle += 0.006;
      cam.lookAt([Math.sin(angle) * orbitR, orbitH, Math.cos(angle) * orbitR], [0, 0, 0], [0, 1, 0]);
      if (renderer.beginFrame(sc)) { renderer.render(sc, view); renderer.endFrame(); }
      engine.execute();
      requestAnimationFrame(render);
    }
    render();

    // Expose for model switching buttons
    window.loadModel = loadModel;

  } catch(e) {
    status.textContent = 'Error: ' + e.message;
    status.style.color = '#ea4335';
    console.error(e);
  }
});

function load(btn, name) {
  document.querySelectorAll('.models button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (window.loadModel) window.loadModel(MODELS[name]);
}
</script>
</body>
</html>
