name: sceneview
description: Flutter plugin for SceneView — 3D and AR scenes using native renderers (Filament on Android, RealityKit on iOS).
version: 3.6.1
homepage: https://sceneview.github.io
repository: https://github.com/sceneview/sceneview
issue_tracker: https://github.com/sceneview/sceneview/issues
topics:
  - three-dimensional
  - ar
  - sceneview
  - filament
  - augmented-reality

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: io.github.sceneview.flutter
        pluginClass: SceneViewPlugin
      ios:
        pluginClass: SceneViewPlugin
