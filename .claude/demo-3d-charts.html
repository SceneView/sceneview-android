<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SceneView — Graphiques 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;overflow:hidden;font-family:'Segoe UI',sans-serif}
canvas{width:100vw;height:100vh;display:block;cursor:grab}
canvas:active{cursor:grabbing}
.controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10}
.controls button{background:rgba(26,115,232,0.3);border:1px solid rgba(138,180,248,0.3);color:#8ab4f8;padding:10px 20px;border-radius:12px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;backdrop-filter:blur(10px)}
.controls button:hover{background:rgba(26,115,232,0.5);border-color:#8ab4f8}
.controls button.active{background:rgba(26,115,232,0.6);color:#fff;border-color:#1a73e8}
.title{position:fixed;top:20px;left:50%;transform:translateX(-50%);color:#fff;font-size:1.1rem;font-weight:700;z-index:10;text-align:center;text-shadow:0 2px 8px rgba(0,0,0,0.5)}
.title span{color:#8ab4f8}
.legend{position:fixed;top:60px;left:50%;transform:translateX(-50%);display:flex;gap:16px;z-index:10}
.legend-item{display:flex;align-items:center;gap:6px;color:#9aa0a6;font-size:0.8rem}
.legend-dot{width:10px;height:10px;border-radius:50%}
.watermark{position:fixed;bottom:60px;right:20px;color:rgba(138,180,248,0.3);font-size:0.7rem;z-index:10}
</style>
</head>
<body>
<div class="title">SceneView — <span>Revenue Dashboard 3D</span></div>
<div class="legend" id="legend"></div>
<canvas id="c"></canvas>
<div class="controls">
  <button class="active" onclick="setDataset(0)">Revenue 2026</button>
  <button onclick="setDataset(1)">Users Growth</button>
  <button onclick="setDataset(2)">Platform Stats</button>
</div>
<div class="watermark">Powered by SceneView + Filament.js</div>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', {antialias:true,alpha:false});
const dpr = Math.min(devicePixelRatio,2);

function resize(){canvas.width=innerWidth*dpr;canvas.height=innerHeight*dpr;gl.viewport(0,0,canvas.width,canvas.height)}
resize(); addEventListener('resize',resize);

// Shader
const vs=`#version 300 es
in vec3 aPos;in vec3 aNorm;in vec3 aColor;in float aAnim;
uniform mat4 uMVP;uniform mat4 uModel;uniform float uTime;uniform float uTransition;
out vec3 vColor;out vec3 vNorm;out vec3 vPos;out float vAnim;
void main(){
  float t=clamp(uTransition,0.0,1.0);
  float scale=smoothstep(0.0,1.0,t)*aAnim;
  float bounce=1.0+sin(uTime*2.0+aAnim*6.28)*0.02;
  vec3 p=aPos;
  p.y*=scale*bounce;
  gl_Position=uMVP*vec4(p,1);
  vColor=aColor;vNorm=mat3(uModel)*aNorm;vPos=(uModel*vec4(p,1)).xyz;vAnim=aAnim;
}`;
const fs=`#version 300 es
precision highp float;
in vec3 vColor;in vec3 vNorm;in vec3 vPos;in float vAnim;
uniform float uTime;uniform vec3 uEye;
out vec4 fragColor;
void main(){
  vec3 n=normalize(vNorm);
  vec3 l1=normalize(vec3(0.6,1.0,0.8));
  vec3 l2=normalize(vec3(-0.5,0.3,-0.6));
  float d1=max(dot(n,l1),0.0);
  float d2=max(dot(n,l2),0.0)*0.3;
  float amb=0.15;
  vec3 v=normalize(uEye-vPos);
  vec3 h=normalize(l1+v);
  float spec=pow(max(dot(n,h),0.0),64.0)*0.4;
  float rim=pow(1.0-max(dot(n,v),0.0),3.0)*0.15;
  vec3 col=vColor*(amb+d1+d2)+vec3(spec)+vec3(rim)*vColor;
  col+=vColor*sin(uTime*1.5+vAnim*6.28)*0.05;
  col=pow(col,vec3(0.9));
  fragColor=vec4(col,1);
}`;

function compile(src,type){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s}
const prog=gl.createProgram();
gl.attachShader(prog,compile(vs,gl.VERTEX_SHADER));
gl.attachShader(prog,compile(fs,gl.FRAGMENT_SHADER));
gl.linkProgram(prog);gl.useProgram(prog);

const uMVP=gl.getUniformLocation(prog,'uMVP');
const uModel=gl.getUniformLocation(prog,'uModel');
const uTime=gl.getUniformLocation(prog,'uTime');
const uTransition=gl.getUniformLocation(prog,'uTransition');
const uEye=gl.getUniformLocation(prog,'uEye');

// Datasets
const datasets=[
  {
    title:'Revenue 2026 (EUR)',
    legend:[{c:'#1a73e8',n:'Sponsors'},{c:'#34a853',n:'MCP Pro'},{c:'#ff9800',n:'Polar.sh'}],
    labels:['Jan','Fev','Mar','Avr','Mai','Jun','Jul','Aou','Sep','Oct','Nov','Dec'],
    series:[
      [14,14,28,45,80,120,180,250,320,400,500,650],
      [0,0,0,20,60,150,300,500,800,1200,1800,2500],
      [0,0,10,30,50,80,120,180,250,350,500,700]
    ],
    colors:[[0.1,0.45,0.91],[0.2,0.66,0.33],[1.0,0.6,0.0]]
  },
  {
    title:'Users Growth',
    legend:[{c:'#8ab4f8',n:'npm Downloads'},{c:'#f48fb1',n:'GitHub Stars'},{c:'#81c784',n:'MCP Installs'}],
    labels:['Jan','Fev','Mar','Avr','Mai','Jun','Jul','Aou','Sep','Oct','Nov','Dec'],
    series:[
      [50,80,200,500,1200,2500,5000,8000,12000,18000,25000,35000],
      [1500,1520,1600,1750,2000,2400,3000,3800,5000,6500,8500,11000],
      [0,0,100,300,800,1500,3000,5000,8000,12000,18000,28000]
    ],
    colors:[[0.54,0.71,0.97],[0.96,0.56,0.69],[0.51,0.78,0.52]]
  },
  {
    title:'Platform Adoption',
    legend:[{c:'#4caf50',n:'Android'},{c:'#2196f3',n:'iOS'},{c:'#ff9800',n:'Web'},{c:'#9c27b0',n:'Other'}],
    labels:['And.','iOS','Web','TV','Desktop','Flutter','RN','macOS','visionOS'],
    series:[
      [8500,3200,2800,400,200,600,300,150,80]
    ],
    colors:[[0.3,0.69,0.31],[0.13,0.59,0.95],[1.0,0.6,0.0],[0.61,0.15,0.69]]
  }
];

let currentDataset=0;let transitionStart=0;let transitioning=false;

function setDataset(i){
  document.querySelectorAll('.controls button').forEach((b,j)=>b.classList.toggle('active',j===i));
  currentDataset=i;transitionStart=performance.now()/1000;transitioning=true;
  updateLegend();
}

function updateLegend(){
  const d=datasets[currentDataset];
  document.getElementById('legend').innerHTML=d.legend.map(l=>
    `<div class="legend-item"><div class="legend-dot" style="background:${l.c}"></div>${l.n}</div>`
  ).join('');
}
updateLegend();

// Generate bar geometry
function genBar(x,y,z,w,h,d2,color,anim){
  const verts=[];
  const hw=w/2,hd=d2/2;
  // Front
  verts.push(x-hw,0,z+hd, 0,0,1, ...color,anim);
  verts.push(x+hw,0,z+hd, 0,0,1, ...color,anim);
  verts.push(x+hw,h,z+hd, 0,0,1, ...color,anim);
  verts.push(x-hw,0,z+hd, 0,0,1, ...color,anim);
  verts.push(x+hw,h,z+hd, 0,0,1, ...color,anim);
  verts.push(x-hw,h,z+hd, 0,0,1, ...color,anim);
  // Back
  verts.push(x+hw,0,z-hd, 0,0,-1, ...color,anim);
  verts.push(x-hw,0,z-hd, 0,0,-1, ...color,anim);
  verts.push(x-hw,h,z-hd, 0,0,-1, ...color,anim);
  verts.push(x+hw,0,z-hd, 0,0,-1, ...color,anim);
  verts.push(x-hw,h,z-hd, 0,0,-1, ...color,anim);
  verts.push(x+hw,h,z-hd, 0,0,-1, ...color,anim);
  // Right
  verts.push(x+hw,0,z+hd, 1,0,0, ...color,anim);
  verts.push(x+hw,0,z-hd, 1,0,0, ...color,anim);
  verts.push(x+hw,h,z-hd, 1,0,0, ...color,anim);
  verts.push(x+hw,0,z+hd, 1,0,0, ...color,anim);
  verts.push(x+hw,h,z-hd, 1,0,0, ...color,anim);
  verts.push(x+hw,h,z+hd, 1,0,0, ...color,anim);
  // Left
  verts.push(x-hw,0,z-hd, -1,0,0, ...color,anim);
  verts.push(x-hw,0,z+hd, -1,0,0, ...color,anim);
  verts.push(x-hw,h,z+hd, -1,0,0, ...color,anim);
  verts.push(x-hw,0,z-hd, -1,0,0, ...color,anim);
  verts.push(x-hw,h,z+hd, -1,0,0, ...color,anim);
  verts.push(x-hw,h,z-hd, -1,0,0, ...color,anim);
  // Top
  const tc=[color[0]*1.2,color[1]*1.2,color[2]*1.2];
  verts.push(x-hw,h,z+hd, 0,1,0, ...tc,anim);
  verts.push(x+hw,h,z+hd, 0,1,0, ...tc,anim);
  verts.push(x+hw,h,z-hd, 0,1,0, ...tc,anim);
  verts.push(x-hw,h,z+hd, 0,1,0, ...tc,anim);
  verts.push(x+hw,h,z-hd, 0,1,0, ...tc,anim);
  verts.push(x-hw,h,z-hd, 0,1,0, ...tc,anim);
  return verts;
}

// Grid floor
function genGrid(){
  const v=[];const c=[0.15,0.18,0.25];
  for(let i=-6;i<=6;i++){
    v.push(i,0,-6, 0,1,0,...c,0, i,0,6, 0,1,0,...c,0);
    v.push(-6,0,i, 0,1,0,...c,0, 6,0,i, 0,1,0,...c,0);
  }
  return v;
}

function buildScene(){
  const d=datasets[currentDataset];
  const allVerts=[];
  const maxVal=Math.max(...d.series.flat());
  const barW=0.3;const barD=0.3;
  const numBars=d.labels.length;
  const numSeries=d.series.length;
  const gap=0.15;
  const groupW=(numSeries*barW+(numSeries-1)*gap);
  const totalW=numBars*groupW+(numBars-1)*0.3;
  const startX=-totalW/2+groupW/2;

  for(let i=0;i<numBars;i++){
    for(let s=0;s<numSeries;s++){
      const val=d.series[s][i]||0;
      const h=(val/maxVal)*5;
      const x=startX+i*(groupW+0.3)+s*(barW+gap);
      const z=0;
      const ci=s%d.colors.length;
      const color=d.colors[ci];
      const anim=(i*numSeries+s)/(numBars*numSeries);
      allVerts.push(...genBar(x,0,z,barW,Math.max(h,0.05),barD,color,anim));
    }
  }
  // Grid
  allVerts.push(...genGrid());
  return new Float32Array(allVerts);
}

let vbo=gl.createBuffer();
let vertCount=0;

function uploadScene(){
  const data=buildScene();
  vertCount=data.length/10;
  gl.bindBuffer(gl.ARRAY_BUFFER,vbo);
  gl.bufferData(gl.ARRAY_BUFFER,data,gl.DYNAMIC_DRAW);
  const stride=40;
  const aPos=gl.getAttribLocation(prog,'aPos');
  const aNorm=gl.getAttribLocation(prog,'aNorm');
  const aColor=gl.getAttribLocation(prog,'aColor');
  const aAnim=gl.getAttribLocation(prog,'aAnim');
  gl.enableVertexAttribArray(aPos);gl.vertexAttribPointer(aPos,3,gl.FLOAT,false,stride,0);
  gl.enableVertexAttribArray(aNorm);gl.vertexAttribPointer(aNorm,3,gl.FLOAT,false,stride,12);
  gl.enableVertexAttribArray(aColor);gl.vertexAttribPointer(aColor,3,gl.FLOAT,false,stride,24);
  gl.enableVertexAttribArray(aAnim);gl.vertexAttribPointer(aAnim,1,gl.FLOAT,false,stride,36);
}
uploadScene();

// Camera
let camTheta=0.5,camPhi=0.6,camDist=10;
let targetTheta=camTheta,targetPhi=camPhi,targetDist=camDist;
let dragging=false,lastX=0,lastY=0,autoRotate=true;

canvas.addEventListener('mousedown',e=>{dragging=true;lastX=e.clientX;lastY=e.clientY;autoRotate=false;});
canvas.addEventListener('mousemove',e=>{if(!dragging)return;targetTheta+=(e.clientX-lastX)*0.005;targetPhi+=(e.clientY-lastY)*0.005;targetPhi=Math.max(0.1,Math.min(1.5,targetPhi));lastX=e.clientX;lastY=e.clientY;});
addEventListener('mouseup',()=>dragging=false);
canvas.addEventListener('wheel',e=>{e.preventDefault();targetDist*=1+e.deltaY*0.001;targetDist=Math.max(4,Math.min(20,targetDist));},{passive:false});
canvas.addEventListener('touchstart',e=>{if(e.touches.length===1){dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;autoRotate=false;}});
canvas.addEventListener('touchmove',e=>{if(!dragging)return;e.preventDefault();targetTheta+=(e.touches[0].clientX-lastX)*0.005;targetPhi+=(e.touches[0].clientY-lastY)*0.005;targetPhi=Math.max(0.1,Math.min(1.5,targetPhi));lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;},{passive:false});
canvas.addEventListener('touchend',()=>dragging=false);

// Math
function mat4Perspective(fov,asp,n,f){const t=Math.tan(fov/2);const m=new Float32Array(16);m[0]=1/(asp*t);m[5]=1/t;m[10]=-(f+n)/(f-n);m[11]=-1;m[14]=-2*f*n/(f-n);return m}
function mat4LookAt(eye,center,up){const z=[eye[0]-center[0],eye[1]-center[1],eye[2]-center[2]];const zl=Math.hypot(...z);z[0]/=zl;z[1]/=zl;z[2]/=zl;const x=[up[1]*z[2]-up[2]*z[1],up[2]*z[0]-up[0]*z[2],up[0]*z[1]-up[1]*z[0]];const xl=Math.hypot(...x);x[0]/=xl;x[1]/=xl;x[2]/=xl;const y=[z[1]*x[2]-z[2]*x[1],z[2]*x[0]-z[0]*x[2],z[0]*x[1]-z[1]*x[0]];const m=new Float32Array(16);m[0]=x[0];m[1]=y[0];m[2]=z[0];m[4]=x[1];m[5]=y[1];m[6]=z[1];m[8]=x[2];m[9]=y[2];m[10]=z[2];m[12]=-(x[0]*eye[0]+x[1]*eye[1]+x[2]*eye[2]);m[13]=-(y[0]*eye[0]+y[1]*eye[1]+y[2]*eye[2]);m[14]=-(z[0]*eye[0]+z[1]*eye[1]+z[2]*eye[2]);m[15]=1;return m}
function mat4Mul(a,b){const o=new Float32Array(16);for(let i=0;i<4;i++)for(let j=0;j<4;j++){o[i*4+j]=0;for(let k=0;k<4;k++)o[i*4+j]+=a[k*4+j]*b[i*4+k]}return o}
function mat4Id(){const m=new Float32Array(16);m[0]=m[5]=m[10]=m[15]=1;return m}

gl.enable(gl.DEPTH_TEST);
gl.enable(gl.CULL_FACE);

let lastDataset=-1;

function render(t){
  t/=1000;
  if(autoRotate)targetTheta+=0.003;
  camTheta+=(targetTheta-camTheta)*0.08;
  camPhi+=(targetPhi-camPhi)*0.08;
  camDist+=(targetDist-camDist)*0.08;

  if(lastDataset!==currentDataset){uploadScene();lastDataset=currentDataset;}

  const transition=transitioning?Math.min((t-transitionStart)*1.5,1.0):1.0;
  if(transition>=1.0)transitioning=false;

  const ex=camDist*Math.sin(camPhi)*Math.cos(camTheta);
  const ey=camDist*Math.cos(camPhi);
  const ez=camDist*Math.sin(camPhi)*Math.sin(camTheta);
  const eye=[ex,ey,ez];

  const proj=mat4Perspective(0.8,canvas.width/canvas.height,0.1,100);
  const view=mat4LookAt(eye,[0,1.5,0],[0,1,0]);
  const model=mat4Id();
  const mvp=mat4Mul(proj,mat4Mul(view,model));

  gl.clearColor(0.04,0.055,0.1,1);
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);

  gl.uniformMatrix4fv(uMVP,false,mvp);
  gl.uniformMatrix4fv(uModel,false,model);
  gl.uniform1f(uTime,t);
  gl.uniform1f(uTransition,transition);
  gl.uniform3fv(uEye,eye);

  gl.drawArrays(gl.TRIANGLES,0,vertCount-52*2);
  // Grid as lines
  gl.drawArrays(gl.LINES,vertCount-52*2,52*2);

  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
</html>
