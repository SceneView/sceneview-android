<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Baby-foot 3D — SceneView</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;overflow:hidden}
canvas{width:100vw;height:100vh;display:block;cursor:grab}
canvas:active{cursor:grabbing}
.title{position:fixed;top:20px;left:50%;transform:translateX(-50%);color:#fff;font-family:'Segoe UI',sans-serif;font-size:1.1rem;font-weight:700;z-index:10;text-shadow:0 2px 8px rgba(0,0,0,0.5)}
.title span{color:#34a853}
.wm{position:fixed;bottom:16px;right:16px;color:rgba(138,180,248,0.3);font-size:0.7rem;font-family:'Segoe UI',sans-serif;z-index:10}
</style>
</head>
<body>
<div class="title">⚽ Baby-foot 3D — <span>SceneView</span></div>
<canvas id="c"></canvas>
<div class="wm">Powered by SceneView + WebGL2</div>
<script>
const canvas=document.getElementById('c');
const gl=canvas.getContext('webgl2',{antialias:true,alpha:false});
const dpr=Math.min(devicePixelRatio,2);
function resize(){canvas.width=innerWidth*dpr;canvas.height=innerHeight*dpr;gl.viewport(0,0,canvas.width,canvas.height)}
resize();addEventListener('resize',resize);

const vs=`#version 300 es
in vec3 aP;in vec3 aN;in vec3 aC;
uniform mat4 uMVP;uniform mat4 uM;uniform float uT;
out vec3 vC,vN,vW;
void main(){
  gl_Position=uMVP*vec4(aP,1);
  vC=aC;vN=mat3(uM)*aN;vW=(uM*vec4(aP,1)).xyz;
}`;
const fs=`#version 300 es
precision highp float;
in vec3 vC,vN,vW;
uniform vec3 uEye;
out vec4 fc;
void main(){
  vec3 n=normalize(vN);
  vec3 l1=normalize(vec3(0.4,1.0,0.5));
  vec3 l2=normalize(vec3(-0.3,0.5,-0.4));
  float d1=max(dot(n,l1),0.0);
  float d2=max(dot(n,l2),0.0)*0.3;
  float amb=0.15;
  vec3 v=normalize(uEye-vW);
  vec3 h=normalize(l1+v);
  float spec=pow(max(dot(n,h),0.0),48.0)*0.35;
  float rim=pow(1.0-max(dot(n,v),0.0),3.0)*0.1;
  vec3 col=vC*(amb+d1+d2)+vec3(spec*0.8)+vec3(rim)*vC;
  col=pow(col,vec3(0.9));
  fc=vec4(col,1);
}`;

function compile(s,t){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);return sh}
const prog=gl.createProgram();
gl.attachShader(prog,compile(vs,gl.VERTEX_SHADER));
gl.attachShader(prog,compile(fs,gl.FRAGMENT_SHADER));
gl.linkProgram(prog);gl.useProgram(prog);

const uMVP=gl.getUniformLocation(prog,'uMVP');
const uM=gl.getUniformLocation(prog,'uM');
const uT=gl.getUniformLocation(prog,'uT');
const uEye=gl.getUniformLocation(prog,'uEye');

const V=[];

function tri(p1,p2,p3,c){
  const ux=p2[0]-p1[0],uy=p2[1]-p1[1],uz=p2[2]-p1[2];
  const vx=p3[0]-p1[0],vy=p3[1]-p1[1],vz=p3[2]-p1[2];
  let nx=uy*vz-uz*vy,ny=uz*vx-ux*vz,nz=ux*vy-uy*vx;
  const l=Math.hypot(nx,ny,nz)||1;nx/=l;ny/=l;nz/=l;
  V.push(...p1,nx,ny,nz,...c,...p2,nx,ny,nz,...c,...p3,nx,ny,nz,...c);
}
function quad(a,b,c,d,col){tri(a,b,c,col);tri(a,c,d,col)}

// Box helper
function box(x,y,z,w,h,d,c){
  const hw=w/2,hd=d/2;
  // Front
  quad([x-hw,y,z+hd],[x+hw,y,z+hd],[x+hw,y+h,z+hd],[x-hw,y+h,z+hd],c);
  // Back
  quad([x+hw,y,z-hd],[x-hw,y,z-hd],[x-hw,y+h,z-hd],[x+hw,y+h,z-hd],c);
  // Right
  quad([x+hw,y,z+hd],[x+hw,y,z-hd],[x+hw,y+h,z-hd],[x+hw,y+h,z+hd],c);
  // Left
  quad([x-hw,y,z-hd],[x-hw,y,z+hd],[x-hw,y+h,z+hd],[x-hw,y+h,z-hd],c);
  // Top
  const tc=[c[0]*1.15,c[1]*1.15,c[2]*1.15];
  quad([x-hw,y+h,z+hd],[x+hw,y+h,z+hd],[x+hw,y+h,z-hd],[x-hw,y+h,z-hd],tc);
  // Bottom
  const bc=[c[0]*0.6,c[1]*0.6,c[2]*0.6];
  quad([x-hw,y,z-hd],[x+hw,y,z-hd],[x+hw,y,z+hd],[x-hw,y,z+hd],bc);
}

// Cylinder helper
function cyl(x,y,z,r,h,segs,c){
  for(let i=0;i<segs;i++){
    const a1=i/segs*Math.PI*2,a2=(i+1)/segs*Math.PI*2;
    const c1=Math.cos(a1),s1=Math.sin(a1),c2=Math.cos(a2),s2=Math.sin(a2);
    quad([x+c1*r,y,z+s1*r],[x+c2*r,y,z+s2*r],[x+c2*r,y+h,z+s2*r],[x+c1*r,y+h,z+s1*r],c);
    tri([x,y+h,z],[x+c1*r,y+h,z+s1*r],[x+c2*r,y+h,z+s2*r],[c[0]*1.1,c[1]*1.1,c[2]*1.1]);
    tri([x,y,z],[x+c2*r,y,z+s2*r],[x+c1*r,y,z+s1*r],[c[0]*0.7,c[1]*0.7,c[2]*0.7]);
  }
}

// Sphere helper
function sphere(cx,cy,cz,r,segs,c){
  for(let i=0;i<segs;i++){
    for(let j=0;j<segs;j++){
      const p1=i/segs*Math.PI,p2=(i+1)/segs*Math.PI;
      const t1=j/segs*Math.PI*2,t2=(j+1)/segs*Math.PI*2;
      const v1=[cx+r*Math.sin(p1)*Math.cos(t1),cy+r*Math.cos(p1),cz+r*Math.sin(p1)*Math.sin(t1)];
      const v2=[cx+r*Math.sin(p2)*Math.cos(t1),cy+r*Math.cos(p2),cz+r*Math.sin(p2)*Math.sin(t1)];
      const v3=[cx+r*Math.sin(p2)*Math.cos(t2),cy+r*Math.cos(p2),cz+r*Math.sin(p2)*Math.sin(t2)];
      const v4=[cx+r*Math.sin(p1)*Math.cos(t2),cy+r*Math.cos(p1),cz+r*Math.sin(p1)*Math.sin(t2)];
      tri(v1,v2,v3,c);tri(v1,v3,v4,c);
    }
  }
}

const wood=[0.45,0.28,0.12];
const darkWood=[0.35,0.2,0.08];
const chrome=[0.75,0.75,0.78];
const green=[0.1,0.55,0.15];
const darkGreen=[0.08,0.42,0.1];
const white=[0.9,0.9,0.92];
const red=[0.85,0.15,0.1];
const blue=[0.1,0.15,0.85];
const black=[0.1,0.1,0.1];
const yellow=[0.95,0.85,0.2];

// TABLE
const tW=3.6,tD=2.0,tH=0.15,legH=2.0;

// Legs (4 corners)
box(-tW/2+0.1,0,-tD/2+0.1, 0.15,legH,0.15, darkWood);
box(tW/2-0.1,0,-tD/2+0.1, 0.15,legH,0.15, darkWood);
box(-tW/2+0.1,0,tD/2-0.1, 0.15,legH,0.15, darkWood);
box(tW/2-0.1,0,tD/2-0.1, 0.15,legH,0.15, darkWood);

// Side walls
box(0,legH,-tD/2, tW,0.3,0.08, wood); // front wall
box(0,legH,tD/2, tW,0.3,0.08, wood);  // back wall
box(-tW/2,legH,0, 0.08,0.3,tD, wood); // left wall
box(tW/2,legH,0, 0.08,0.3,tD, wood);  // right wall

// Playing field (green surface)
box(0,legH+0.29,0, tW-0.16,0.04,tD-0.16, green);

// Field lines (white stripes)
box(0,legH+0.335,0, 0.02,0.005,tD-0.2, white); // center line
// Center circle (approximate with thin boxes)
for(let i=0;i<16;i++){
  const a=i/16*Math.PI*2;
  const r=0.3;
  box(Math.cos(a)*r,legH+0.335,Math.sin(a)*r, 0.04,0.005,0.02, white);
}

// Goals (nets)
box(-tW/2+0.02,legH+0.29,-0.25, 0.06,0.2,0.5, black); // left goal
box(tW/2-0.02,legH+0.29,-0.25, 0.06,0.2,0.5, black);  // right goal

// RODS (8 rods across the table)
const rodY=legH+0.55;
const rodPositions=[-1.5,-1.0,-0.4,0.0,0.4,1.0,1.5]; // x positions
const rodColors=[chrome,chrome,chrome,chrome,chrome,chrome,chrome];

// Rod configurations: [x, players per rod, team color]
const rods=[
  [-1.5, 1, red],    // goalie red
  [-1.0, 2, red],    // defense red
  [-0.4, 5, red],    // midfield red
  [0.0, 3, blue],    // attack blue (reversed)
  [0.4, 5, blue],    // midfield blue
  [1.0, 2, blue],    // defense blue
  [1.5, 1, blue],    // goalie blue
];

for(const [rx, count, teamColor] of rods){
  // Rod (thin chrome cylinder across)
  cyl(rx,rodY,-tD/2-0.15, 0.02,tD+0.3, 8, chrome);

  // Handle on far side
  cyl(rx,rodY,tD/2+0.15, 0.04,0.25, 8, darkWood);
  // Handle knob
  cyl(rx,rodY,tD/2+0.38, 0.05,0.08, 8, darkWood);

  // Players
  const spacing=tD*0.8/(count+1);
  const startZ=-tD*0.4+spacing;
  for(let p=0;p<count;p++){
    const pz=startZ+p*spacing;
    // Body
    box(rx,rodY-0.12,pz, 0.08,0.22,0.06, teamColor);
    // Head
    sphere(rx,rodY+0.12,pz, 0.045, 6, [0.9,0.75,0.6]);
    // Feet
    box(rx,rodY-0.18,pz, 0.1,0.06,0.04, black);
  }
}

// Ball
sphere(0,legH+0.36,0, 0.04, 8, white);

// Score counters (beads on wire)
for(let i=0;i<5;i++){
  sphere(-tW/2-0.08,legH+0.1+i*0.06,tD/2-0.15, 0.025, 6, red);
  sphere(tW/2+0.08,legH+0.1+i*0.06,tD/2-0.15, 0.025, 6, blue);
}

// Floor — wooden parquet
for(let fx=-4;fx<5;fx++){
  for(let fz=-4;fz<5;fz++){
    const shade=((fx+fz)%2===0)?[0.42,0.28,0.14]:[0.38,0.24,0.11];
    quad([fx,0,fz],[fx+1,0,fz],[fx+1,0,fz+1],[fx,0,fz+1],shade);
  }
}

// Walls
const wallC=[0.25,0.22,0.18];
box(0,0,-5, 10,3,0.15, wallC); // back wall
box(0,0,5, 10,3,0.15, wallC);  // front wall
box(-5,0,0, 0.15,3,10, wallC); // left wall
box(5,0,0, 0.15,3,10, wallC);  // right wall

// Window on back wall (lighter rectangle)
box(1.5,1.2,-4.9, 1.2,1.0,0.05, [0.5,0.65,0.8]);
box(-1.5,1.2,-4.9, 1.2,1.0,0.05, [0.5,0.65,0.8]);

// Window frame
box(1.5,1.7,-4.88, 1.3,0.04,0.03, darkWood);
box(1.5,0.7,-4.88, 1.3,0.04,0.03, darkWood);
box(0.85,1.2,-4.88, 0.04,1.1,0.03, darkWood);
box(2.15,1.2,-4.88, 0.04,1.1,0.03, darkWood);
box(-1.5,1.7,-4.88, 1.3,0.04,0.03, darkWood);
box(-1.5,0.7,-4.88, 1.3,0.04,0.03, darkWood);
box(-2.15,1.2,-4.88, 0.04,1.1,0.03, darkWood);
box(-0.85,1.2,-4.88, 0.04,1.1,0.03, darkWood);

// Ceiling lamp
cyl(0,2.95,0, 0.02,0.05, 6, chrome);
cyl(0,2.7,0, 0.25,0.08, 12, [0.2,0.18,0.15]);
sphere(0,2.65,0, 0.12, 8, [1.0,0.95,0.7]); // bulb

// Bar counter on the right
box(4.0,0,0, 0.6,1.1,2.5, darkWood);
box(4.0,1.1,0, 0.7,0.06,2.6, wood); // counter top

// Beer glasses on counter
cyl(4.0,1.16,-0.5, 0.06,0.18, 8, [0.95,0.85,0.4]);
cyl(4.0,1.16,0.3, 0.06,0.18, 8, [0.95,0.85,0.4]);
cyl(3.85,1.16,0.8, 0.06,0.18, 8, [0.85,0.55,0.2]);

// Stools
for(let sz=-0.8;sz<=0.8;sz+=0.8){
  cyl(3.3,0,sz, 0.04,0.8, 6, chrome);
  cyl(3.3,0.8,sz, 0.18,0.05, 10, [0.6,0.15,0.1]);
}

// Dartboard on left wall
cyl(-4.9,1.8,0, 0.35,0.05, 16, [0.15,0.12,0.08]);
// Rings
for(let r=0;r<5;r++){
  const ringR=0.07+r*0.06;
  const ringC=r%2===0?[0.85,0.15,0.1]:[0.12,0.4,0.15];
  for(let i=0;i<12;i++){
    const a=i/12*Math.PI*2;
    sphere(-4.87,1.8+Math.sin(a)*ringR,Math.cos(a)*ringR, 0.015, 4, ringC);
  }
}
// Bullseye
sphere(-4.87,1.8,0, 0.025, 6, [0.9,0.1,0.1]);

// Poster/picture frames on walls
box(-2.5,1.8,4.88, 0.6,0.45,0.03, [0.3,0.25,0.2]);
box(-2.5,1.8,4.85, 0.5,0.35,0.02, [0.2,0.35,0.5]);
box(2.0,1.6,4.88, 0.5,0.7,0.03, [0.3,0.25,0.2]);
box(2.0,1.6,4.85, 0.4,0.6,0.02, [0.4,0.3,0.2]);

// Neon sign "BAR" on back wall (glowing boxes)
const neon=[0.1,0.6,1.0];
box(-0.3,2.4,-4.88, 0.12,0.2,0.03, neon); // B
box(-0.1,2.4,-4.88, 0.12,0.2,0.03, neon); // A
box(0.1,2.4,-4.88, 0.12,0.2,0.03, neon);  // R

// Upload
const data=new Float32Array(V);
const vertCount=data.length/9;
const vbo=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,vbo);
gl.bufferData(gl.ARRAY_BUFFER,data,gl.STATIC_DRAW);
const stride=36;
gl.enableVertexAttribArray(0);gl.vertexAttribPointer(0,3,gl.FLOAT,false,stride,0);
gl.enableVertexAttribArray(1);gl.vertexAttribPointer(1,3,gl.FLOAT,false,stride,12);
gl.enableVertexAttribArray(2);gl.vertexAttribPointer(2,3,gl.FLOAT,false,stride,24);

// Camera
let theta=0.3,phi=0.65,dist=5.5;
let tT=theta,tP=phi,tD2=dist;
let drag=false,lx=0,ly=0,auto=true;

canvas.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;auto=false});
canvas.addEventListener('mousemove',e=>{if(!drag)return;tT+=(e.clientX-lx)*0.005;tP-=(e.clientY-ly)*0.005;tP=Math.max(0.15,Math.min(1.4,tP));lx=e.clientX;ly=e.clientY});
addEventListener('mouseup',()=>drag=false);
canvas.addEventListener('wheel',e=>{e.preventDefault();tD2*=1+e.deltaY*0.001;tD2=Math.max(2.5,Math.min(12,tD2))},{passive:false});
canvas.addEventListener('touchstart',e=>{if(e.touches.length===1){drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;auto=false}});
canvas.addEventListener('touchmove',e=>{if(!drag)return;e.preventDefault();tT+=(e.touches[0].clientX-lx)*0.005;tP-=(e.touches[0].clientY-ly)*0.005;tP=Math.max(0.15,Math.min(1.4,tP));lx=e.touches[0].clientX;ly=e.touches[0].clientY},{passive:false});
canvas.addEventListener('touchend',()=>drag=false);

function mat4P(f,a,n,r){const t=Math.tan(f/2),m=new Float32Array(16);m[0]=1/(a*t);m[5]=1/t;m[10]=-(r+n)/(r-n);m[11]=-1;m[14]=-2*r*n/(r-n);return m}
function mat4L(e,c,u){const z=[e[0]-c[0],e[1]-c[1],e[2]-c[2]];const zl=Math.hypot(...z);z[0]/=zl;z[1]/=zl;z[2]/=zl;const x=[u[1]*z[2]-u[2]*z[1],u[2]*z[0]-u[0]*z[2],u[0]*z[1]-u[1]*z[0]];const xl=Math.hypot(...x);x[0]/=xl;x[1]/=xl;x[2]/=xl;const y=[z[1]*x[2]-z[2]*x[1],z[2]*x[0]-z[0]*x[2],z[0]*x[1]-z[1]*x[0]];const m=new Float32Array(16);m[0]=x[0];m[1]=y[0];m[2]=z[0];m[4]=x[1];m[5]=y[1];m[6]=z[1];m[8]=x[2];m[9]=y[2];m[10]=z[2];m[12]=-(x[0]*e[0]+x[1]*e[1]+x[2]*e[2]);m[13]=-(y[0]*e[0]+y[1]*e[1]+y[2]*e[2]);m[14]=-(z[0]*e[0]+z[1]*e[1]+z[2]*e[2]);m[15]=1;return m}
function mat4M(a,b){const o=new Float32Array(16);for(let i=0;i<4;i++)for(let j=0;j<4;j++){o[i*4+j]=0;for(let k=0;k<4;k++)o[i*4+j]+=a[k*4+j]*b[i*4+k]}return o}
function mat4I(){const m=new Float32Array(16);m[0]=m[5]=m[10]=m[15]=1;return m}

gl.enable(gl.DEPTH_TEST);

function render(t){
  t/=1000;
  if(auto)tT+=0.003;
  theta+=(tT-theta)*0.06;
  phi+=(tP-phi)*0.06;
  dist+=(tD2-dist)*0.06;

  const ex=dist*Math.sin(phi)*Math.cos(theta);
  const ey=dist*Math.cos(phi)+1.5;
  const ez=dist*Math.sin(phi)*Math.sin(theta);
  const eye=[ex,ey,ez];

  const proj=mat4P(0.7,canvas.width/canvas.height,0.1,50);
  const view=mat4L(eye,[0,2.2,0],[0,1,0]);
  const mvp=mat4M(proj,mat4M(view,mat4I()));

  gl.clearColor(0.04,0.05,0.1,1);
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);

  gl.uniformMatrix4fv(uMVP,false,mvp);
  gl.uniformMatrix4fv(uM,false,mat4I());
  gl.uniform1f(uT,t);
  gl.uniform3fv(uEye,eye);

  gl.drawArrays(gl.TRIANGLES,0,vertCount);
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
</html>
