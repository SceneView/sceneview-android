<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Blue gradient for top face -->
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8AB4F8"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <!-- Right face gradient -->
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#1A73E8"/>
    </linearGradient>
    <!-- Left face gradient -->
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A73E8"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>

  <!-- Background — transparent for logo use -->

  <!-- Drop shadow -->
  <polygon points="256,420 390,342 390,338 256,416 122,338 122,342"
           fill="rgba(0,0,0,0.1)"/>

  <!-- Left face — deep blue -->
  <polygon points="256,272 122,194 122,340 256,418"
           fill="url(#leftGrad)"/>

  <!-- Right face — medium blue -->
  <polygon points="256,272 390,194 390,340 256,418"
           fill="url(#rightGrad)"/>

  <!-- Top face — bright blue -->
  <polygon points="256,126 390,204 256,282 122,204"
           fill="url(#topGrad)"/>

  <!-- Top face inner highlight -->
  <polygon points="256,145 370,210 256,275 142,210"
           fill="rgba(255,255,255,0.12)"/>

  <!-- Edge highlights -->
  <polygon points="256,126 390,204 256,282 122,204"
           fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <line x1="122" y1="204" x2="122" y2="340"
        stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <line x1="390" y1="204" x2="390" y2="340"
        stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <line x1="256" y1="282" x2="256" y2="418"
        stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Viewport brackets — white, rounded caps -->
  <!-- Top-left -->
  <polyline points="96,120 96,82 134,82"
            fill="none" stroke="#1A73E8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Top-right -->
  <polyline points="416,120 416,82 378,82"
            fill="none" stroke="#1A73E8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom-left -->
  <polyline points="96,392 96,430 134,430"
            fill="none" stroke="#1A73E8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom-right -->
  <polyline points="416,392 416,430 378,430"
            fill="none" stroke="#1A73E8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
