<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#005BC1"/>
      <stop offset="100%" stop-color="#6446CD"/>
    </linearGradient>
    <linearGradient id="cube-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A4C1FF"/>
      <stop offset="100%" stop-color="#5A8EE8"/>
    </linearGradient>
    <linearGradient id="cube-right" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3D7FD9"/>
      <stop offset="100%" stop-color="#005BC1"/>
    </linearGradient>
    <linearGradient id="cube-left" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#005BC1"/>
      <stop offset="100%" stop-color="#003A7D"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>
  <ellipse cx="350" cy="250" rx="400" ry="350" fill="url(#glow)"/>

  <!-- Isometric cube — right side -->
  <g transform="translate(760, 220) scale(3)">
    <polygon points="0,10 -40,-15 -40,25 0,50" fill="url(#cube-left)"/>
    <polygon points="0,10 40,-15 40,25 0,50" fill="url(#cube-right)"/>
    <polygon points="0,-30 40,-5 0,20 -40,-5" fill="url(#cube-top)"/>
    <polyline points="-52,-38 -52,-48 -42,-48" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="52,-38 52,-48 42,-48" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="-52,58 -52,68 -42,68" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="52,58 52,68 42,68" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text -->
  <text x="80" y="200" fill="white" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="64" font-weight="800" letter-spacing="-2">SceneView</text>
  <text x="80" y="260" fill="rgba(255,255,255,0.85)" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="400">3D and AR for Jetpack Compose</text>

  <!-- Features -->
  <g transform="translate(80, 310)">
    <rect x="0" y="0" width="110" height="30" rx="15" fill="rgba(255,255,255,0.12)"/>
    <text x="55" y="20" fill="rgba(255,255,255,0.9)" font-family="Inter, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Filament PBR</text>

    <rect x="120" y="0" width="80" height="30" rx="15" fill="rgba(255,255,255,0.12)"/>
    <text x="160" y="20" fill="rgba(255,255,255,0.9)" font-family="Inter, sans-serif" font-size="12" font-weight="500" text-anchor="middle">ARCore</text>

    <rect x="210" y="0" width="90" height="30" rx="15" fill="rgba(255,255,255,0.12)"/>
    <text x="255" y="20" fill="rgba(255,255,255,0.9)" font-family="Inter, sans-serif" font-size="12" font-weight="500" text-anchor="middle">AI + MCP</text>

    <rect x="310" y="0" width="100" height="30" rx="15" fill="rgba(255,255,255,0.12)"/>
    <text x="360" y="20" fill="rgba(255,255,255,0.9)" font-family="Inter, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Open Source</text>
  </g>

  <!-- Version -->
  <rect x="80" y="130" width="56" height="24" rx="12" fill="rgba(255,255,255,0.15)"/>
  <text x="108" y="147" fill="rgba(255,255,255,0.9)" font-family="Inter, sans-serif" font-size="11" font-weight="600" text-anchor="middle">v3.5.2</text>
</svg>
