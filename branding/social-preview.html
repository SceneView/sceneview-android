<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>SceneView — Social Preview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 640px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0D2137;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Subtle radial glow behind content */
  body::before {
    content: '';
    position: absolute;
    width: 800px;
    height: 500px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse at center, rgba(138,180,248,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    position: relative;
    z-index: 1;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 28px;
    margin-bottom: 16px;
  }

  .logo-row svg {
    width: 120px;
    height: 120px;
    flex-shrink: 0;
  }

  .title {
    font-size: 86px;
    font-weight: 800;
    color: #FFFFFF;
    letter-spacing: -2px;
    line-height: 1;
  }

  .subtitle {
    font-size: 28px;
    font-weight: 500;
    color: #8AB4F8;
    letter-spacing: 0.5px;
    margin-bottom: 48px;
  }

  .platforms {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    border-radius: 28px;
    background: rgba(138,180,248,0.10);
    border: 1px solid rgba(138,180,248,0.20);
    color: rgba(255,255,255,0.85);
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  .badge svg {
    width: 20px;
    height: 20px;
    fill: #8AB4F8;
    flex-shrink: 0;
  }

  /* Thin bottom accent line */
  .accent-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent 5%, #8AB4F8 30%, #A8CBFA 50%, #8AB4F8 70%, transparent 95%);
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo-row">
    <!-- Inlined logo-dark.svg -->
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="120" height="120">
      <defs>
        <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#A8CBFA"/>
          <stop offset="100%" stop-color="#8AB4F8"/>
        </linearGradient>
        <linearGradient id="rightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#8AB4F8"/>
          <stop offset="100%" stop-color="#4A90D9"/>
        </linearGradient>
        <linearGradient id="leftGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#4A90D9"/>
          <stop offset="100%" stop-color="#1A73E8"/>
        </linearGradient>
      </defs>
      <ellipse cx="256" cy="300" rx="160" ry="80" fill="rgba(138,180,248,0.06)"/>
      <polygon points="256,272 122,194 122,340 256,418" fill="url(#leftGrad)"/>
      <polygon points="256,272 390,194 390,340 256,418" fill="url(#rightGrad)"/>
      <polygon points="256,126 390,204 256,282 122,204" fill="url(#topGrad)"/>
      <polygon points="256,145 370,210 256,275 142,210" fill="rgba(255,255,255,0.08)"/>
      <polygon points="256,126 390,204 256,282 122,204" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
      <line x1="122" y1="204" x2="122" y2="340" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
      <line x1="390" y1="204" x2="390" y2="340" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
      <line x1="256" y1="282" x2="256" y2="418" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <polyline points="96,120 96,82 134,82" fill="none" stroke="#8AB4F8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="416,120 416,82 378,82" fill="none" stroke="#8AB4F8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="96,392 96,430 134,430" fill="none" stroke="#8AB4F8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="416,392 416,430 378,430" fill="none" stroke="#8AB4F8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="title">SceneView</span>
  </div>

  <div class="subtitle">3D &amp; AR SDK for Every Platform</div>

  <div class="platforms">
    <div class="badge">
      <!-- Android robot head icon -->
      <svg viewBox="0 0 24 24"><path d="M6 18c0 .55.45 1 1 1h1v3.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5V19h2v3.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5V19h1c.55 0 1-.45 1-1V8H6v10zM3.5 8C2.67 8 2 8.67 2 9.5v7c0 .83.67 1.5 1.5 1.5S5 17.33 5 16.5v-7C5 8.67 4.33 8 3.5 8zm17 0c-.83 0-1.5.67-1.5 1.5v7c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5v-7c0-.83-.67-1.5-1.5-1.5zm-4.97-5.84l1.3-1.3c.2-.2.2-.51 0-.71-.2-.2-.51-.2-.71 0l-1.48 1.48C13.85 1.23 12.95 1 12 1c-.96 0-1.86.23-2.66.63L7.85.15c-.2-.2-.51-.2-.71 0-.2.2-.2.51 0 .71l1.31 1.31C6.97 3.26 6 5.01 6 7h12c0-1.99-.97-3.75-2.47-4.84zM10 5H9V4h1v1zm5 0h-1V4h1v1z"/></svg>
      Android
    </div>
    <div class="badge">
      <!-- Apple icon -->
      <svg viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      iOS
    </div>
    <div class="badge">
      <!-- Globe/Web icon -->
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      Web
    </div>
    <div class="badge">
      <!-- Desktop icon -->
      <svg viewBox="0 0 24 24"><path d="M21 2H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h7l-2 3v1h8v-1l-2-3h7c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 12H3V4h18v10z"/></svg>
      Desktop
    </div>
    <div class="badge">
      <!-- TV icon -->
      <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
      TV
    </div>
  </div>
</div>

<div class="accent-line"></div>

</body>
</html>
