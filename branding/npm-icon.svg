<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#005BC1"/>
      <stop offset="100%" stop-color="#6446CD"/>
    </linearGradient>
    <linearGradient id="ct" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A4C1FF"/>
      <stop offset="100%" stop-color="#5A8EE8"/>
    </linearGradient>
    <linearGradient id="cr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3D7FD9"/>
      <stop offset="100%" stop-color="#005BC1"/>
    </linearGradient>
    <linearGradient id="cl" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#005BC1"/>
      <stop offset="100%" stop-color="#003A7D"/>
    </linearGradient>
  </defs>

  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Isometric cube -->
  <g transform="translate(128, 120) scale(2.2)">
    <polygon points="0,10 -30,-10 -30,20 0,40" fill="url(#cl)"/>
    <polygon points="0,10 30,-10 30,20 0,40" fill="url(#cr)"/>
    <polygon points="0,-22 30,-2 0,18 -30,-2" fill="url(#ct)"/>
  </g>

  <!-- Viewport brackets -->
  <g stroke="rgba(255,255,255,0.45)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="42,52 42,38 56,38"/>
    <polyline points="214,52 214,38 200,38"/>
    <polyline points="42,204 42,218 56,218"/>
    <polyline points="214,204 214,218 200,218"/>
  </g>
</svg>
